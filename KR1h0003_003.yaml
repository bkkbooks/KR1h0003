body:
  text: 欽定四庫全書孟子注疏卷三上漢趙氏注宋孫奭音義并疏公孫丑章句上注公孫丑者公孫姓丑名孟子弟子也丑有政事之才問管晏之功猶論語子路問政故以題篇疏正義曰前篇章首論梁惠王問以利國孟子答以仁義之事故目梁惠王為篇題蓋謂君國當以仁義為首也既以仁義為首然後其政可得行之是以此篇公孫丑有政事之才而問管晏之功如論語子路問政遂以目為篇題不亦宜乎故次梁惠王之篇所以揭公孫丑為此篇之題也此篇凡二十有三章自趙氏分之遂為上下卷據此上卷有九章而已一章言德流速於置郵君子得時大行其道管晏為曽西之所羞二章言義以行勇則不動心養氣順道無效揠苖聖人量時賢者道偏孟子究言情理而歸學孔子三章言王者任德霸者兼力四章言國必修政君必行仁禍福由已不専在天當防患於未亂五章言修古之道鄰國之民以為父母命曰天吏六章言人之行當內求諸已以演大四端充擴其道上以正君下以榮身七章言各治其術術有善惡禍福之來隨行而作耻為人役不若居仁治術之忌勿為矢人八章言大聖之君由取善於人九章言伯夷栁下惠古之大賢猶有所闕其餘十四章趙氏分在下卷各有分說注公孫姓丑名孟子弟子也至題篇正義曰自魯桓公之子慶父之後有孟孫氏叔孫氏季孫氏同出三桓子孫衛國有王孫賈出自周頃王之後王孫賈之子自以去王室久改為賈孫氏故孫氏多焉又非特止於一族也自封公後其子孫皆以公孫為氏春秋隱公八年無駭卒羽父請諡與族公問族於衆仲衆仲對曰天子建德因生以賜姓公命以字為展氏杜預曰諸侯之子稱公子公子之子稱公孫公孫之子以王父字為氏然則公孫氏皆自公子之後為氏也今公孫丑其氏有自來矣案史記孟子列傳云孟子退而與萬章公孫丑之徒著述作七篇則公孫丑為孟子弟子明矣絰曰弟子之惑滋甚是也論語第十三篇子路問政子曰先之勞之請益曰無倦集論語者因其問政故以題篇若此公孫丑有政事之才而問管晏之功亦以因其人而題其篇而次之梁惠王也公孫丑問曰夫子當路於齊管仲晏子之功可復許乎注夫子謂孟子許猶興也如使夫子得當仕路於齊而可以行道管夷吾晏嬰之功寧可復興乎孟子曰子誠齊人也知管仲晏子而已矣注誠實也子實齊人也但知二子而已豈復知王者之佐乎或問乎曽西曰吾子與子路孰賢曽西蹴然曰吾先子之所畏也注曽西曽子之孫蹴然猶蹴踖也先子曽子也子路在四友故曽子畏敬之曽西不敢比曰然則吾子與管仲孰賢曽西艴然不悅曰爾何曽比豫於管仲注艴然愠怒色也何曽猶何乃也管仲得君如彼其専也行乎國政如彼其久也功烈如彼其卑也爾何曽比豫於是注曽西答㦯人言管仲得遇桓公使之専國政如彼行政於國其久如彼功烈卑陋如彼謂不率齊桓公行王道而行霸道故言卑也重言何曽比我耻見比之之甚也曰管仲曽西之所不為也而子為我願之乎注孟子心狹曽西曽西尚不欲為管仲而子為我願之乎非丑之言小也曰管仲以其君霸晏子以其君顯管仲晏子猶不足為與注丑曰管仲輔桓公以霸道晏子相景公以顯名二子如此尚不可以為邪曰以齊王由反手也注孟子言以齊國之大而行王道其易若反手耳故譏管晏不勉其君以王業也曰若是則弟子之惑滋甚且以文王之德百年而後崩猶未洽於天下武王周公繼之然後大行今言王若易然則文王不足法與注丑曰如是言則弟子惑益甚也文王尚不能及身而王何謂若易然也若是則文王不足以為法邪曰文王何可當也由湯至於武丁賢聖之君六七作天下歸殷久矣久則難變也武丁朝諸侯有天下猶運之掌也注武丁髙宗也孟子言文王之時難為功故言何可當也從湯以下賢聖之君六七興謂太甲太戊盤庚等也運之掌言其易也紂之去武丁未久也其故家遺俗流風善政猶有存者又有微子微仲王子比干箕子膠鬲皆賢人也相與輔相之故久而後失之也尺地莫非其有也一民莫非其臣也然而文王猶方百里起是以難也注紂得髙宗餘化又多良臣故久乃亡也微仲膠鬲皆良臣也但不在三仁中耳文王當此時故難也齊人有言曰雖有知慧不如乘勢雖有鎡基不如待時今時則易然也注齊人諺言也乘勢居富貴之勢鎡基田器耒耜之屬待時三農時也今時易以行王化者也夏后殷周之盛地未有過千里者也而齊有其地矣雞鳴狗吠相聞而達乎四境而齊有其民矣地不改辟矣民不改聚矣行仁政而王莫之能禦也注三代之盛封畿千里耳今齊地土民人以足矣不更辟土聚民也雞鳴狗吠相聞言民室屋相望而衆多也以此行仁而王誰能止之也且王者之不作未有疏於此時者也民之憔悴於虐政未有甚於此時者也飢者易為食渴者易為飲孔子曰德之流行速於置郵而傳命注言王政不興久矣民患虐政甚矣若飢者食易為美渴者飲易為甘德之流行疾於置郵傳書命也當今之時萬乘之國行仁政民之悅之猶解倒懸也故事半古之人功必倍之惟此時為然注倒懸喻困苦也當今所施恩惠之事半於古人而功倍之矣言今行之易也音義復扶又切下同蹴子六切踧同踖子亦切艴丁音勃張音拂何曽丁音憎則也乃也愠于問切帥音率重直用切為于僞切注及後章非為皆同與音餘下法與聞與同與皆同以齊王之王張于况切云此字既多可以義詳由丁云義當作猶如也古字借用耳下文由弓人由矢人義同易以豉切朝音潮鬲丁隔歷二音輔相息亮切丁本作押音甲廣雅云輔也義與央同鎡或作兹音同辟音闢郵丁音尤今之驛也疏正義曰此章言德流之速過於置郵君子得時大行其道管晏雖勤猶為曽西所羞也公孫丑問曰夫子當路於齊管仲晏子之功可復許乎者公孫丑問孟子言夫子得當仕路於齊國則管仲晏子佐桓景二霸之功寧可復興之乎管仲管夷吾也晏子晏嬰也夷吾佐桓公者也晏嬰佐景公者也孟子曰子誠齊人也知管仲晏子而已矣者孟子答公孫丑以謂子實齊國之人也然但能知此二子而止矣孟子答之以此者其意蓋謂丑豈能復知有王者之佐乎或問乎曽西曰吾子與子路孰賢曽西蹴然曰吾先子之所畏也至爾何曽比豫於是者孟子又謂嘗有或人問乎曽西曽西曽子之孫也而曰吾子與子路孰賢曽西乃蹴踖而言曰我先子曽子所敬畏者也曰然則吾子與管仲孰賢曽西艴然不恱曰爾何曽比豫於管仲者言或人又曰如是則吾子與管仲孰為賢曽西乃艴然愠怒而不悅曰爾何以乃比我於管仲為也管仲得君如彼其専也行乎國政如彼其久也功烈如彼其卑也爾何曽比豫於是者曽西言管仲得齊桓立為仲父貴戚不敢為之妬與高國之位大臣不敢為之惡內外政皆盡委之斷焉言如此其専也自立位相職至終四十餘年執齊國之政言其行政又如此其久也其終也不過致君為霸者而已而其功烈只如此之卑也爾故何如乃比我於是之甚焉功烈者蓋致力以為功成業以為烈言管仲以力致齊桓則止於為霸功以業成就齊桓則亦止為霸烈故曰功烈如彼之卑也孟子所以引此或人與曽西之言者意在於王佐為貴也不以霸者之佐為貴也故曰管仲曽西之所不為也而子為我願之乎者孟子言管仲曽西之所不願為也而子以為我願比之乎云子者指公孫丑而云也曰管仲以其君霸晏子以其君顯管仲晏子猶不足為與曰以齊王由反手也者孟子言管仲以佐其君為霸晏子以佐其君而顯名管仲晏子猶若不足為耳言我能佐齊國之大而行王道為王其易則若反覆手掌也故曰以齊王由反手也孟子言此蓋譏管晏二子不能致君行王道耳曰若是則弟子之惑滋甚者公孫丑不曉孟子意在譏管晏二子但為霸者之佐故於孟子曰如此之言則弟子之蔽惑益甚也弟子者蓋公孫丑自稱為孟子弟子也且以文王之德百年而後崩猶未洽於天下武王周公繼之然後大行今言王若易然則文王不足法與者公孫丑言今且以文王之德化觀之起自百里之微加之百年之久而後崩喪其尚不能及身而王天下浹洽其德及武王周公繼續之然後德化大行為王於天下今言以齊王若反手之易是則文王不足以為之法與曰文王何可當也由湯至於武丁賢聖之君六七作天下歸殷久矣久則難變也武丁朝諸侯有天下猶運之掌也至是以難也者孟子又言文王安可當也言自湯至於武丁其間賢聖之君六七作故天下德化被民也久恩澤漸人也深而天下之民歸心於殷固以久而難變也是以武丁朝諸侯而有天下若反運手掌之易也武丁髙宗也云六七作若太甲太戊祖乙盤庚等是也紂之去武丁未久也其故家遺俗流風善政猶有存者至是以難也者孟子又言自殷紂去武丁之時尚未久故其世嗣續之故家其民習尚之遺俗上之化下其流風之所被善政之所行尚有存者不特此也又有微子微仲王子比干箕子膠鬲數者皆是賢人相與同輔相其紂故紂之失亡亦至久而後失也雖一尺之地莫非紂之所有一民莫非為紂之臣然而如此尚能自百里之地而興起為王是以難而不若武丁之易也齊人有言曰雖有智慧不如乘勢雖有鎡基不如待時者孟子又言齊國之人有言云人雖有智慧之才亦不如乘其富貴之勢雖有田器如耒耜之屬亦不如乘三時農務之際也蓋大而知之之謂智小而察之之謂慧鎡基田器之利也言人雖有智慧之才然非乘富貴之勢則智慧之才有所不運比之齊國則今時易以行王道者也故曰今時則易然也夏后殷周之盛地未有過千里者也而齊有其地矣至莫之能禦也者孟子言自夏后殷周三代之盛治其封畿皆方千里未有過千里之地者也而齊國今有其地亦得其千里雞鳴狗吠相聞而廣達乎四境是其齊國不特有千里之地而已其間雞犬相聞而又有其民相望而衆多也如此土地亦以足矣故不待更廣闢其土地矣民人亦以足矣又不待聚集其民人矣即行仁為政而王之人莫能禦止之也且王者不作未有疏於此時者也飢者易為食渴者易為飲孔子曰德之流行速於置郵而傳命者孟子又言且王者之不與作未有如疏於此時者也而民人憔悴困苦於暴虐之政又未有如極甚於此時者也似若飢餓者食易為美渴者飲易為甘矣故孔子有云其德化之流行其速疾又過於置郵而傳書命也郵釋名云境上舍也又云官名督郵主諸縣罰負說文曰境上行書舍也當今之時萬乘之國行仁政民之悅之猶解倒懸也者孟子又言當今齊國之時為萬乘之國行仁政而及民則民皆喜悅之如得解其倒懸之索也云倒懸者喻其因苦之如比也故事半古之人功必倍之惟此時為然者孟子又言故於當此之時其施恩惠之事但半於古人其成治功亦必倍過於古人矣故曰惟此當今齊國之時為能如是也管夷吾晏嬰正義曰管仲齊之相也案左傳魯莊公九年桓公殺公子糾召忽死之管仲不死請囚鮑叔受之及堂阜而稅之歸而以告曰管夷吾治於高傒使相可也杜注云堂阜齊地西北有夷吾亭或曰鮑叔解夷吾縛於此又云髙傒齊卿髙敬仲也言管仲治理政事才多於高敬仲遂使相之晏嬰姓晏名嬰齊大夫也語云晏平仲善與人交周注云諡為平諡法曰法治清省曰平案左傳文知之是晏桓子之子也相齊景公注曽西曽子之孫及子路正義曰曽西為曽子之孫者經云曽西曰吾先子之所畏也先子是曽子也以祖稱之也即知曽西乃曽子之孫也其他經傳未詳子路孔子弟子姓仲名由字子路卞國人也案史記弟子傳云少孔子九嵗性鄙好勇力抗直冠雄雞佩豭豚陵暴孔子孔子設禮誘子路子路後儒服委質因門人請為弟子云蹙然猶蹙踖者語云踧踖如也馬注云踧踖恭敬之貌注艴然愠怒邑正義曰釋云艴不悅也字從弗色是知即慍怒之色也注武丁髙宗也至易也正義曰孔安國傳云盤庚弟小乙子名武丁德髙可尊始號為髙宗云從湯以下賢聖之君六七作謂太甲太戊盤庚等是也者案史記世表云自湯之後湯太子早卒故立次弟外丙外丙即位三年卒立外丙弟仲壬仲壬即位四年卒伊尹乃立太丁子太甲太甲成湯適長孫也太甲立三年不明伊尹放之桐三年悔過自責反善伊尹乃迎帝太甲授之政太甲修德諸侯咸歸百姓以寧稱為太宗太宗崩子沃丁立丁崩弟太庚立庚崩子小甲立甲崩弟雍已立殷道衰諸侯或不至已崩弟太戊立殷道復興諸侯歸之故稱中宗中宗崩子仲丁立丁遷于囂丁崩弟外壬立壬崩弟河亶甲立殷道復衰甲崩子帝祖乙立乙立殷道復興乙崩子祖辛立辛崩弟沃甲立甲崩兄祖辛之子祖丁立丁崩弟沃甲之子南庚立庚崩祖丁之子陽甲立殷道復衰甲崩弟盤庚立殷道復興諸侯來朝庚崩弟小辛立殷道復衰辛崩弟小乙立乙崩子武丁立殷道復興故號為髙宗是也注云鎡基田器耒耜之屬正義曰釋名云鎡基大鋤也云農時者左傳莊公二十九年云凡土功龍見而畢務注云今九月周十一月龍星角亢晨見東方三務始畢火見而致用注云大火心星次角亢見者致築作之物水昏正而栽注云謂今十月定星昏而中於是樹板幹而興作日至而畢注云日南至微陽始動故土功畢若其門戶道橋城郭墻塹有所損壞則隨時修之僖公二十年云凡啓塞從時是也又案七月之詩云三之日于耜四之日舉趾同我婦子饁彼南畝注云三之日夏之正月也四之日周之四月民無不舉足耕矣公孫丑問曰夫子加齊之卿相得行道焉雖由此霸王不異矣如此則動心否乎注加猶居也丑問孟子如使夫子得居齊卿相之位行其道德雖用此臣位輔君行之亦不異於古霸王之君矣如是寧動心畏難自恐不能行否耶丑以此為大道不易人當恐懼之不敢欲行也孟子曰否我四十不動心注孟子言禮四十强而仕我志氣已定不妄動心有所畏也曰若是則夫子過孟賁逺矣注丑曰若此夫子志氣堅勇過孟賁賁勇士也孟子勇於德曰是不難告子先我不動心注孟子言是不難也告子之勇未四十而不動心矣曰不動心有道乎注丑問不動心之道云何曰有注孟子欲為言之北宫黝之養勇也不膚撓不目逃思以一毫挫於人若撻之於市朝不受於褐寬博亦不受於萬乘之君視刺萬乘之君若刺褐夫無嚴諸侯惡聲至必反之注北宫姓黝名也人刺其肌膚不為撓郤刺其目目不轉睛逃避之矣人拔一毛若見捶撻於市朝之中矣褐寬博獨夫被褐者嚴尊也無有尊嚴諸侯可敬者也以惡聲加已巳必惡聲報之言所養育勇氣如是也孟施舍之所養勇也曰視不勝猶勝也量敵而後進慮勝而後㑹是畏三軍者也舍豈能為必勝哉能無懼而已矣注孟姓舍名施發音也施舍自言其名則但曰舍舍豈能為必勝哉要不恐懼而已也以為量敵少而進慮勝者足勝乃㑹若此畏三軍之衆者耳非勇者也孟施舍似曽子北宫黝似子夏夫二子之勇未知其孰賢然而孟施舍守約也注孟子以為曽子長於孝孝百行之本子夏知道雖衆不如曽子孝之大也故以舍譬曽子黝譬子夏以施舍要之以不懼為約要也昔者曽子謂子襄曰子好勇乎吾嘗聞大勇於夫子矣自反而不縮雖褐寬博吾不惴焉自反而縮雖千萬人吾往矣孟施舍之守氣又不如曽子之守約也注子襄曽子弟子也夫子謂孔子也縮義也惴懼也詩云惴惴其栗曽子謂子襄言孔子告我大勇之道人加惡於己已內自省有不義不直之心雖敵人被褐寬博一夫不當輕驚懼之也自省有義雖敵家千萬人我直往突之言義之强也施舍雖守勇氣不如曽子守義之為約也曰敢問夫子之不動心與告子之不動心可得聞與注丑曰不動心之勇其意豈可得聞與告子曰不得於言勿求於心不得於心勿求於氣不得於心勿求於氣可不得於言勿求於心不可注不得者不得人之善心善言也求者取也告子為人勇而無慮不原其情人有不善之言加於己不復取其心有善也直怒之矣孟子以為不可也告子知人之有惡心雖以善辭氣來加已亦直怒之矣孟子以為是則可言人當以心為正也告子非純賢其不動心之事一可用一不可用也夫志氣之帥也氣體之充也注志心所念慮也氣所以充滿形體為喜怒也志帥氣而行之度其可否也夫志至焉氣次焉注志為至要之本氣為其次焉故曰持其志無暴其氣注暴亂也言志所嚮氣隨之當正持其志無亂其氣妄以喜怒加人也既曰志至焉氣次焉又曰持其志無暴其氣者何也注丑問暴亂其氣云何曰志一則動氣氣一則動志也今夫蹶者趨者是氣也而反動其心注孟子言一者志氣閉而為一也志閉塞則氣不行氣閉塞則志不通蹶者相動今夫行而蹶者氣閉不能自持故志氣顛倒顛倒之間無不動心而恐矣則志氣之相動也敢問夫子惡乎長注丑問孟子才志所長何等曰我知言我善養吾浩然之氣注孟子云我聞人言能知其情所趨我能自養育我之所有浩然之大氣也敢問何謂浩然之氣注丑問浩然之氣狀何如曰難言也其為氣也至大至剛以直養而無害則塞于天地之間注言此至大至剛正直之氣也然而貫洞纎微洽於神明故言之難也養之以義不以邪事干害之則可使滋蔓塞滿天地之間布施德教無窮極也其為氣也配義與道無是餒也注重說是氣言此氣與道義相配偶俱行義謂仁義可以立德之本也道謂隂陽大道無形而生有形舒之彌六合卷之不盈握包絡天地稟授羣生者也言能養道氣而行義理常以充滿五臟若其無此則腹腸飢虛若人之餒餓也是集義所生者非義襲而取之也注集雜也密聲取敵曰襲言此浩然之氣與義雜生從內而出人生受氣所自有者行有不慊於心則餒矣注慊快也自省所行仁義不備干害浩氣則心腹飢餒矣我故曰告子未嘗知義以其外之也注孟子曰仁義皆出於內而告子嘗以為仁內義外故言其未嘗知義也必有事焉而勿正心勿忘勿助長也注言人行仁義之事必有福在其中而勿正但以為福故為仁義也但心勿忘其為福而亦勿汲汲助長其福也汲汲則似宋人也無若宋人然宋人有閔其苗之不長而揠之者芒芒然歸謂其人曰今日病矣豫助苖長矣其子趨而往視之苖則槁矣注揠挺拔之欲亟長也病罷也芒芒然罷倦之貌其人家人也其子揠苖者之子也趨走也槁乾枯也以喻人之情邀福者必有害若欲急長苖而反使之枯死也天下之不助苖長者寡矣以為無益而舍之者不耘苖者也助之長者揠苖者也非徒無益而又害之注天下人行善者皆欲速得其福恬然者少也以為福祿在天求之無益舍置仁義不求為善是由農夫任天不復耘治其苗也其邀福欲急得之者由此揠苖人也非徒無益於苗乃反害之言告子外義常恐其行義欲急得其福故為丑言人之行當內治善不當急求其福亦若此揠苖者矣何謂知言注丑問知言之意何謂曰詖辭知其所蔽淫辭知其所陷邪辭知其所雜遁辭知其所窮注孟子曰人有險詖之言引事以褒人若賓孟言雄雞自斷其尾之事能知其欲以譽子朝蔽子猛也有淫美不信之辭若驪姬勸晉獻公與申生之事能知欲以陷害之也有邪辟不正之辭若豎牛勸仲壬賜環之事能知其欲行譛毁以離之於叔孫也有隱遁之辭若秦客之廋辭於朝能知其欲以窮晉諸大夫也若此四者之類我聞能知其所趨也生於其心害於其政發於其政害於其事聖人復起必從吾言矣注生於其心譬若人君有好殘賊嚴酷心必妨害仁政不得行之也發於其政者若出令欲以非時田獵築作宫室必妨害民之農事使百姓有飢寒之患也吾見其端欲防而止之如使聖人復興必從吾言也宰我子貢善為說辭冉牛閔子顔淵善言德行孔子兼之曰我於辭命則不能也注言人各有能我於言辭教命則不能如二子然則夫子既聖矣乎注丑見孟子但言不能辭命不言不能德行謂孟子欲自比孔子故曰夫子既已聖矣乎曰惡是何言也昔者子貢問於孔子曰夫子聖矣乎孔子曰聖則吾不能我學不厭而教不倦也子貢曰學不厭智也教不倦仁也仁且智夫子既聖矣夫聖孔子不居是何言也注惡者不安事之歎辭也孟子答丑言往者子貢孔子相答如此孔子尚不敢安居於聖我何敢自謂為聖故再言是何言也昔者竊聞之子夏子游子張皆有聖人之一體冉牛閔子顔淵則具體而微注體者四肢股肱也孟子言昔日竊聞師言也丑方問欲知孟子之德故謙辭言竊聞也一體者得一肢也具體者四肢皆具微小也比聖人之體微小耳體以喻德也敢問所安注丑問孟子所安比也曰姑舍是注姑且也孟子曰且置是我不願比也曰伯夷伊尹何如注丑曰伯夷之行何如孟子心可願比伯夷否曰不同道注言伯夷之行不與孔子伊尹同道也非其君不事非其民不使治則進亂則退伯夷也注非其君非己所好之君也非其民不以正道而得民伯夷不願使之故謂之非其民也何事非君何使非民治亦進亂亦進伊尹也注伊尹曰事非其君者何傷也使非其民者何傷也要欲為天理物冀得行道而已矣可以仕則仕可以止則止可以久則久可以速則速孔子也注止處也久留也速疾去也皆古聖人也吾未能有行焉乃所願則學孔子也注此皆古之聖人我未能有所行若此乃言我心之所庶幾則願欲學孔子所履進退無常量時為宜也伯夷伊尹於孔子若是班乎注班齊等之貌也丑嫌伯夷伊尹與孔子相比問此三人之德班然齊等乎曰否自有生民以來未有孔子也注孟子曰不等也從有生民以來非純聖人則未有與孔子齊德也然則有同與注丑曰然則此三人有同者耶曰有得百里之地而君之皆能以朝諸侯有天下行一不義殺一不辜而得天下皆不為也是則同注孟子曰此三人君國皆能使鄰國諸侯尊敬其德而朝之不以其義得之皆不為也是則孔子同之矣曰敢問其所以異注丑問孔子與二人異謂何曰宰我子貢有若智足以知聖人汙不至阿其所好注孟子曰宰我等三人之智足以識聖人汙下也言三人雖小汙不平亦不至阿其所好以非其事阿私所愛而空譽之其言有可用者欲為丑陳三子之道孔子也宰我曰以豫觀於夫子賢於堯舜逺矣注豫宰我名也以為孔子賢於堯舜以孔子但為聖不王天下而能制作素王之道故美之如使當堯舜之世觀於制度賢之逺也子貢曰見其禮而知其政聞其樂而知其德由百世之後等百世之王莫之能違也自生民以來未有夫子也注見其制作之禮知其政之可以致太平也聽聞其雅頌之樂而知其德之可與文武同也春秋外傳曰五聲昭德言五音之樂聲可以明德也從孔子後百世上推等其德於前百世之聖王無能違離孔子道者自從生民以來未有能備若孔子也有若曰豈惟民哉麒麟之於走獸鳯凰之於飛鳥泰山之於丘垤河海之於行潦類也聖人之於民亦類也出於其類拔乎其萃自生民以來未有盛於孔子也注垤蟻封也行潦道傍流潦也萃聚也有若以為萬類之中各有殊異至於人類卓絶未有盛美過於孔子者也若三子之言孔子所以異於伯夷伊尹也夫聖人之道同符合契前聖後聖其揆一也不得相踰云生民以來無有者此三子皆孔子弟子緣孔子聖德髙美而盛稱之也孟子知其言大過故貶謂之汙下但不以無為有耳因事則褒辭在其中矣亦以眀師徒之義得相褒揚也音義難乃旦切我四十不動心楊子曰請問孟軻之勇曰勇于義而果于德不以貧富貴賤死生動其心於勇也其庶乎賁音奔黝伊糾切撓丁奴效切行丁孟切下之行德行隨行皆同要音邀後以要同好呼報切下好殘所好皆同惴之睡切丁本作遄云音揣恐懼也帥所類切或音率注同本亦作師度大各切蹶音厥又居衛切顛字或作傎音同惡音烏下曰惡同趨音趣下同餒奴罪切陸云言以道義配之則能充塞無是餒也慊口簟切助長張丈切注及下不長苖長長天下皆同揠烏八切拔也芒丁音忙亟音棘疾也罷音皮舍丁張並音捨下舍是舍已皆同詖彼寄切斷丁音短譽音餘亦音豫下譽之同驪姬吕支切邪辟音僻廋音搜說辭張音稅丁又依字夫音扶屬下句汙丁音蛙不平貌垤大結切潦音老大過之大音泰後章注大宰及章末大隘其大皆同疏正義曰此章言義以行勇則不動心養氣順道無效宋人聖人量時賢者道偏孟子究言情理歸學於孔子也公孫丑問曰夫子加齊之卿相得行道焉雖由此霸王不異矣如此則動心否乎者是公孫丑問孟子言以夫子之才加之以齊國卿相之位以得行其道雖曰用此卿相之位而輔相其君而行之亦不異於古之霸王矣如此則夫子寧動心畏懼其不能行乎否不動心畏懼其不能行乎孟子曰否我四十不動心者孟子答公孫丑以謂我年至四十之時內有所定故未嘗動心有所畏懼也曰若是則夫子過孟賁逺矣者公孫丑見孟子以謂四十之時已不動心言如此則夫子實有勇過於孟賁之勇士也曰是不難告子先我不動心者孟子言我之有勇過於孟賁此不難也孟子之意蓋以謂已之勇勇於德孟賁之勇但勇於力必能過之也所以謂不難也以言其易過之也言告子之勇已先我於未四十之時而不動心矣曰不動心有道乎者丑問孟子謂不動心寧有道乎曰有孟子欲為公孫丑言其不動心之道故答之曰有也北宫黝之養勇也不膚撓不目逃至孟施舍之養勇也曰視不勝猶勝也以至又不如曽子之守約也者此皆孟子答公孫丑而言養勇者也北宫黝北宫姓黝名孟施舍孟姓舍名施發言之音也曽子姓曽名參字子輿子夏姓卜名商字子夏並為孔門之徒弟也言北宫黝之養勇人刺其肌膚不為撓郤人刺其目不以目轉睛而逃避思以一毫之毛而拔於人若見捶撻於市朝之中矣不受物於被褐者之獨夫亦不受賜於萬乘之君視刺萬乘之君但若刺被褐者之獨夫無嚴畏諸侯有惡聲加己巳亦以惡聲反報之此北宫黝養勇之如是也孟施舍之養勇嘗謂視敵之不勝猶勝之也若以量度其敵可以敵然後進而敵之謀慮其必能勝敵然後方㑹其兵此是畏三軍之士也非勇者也故自稱名曰舍豈能為必勝其敵哉但能無所畏懼而已矣此孟施舍養勇之如是也孟施舍養勇其迹近似於曽子北宫黝養勇其迹近似於子夏以其孟施舍養勇見於言而要約如曽子以孝弟事親喻為守身之本聞夫子之道則喻為一貫之要故以此比之也北宫黝養勇見於行而多方如子夏悅在於紛華為已有雜於小人之儒教人以事於灑掃之末故以此比之也雖然以二子之實固不足比於曽子子夏但以粗迹比之耳是二子之養勇皆止於一偏未如君子所養得其大全而已孟子所以言夫二子黝與舍之養勇又未知誰以為猶賢然而能無懼而已者近能知其本也故曰孟施舍守約也昔者曽子謂子襄曰子好勇乎吾嘗聞大勇於夫子矣至守約也孟子言往者曽子謂子襄曰子能好勇乎言我嘗聞夫子有大勇之義告於我以謂自反已之勇為非義則在人者有可陵之辱故雖一褐寬博之獨夫我且不以小恐惴之而且亦大恐焉自反已之勇為義則在人無可憚之威故雖千萬人之衆我且直往其中而不懼矣如此則孟施舍養勇在於守其氣勇又不如曽子以義為守而要也言此則黝不如子夏可知矣以其養勇有本末之異則言北宫黝之多方不若孟施舍之守約以其守約有氣義之别則又言孟施舍之守其氣勇不如曽子以義為守而要也然論其不動心則同根其德則大不相侔矣曰敢問夫子之不動心與告子之不動心可得聞與者公孫丑又問孟子之不動心與告子之不動心其道可得而聞知之與告子曰不得於言勿求於心不得於心勿求於氣至勿求於心不可者孟子答孫丑以謂告子言人有不善之言者是其不得於言者也故不復求其有善心告子意以謂人既言之不善則心中亦必不善也故云不得於言勿求於心人有不善之心者是其不得於心者也故不復求其有善辭氣告子意以謂人心既惡則所出辭氣亦必不善也故云不得於心勿求於氣孟子言之以謂人有不善之心故勿復求其有善辭氣則如告子之言可也如人但有不善之言便更不復求其心之有善則告子之言以為不可也無他蓋以人之言雖有不善而其心未必不善也其心之不善則所出辭氣必不善故也以其告子非得其大全之道故其言此一可行一不可行也夫志氣之帥也氣體之充也者孟子言人之志心之所之之謂志所以帥氣而行之者也氣但能充滿形體者也故曰志氣之帥也氣體之充也以其人之辭氣有不善者皆心志所帥而行之矣氣者但惟志是從也所以又言志至焉氣次焉蓋以氣由志之所發志得氣而運之也然則氣為所適善惡之路豈非志至焉氣次焉之意乎至言無以過之以其足以制於氣不為氣之所制次言有以先之以其從於志而又有以持於志也故曰持其志無暴其氣者孟子言氣惟志之是從但持揭其志則無暴亂其氣矣既曰志至焉氣次焉又曰持其志無暴其氣者何也者公孫丑未曉孟子之言志氣故問之曰夫子既已言志至焉氣次焉而又再言持其志無暴其氣是如之何也曰志一則動氣氣一則動志也今夫蹶者趨者是氣也而反動其心者孟子答公孫丑言志鬱一而不通矣是謂志一則動氣氣鬱一而不通矣是謂氣一則動志也今夫志氣皆鬱一而不通以之顛倒趨蹶者是乃反動其心焉故曰今夫蹶者趨者是氣也而反動其心蓋志則將帥譬也氣則衆卒譬也心則君譬也君任將帥將帥御衆然則志一則動氣如將帥悖則動衆卒矣氣一則動志如衆卒悖則動將帥其上又有以動其君矣由此論之則既持其志又不可不知無暴其氣矣敢問夫子惡乎長者公孫丑問孟子曰夫子之才志所長以何等敢請問之曰我知言我善養吾浩然之氣者孟子答公孫丑之問以謂我之所長是我能知人之言而識其人情之所嚮我又善養我所有浩然之氣也敢問何謂浩然之大氣者公孫丑之言敢問如何謂之浩然之氣曰難言也其為氣也至大至剛以直飬而無害則塞于天地之間者孟子答公孫丑以為浩然之大氣難以言形也蓋其為氣至大而無所不在至剛而無所不勝養之在以直道不以邪道干害之則充塞于天地之間無有窮極也其為氣也配義與道無是餒也者孟子重言其為氣也與道義相配偶常以充滿於人之五臟若無此氣與道義配偶則餒矣若人之飢餓也能合道義以養其氣即至大至剛之氣也蓋裁制度宜之謂義故義之用則剛萬物莫不由之謂道故道之用則大氣至充塞盈滿乎天地之間是其剛足以配義大足以配道矣此浩然大氣之意也是集義所生者非義襲而取之也者孟子又言是氣也是與義雜生所自有者也從內而出矣非義之所密取而在外入者也行有不慊於心則餒矣者孟子又言人之所行如有道義不足於心者則飢餓者矣以其有邪干害其浩然之氣者焉孟子所以云我故曰告子未嘗知義以其外之也蓋以告子以仁內義外為言此孟子乃曰告子未嘗知義是又不知是集義所生者非義襲而取之之意也必有事焉而勿正心勿忘勿助長也者孟子又言人之所行仁義之事必有福在其中矣而不可但正心於為福然後乃行仁義也止在其不忘於為福不汲汲於助長其福矣以其人生之初善性固有不但為之然後有也惟在常存行之耳斯亦集義所生非義襲而取之之意也故曰必有事焉而勿正心勿忘勿助長也又一說云言人之所行不可必待有事而後乃正其心而應之也惟在其常存而不忘又不在汲汲求助益之而已斯則先事而慮謂之豫豫則事優成後事而慮謂之猶猶則不立之意也以其在常存正心於事未然之前耳矣故曰必有事焉而勿正心其言勿忘勿助長則同意無若宋人然宋人有閔其苖之不長而揠之者至而又害之者此孟子引宋人揠苖而比喻之以解其助長之意也言人苟欲速得其福而助長之者則宋人揠苖者也故言無若宋人然宋人宋國之人也宋國之人有憐閔苖之不長茂而以揠拔欲亟其長者芒芒然罷倦而回歸謂其家中之人曰今日我罷倦成病矣我其為助長其苖矣其宋人之子見父云助苖長而罷倦成病乃趨走而往視其苖還助得其長否及往至田所視之其苖則皆枯槁而死矣孟子又言今天下之人不若助苖長者少矣言當時人皆欲速其福而助長之者也以其為善無所益而舍去之者是忘其善也是若不耘其苖者也助長者是若揠苖者也非特無益其善而又適所以殘害其善也善者即仁義是也仁義即善也苖是種之美者以譬則人之美質也固非可以增減之耳孟子之意蓋欲人之所行當內治不當急欲求其福也此亦修其天爵而人爵從之之意也孟子所以云我善養吾浩然之氣何謂知言者公孫丑既得孟子言浩然之氣又問孟子知言之意謂何曰詖辭知其所蔽淫辭知其所陷邪辭知其所離遁辭知其所窮者此孟子又答公孫丑問知言之意也詖辭其言有偏詖不平也孟子言人有偏詖不平之言我則知其蔽於一曲而已若告子言仁內義外是也趙云若賓孟言雄雞自斷其尾之事也淫辭言過而不中也孟子言人有過而不中之言我則知其所陷而陷又無所不蔽而已如人墜於陷阱之陷以其無所不蔽也若楊墨無父無君之言是也趙云若驪姬勸晉獻公與申生之事也邪辭悖正道者也孟子言人有悖正道之言我則知其言易以離畔矣若陳賈謂周公未盡仁智而况於齊王之言是也趙云若豎牛勸仲壬賜環之事也遁辭屈其理也孟子言人有屈理之言我則知其言易以窮也若夷子與孟子相勝以辨卒以受教是也趙云若秦客之廋辭也生於其心害於其政發於其政害於其事者孟子又言此上四事皆非出於其心者即皆出於異端之學者也人君苟生此四者於心中必妨害其仁政既妨害其仁政則又妨害其事政則本上之所施而正人者也事則下之所行以治職者也故事為政之末政為事之本如孔子問冉子之退朝何晏也則謂之事故不謂之政是知政事有别矣聖人復起必從吾言矣者孟子言後之聖人有能復興起者必從事吾此言而行之矣宰我子貢善為說辭冉牛閔子顔淵善言德行孔子兼之曰我於辭命則不能也者孟子既言其詖淫邪遁之辭為非故於此言其善為說辭善言德行為是者也蓋言宰我子貢二人皆善能為說辭說辭者以辭說人者也宰我子貢皆得聖人所以言者也故云善為說辭論語四科二人所以列於言語之科也冉牛閔子顔淵三人皆善言德行善言德行者言之必可行是善言也行之必可言是德行也冉牛閔子顔淵皆得聖人所以行者也故云善言德行論語四科三人所以列於德行科也孔子兼之者孔子天縱之將聖故多能鄙事則於說辭德行兼而能焉而曰我於辭命則不能也孟子蓋以儒道遊於諸侯而諸侯賓之不敢臣又為國人所矜式故於辭命又安用之哉此所以曰我於辭命則不能也然孟子於辭命非誠不能也但不為之耳以辭命人者故謂之辭命以其末也非本也故不言不能德行以其本也非末也孟子之意蓋欲當時之人務本不務末耳然則夫子既聖矣乎者公孫丑見孟子但言不能辭命之末不言不能德行之本故言孟子如是則夫子既已為聖矣以其宰我子貢雖善為說辭然尚未得聖人所以言冉牛閔子顔淵雖善言德行然尚未得聖人所以行故數子者但為孔子之高弟惟顔淵三子於聖但具體而微者而亦未得其為聖矣公孫丑見孟子言之辭命則不能者以知孟子之意蓋有在於此矣所以於辭命則言不能也故問之曰然則夫子既聖矣乎曰惡是何言也者孟子答公孫丑為不敢安居其聖故曰惡是何言也惡嘆也以其不敢居聖故嘆而言之也又言昔者子貢問於孔子曰夫子聖矣乎至是何言也者孟子言昔日子貢嘗問於孔子而謂夫子聖矣乎孔子答之曰於聖則我不能為也我但學不厭飽教人不倦怠也子貢曰夫學道能不厭飽是有智也以其智足以有知故能學道不厭也教人能不倦怠是有仁也以其仁足以及物故能教人不倦也仁而且智是夫子既以聖矣孟子遂言夫聖於孔子尚不敢居而今丑言我既聖矣是何所言也故再言是何言也昔者聞之子夏子游子張皆有聖人之一體冉牛閔子顔淵則具體而微者孟子嘗自謙故言我往日竊聞之有子夏子游子張三人皆有聖人之一體亦未得其全才冉牛閔子顔淵則具體而微小者也孟子言此是宜孫丑於前有夫子既聖矣乎而問之也敢問所安者丑見孟子又言此子夏子游子張冉牛閔子顔淵數者意欲知孟子於此數者之中何者為比也曰姑舍是者孟子言且置去非我之願比者也曰伯夷伊尹何如者丑見孟子不比數者又問之以伯夷伊尹二者可比之何如曰不同道者孟子答之以為伯夷之行不與伊尹孔子同道也非其君不事非其民不使治則進亂則退伯夷也者孟子言非已所好之君則不奉事之非以正道得民者不命使之天下有治道之時則進而仕之天下無道則退藏其身是伯夷之所行也何事非君何使非民治亦進亂亦進伊尹也者孟子言伊尹曰何所事之君為非君蓋所事者即皆君也何所使之民為非民蓋以所使皆是民也天下治亦進而行其道天下亂亦進而行其道是伊尹之所行也可以仕則仕可以止則止可以久則久可以速則速孔子也者孟子言可以進而為仕則進而仕之可以止而不仕則止之而不仕可以久則久雖終身不仕亦不為之久可以速則速雖接淅而行亦不為速是孔子所行如是也皆古聖人也吾未能有行焉乃所願則學孔子也孟子言此數者皆是古之聖人也我俱未有所行若此而已乃言我之所願學則孔子是學也孟子之意蓋謂孔子所行於伯夷伊尹二子皆兼而有之也故可仕則仕而不為伯夷之必於退可止則止而不為伊尹之必於進無可無不可矣故於終所必歸之但願學孔子也伯夷伊尹於孔子若是班乎者公孫丑見孟子言之伯夷伊尹又言之以孔子乃曰皆古聖人也故問之以伯夷伊尹孔子如是則齊等之乎班齊等也曰否自生民以來未有孔子也者孟子答之以為否不齊等也自其有生民以來至今未有與孔子齊其等者也然則有同與者公孫丑又問孟子以謂如是則伯夷伊尹孔子三人有同者邪曰有得百里之地而君之至是則同者孟子答之以謂此三人有所同也蓋得百里之土地而為君三人皆能以朝諸侯有天下也然行一事之不義殺一人之無罪而得天下則三人亦皆不為之如是則同若其他事則所行又有不同焉故曰是則同曰敢問其所以異者公孫丑又問孟子曰丑敢請問三人其所以有異者曰宰我子貢有若智足以知聖人汙不至阿其所好至未有盛於孔子也者此皆孟子為丑言此三人其所以異者也言宰我與子貢有若三者其有智皆足以知其聖人然雖有小卑汙不平處蓋亦不至於阿私所好而空譽之其言皆有可用者也遂引宰我知聖人之事為公孫丑言之故言宰我有曰以豫觀於孔子其賢過於堯舜逺矣豫宰我名也宰我之意蓋謂堯舜有位之聖人故其行道易孔子無位之聖人故其行道難故以難易為言也又謂堯舜治天下但見效於當時即一時之功也孔子著述五經載道於萬世以其有萬世之功故以功為言也孟子又引子貢有曰見其孔子制作之禮而知孔子有政可以致天下之太平聞孔子雅頌之樂音而知孔子有德與文武同也從孔子之後推而等之百世之聖王者無有能違逆其孔子之道者是其自生民而來至于今未有如夫子者也凡此是子貢之知聖人有如此也孟子又引有若有曰豈獨其民有類乎哉言麒麟之於走獸鳳凰之於飛鳥泰山之於丘垤河海之於行潦亦類也聖人之於民亦類也然而走獸之中以麒麟為之長飛鳥之中以鳳凰為之王丘垤之中以泰山為之尊行潦之中以河海為之大人民之間以聖人為人倫之至也聖人之於民類也物亦類也以其出乎民人之類而超拔乎衆萃之中自生民以來至於今未有美盛過於孔子者也然則孔子於此三子言之是所以異於伯夷伊尹者也故孟子所以願學則學孔子也注四十强而仕正義曰曲禮云人生十年曰幼學二十曰弱冠三十曰壯有室四十曰强而仕五十曰艾服官政六十曰耆指使七十曰老而傳八十九十曰耄凡此是其文也注孟賁勇士也正義曰案帝王世說云秦武王好多力之人齊孟賁之徒並歸焉孟賁生拔牛角是為之勇士也注云北宫黝北宫姓黝名也又云褐寬博獨夫被褐者釋云褐編枲襪也一曰短衣北宫黝其人未詳於他絰傳亦未之聞焉孟施舍亦未詳云縮義也惴懼也蓋記云古之冠也縮縫今之冠也衡縫則縮者理之直也是知縮訓義也詩云惴惴其栗注云恐也傳云小恐惴惴大恐縵縵是也注密聲取敵曰襲正義曰左傳云凡有鐘鼓曰伐無鐘鼓曰襲杜預注云密聲取敵曰襲是其文也注云賓孟言雄雞自斷其尾至諸大夫也正義曰案魯昭公二十二年左傳云王子朝賓起有寵於景王王與賓孟說之欲立之劉獻公庶子伯蚠事單穆公惡賓孟適郊見雄雞自斷其尾問之侍者曰自憚其犧也遽歸告王且曰雞其憚為人用乎人異於是犧者實用人人犧實難已犧何害王弗應凡此是也云驪姬勸晉獻公與申生者案魯莊公二十八年云晉獻公娶于賈無子蒸於齊姜生秦穆夫人及太子申生又娶二女於戎大戎狐姬生重耳小戎子生夷吾晉伐驪戎驪戎男女以驪姬歸生奚齊其娣生卓子驪姬欲立其子賂外嬖梁五與東關嬖五使言於公曰曲沃君之宗也蒲與二屈君之疆也不可以無主宗邑無主則民不威疆場無主則啓戎心若使太子主曲沃而重耳主蒲夷吾主屈則可以威民而懼戎且旌君伐使俱曰狄之廣莫於晉為都晉之啓土不亦宜乎晉侯悅之夏使太子申生主曲沃重耳居蒲夷吾居屈惟二姬之子在絳二五卒與驪姬譛羣公子而立奚齊晉人謂之二五耦凡此是也云豎牛勸仲壬賜環之事案左傳昭公四年云初穆子去叔孫氏及庚宗適齊娶於國氏生孟丙仲壬夢天壓已弗勝顧而見人黑而上僂深目而豭喙號之曰牛助余乃勝之旦召其徒無之及後婦人獻雉婦人是穆子及庚宗之地常遇而宿者也因問其有子曰余子長矣能奉雉以從我矣召而見之則所夢也問其名曰牛遂使為豎臣有寵長使為政豎牛欲亂其室仲壬與公御萊書觀於公公與之環使牛入示之入不示出命佩之牛謂叔孫見仲壬而何叔孫曰何為曰不見既自見矣公與之環而佩之矣遂逐之奔齊叔孫疾急命召仲牛許而不召有進食則止之而弗進叔孫不食乃卒立其子而相之昭公五年又曰昭子即位朝其家衆曰豎牛禍叔孫氏使亂大從殺嫡立庶又披其邑將以赦罪罪莫大焉必速殺之豎牛懼奔齊孟仲之子殺諸塞外投其首於寧風之棘上凡此是也云秦客廋辭者案國語晉文公時范文子暮退於朝武子曰何暮也對曰有秦客廋辭於朝大夫莫之能對吾知一二焉武子怒曰大夫非不能也讓父兄也爾童子而三掩人於朝吾不在晉亡無日矣擊之以杖折委笄凡此者是也大抵廋辭云者如今呼筆為管城子紙為楮先生錢為白水真人又為阿堵物之類是也注豫宰我名也正義曰案史記弟子傳云宰豫字子我鄭𤣥曰魯人也注垤蟻封行潦道傍流潦也萃聚也正義曰釋云垤蟻冡也潦雨水盛也經云行潦是為道傍流潦也萃亦云集也孟子注疏卷三上孟子注疏卷三上考證夫子當路於齊章微仲注疏從略臣宗楷按微子之弟衍為微仲禮云舍其孫腯而立衍是也日知録曰衍之繼其兄繼宋非繼微也而稱微仲者何猶微子之心也至於衍之子稽則逺矣于是始稱宋公吾于微子之命仍以舊爵名篇而知武王周公之仁未能奪其所守蓋殷先王之德澤逺也疏孟子言管仲曽西之所不願為也言監本訛可今改正又疏魯莊公九年桓公殺公子糾九年監本訛八年今從左傳改正夫子加齊之卿相章必有事焉而勿正心勿忘勿助長也日知録曰倪文節謂當作必有事焉而勿忘勿忘勿助長也傳寫之誤以忘字作正心二字言養浩然之氣必當有事而勿忘既以勿忘又當勿助長也疊勿忘作文法也按書無逸篇曰自時厥後立王生則逸生則逸不知稼穡之艱難亦是疊一句而文愈有致禮記祭義見間以俠甒鄭氏曰見間當為覸史記蔡澤傳吾將梁刺齒肥索隱曰刺齒肥當為齧肥論語五十以學易朱子以為五十當作卒此皆古書誤為兩字之證也天下之不助苖長者節注其邀福欲急得之者邀監本訛遲今改正詖辭知其所蔽節注若豎牛勸仲壬賜環之事勸監本訛觀今從左傳改正生於其心節注妨害仁政妨監本訛防今改正疏如子夏悅在于紛華悅監本訛况今改正又疏伯夷伊尹二子二監本訛孔今改正又疏帝王世說云秦武王好多力之人齊孟賁之徒並歸焉臣齊燾按許慎注淮南子孟賁衛人與帝王世說不同孟子注疏卷三上考證欽定四庫全書孟子注疏卷三下漢趙氏注宋孫奭音義並疏公孫丑章句下孟子曰以力假仁者霸霸必有大國以德行仁者王王不待大湯以七十里文王以百里注言霸者以大國之力假仁義之道然後能霸若齊桓晉文等是也以已之德行仁政於民小國則可以致王若湯文王是也以力服人者非心服也力不贍也以德服人者中心悅而誠服也如七十子之服孔子也注贍足也以已力不足而往服從於人非心服者也以已德不如彼而往服從之誠心服者也如顏淵子貢等之服於仲尼心服者也詩云自西自東自南自北無思不服此之謂也注詩大雅文王有聲之篇言從四方來者無思不服武王之德此亦心服之謂也疏正義曰此章言王者任德霸者兼力力服心服優劣不同也孟子曰以力假仁者霸至文王百里者孟子言以大國之力而假以仁義之道行之者乃能為霸以把握諸侯之權也故必有其大國以德澤而行仁政者乃能為之王使天下皆歸往者也故不待有大國而為之也湯但以七十里起而為商之湯王文王但以百里而天下歸是其以德澤行仁政於天下故不待有大國而為之王此湯文二者是也以力服人者至服孔子也者孟子言但以力而服人人雖面從而服之然亦非是心服之也以德服人人則中心悅樂而誠心服也如七十子之服仲尼者也是其以誠心服之也非面從而服之者也詩云自西自東自南自北無思不服此之謂也者此蓋詩大雅文王有聲之篇文也蓋孟子引此而證其誠服之意故援之曰自南而自北自西而自東而四方皆歸之無有所思而不服是亦此之謂與注大雅文王有聲之詩正義曰此篇蓋言文王繼伐武王能廣文王之聲卒其伐功也箋云自由也言武王於鎬京行辟雍之禮自四方來觀者皆感化其德而心無不服者孟子曰仁則榮不仁則辱今惡辱而居不仁是猶惡濕而居下也注行仁政則國昌而民安得其榮樂行不仁則國破民殘蒙其耻辱惡辱而不行仁譬猶惡濕而居埤下近水泉之地也如惡之莫如貴德而尊士賢者在位能者在職注諸侯如惡辱之來則當貴德以治身尊士以敬人使賢者居位官得其人能者居職人任其事也國家閒暇及是時明其政刑雖大國必畏之矣注及無鄰國之虞以是閒暇之時明修其政教審其刑罰雖天下大國必來畏服詩云逮天之未陰雨徹彼桑土綢繆牖户今此下民或敢侮豫孔子曰為此詩者其知道乎能治其國家誰敢侮之注詩邠風鴟梟之篇逮及徹取也桑土桑根也言此鴟梟小鳥猶尚知及天未陰雨而取桑根之皮以纒綿牖户人君能治國家誰敢侮之刺邠君曽不如此鳥孔子善之故謂此詩知道也今國家閒暇及是時般樂怠敖是自求禍也禍福無不自已求之者注般大也孟子傷今時之君國家適有閒暇且以大作樂怠惰敖遊不修政刑是以見侵而不能距皆自求禍者也詩云永言配命自求多福注詩大雅文王之篇永長言我也長我周家之命配當善道皆內自求責故有多福也太甲曰天作孽猶可違自作孽不可活此之謂也注殷王太甲言天之妖孽尚可違避譬若高宗雊雉宋景守心之變皆可以德消去也自己作孽者若帝乙慢神震死是為不可活故若此之謂也音義惡烏路切章內文注及後章非惡皆同樂音洛下文般樂樂為樂聞樂取皆同埤音卑閒音間徹直列切土丁音杜綢音稠繆武彪切鴟處脂切梟于嬌切般音盤敖五勞切又五到切孽魚列切活如字丁云尚書作逭音換下離婁篇同雊古候切疏正義曰此章言國必修政君必行仁禍福由已不專在天當防患於未亂也孟子曰仁則榮不仁則辱今惡辱而居不仁是猶惡濕而居下也者孟子言國君行仁則國昌民安享其榮樂行不仁則國破民殘故已䝉其耻辱今之國君既能疾惡其有耻辱於已而以居處於不仁之道是若疾惡其濕汚而以居其卑下近水泉之地也如惡之莫如貴德而尊士賢者在位能者在職者言今之國君如能疾惡其耻辱莫若尚其有德之賢而尊敬其有德之士也既能貴德尊士則賢者居其官位能者任其官職也所貴德者為其有德也所以尊士者為其事道也能為人所不能為賢長於德行者也能為人之所能為能長於道藝者也得賢能在位在職則國無不治也所以謂仁則榮之意也今國家閒暇及是時明其政刑雖大國必畏之矣者言今國家閒暇無事以及此時若能修明政教刑罰雖强大之國亦必畏服矣詩云逮天之未陰雨徹彼桑土至誰敢侮之者自逮天至或敢侮豫蓋詩邠國鴟梟之篇文也言此鴟梟小鳥尚知天未陰雨之前取彼桑根之皮土以纒綿牖户喻人君能於閒暇之時治其國家以明其政刑則今此下民誰敢侮慢我也詩人蓋以天之未陰雨國家閒暇之譬也徹彼桑土綢繆牖戶明其政刑之譬也今此下民或敢侮豫大國必畏之譬也鴟梟所以徹彼桑土於天未陰雨之前以纒綿牖戶則風雨莫得以漂搖人君所以明政刑於閒暇之時以維持國家則鄰國莫得以侵侮此孔子所以曰作為此詩者是能知其治道者也以其能治其國家則誰敢侮之矣是宜孔子善之以謂為此詩者其知道乎令國家閒暇及是時般樂怠敖是自求禍也禍福無不自己求者孟子傷今之人君於國家閒暇以及於此時乃大作樂怠惰敖遊而不修明刑政是自求其禍也以其禍福無有不自於已求之矣如所謂夫人必自畏然後人畏之夫人必自侮然後人侮之是其禍福無不自已求之意也詩云永言配命自求多福者蓋詩大雅文王之篇文也永長也言我也蓋謂我長配天命而行以自求多福也太甲曰天作孽猶可違自作孽不可活此之謂也者太甲殷王之名也言太甲嘗謂上天作其災孽尚可違避如已自作其災孽不可得而生活也如高宗宋景二者修德以消去者是天作孽猶可違也帝乙慢神震死是自作孽不可活也凡此孟子所以引之者是亦證其禍福無不自已求之之意也注詩邠風鴟梟之篇正義曰鴟梟之詩蓋言周公救亂也成王未知周公之志公乃為詩以遺王名之曰鴟梟焉毛云鴟梟鸋鴂也逮及也徹剝也桑土桑根也綢繆猶纒綿也箋云鴟梟自說作巢至苦矣如是以喻諸臣之先臣亦及文武未定天下積日纍功以固定此官位與土地今女我巢下之民寧有敢侮慢欲毁之者乎意欲恚怒之以喻諸臣之先臣固定此官位土地亦不欲見其絶奪矣注詩大雅文王之篇正義曰此詩蓋言文王受命作周之詩也箋云長猶常也王既述修祖德常言當配天命而行則福祿自來也注殷王太甲至不可活正義曰案本紀云太甲成湯適長孫也太丁之子也太甲既立三年不明暴虐不遵湯法亂德於是伊尹放之於桐宫三年悔過自責反善伊尹乃迎太甲而授之政太甲修德諸侯咸歸百姓以寧伊尹嘉之作太甲訓以褒太甲號稱太宗云高宗雊雉者案史記云武丁也武丁祭成湯明日有飛雉登鼎耳而雊武丁懼祖已曰王勿憂先修政事武丁乃修政行德天下咸歡武丁崩租已嘉武丁之以祥雉為德立其廟為高宗遂作高宗肜日及訓是也云宋景守心之變者案史記云頭曼立三十七年熒惑守心心宋之分野也景公憂之司星子韋曰可移於相景公曰相吾之股肱曰可移於民景公曰君者待民曰可移於歲景公曰歲饑民困吾誰為君子韋曰天高聽卑君有君人之言三熒惑宜有動於是候之果徙三度六十四年景公卒是也云帝乙慢神震死者案史記云庚丁之子也武乙立為帝無道為偶人謂之天神與之博令人為行天神不勝乃僇辱之為革囊盛血仰而射之命曰射天武乙獵於河渭之閒暴雷武乙震死是也孟子曰尊賢使能俊傑在位則天下之士皆悅而願立於其朝矣注俊美才出衆者也萬人者稱傑市廛而不征法而不廛則天下之商皆悅而願藏於其市矣注廛市宅也古者無征衰世征之王制曰市廛而不稅周禮載師曰國宅無征法而不廛者當以什一之法征其地耳不當征其廛宅也關譏而不征則天下之旅皆悅而願出於其路矣注言古之設關但譏禁異言識異服耳不征稅出入者也故王制曰古者關譏而不征周禮大宰曰九賦七曰關市之賦司關曰國凶札則無關門之征猶譏王制謂文王以前也文王治岐關譏而不征周禮有征者謂周公以來孟子欲令復古去征使天下行旅悅之也耕者助而不稅則天下之農皆悅而願耕於其野矣注助者井田什一助佐公家治公田不橫稅賦若履畝之類廛無夫里之布則天下之民皆悅而願為之氓矣注里居也布錢也夫一夫也周禮載師曰宅不毛者有里布田不耕者出屋粟凡民無職事者出夫家之征孟子欲使寬獨夫去里布則人皆樂為之氓矣氓者謂其民也信能行此五者則鄰國之民仰之若父母矣率其子弟攻其父母自生民以來未有能濟者也注今諸侯誠能行此五事四鄰之民仰望而愛之如父母矣鄰國之君欲將其民來伐之譬若率勉人子弟使自攻其父母自生民以來何能以此濟成其欲也如此則無敵於天下無敵於天下者天吏也然而不王者未之有也注言諸侯所行能如此者何敵之有是為天吏天吏者天使之也為政當為天所使誅伐無道故謂之天吏也音義廛直連切藏或作臧音藏橫去聲氓或作萌或作氓皆音盲疏正義曰此章言修古之道鄰固之民以為父母行今之政自己之民不得而子是故衆夫擾擾非所常有命曰天吏明天所使者也孟子曰尊賢使能俊傑在位則天下之士皆悅而願立於其朝矣者孟子言今之國君能尊敬賢者任使能者俊傑大才在官位則天下為之士者皆悅樂願立其朝廷矣市廛而不征法而不廛則天下之商皆悅而願藏於其市矣者言市廛宅而不征取其稅以什一之法征其地而不征其廛宅則天下為商賈者皆喜悅而願藏貯於其市矣關譏而不征則天下之旅皆悅而願出其路矣者言關門之所但譏察其異言異服之人而不稅出入者則天下行旅之衆皆悅樂而願出於其道路矣耕者助而不稅則天下之農皆悅而願耕於其野矣者言耕田者但以井田制之使助佐公田而治不以橫稅取之則天下為之農者皆悅而願耕作其郊野矣廛無夫里之布則天下之民皆悅而願為之氓矣者言一夫所受之宅而不出夫家之征一廛所居之地而不取其里布則天下之民皆悅樂而願為之氓矣信能行此五者於天下則鄰國之民仰之若父母矣率其子弟攻其父母自有生民以來未有能濟者也者言今之國君誠能信行此上五者之事則四鄰之國民仰望之如父母而親之矣鄰國雖欲勉率其民如子弟攻其父母言自有生民以來而至於今未有能濟成其欲者也言其民皆仰望之而親敬之不肻為其所惡而賊其所好也如此則無敵於天下無敵於天下者天吏也然而不王者未之有也者言國君行此五者之事而民仰望之如此則是無敵於天下也言天下之人無與敢為敵者也既無敵於天下者是名為天吏者也天所使者是謂天吏也然而為天吏而不王者必無也故曰未之有也廛者一夫所受之宅也里者一廛所居之地也野者氓者案周官制地之法六鄉以教為主其主民有郊於內故其地為郊而民則謂之民以其近主而有知者也六遂以耕為主而其民有遂於外故其地為野而民故謂之氓以其遠主而無知者也此孟子云野云氓之意也蓋孟子或云貴德而尊士賢者在位能者在職或曰尊賢使能俊傑在位者以其貴士之有德尊士之有道者為其賢也為其能也即其賢而授之位所以尊其賢即其能而授之職所以使其能若夫俊傑則行而敏速立而絶衆賢之豪者非可使以職也故曰在位而已注廛市宅至廛宅也正義曰王制云市廛而不稅者案鄭注云廛市物邸舍稅其舍不稅其物也注云周禮載師云宅無征者載師者掌任土之法以物地事授地職而待其政令者也宅無征所以言宅無稅也注言古之設關至旅悅之也正義曰云王制曰古者關譏而不征禮記王制之篇中有此文案鄭注云譏異服識異言也云周禮太宰曰九賦七曰關市之賦者大宰以九賦斂財賄一曰邦中之賦二曰四郊之賦三曰邦甸之賦四曰家削之賦五曰邦縣之賦六曰邦都之賦七曰關市之賦八曰山澤之賦九曰幣餘之賦鄭司農云幣餘百工之餘司關曰國凶札則無關門之征猶譏鄭司農云凶謂凶年饑荒也札謂疾疫死亡也越人謂死為札春秋傳曰札瘥天昏無關門之征者出入關門無租稅猶苛察不得令姦人出入也注周禮載師曰宅不毛者有里布田不耕者出屋粟凡民無職事者出夫家之征鄭司農云宅不毛者謂不樹桑麻也里布者布參印書廣二寸長二尺以為幣貿易物詩云抱布貿絲抱此布也或曰布泉也春秋傳曰買之百兩一布又廛人職掌斂市之次布儳布質布罰布廛布不知言布參印書者何見舊時說也鄭𤣥謂宅不毛者罰以一里二十五家之泉空田者罰以三家之稅粟以共吉凶二服及喪器也民雖有閒無職事者猶出夫稅家稅也夫稅者百畝之稅家稅者出士徒車輦給徭役孟子曰人皆有不忍人之心注言人人皆有不忍加惡於人之心也先王有不忍人之心斯有不忍人之政矣以不忍人之心行不忍人之政治天下可運之掌上注先聖王推不忍害人之心以行不忍傷民之政以是治天下易於轉丸於掌上也所以謂人皆有不忍人之心者今人乍見孺子將入於井皆有怵惕惻隱之心非所以內交於孺子之父母也非所以要譽於鄉黨朋友也非惡其聲而然也注乍暫也孺子未有知之小子所以言人皆有是心凡人暫見小孺子將入井賢愚皆有驚駭之情情發於中非為人也非惡有不仁之聲名故為之怵惕者而然也由是觀之無惻隱之心非人也無羞惡之心非人也無辭讓之心非人也無是非之心非人也注言無此四者當若禽獸非人心耳為人則有之矣凡人但不能演用為行耳惻隱之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之心智之端也注端者首也人皆有仁義禮智之首可引用之人之有是四端也猶其有四體也有是四端而自謂不能者自賊者也注自謂不能為善自賊害其性使不為善也謂其君不能者賊其君者也注謂君不能為善而不匡正者賊其君使陷惡也凡有四端於我者知皆擴而充之矣若火之始然泉之始達苟能充之足以保四海苟不充之不足以事父母注擴廓也凡有四端在於我者知皆廓而充大之若火泉之始微小廣大之則無所不至以喻人之四端也人誠能充大之可保安四海之民誠不充大之內不足以事父母言無仁義禮智何以事父母也音義怵音黜內交張音納本亦作納羞惡丁烏故切又如字為行下孟切擴丁音郭張大也字亦作彍音霍疏正義曰此章言人之行當內求諸已也孟子曰人皆有不忍人之心者孟子言人之為人皆有不忍加惡於人之心也先主有不忍人之心斯有不忍人之政至掌上者又言古先聖王有不忍加惡於人之心斯有不忍傷民之政既以不忍加惡於人之心以行其不忍傷民之政其治天下之易但若轉運走丸於掌上之易者也所以謂人皆有不忍人之心者今人乍見孺子將入井至然也者孟子又言所以謂人之為人皆有不忍加惡於人之心者且以今人乍見孺子言之孺子無知之小子也今人乍見無知之小子相將匍匐欲墜於井但見之者皆有怵惕恐懼惻隱痛忍之心所以然者非是內嘗結交於孺子之父母然後如此也又非是所以欲要求美譽於鄉黨朋友也又非所以惡有不仁之聲而然也由是觀之無惻隱之心非人也至無是非之心非人也者孟子言由此見孺子將入於井人皆有怵惕惻隱之心觀察之是無惻隱羞惡辭讓是非四者之心皆非是人也乃若禽獸之類也禽獸所以無惻隱不忍之心又無羞惡慚耻之心又無辭讓揖遜之心又無是非好惡之心者也言苟無此四者所以皆謂之非人也乃禽獸之類也惻隱之心至智之端也者孟子言人有惻隱之心是仁之端本起於此也有羞惡之心者是義之端本起於此也有辭讓是非之心者是禮智之端本起於此者也以其仁者不過有不忍惻隱也此孟子所以言惻隱羞惡辭讓是非四者是為仁義禮智四者之端本也人之有是四端也猶其有四體也至賊其君者也者孟子又言人有是惻隱羞惡辭讓是非為仁義禮智之四端若其人之有四肢也既有此四端而自謂已之不能為善者是自賊害其善而不為善也以之事君如謂其君不能為善不匡正之者是亦賊害其君使陷於惡也無他以其人之為人皆有此四端也但不推用而行之耳如能推此四端行之是為仁義禮智者矣所謂仁義禮智者即善也然則人人皆有善矣故孟子所以言之以此凡有四端於我者知皆擴而充之至不足以事父母者孟子又言凡人所以有四端在於我焉者能皆廓而充大之是若火之初燃泉之始達而終極乎燎原之熾襄陵之蕩也苟能充大之雖四海之大亦足保安之也苟不能充大之雖已之父母亦不足以奉事之故曰苟能充之足以保四海苟不充之不足以事父母是亦推恩足以保四海不推恩無以保妻子之意也孟子曰矢人豈不仁於函人哉矢人惟恐不傷人函人惟恐傷人巫匠亦然故術不可不愼也注矢箭也函鎧也周禮曰函人為甲作箭之人其性非獨不仁於作甲之人也術使之然巫欲祝活人匠梓匠作棺欲其蚤售利在於人死也故凡術當愼修其善者也孔子曰里仁為美擇不處仁焉得智注里居也仁最其美者也夫簡擇不處仁為不智夫仁天之尊爵也人之安宅也莫之禦而不仁是不智也注為仁則可以長天下故曰天所以假人尊爵也居之則安無止之者而人不能知入是仁道者又安得為之智乎不仁不智無禮無義人役也注若此為人所役者也人役而耻為役由弓人而耻為弓矢人而耻為矢也注治其事而耻其業者惑也如耻之莫如為仁注如其耻為人役而為仁仁則不為役也仁者如射射者正已而後發發而不中不怨勝已者反求諸已而已矣注以射喻人為仁不得其報當反責已之仁恩有所未至也不怨勝已者音義函音含鎧苦愛切又苦亥切祝丁亦音呪蚤售音早授中張仲切疏正義曰此章言各治其術術有善惡禍福之來隨行而作耻為人役不若居仁治術之忌勿為矢人也孟子曰矢人豈不仁於函人哉至故術不可不愼也者孟子言作矢之人其性豈不仁過於函人哉其所以不仁於函人者以其術使之然也作矢之人其心於所作箭之時惟恐不利不能傷害人也作函之人其心於作函之時惟恐不堅厚而有傷害於人也不特此二者如此雖作巫祝梓匠之人亦如是也以其巫人祝在於活人梓人作棺欲其速售利在於人死也此孟子所以故云其治術人亦不可不愼擇也矢箭也函鎧也甲是也孔子曰里仁為美擇不處仁焉得智者孟子言孔子有曰所居以仁最為美也然而人所㨂擇不處於仁里又安得謂之智也以其智足以有知故也不知擇處於仁豈謂之智哉夫仁天之尊爵也人之安宅也莫之禦而不仁是不智也者言夫仁之為道是天之尊爵也人之安宅也謂之尊爵者蓋受之於人而彼得以賤之者非尊爵也仁則得之於天而萬物莫能使之賤是尊爵也安宅者蓋營於外而彼得以危之者非安宅也仁則立之自內而萬物莫能使之危是安宅也今夫天下之事有形格勢禁而不得有為者為其有以禦之也仁之為道乃天之尊爵而得之自天者人之安宅而立之自我者但欲仁則仁矣誰其禦之而不為哉今仁之為道人莫禦之使不為而自不為仁者是亦不智者也不仁不智無禮無義人役也至莫如為仁者言人之不仁不智者是無禮無義為人所役者也既為人所役而耻辱為人所役是若作弓矢之人不知擇術而耻為弓矢也如耻為人所役莫若擇術而為仁也以其為仁則禮義隨而有之矣雖欲役之不可得已然則仁則榮不仁則辱亦此之謂也仁者如射至反求諸已而已矣者孟子比之於仁者如射也以其射者必待先正其身已然後而發矢射之也既發矢而射之不中其的則又不怨恨其射勝於已者但反責求諸已而已矣蓋君子以仁存心其愛人則人常愛之猶之正已而後發也有人於此待我以橫逆猶之發而不中也自反而不以責諸人猶之不怨勝已者反求諸已而已矣此孟子所以比仁者如射發而不中不怨勝已者反求諸已而已矣孟子曰子路人告之以有過則喜禹聞善言則拜注子路樂聞其過過而能改也尚書曰禹拜讜言大舜有大焉善與人同舍已從人樂取於人以為善注大舜虞帝也孔子稱曰巍巍故言大舜有大焉能舍已從人故為大也於子路與禹同者也自耕稼陶漁以至為帝無非取於人者取諸人以為善是與人為善者也故君子莫大乎與人為善注舜從耕於歷山及其陶漁皆取人之善謀而從之故曰莫大乎與人為善音義讜音黨直言也書作昌疏正義曰此章言大聖之君猶采善於人也孟子曰子路人告之以有過則喜禹聞善言則拜者孟子言子路之為人人有告之以過事則喜樂從人之言而改其過大禹之為人聞有善言則拜而受之也大舜有大焉善與人同舍已從人樂取於人以為善者孟子又言大舜之為帝有大巍巍之功焉無他以其善能與人同之也已之善亦猶人之善人之善亦猶已之善是與人同善也所以能如此者亦以能舍已之所見而從人之見又樂取諸人以為善也自耕稼至與人為善者此孟子自引舜之事迹而自解舜取人以為善之言也言舜自耕稼於歷山陶於河濱漁於雷澤之時以至為帝無非取人之善謀而從之也取諸人以為善是亦與人為其善者也所謂舜耕歷山歷山之人皆讓畔漁雷澤雷澤之人皆讓居陶河濱河濱器皆不苦窳是亦與人為善之事也故君子莫大乎與人為善者此孟子所以復言凡為善之君子莫大乎與人為善也注大舜虞帝至同者也正義曰虞舜之國號也云孔子稱曰巍巍者案論語有云巍巍乎其有成功孔注云功成化隆高大巍也注舜從耕歷山及其陶漁正義曰此皆案史記帝紀有云然也孟子曰伯夷非其君不事非其友不友不立於惡人之朝不與惡人言立於惡人之朝與惡人言如以朝衣朝冠坐於塗炭推惡惡之心思與鄉人立其冠不正望望然去之若將凂焉注伯夷孤竹君之長子讓國而隱居者也塗泥炭墨也凂汚也思念也與鄉人立見其冠不正望望然慚愧之貌也去之恐其汚已也是故諸侯雖有善其辭命而至者不受也不受也者是亦不屑就已注屑潔也詩云不我屑已伯夷不潔諸侯之行故不忍就見也殷之末世諸侯多不義故不就之後乃歸於西伯也栁下惠不羞汚君不卑小官進不隱賢必以其道遺佚而不怨厄窮而不憫故曰爾為爾我為我雖袒裼裸裎於我側爾焉能凂我哉注栁下惠魯公族大夫也姓展名禽字季柳下是其號也進不隱已之賢才必欲行其道也憫悶也善已而已惡人何能汚於我邪故由由然與之偕而不自失焉援而止之而止援而止之而止者是亦不屑去已注由由浩浩之貌不憚與惡人同朝竝立偕俱也與之儷行於朝何傷但不失已之正心而已耳援而止之謂三絀不慚去也是栁下惠不以去為潔也孟子曰伯夷隘栁下惠不恭隘與不恭君子不由也注伯夷隘懼人之汚來及已故無所含容言其太隘狹也栁下惠輕忽時人禽獸畜之無欲彈正之心言其大不恭敬也聖人之道不取於此故曰君子不由也先言二人之行孟子乃評之耳音義推惡此章惟此字烏路切餘如字凂張莫罪切丁亡但切說文曰汙也方言曰東齊之間謂汙曰凂汙烏故反下文同就已之已音以注同遺佚音義與逸同或作迭或作失皆音逸厄音厄本亦作厄袒音但裼音錫裸郎果切裎音程竝露也裎亦作程焉於䖍切悶音滿又摸本切本亦作滿援而止之或作正之憚徒案切儷音麗絀音黜隘或作厄或作厄竝烏懈切彈音壇疏正義曰此章言伯夷古之大賢猶有所闕也孟子曰伯夷非其君不事至是亦不屑就已者孟子曰伯夷非已所好之君則不奉事之非與已同志之友則不與為交友不立於惡人之朝是不事非其君也不與惡人言是不友非其友也謂立於惡人之朝與惡人言語如以服其朝衣朝冠而坐於塗泥炭墨之中矣以其有汚於已也推已惡惡之心乃至於與鄉人立其冠有不正且望望然慚耻而遠去之若相將有汚於已也如此故諸侯雖有善辭命而至者亦不受也以其不受之者是亦不潔而不忍就見也故以不就為潔也屑潔也栁下惠不羞汚君不卑小官至是亦不屑去已者孟子又言栁下惠不羞耻事其汚君汚君濫惡之君也雖居小官之位而不卑辱進而仕則不隱已之賢才必以欲行其道雖遺佚於野而不怨恨雖厄之使窮困而不哀憫故曰爾為之爾我為之我雖袒裼裸裎襲其身體於我身側爾又安能凂瀆於我哉以其不殊於俗一於和而已如此故由由然與人偕儷而行但不失已之正心焉牽援而止之而則止之以其援而止之而止是亦不潔而去已故以不去為潔也孟子曰伯夷隘柳下惠不恭隘與不恭君子不由也者此孟子所以復言伯夷之行失之太清而不能含容故為狹隘栁下惠失之太和而輕忽時人故為不恭敬然隘狹與不恭敬是非先王所行之道故君子不由用而行之也注伯夷孤竹君之長子讓國而隱居者也正義曰案春秋少陽篇云伯夷姓墨名允字公信諡為夷太史公云伯夷叔齊孤竹君之二子父欲立叔齊及父卒叔齊讓伯夷伯夷曰父命也遂逃去叔齊不肯立亦逃之國人立其中子於是伯夷叔齊聞西伯昌善養老盍往歸焉及西伯卒武王東伐紂伯夷叔齊叩馬而諫曰父死不葬爰及干戈可謂孝乎以臣弒君可謂仁乎左右欲兵之太公曰此義人也扶而去之武王平殷天下宗周伯夷叔齊耻之義不食周粟隱於首陽山采薇而食之及餓死者是矣孤竹北方之遠國也號為孤竹案地理志云遼西有孤竹城應邵曰故伯夷國是也栁下惠魯公族大夫姓展名禽字季栁下是其號者正義曰案史記傳云柳下惠姓展名禽魯人也為魯典獄之官任以直道故孔子云栁下惠為士師三黜人曰子未可去乎曰直道而事人焉往而不三黜枉道而事人何必去父母之邦孔注云士師典獄之官鄭𤣥亦云然孟子注疏卷三下孟子注疏卷三下考證以力假仁者章文王以百里日知録曰湯以七十里文王以百里孟子為此言以證王之不待大耳其實文王之國不止百里周自王季伐諸戎疆土日大文王自岐遷豐其國已跨三四百里之地伐崇伐密自河以西舉屬之周至于武王而西及梁益東臨上黨無非周地紂之所有不過河內殷墟其從之者亦但東方諸國而已一舉而克商宜其如振槁也書之言文王曰大邦畏其力文王何嘗不藉力哉仁則榮章太甲曰節注殷王太甲疏祖已嘉武丁之以祥雉為德已監本訛乙今改正尊賢使能章關譏而不征節注七曰關市之賦賦監本訛征今改正㕓無夫里之布節注周禮載師曰宅不毛者有里布臣邦綏按南軒孟子說云居㕓者既有稅矣則夫布里布不復重征之是夫與里各有布明矣注引載師云云但言里布而不及夫布今考周禮閭師職云凡無職者出夫布此即南軒所謂夫布者是也疏次布儳布臣邦綏按周禮㕓人掌斂市絘布總布質布罰布㕓布而入於泉府陸德明經典釋文曰絘音次總劉依杜音讒鄭音㧾然則疏云儳布應作總布人皆有不忍人之心章凡有四端節注擴廓也也監本訛此今改正伯夷非其君不事章疏由由然與人偕儷而行然字下監本多浩浩二字今從宋本刪孟子注疏卷三下考證
