body:
  text: 欽定四庫全書孟子注疏卷十三上漢趙氏注宋孫奭音義并疏盡心章句上注盡心者人之有心為精氣主思慮可否然後行之猶人法天天之執持綱維以正二十八舍者北辰也論語曰北辰居其所而衆星共之心者人之北辰也苟存其心養其性所以事天也故以盡心為篇題音義共求用切亦作拱居勇切疏正義曰前篇章首論告子之言性此篇章首以論盡心蓋以情性有主於心故次之以盡心也言盡已之心與天道通是道之極者故孟子七篇所以終於盡心也此篇凡八十五章趙氏分成上下卷此卷即有四十七章而已一章言盡心知性二章言人必趨命貴受其正三章言為仁由已富貴在天四章言每必以誠恕已而行五章言人有仁端達之為道六章言逺辱不為憂七章言不慕大人何能有恥八章言王公尊賢以貴下賤九章言內定常滿賤不失道達善天下十章言小人待化十一章言人情富盛莫不驕矜十二章言勞人欲以佚之殺人欲以生之十三章言王政浩浩與天地同道霸者德小民人速覩十四章言明法審令崇寬務化十五章言本性良能仁義是也十六章言聖人潛隱十七章言已所不欲勿施于人仲尼之道也十八章言孤孽自危故能顯達十九章言容悅凡臣社稷股肱天民行道大人正巳二十章言育養賢才樂過萬乘二十一章言臨蒞天下君子之樂尚不與焉二十二章言王政普大二老聞歸二十三章言教民之道富而節用二十四章言能大明者無不照二十五章言好善從舜好利從跖二十六章言楊墨放蕩子莫執一二十七章言饑不妄食二十八章言下惠不恭二十九章言為仁由已必在究之三十章言仁在性體其次假道三十一章言放惡攝政伊周有為凡人志異則生篡心三十二章言君子正己以立於世三十三章言人當尚志善之所由仁與義也三十四章言事有輕重行有小大三十五章言奉法承天政不可枉大孝榮父遺棄天下三十六章言人性皆同居使之異三十七章言輿服器用人同不殊尊貴居之志氣以舒三十八章言取人之道必以恭敬三十九章言聖人踐形四十章言禮斷三年孝者欲益富貴怠厭思減其日四十一章言教人之術莫善五者四十二章言道大難追人能𢎞道四十三章言窮達卷舒屈伸異變四十四章言學尚虛已四十五章言賞僭及淫刑濫傷害季文三思四十六章言君子布德各有所施四十七章言振裘持領正羅惟綱其餘三十八章趙氏分在下卷各有叙焉注盡心者至篇題正義曰云人之有心為精氣主思慮可否然後行之猶人法天者蓋以性之得於天心之生於性天莫之為而所以命人者性也性則湛然自得所以為主者心也則人之心為精氣主思慮可否然後行由人法天也云天之執持維綱以正二十八舍者北辰也者二十八舍案五行天文志云東方角亢氐房心尾箕北方斗牛女虛危室壁西方奎婁胃昴畢觜參南方井鬼栁星張翼軫凡此四七之星分布四方是二十八舍也然所以正之者蓋在乎北辰論語曰北辰居其所而衆星拱之包注云北辰常不移而衆星拱之爾雅釋天云北極謂之北辰郭璞曰北極天之中以正四時然則極中也辰時也以其居天之中故曰北極以正四時故曰北辰又按漢書天文志云中宫太極星其一明者太一之常居也旁三星三公環之匡衛十二星藩臣皆曰紫宫北斗七星所謂璇璣玉衡以齊七政斗為帝車運於中央臨制四方分隂陽建四時均五行移節度定諸紀皆係於斗是衆星所拱也孟子曰盡其心者知其性也知其性則知天矣注性有仁義禮智之端心以制之惟心為正人能盡極其心以思行善則可謂知其性矣知其性則知天道之貴善者也存其心養其性所以事天也注能存其心養育其正性可謂仁人天道好生仁人亦好生天道無親惟仁是與行與天合故曰所以事天也夭壽不二修身以俟之所以立命也注二二也仁人之行一度而已雖見前人或夭或夀終無二心改易其道夭若顔淵夀若邵公皆歸之命修正其身以待天命此所以立命之本音義好呼報切下所好好善好以好利好仁之好皆同行下孟切下之行改行善行行有百行皆同夭與夭同疏正義曰此章言盡心竭性足以承天夭壽禍福秉心不違立命之道惟是為珍者也孟子曰盡其心者至所以立命也者孟子言人能盡極其心以思之者是能知其性也知其性則知天道矣知存其心養育其性此所以能承事其天者也以其天之賦性而性者人所以得於天也然而心者又生於性性則湛然自得而心者又得以主之也蓋仁義禮智根於心是性本固有而為天所賦也盡惻隱羞惡恭敬是非之心則是知仁義禮智之性知吾性固有此者則知天實賦之者也如存此惻隱羞惡恭敬是非之心以長育仁義禮智之性是所以事天者也是性即天也故存心養性是為事天矣又言人之於命雖有或夭或夀但操執其心而不二也既夭夀不二而修其身以待其在夭者何如耳如是所以為能立命之本也以其夭夀皆定於未形有分之初亦一而不二也不可徼求之矣但修其在我以待之是為立命也如於夭夀而二其心以廢其所以修其在我者則非所以立命者也商書云我生不有命在天是其意也孟子曰莫非命也順受其正注莫無也人之終無非命也命有三名行善得善曰受命行善得惡曰遭命行惡得惡曰隨命惟順受命為受其正也已是故知命者不立乎巖墻之下盡其道而死者正命也注知命者欲趨於正故不立於巖墻之下恐壓覆也盡修身之道以夀終者得正命也桎梏死者非正命也注畏壓溺死禮所不弔故曰非正命也已音義命有三名丁云案此三命事出孝經援神契壓烏甲切疏正義曰此章言人必趨命貴受其正巖墻之疑君子遠之也孟子曰莫非命至非正命也者孟子言人之死無非是命也然當順受其正盡道以生死也書云惠迪吉是其順受其正之㫖也是故知命之君子不立身於巖墻危險之下以其能壓覆人也是以盡其修身之道而死亡者乃為受正命而死也陷於刑獄為桎梏而死者非受正命而死也以其不能盡修身之道而順受其命而死也桎足械也梏手械也今刑獄匣手足者也案孔子云人有三死而非命飲食不節勞逸過度是病其殺之者也居下位而上誣其君耆欲無厭是刑其殺之也以少犯衆以弱侮強是兵其殺之者也又云人有三死而不弔有畏而死者有壓而死者有溺而死者注莫無也至正也正義曰云命有三行善得善曰受命者如舜聞一善言見一善行沛然若決江河而莫之禦而終得升于帝而崩是也行善得惡曰遭命如淮南子伯牛有癩論語云伯牛有疾孔子自牖執其手曰亡之命矣夫斯人也而有斯疾也斯人也而有斯疾也包曰伯牛有惡疾是也行惡得惡曰隨命如舜之四凶之類是也注畏壓溺死禮所不弔正義曰禮於檀弓云死而不弔者三畏壓溺鄭氏云謂輕身忘孝也畏人或時以非罪攻巳不能有以說之死之者孔子畏於匡是也壓行止危險之下是也溺不乘橋船是也荀子曰夏首之南有人曰涓蜀梁其為人善畏明月而宵行俯見其影以為伏鬼也仰視其髮以為立魅背而走比至其家失氣而死是亦畏死者也又秦武王時大蛇從身出復入穴五女示之五丁拔蛇壓殺五女是壓死者也尾生與女子期於粱下水至不去抱梁柱而死是溺死者也孟子之言其趨則一也音義遠于願切下遠辱同孟子曰求則得之舍則失之是求有益於得也求在我者也注謂修仁行義事在於我我求則得我舍則失故求有益於得也求之有道得之有命是求無益於得也求在外者也注謂賢者修其天爵而人爵從之故曰求之有道也修天爵者或得或否故曰得之有命也爵祿須知己知己者在外非身所專是以云求無益於得也求在外者也音義舍音捨下是舍舍大皆同疏正義曰此章言為仁由已富貴在天者也孟子言仁義禮智性之所有如就性而求之則得之舍而不求則亡是則仁義禮智求之有益於得者也是求之在我者也以其仁義禮智有生之初性固有者是為在我者也是為天爵也求之有道則修其天爵而人爵從之故也既修其天爵而人爵或有不得者是或得或否是得之有命也是則人爵求之無益於得也是求之在外者也以其人爵非身所專故為在外者也如論語云求仁而得仁是求則得之之謂也易云舍爾靈龜凶是舍則失之之謂也詩云愷悌君子求福不回是求之有道者也荀子云君子能為可用不能使人必用已是得之有命者也孟子所以言之以此孟子曰萬物皆備於我矣反身而誠樂莫大焉注物事也我身也普謂人為成人巳往皆備知天下萬物當有所行矣誠者實也反自思其身所施行能皆實而無虛則樂莫大焉彊恕而行求仁莫近焉注當自彊勉以忠恕之道求仁之術此最為近也音義樂音洛下樂在樂善樂其所樂樂道樂義之樂樂風樂為而樂樂而三樂樂也所樂樂之皆同疏正義曰此章言每必以誠恕已而行樂在其中仁之至者也孟子言人之生也萬物皆偹足於我矣但能反已思之以誠不為物之喪已是有得於內矣有得於內則為樂亦莫大焉以其外物為樂則所樂在物不在於我故為樂也小以內為樂則所樂在已不在物其為樂也大又言勉彊以忠恕之道而行之以求仁之術為最近故傳有云仁者必恕而後行是之謂也斯亦力行近乎仁之意歟孟子曰行之而不著焉習矣而不察焉終身由之而不知其道者衆也注人皆有仁義之心日自行之於所愛而不能著明其道以施於大事仁妻愛子亦以習矣而不能察知可推以為善由用也終身用之以為自然不究其道可成君子此衆庶之人也疏正義曰此章言人有仁端達之為道凡人用之不知其為寶也孟子言仁義之道人皆有之然而行之而不著則其迹不能彰明習此仁義之道而不察列其理不能推明終身用而行之而不知其是為道凡如此者非君子者也是則為凡衆者矣故孟子以此憫之孟子曰人不可以無恥注人不可以無所羞恥也論語曰行已有恥無恥之恥無恥矣注人能恥已之無所恥是為改行從善之人終身無復有恥辱之纍也疏正義曰此章言恥身無分獨無所恥斯必遠辱不為憂矣孟子言人之不可無其羞恥也人能無恥而尚有羞恥是為遷善逺罪之人終身無復有恥辱纍之矣案禮云君子有五恥朝不坐燕不善君子恥之居其位無其言君子恥之有其言無其行君子恥之既得之又失之君子恥之地有餘而民不足君子恥之如此則人可以無恥乎此孟子所以有此言而救時之弊與孟子曰恥之於人大矣為機變之巧者無所用恥焉注恥者為不正之道正人之所恥為也今造機變阱陷之巧以攻戰者非古之正道也取為一切可勝敵之宜無以錯於廉恥之心不恥不若人何若人有注不恥不如古之聖賢何有如聖賢之名也音義錯音措疏正義曰此章言不慕大人何能有恥者也孟子言人之所以恥者以其為不正之道也不正之道正宜羞恥而無為之也是為恥之於人為大者也今之人乃造機變阱陷藏兵之巧以為攻戰者是為不正之道也是無所用而恥之也如不恥不若古之聖賢何能有古聖賢之名也注隰朋頗淵正義曰凡於趙注有所要者雖於文假不録然於事未嘗敢棄之而不明今有以隰朋不及黃帝佐齊桓以有勳顔淵慕虞舜仲尼歎庶幾也案杜預春秋傳云隰朋齊大夫也史記注云徐廣曰朋或作崩常愧恥不若黃帝之為人後齊桓得之為佐桓公四十一年卒顔淵慕虞舜案經云顔淵曰舜何人也豫何人也有為者亦若是孔子所以曰回也其庶乎屢空是其嘆也趙注所以引而為解文孟子曰古之賢王好善而忘勢注樂善自卑若髙宗得傅說而禀命古之賢士何獨不然樂其道而忘人之勢注何獨不然何獨不有所樂有所忘也樂道守志若許由洗耳可謂忘人之勢矣故王公不致敬盡禮則不得亟見之見且猶不得亟而况得而臣之乎注亟數也若伯夷非其君不事伊尹樂道堯舜不致敬盡禮可數見之乎作者七人隱各有方豈可得而臣之者乎音義亟去吏切下同數音朔下同疏正義曰此章言王公尊賢以貴下賤樂道忘勢不以富貴動其心者也孟子曰至而况得而臣之者乎孟子曰古之賢者之君好人之善而忘巳之勢古之為賢士者亦然以其能樂已之樂而忘人之貴勢也如此故有王公大人不致其敬而盡其禮則不得數數見其賢者然而見之且猶尚以為不可而况得臣之而卑下者乎注髙宗得傅說而稟命正義曰案尚書說命篇云髙宗夢得說使百工營求諸野得諸傅岩爰立作相王置諸其左右曰臣下罔有稟命孔安國傳云名說禀受也命令也注許由洗耳可謂忘人之勢正義曰案高士傳云許由頴川人也隱箕山堯聞之躬聘為九川長由不赴遂洗耳於河巢父見之曰吾欲飲牛汚吾牛口於是牽牛上流飲之由大慚而隱是也注亟數也至作者七人正義曰云伯夷伊尹者此蓋本孟子之正文也已說之詳矣云作者七人者案論語之文也七人包注云凡七人長沮桀溺丈人石門荷蕢儀封人楚狂接輿是也王弼云七人伯夷叔齊虞仲夷逸朱張栁下惠少連是此七人者也音義賤去聲孟子謂宋句踐曰子好遊乎吾語子遊人知之亦囂囂人不知亦囂囂注宋姓也句踐名也好以道德遊欲行其道者囂囂自得無欲之貌也曰何如斯可以囂囂矣注句踐問何執守可囂囂也曰尊德樂義則可以囂囂矣注尊貴也孟子曰能貴德而履之樂義而行之則可以囂囂無欲矣故士窮不失義達不離道窮不失義故士得已焉達不離道故民不失望焉注窮不失義不為不義而苟得故得巳之本性也達不離道思利民之道故民不失其望也古之人得志澤加於民不得志修身見於世窮則獨善其身達則兼善天下注古之人得志君國則德澤加於民人不得志謂賢者不遭遇也見立也獨治其身以立於世間不失其操也是故獨善其身達謂得行其道故能兼善天下也音義句古侯切語魚據切囂五高反又許驕切離力智切下同見音現疏正義曰此章言內定常滿囂囂無憂可出可處故云以遊修身立世賤不失道達善天下乃用其寶句踐好逰未得其要孟子言之然後乃喻者也孟子謂宋句踐曰至囂囂宋句踐宋人姓宋名句踐孟子謂句踐曰子好逸遊乎我今語以教子之逰也言人之知巳亦但囂囂然自得人不知巳亦但囂囂然而自得曰何如斯可以囂囂矣句踐問之曰當何如此可以囂囂然自得矣曰尊德樂義至達則兼善天下孟子又與之曰尊貴其德所樂以義以此則可以囂囂自得矣蓋德有所得於內義有所不為於外既所貴在德而盡性於內所樂在義而窮理於外是以樂天知命故人知不知斯囂囂然自得矣如此故士窮而在下則不失義而不為苟得達而在上則不離道而常思利民窮不失義而不為苟得故得已之本性達不離道而常思利民故民不失其所望是以古之人得志遭遇其時則布恩澤而加被於民不得志則修治其身以立於世間是其窮則獨善其身達則得行其道而兼善天下也言古之人以是者如顔子之徒窮而不得志則不改其樂而獨善其身伊尹之徒得志而澤加於民也孟子曰待文王而後興者凡民也若夫豪傑之士雖無文王猶興注凡民無知者也故由文王之化乃能自興起以趨善道若夫豪傑之才知千萬於凡人者雖不遭文王猶能自起以善守其身正其行不陷溺也音義知音智下術智同疏正義曰此章言小人待化乃不邪辟君子特立不為俗移故稱豪傑自興者也孟子言必待文王之化而乃能興起以從善道者凡民也以其無自知者也若夫才有過於千萬人之豪傑者雖不遭遇文王之化猶能自興起以從善而正立其身也已音義辟音僻孟子曰附之以韓魏之家如其自視欿然則過人遠矣注附益也韓魏晉六卿之富者也言人既自有家復益韓魏百乘之家其富貴已美矣而其人欿然不以足自知仁義之道不足也此則過人甚逺矣音義欿張音坎字林云欲得也今詳此義內顧不足而有所然也下注滿欿同疏正義曰此章言人情富盛莫不驕亢有若欿然謂不如人非但免過卓絶乎凡也孟子言人自有富復附益以韓魏晋六卿百乘之家富而貴之如其自視已于仁義之道欿然不足則超絶有過乎衆人遠矣注韓魏晋六卿百乘之家正義曰巳說於梁惠首篇孟子曰以佚道使民雖勞不怨注謂教民趨農役有常時不使失業當其雖勞後獲其利則佚矣若亟其乘屋之類也故曰不怨以生道殺民雖死不怨殺者注謂殺大辟之罪者以坐殺人故也殺此罪人者其意欲生民也故雖伏罪而死不怨殺者音義亟音棘辟音闢疏正義曰此章言勞人欲以佚之殺人欲以生之則民不怨者也孟子言國君如使民趨於農耕是以佚道使民是農耕時雖為勞然後有所獲稼則又有以佚樂矣如是則何怨恨其勞乎故曰以佚道使民雖勞不怨又言國君殺戮其罪人者以其恐有害於民故殺之而意有在於欲生其民也是則罪人被殺雖死且不怨恨殺者也故曰以生道殺民雖死不怨殺者注若亟其乘屋之類正義曰已於滕文公說之矣注大辟之罪正義曰孔云大辟之罪死刑也前已說孟子曰霸者之民歡虞如也王者之民皥皥如也殺之而不怨利之而不庸民曰遷善而不知為之者注霸者行善恤民恩澤暴見易知故民歡虞樂之也王者道大法天浩浩而德難見也殺之不怨故曰殺之而不怨庸功也利之使趨時而農六畜繁息無凍餓之老而民不知獨是王者之功修其庠序之教又使日遷善亦不能覺知誰為之者言遷善之大化無過此也夫君子所過者化所存者神上下與天地同流豈曰小補之哉注君子通於聖人聖人如天過此世能化之存在此國其化如神故言與天地同流也天地化物嵗成其功豈曰使人知其小補益之者哉音義歡虞丁云義當作歡娛古字通用耳皥張云皥與昊同說文胡老切義與浩同古字通用所過者化所存者神陸云言君子所過人者在于政化存其身者在於神明疏正義曰此章言王政皥皥與天地同流霸者德小民人速覩是以賢者志其大者也孟子曰至小補之哉者孟子言霸者行善政以及民以其恩澤暴見故民歡虞而樂也王者道大故若天浩浩而難知難見者也故民皥皥然自得而已矣是以王者之民殺之而不怨以其生道殺之故也利而不知為王者之功以其佚道使之故也自迹觀之則君子過之而不守拘其一自妙道觀之則其所感而遂通天下之故者未嘗不有存焉故曰君子所過者化所存者神今夫天地之化者始乎春而終乎冬而萬物皆得以移易者也天地之神者始乎震而終乎艮而隂陽不可測之者是也然則王者之於民所過者以化所存者以神宜其與天地上下同流而無間也則是天地之化以神而存之豈曰使萬物知其有小補益哉王者之化亦存以神又豈曰使民知其有小補益之哉如此故王者之民所以皥皥如也蓋虞之為樂必待虞度無患然後為歡則其樂淺皥皥如也以其使民舒通太平自得而已故於歡虞又有以間矣此孟子所以抑區區之霸而尊崇其王者也孟子曰仁言不如仁聲之入人深也注仁言政教法度之言也仁聲樂聲雅頌也仁言之政雖明不如雅頌感人心之深也善政不如善教之得民也注善政使民不違上善教使民尚仁義心易得也善政民畏之善教民愛之善政得民財善教得民心注畏之不逋怠故賦役舉而財聚於一家也愛之樂風化而上下親故歡心可得也疏正義曰此章言明法審令民趨君命崇寬務化民愛君德故曰移風易俗莫善於樂者也孟子至善教得民心孟子言仁言為政教法度之言不若仁聲樂聲雅頌感人心之深也善政使民不違上又不若善教得民之易也以其善政出於法度之粗有刑威以行之故民有以畏之善教本人之德性有仁恩以懷之故民有以愛之亦以善政有九職任萬民有九兩以繫萬民九職任萬民故一曰三農以平地山澤生黍稷秣稻麻大小豆大小麥之九穀二曰園圃以育草木三曰虞衡作山澤之材四曰藪牧養蕃鳥獸五曰百工飭化八材八材鄭司農云珠象玉石金木革羽是也六曰商賈阜通貨賄七曰嬪婦化治絲枲鄭𤣥云金玉曰貨布帛曰賄嬪婦人之美稱也八曰臣妾聚斂疏材九曰閒民無常職轉移執事鄭𤣥云疏材百草根實可食者九兩繫萬民一曰牧以地得民二曰長以貴得民三曰師以賢得民四曰儒以道得民五曰宗以族得民六曰主以利得民七曰吏以治得民八曰友以任得民九曰藪以富得民凡此善政為民財而已善教因民心以教之故能得民心矣此所以為仁言不如仁聲之入人深也善政不如善教之得民然而善政非不能得民但得民財而已又不若善教得民之心矣蓋移風易俗莫大乎樂此禮之文然也孟子所以同其趨焉孟子曰人之所不學而能者其良能也所不慮而知者其良知也注不學而能性所自能良甚也是人之所能甚也知亦猶是能也孩提之童無不知愛其親也及其長也無不知敬其兄也注孩提二三歲之間在襁褓知孩笑可提抱者也少知愛親長知敬兄此所謂良能良知也親親仁也敬長義也無他達之天下也注人仁義之心少而皆有之欲為善者無他逹通也但通此親親敬長之心推之天下人也音義襁褓丁紀享切說文云負兒衣也博物志曰織縷為之廣八寸長一尺二寸以負小兒於背上下音保聲類曰褓者小兒被子也少知詩妙切下少而同長知張丈切下敬長挾長皆同疏正義曰此章言本性良能仁義是也達之天下恕乎已者也孟子曰人之所不學而能至逹之天下也者孟子言人之所以不學而性自能是謂良能者也所以不待思慮而自然知者是謂良知者也孩提襁褓之童子無有不知愛其父母及其長大無不知欽順其兄是則親愛其親欽順其兄是仁義也仁義即良知良能者也言人欲為善者無更於他求也但通逹此親親敬長之良能良知施之于天下耳注襁褓者正義曰釋云襁褓負也負兒衣也織縷為之廣八寸長二尺以負兒於背上者也是亦知孩提為二三嵗孟子曰舜之居深山之中與木石居與鹿豕遊其所以異於深山之野人者幾希注舜耕歷山之時居木石間鹿豕近人若與人遊也希遠也當此之時舜與野人相去豈逺及其聞一善言見一善行若決江河沛然莫之能禦也注舜雖外與野人同其居處聞人一善言則從之見人一善行則識之沛然不疑若江河之流無能禦止其所欲行也疏正義曰此章言聖人潛隱若神龍亦能飛天亦能潜藏同舜之謂也孟子言虞舜初起於歷山耕時居於木石之間以其近木石故也與鹿豕遊以其鹿與豕近於人也然而舜於此其所以有異於深山之野人不逺但能及其聞一善言見一善行其從之若決江河之水沛然其勢莫之能禦止之也注聖人潛隱若神龍者正義曰此蓋周易乾卦之文也趙注引之以解其經孟子曰無為其所不為無欲其所不欲如此而已矣注無使人為已所不欲為者無使人欲已之所不欲者每以身先之如此則人道足也疏正義曰此章言己所不欲勿施於人仲尼之道也孟子言人無為其所不為以其所不為者不義也無欲其所不欲者以其不欲為不善也人能無不義又不欲其所不善則人道於是足矣故曰如此也孟子曰人之有德慧術知者恆存乎疢疾注人所以有德行智慧道術才智者以其在於有疢疾之人疢疾之人又力學故能成德獨孤臣孽子其操心也危其慮患也深故逹注此即人之疢疾也自以孤微懼於危殆之患而深慮之勉為仁義故至於逹也音義疢丑創切孽魚列切疏正義曰此章言孤孽自危故能顯逹膏梁自止多用沉溺是故在上不驕以戒諸侯也孟子言人之所以有德慧術知者常在於疢疾之人也疢疾人之有小疾常霑在身不去者是為疢疾也如孤臣孽子其操心也常危其慮患也常深是若疢疾也此孟子所以執此喻以自解也言孤臣不得於其君者也孽子不得於其親者也不得於其君與不得於其親者故能秉心常危慮患常深以勉力於為道德故能顯逹也操心常危慮患常深是人之疢疾常霑在身而不去也是孟子所以為疢疾之人有德慧術智也然而非謂德慧術智必繫乎有疢疾者但常存乎疢疾之人而已蓋有得於已謂之德述而行之謂之術然德又以慧連術又以智連之者以其德以慧明術以智擇耳是則所謂智慮生於憂患豈非德慧術智存於疢疾之意有同歟此孟子所以有是言之而戒當時之人者也孟子曰有事君人者事是君則為容悅者也注事君求君之意為苟容以悅君者也有安社稷臣者以安社稷為悅者也注忠臣志在安社稷而後為悅者也有天民者達可行於天下而後行之者也注天民知道者也可行而行可止而止有大人者正已而物正者也注大人大丈夫不為利害動移者也正已物正象天不言而萬物化成也疏正義曰此章言容恱凡臣社稷股肱天民行道大人正身凡四科優劣之差者也孟子曰有事君人者事是君則為容悅者也孟子言有人事其君以求君之意者是為苟容以悅君者也有安社稷臣者以安社稷為恱者也孟子又言有忠臣為安社稷臣者也在於安社稷而後為恱者也有天民者達可行於天下而後行之者也言天民為之先覺者志在于行道然而既逹而在位可以行其道於天下然後乃行之也以其若窮而在下未可行其道則亦止而不行矣是其窮逹一歸於天而已有大人者正已而物正者也言有大丈夫不為利害之所移動是則自正冶其已而物後自取正於我也凡此是其四科優劣差出也孟子曰君子有三樂而王天下不與存焉父母俱存兄弟無故一樂也仰不愧於天俯不怍於人二樂也得天下英才而教育之三樂也注天下之樂不得與此三樂之中兄弟無故無他故不愧天又不怍人心正無邪也育養也教養英才成之以道皆樂也君子有三樂而王天下不與存焉注君子重言是美之也音義王于况切與音豫怍音昨重直用切疏正義曰此章言保親之養兄弟無他誠不愧天育養英才吾人能之樂過萬乘孟子重為一章再云者也孟子曰君子有三樂而王天下不與存焉至存焉者孟子言君子有三樂而為王天下者不得與於其間父母皆在兄弟無有他故者以其無嫌隙之事也此乃一樂也存誠於已而仰無以有羞愧於天俯無以有慚怍於人此乃二樂也已之有德又得天下英才大賢而推已以教而養育之此乃三樂也三樂如此故孟子又重言之然君子有三樂而王天下不與存焉以其有天下之樂不若此三樂矣故重言之而美此三樂也是以舜得天下而無足解憂楊子云紆朱懷金之樂不如顔氏子之樂是亦與此同意也孟子曰廣土衆民君子欲之所樂不存焉中天下而立定四海之民君子樂之所性不存焉注廣土衆民大國諸侯也所樂不存欲行禮也中天下而立謂王者所性不存乃所謂性於仁義者也君子所性雖大行不加焉雖窮居不損焉分定故也注大行行之於天下窮居不失性也分定故不變君子所性仁義禮智根於心其生色也睟然見於靣盎於背施於四體四體不言而喻注四者根生於心色見於面睟然潤澤之貌也盎視其背而可知其背盎盎然盛流於四體四體有匡國之綱口不言人自曉喻而知也音義分扶問切下之分同睟音粹見音現盎張烏曩切下注同又烏浪切陸云盎于背如負之于背疏正義曰此章言臨蒞天下君國子民君子之樂尚不與存仁義內外充身體履方四體不言蟠辟用張心邪意溺進退無容於是之際知其所不同也孟子曰廣土衆民至不言而喻孟子言廣土地之大衆人民之多以為大國之諸侯君子者心欲好之然其所樂不在此也中天下之中而立以安四海之民是為之王君子者雖樂於此然而禀天性不在此焉蓋君子欲廣土衆民以其足以行道於一國故也然其所樂又在于定四海之民而未樂於此一國而已雖樂在于中天下而立定四海之民得以行道於天下奈何所性不在此焉是所性者特在仁義禮智耳故言於下文是也是則君子所禀天之性雖大而行道於天下且不能加益其性雖窮居在下且不能損滅其性以其所生之初受之于天有其分定故也故君子所性是仁義禮智四者根生于心顯而形諸德容其生於色則睟然潤澤見于靣又有光輝乎其前盎盎然見于背又有充實乎其後而旁溢流通乎左右上下四體則一動靜一行止固雖不言而人以曉喻而知其所存是其不言仁而喻其能仁不言義而喻其能義以至禮也智也亦若是矣此所以故云四體不言而喻荀子曰君子之學入乎耳著乎心布乎四體形乎動靜又曰君子至德默然而喻同意音義蟠音盤辟音闢孟子注疏卷十三上孟子注疏卷十三上考證盡心章句上疏一章言盡心知性監本此句下脫二章言人必趨命貴受其正共十一字今補入又疏十六章言聖人潛隱監本此句下脫十七章言己所不欲勿施于人仲尼之道也共十七字今補入又疏四十五章言賞僣及淫刑濫傷害害監本訛及今改正又疏四十六章言君子布德各有所施施監本訛思今改正又疏其餘三十八章八監本訛九今改正求則得之章求之有道節注是以云求無益於得也求監本訛乘今改正人不可以無恥章疏此章言恥身無分獨無所恥斯必遠辱不為憂矣盡心章句上疏六章言逺辱不為憂與此不合恥之於人大矣章注隰朋顔淵疏共四行本注無隰朋顔淵而疏中有之疑古注尚多有刪節也古之賢王章注疏尚書說命篇云髙宗夢得說使百工營求諸野得諸傅巖臣邦綏按此三句乃書序非說命篇文也又云爰立作相王置諸其左右曰臣下罔有禀命尚書云王言惟作命不言臣下罔攸禀令乃髙宗不言羣臣諫王之詞此時未得傅說也今疏欲順注中得傅說而稟命之文遂以諌王之詞為命說之詞而次於爰立作相之下牽引經義似誤仁言不如仁聲章疏飭庀八材庀監本訛化今改正孟子注疏卷十三上考證欽定四庫全書孟子注疏卷十三下漢趙氏注宋孫奭音義并疏盡心章句上孟子曰伯夷辟紂居北海之濵聞文王作興曰盍歸乎來吾聞西伯善養老者太公辟紂居東海之濵聞文王作興曰盍歸乎來吾聞西伯善養老者注已說於上篇天下有善養老則仁人以為已歸矣注天下有若文王者仁人將復歸之矣五畝之宅樹墻下以桑匹婦蠶之則老者足以衣帛矣五母雞二母彘無失其時老者足以無失肉矣百畝之田匹夫耕之八口之家可以無饑矣注五雞二彘八口之家畜之足以為畜産之本也所謂西伯善養老者制其田里教之樹畜導其妻子使養其老五十非帛不暖七十非肉不飽不暖不飽謂之凍餒文王之民無凍餒之老者此之謂也注所謂無凍餒者教導之使可以養老者耳非家賜而人益之也音義辟音避衣於既切疏正義曰此章言王政普大教其常業各飬其老使不餒乏二老聞之歸身自已所謂衆鳥不羅翔鳯來集之類者也孟子曰伯夷辟紂至此之謂也已說于上篇矣此以大同小異更不復說焉然其類亦孔子所云刳胎殺夭則麒麟不至覆巢毁卵則鳯凰不翔亦此類也孟子曰易其田疇薄其稅斂民可使富也食之以時用之以禮財不可勝用也注易治也疇一井也庶民治其田疇薄其稅斂不踰什一則民富矣食取其征賦以時用之以常禮不踰禮以費財也故畜積有餘財不可勝用也民非水火不生活昏暮叩人之門户求水火無弗與者至足矣聖人治天下使有菽粟如水火菽粟如水火而民焉有不仁者乎注水火能生人有不愛者至饒足故也菽粟饒多若是民皆輕施於人而何有不仁者也音義易以䜴切施於䜴切焉於䖍切疏正義曰此章言教民之道富而節用蓄積有餘焉有不仁故曰倉廩實知禮節也孟子曰易其田疇至不可勝用也孟子言如使在下者易治其田疇而不難耕作則地無遺利其在上者又薄其賦斂而無橫賦則民皆可令其富足也又食之以時而其用不屈用之以禮而其欲不窮則財用有餘而不可勝用也民非水火不生活至焉有不仁者乎孟子又言人民非得其水火則不能生活然而昏暮之時有擊人之門户而求之水火無不與之者以其水火至多矣聖人如能治其天下使民有菽粟亦如水火之多則民人孰不以有餘而補其不足而為仁者乎故曰菽粟如水火而民焉有不仁者乎此所謂倉廪實而知禮節者也注疇一井也正義曰說文云為耕治之田也不知一井何據孟子曰孔子登東山而小魯登太山而小天下故觀於海者難為水遊於聖人之門者難為言注所覽大者意大觀小者志小也觀水有術必觀其瀾注瀾水中大波也日月有明容光必照焉注容光小郤也言大明照幽微流水之為物也不盈科不行君子之志於道也不成章不達注盈滿也科坎也流水滿坎乃行以喻君子之學必至成章乃仕進者也音義郤丁去逆切義與隙同疏正義曰此章言能大明者無不照志聖道者成其仁也孟子曰孔子登東山至難為言者孟子言孔子登魯國之東山而所覽者大故小其魯國以魯國莫大於東山也登太山而能小其天下亦所覽者大而天下亦莫大於太山也如此故觀之於海者難為水也以其水所同歸於海者也是以海為百谷王遊聖人之門者難為言以其道之所同出又同歸於此者也楊子云視日月而知衆星之蔑如仰天庭而知天下之居卑亦與此同意觀水有術必觀其瀾者孟子又言人之觀于水以其有術也有術者所謂觀水必觀其波瀾是為能觀水者也云此者以其人之觀書亦若是也言觀書亦當觀其五經而已矣五經所以載聖人之大道者也日月有明容光必照焉者又言日月之有明凡于幽隱但有容其光者則必照之亦若道之在天下無往而不在也流水之為物也不盈科不行至不成章不達者又言流水為物所流遇於科坎不盈實其科坎則不流進而行也如君子之學志在于道也不成章則不達而進仕以其君子於道至於成章則充滿美在其中暢於四支發于事業為美之至者也此孟子所以有水為之喻焉孟子曰雞鳴而起孳孳為善者舜之徒也雞鳴而起孳孳為利者跖之徒也欲知舜與跖之分無他利與善之間也注跖盜跖也跖舜之分故以此别之音義孳張云與孜同古字通用下文同跖張云跖與跖同之石切别彼列切疏正義曰此章言好善從舜好利從跖明明求之常若不足君子小人各一趣也孟子曰至間也者孟子言人之雞鳴而起孳孳勤篤于為善者乃為舜之徒黨也如雞鳴而起孳孳但勤篤於為利者乃為盜跖之徒也儻言欲知舜與盜跖為君子小人之分别無他事焉特一趨于利一趨于善之間而已注盜跖正義曰案李竒漢書傳云盜跖乃是秦之大盜也孟子曰楊子取為我拔一毛而利天下不為也注楊子楊朱也為我為己也拔己一毛以利天下之民不肯為也墨子兼愛摩頂放踵利天下為之注墨子墨翟也兼愛他人摩突其頂下至於踵以利天下已樂為之也子莫執中注子莫魯之賢人也其性中和専一者也執中為近之執中無權猶執一也注執中和近聖人之道然不權聖人之重輕執中而不知權猶執一介之人不知時變也所惡執一者為其賊道也舉一而廢百也注所以惡執一者為其不知權以一知而廢百道也音義為我之為于僞切注為己及下為其為之不為皆同放丁方往切至也踵之隴切突丁徒忽切穿突也子莫執中陸云言子等無執中惡烏路切注同疏正義曰此章楊墨放蕩子莫執一聖人量時不取此術孔子行止唯義所在者也孟子曰楊子取為我拔一毛而利天下不為也至為之孟子謂楊朱所取以為已雖拔己之一毛以利天下且不為也墨翟兼愛他人雖摩突其頂而至於踵而利天下且以為之子莫執一子莫魯賢人言子莫執中和之性而専一者也以其無為巳兼愛之過而已故曰執中為近之言子莫執中為近聖人之道者也如執中而不知權變但若執一介之人不知時變者也然而所以惡疾其執一者是為其有以賊害其道也是若知舉一道而廢其百道也故曰執中無權猶執一也所惡執一者為其賊道舉一而廢其百也孟子曰飢者甘食渴者甘飲是未得飲食之正也飢渴害之也注飢渴害其本所以知味之性令人強甘之豈惟口腹有飢渴之害人心亦皆有害注為利欲所害亦猶飢渴得之人能無以飢渴之害為心害則不及人不為憂矣注人能守正不為邪利所害雖謂富貴之事不及逮人猶為君子不為善人所憂患也音義強其文切疏正義曰此章言飢不忘食忍情節欲賤不失道不為苟求能無心害夫將何憂者也孟子曰飢者甘食至不為憂矣孟子言人飢餓則易為食故以甘之渴者易為飲故以甘之然而不得飲食味之正者也以其但為飢渴害其本性耳豈獨飲食于口腹為有飢渴以害之言人心亦皆有以害之也以其利欲害之故也人能無以飢渴之害為心之害則所養不及於人亦不足為可憂矣蓋無以飢渴為心害則孟子以飢渴之害亦猶利欲之害故假託而言之也孟子曰栁下惠不以三公易其介注介大也栁下惠執𢎞大之志不恥汚君不以三公榮位易其大量也音義陸云介謂特立之行疏正義曰此章言栁下惠不恭用志大也無可無否以貴為賤者也孟子言栁下惠不以三公之榮位而移易己之大志也以其所守之介在道而已是所以不羞小官者焉今夫三公者乃百僚之師帥也人臣之位極者也衣則服衮圭則執桓圭而世之所謂富貴崇顯者無以過也孟子曰有為者辟若掘井掘井九軔而不及泉猶為棄井也注有為為仁義也軔八尺也雖深而不及泉喻有為者能於中道而盡棄前行者也音義掘衢物切又其月切軔丁音創云義與仞同借用耳先儒以七尺為仞注云八尺曰軔疏正義曰此章言為仁由己必在究之九軔而輟無益成功者也孟子曰今之有為之道者譬如掘井者也掘井至九軔之深而不及泉則止之是棄其前掘井之功者也喻為仁義之道而不及之則止而不為是亦棄其仁義之道者也孔子曰為山未成一簣止吾止也與此同意注軔八尺也正義曰案釋云七尺曰軔孟子曰堯舜性之也湯武身之也五霸假之也注性之性好仁自然也身之體之行仁視之若身也假之假仁以正諸侯也久假而不歸惡知其非有也注五霸而能久假仁義譬如假物久而不歸安知其不真有也音義惡音烏下惡在惡得皆同疏正義曰此章言仁在性體而行仁本性之自然者也湯武利而行仁視之若身也五霸強而行仁則力假之而已然而久假而行之而不歸止安知其非真有也楊子曰假儒衣書服而讀之三月不歸孰曰非儒也亦同其㫖公孫丑曰伊尹曰豫不狎于不順放太甲于桐民大恱太甲賢又反之民大悅賢者之為人臣也其君不賢則固可放與注丑怪伊尹賢者而放其君何也孟子曰有伊尹之志則可無伊尹之志則篡也注人臣秉忠志若伊尹欲寧殷國則可放惡而不即立君宿留冀改而復之如無伊尹之忠見間乘利篡心乃生何可放也音義與音餘下禁與子與皆同宿留音秀霤疏正義曰此章言憂國忘家意在出身志在寧君放惡攝政伊周有焉凡人志異則篡心生也公孫丑問孟子謂伊尹有言我不邇于不順已者故放太甲于桐宫而民心大悅及太甲悔改其過而歸賢則伊尹又迎而反之以復君位商民大悅且賢者之為人臣也其君有不賢者則固可以放之與孟子曰如賢者有伊尹愛君之志則可以放君如無伊尹秉忠心以愛君則放君而生篡奪君位之心者也以為不可矣公孫丑曰詩曰不素餐兮君子之不耕而食何也注詩魏國伐檀之篇也無功而食則謂之素餐世之君子有不耕而食何也孟子曰君子居是國也其君用之則安富尊榮其子弟從之則孝弟忠信不素餐兮孰大於是注君子能使人化其道德移其習俗身安國富而保其尊榮子弟孝悌而樂忠信不素餐之功誰大於是何為不可以食祿音義餐七丹切疏正義曰此章言君子正己以立於世世美其道君臣是貴所過者化又何素餐之謂也公孫丑問孟子曰魏國伐檀之詩有云不素餐兮言無功而食謂之素餐然而君子有不自耕而食祿者是如之何孟子對之曰君子居處此國其君任用之則安富尊榮言安國保其尊榮子弟從之則能孝悌忠信是則不素餐兮誰有大於此者言何為而不可食祿注魏國伐檀之篇正義曰此詩蓋刺在位貧鄙無功而受祿君子不得進仕爾王子墊問曰士何事注齊王子名墊也問士當何事為事者也孟子曰尚志注尚貴也士當貴上於用志也曰何謂尚志曰仁義而已矣殺一無罪非仁也非其有而取之非義也居惡在仁是也路惡在義是也居仁由義大人之事􅊀矣注孟子言志之所尚仁義而已矣不殺無罪不取非有者為仁義欲知其所當居者仁為貴所由者義為貴大人之事備矣音義墊丁念切疏正義曰此章言人當尚志於善也善之所由仁與義也欲使王子無過差者也王子墊問曰士何事者王子墊齊王之子名墊也問孟子曰為士者當以何事為尚也孟子曰尚志孟子答之曰為士者當以志為尚也曰何為尚志王子又問孟子何以謂之尚志曰仁義而已矣至大人之事備矣孟子又答之曰尚志則以仁義而已矣言能以仁義為尚則為尚志也如殺一人之無罪是為非仁也非己之所有而取求之是為非義也如此非仁非義者亦以所居有惡疾在于仁所行有惡疾在于義是也如仁以為居義以為行則大人之事亦􅊀矣此孟子所以欲使王子墊於無過之地也孟子曰仲子不義與之齊國而弗受人皆信之是舍簞食豆羮之義也注仲子陳仲子處於陵者人以為廉謂以不義而與之齊國必不受之孟子以為仲子之義若上章所道簞食豆羮無禮則不受萬鍾則不辨禮義而受之也人莫大焉亡親戚君臣上下以其小者信其大者奚可哉注人當以禮義為正陳仲子避兄離母不知仁義親戚上下之叙何可以其小亷信以為大哉疏正義曰此章言事有輕重行有大小以大包小可也以小信大未之聞者也孟子言陳仲子以不義雖與之齊國之大而且不受國人皆信之以為廉是為舍簞食豆羮之小義也人之所尚當以莫大為尚焉者是其知以親戚君臣上下之叙者也今陳仲子避兄離母處於陵而不仕是棄親戚君臣上下之大分而徒取其辭受之小節而已而信廉之大又安可哉以其非義之本耳宜孟子以是闢之注陳仲子至受之也正義曰此于前篇已說矣桃應問曰舜為天子臯陶為士瞽瞍殺人則如之何注桃應孟子弟子問臯陶為士官主執罪人瞽瞍惡暴而殺人則臯陶如何孟子曰執之而已矣注孟子曰臯陶執之耳然則舜不禁與注桃應以舜為天子使有司執其父不禁止之邪曰夫舜惡得而禁之夫有所受之也注夫辭也孟子曰夫舜惡得禁之夫天下乃受之于堯當為天理民王法不曲豈得禁之也然則舜如之何注應問舜為之將如何曰舜視棄天下猶棄敝屣也竊負而逃遵海濵而處終身欣然樂而忘天下注孟子曰舜視棄天下如捐棄敝屣屣草履可屣也敝喻不惜舜必負父而逺逃終身欣然忽忘天下之為至貴也音義陶音姚屣所綺切注同欣音欣疏正義曰此章言奉法承天政不可枉大孝榮父遺棄天下虞舜之道趨將若此孟子之言揆聖意者也桃應問曰舜為天子臯陶為士瞽瞍殺人則如之何桃應問孟子曰舜為天子命臯陶為士官以執罪人舜父瞽瞍殺人則臯陶之士當如何也孟子曰執之而已矣孟子答之但當執而不縱也然則舜不禁與桃應問曰如是則舜為天子使有司執其父而不禁之邪曰夫舜惡得而禁之夫有所受之也孟子又答之曰夫舜豈得而禁止之哉夫以其法有所受之而已然則舜如之何桃應問曰如是舜不敢禁止臯陶無執其父則舜將如之何曰舜視棄天下至忘天下孟子又答之曰舜視天下如捐棄敝屣而不惜也必將竊負戴其父而逃循海濵而處以逃之且終身欣然樂而忘去天下是以舜得天下不足解憂惟順父母可以解憂也孟子自范之齊望見齊王之子喟然嘆曰居移氣養移體大哉居乎夫非盡人之子與注范齊邑王庶子所封食也孟子之范見王子之儀體聲氣髙凉不與人同還至齊謂諸弟子喟然嘆曰居尊則氣高居卑則氣下居之移人氣志使之高凉若供養之移人形身使充盛也大哉居乎者言當慎所居人必居仁也凡人與王子豈非盡是人之子也王子居尊勢故儀聲如是也疏正義曰趙云此章言人性皆同居使之異君子居仁小人處利譬如王子殊于衆品者也孟子嘗自范邑見齊王之子儀體聲氣髙爽不與人同乃往歸齊而於弟子之間喟然嘆息之曰夫居足以移易人之氣所養足以移易人之體以其王子之儀體聲氣如是者亦以所居所養之大移之使然也大哉居乎言人當慎所居以仁為廣居凡衆之人豈非盡人之子與言齊王之子亦人之子也凡人亦人子也下文觀宜合此章孟子曰王子宫室車馬衣服多與人同而王子若彼者其居使之然也况居天下之廣居者乎注言王子宫室乘服皆人之所用之耳然而王子若彼高凉者居勢位故也况居廣居謂行仁義仁義在身不言而喻也魯君之宋呼於垤澤之門守者曰此非吾君也何其聲之似我君也此無他居相似也注垤澤宋城門名也人君之聲相似者以其俱居尊勢故音氣同也以城門不自肯夜開故君自發聲耳音義喟邱愧切乘音剩呼丁火故切垤大結切疏正義曰此章宜與上章合而為一不當分而為二也孟子言王子所居宫室與車馬之乘衣服之飾是皆與人同所用之也然而王子若彼儀體聲氣髙凉者必其居勢位使之如是與人不同耳言王子所居勢位能如此而况居天下之廣居以仁為居者乎且以魯國之君往宋乃呼于垤澤之門守者曰此非吾君之身也何其呼聲似我君也言此無他事異焉亦以皆居尊勢故其聲之如是相似也垤澤宋城門之名守者監門之官也是言能以大人之所居者處己而與大人相似者也孟子曰食而弗愛豕交之也愛而不敬獸畜之也恭敬者幣之未將者也恭敬而無實君子不可虛拘注人之交接但食之而不愛若養豕也愛而不敬若人畜禽獸但愛而不能敬也且恭敬者如有幣帛當以行禮而未以命將行之也恭敬貴實如其無實何可虛拘致君子之心也音義食丁音嗣畜張許六切疏正義曰此章言取人之道必以恭敬恭敬貴實虛則不應實者謂敬愛者也孟子言人之交接但飲食為備而歡意弗加者非以愛相接者也是為豕交之也犬馬者人所愛而畜養者也如愛誠雖至而敬心弗加者是謂愛而弗敬以為獸畜之也然而恭敬者是幣帛之禮未行之也蓋以恭敬為先而幣帛從之也如恭敬而無幣帛之實以將之是又君子不可以虛拘矣以其禮不可以徒虛而行耳必以恭敬修于內而為之本幣帛以將之而為之末則君子交接之道畢矣孟子曰形色天性也惟聖人然後可以踐形注形謂君子體貌尊嚴也尚書洪範一曰貌色謂婦人妖麗之容詩云顔如蕣華此皆天假施於人也踐履居之也易曰黃中通理聖人內外文明然能以正道履居此美形不言居而言踐尊陽抑隂之義也音義蕣音舜疏正義曰此章言體德正容大人所履者也孟子言人之形色皆天所賦性所有也惟獨聖人能盡其天性然後可以踐形而履之不為形之所纍矣蓋形有道之象色為道之容人之生也性出於天命道又出於率性是以形之與色皆為天性也惟聖人能因形以求其性體性以踐其形故體性以踐目之形而得于性之明踐耳之形而得於性之聰以至踐肝之形以為仁踐肺之形以為義踐心之形以通於神明凡於百骸九竅五臟之形各有所踐也故能以七尺之軀方寸之微六通四闢其運無乎不在兹其所以為聖人與然而形與色皆天性乃獨踐形而不踐色何邪蓋形則一定而不易者也色則有喜怒哀樂之變以其無常者也不可以踐之矣亦以聖人吉凶與人同何踐之以為異哉是又孟子之深意然也注形謂君子至抑隂之義也正義曰云洪範一曰貌者蓋以五事之一者也孔安國云貌容儀也謂婦人妖麗之容詩云顔如蕣華者此蓋有女同車之篇文也注云舜木權也易曰君子黃中通理者蓋坤之卦文也謂君子黃中通理正位居體美在其中而暢于四肢發於事業美之至也是亦以正道履居此美形不言居而言踐尊陽而抑隂也齊宣王欲短喪公孫丑曰為朞之喪猶愈於己乎注齊宣王以三年之喪為太長久欲減而短之因公孫丑使自以其意問孟子既不能三年喪以朞年差愈於止而不行喪者也孟子曰是猶或紾其兄之臂子謂之姑徐徐云爾亦教之孝弟而已矣注紾戾也孟子言有人戾其兄之臂為不順也而子謂之曰且徐徐云爾是豈以徐徐之為差者乎不若教之以孝弟勿復戾其兄之臂也今欲行其朞喪亦猶曰徐徐之類也王子有其母死者其傅為之請數月之喪公孫丑曰若此者何如也注丑曰王之庶夫人死迫于適夫人不得行其喪親之數其傅為請之於君欲使得行數月喪如之何曰是欲終之而不可得也雖加一日愈於己謂夫莫之禁而弗為者也注孟子曰如是王子欲終服其子禮而不能者也加益一日則愈於止况數月乎所謂不當者謂無禁自欲短之故譏之也音義紾音軫又徒展切疏正義曰此章言禮斷三年孝者欲益富貴怠厭思減其月君子正言不可阿情丑欲朞之故譬以紾兄徐徐者也齊宣王欲短喪公孫丑曰為朞之喪猶愈於己乎齊宣王欲短三年之喪公孫丑勸之以為朞年之喪猶勝于止而不為者矣朞年十二月也孟子曰至而已矣者孟子言如此是若或有紾戾其兄之臂者子以謂之姑且徐徐然紾其兄之臂云爾但當教之以孝悌不復戾兄之臂也今子欲勸齊王短其三年之喪而且謂為朞年之喪亦若徐徐然之謂也王子有其母死者其傅為之請數月之喪公孫丑曰若此何如也公孫丑又復問孟子曰王子有母死之者其傅相者為之請行數月之喪如此者是如之何也以其王子庶生之母死迫于嫡母而不敢終喪者也曰是欲終之而不可得也至弗為者也孟子答之曰是王子欲終夫喪有所禦而不可得而為者也雖加益一日亦足勝於止而不為者矣今齊宣王欲短三年之喪以其禮所當終之而且謂朞年之喪猶愈於己以勸之是謂夫莫之禁止而自弗為者也此孟子所以不取之也論語宰我問三年之喪期已久矣孔子所以責之曰豫之不仁也汝安之則為之乎是亦孟子于此不取公孫丑之意也孟子曰君子之所以教者五注教民之道有五品有如時雨化之者注教之漸漬而浹洽也有成德者有達財者有答問者有私淑艾者注私獨淑善艾治也君子獨善其身人法其仁此亦與教法之道無差也此五者君子之所以教也注申言之孟子貴重此教之道也音義漸子廉切亦如字達財陸云周恤之一本作才說云以有善才就開其性理也艾丁音刈治也張五泰切養也疏正義曰此章言教人之術莫善五者養育英才君子所珍聖所不倦其惟誨人者也孟子曰君子之所以教者五至所以教也者孟子言君子所以教人之道有五品也有如時雨之教者以教人漸漬浹洽如時雨之澤也是潤之以德漸之以仁善有萌芽則誘之使敷秀性有其材則飬之使長茂凡此因其大以成大小以成小是為有若時雨而教者也有成德者以其因固有之德但教而成之也是其能仁不能反者則教之以克己復禮能勇不能怯者則教之以臨事而懼是為有成德者也有逹財者以其有材之具而不能用者則教而逹之也子貢問曰賜也何如子曰女器也曰何器也曰瑚璉也子謂子夏曰女為君子儒無為小人儒是為有達材之教者也有答問者以其在於咨問之間也不憤不啓不悱不發舉一隅不以三隅反則不復也是為有答問之教也有私淑艾者以其獨善其身使彼法之也子曰我非生而知之者好古敏以求之者也子不語怪力亂神凡此之類是有私淑艾之教也故重言之曰此五者之教乃君子之所以教也論語云有教無類同公孫丑曰道則高矣美矣宜若登天然似不可及也何不使彼為可幾及而曰孳孳也注丑以為聖人之道太高逺將若登天人不能及也何不少近人情令彼凡人可庶幾使日孳孳自勉也孟子曰大匠不為拙工改廢繩墨羿不為拙射變其彀率君子引而不發躍如也中道而立能者從之注大匠不為新學拙工故為之改鑿廢繩墨之正也羿不為新學拙射者變其彀率之法也彀弩張嚮表率之正體望之極思用巧之時不可變也君子謂於射則引弓彀弩而不發以待彀偶也於道則中道德之中不以學者不能故卑下其道將以須於能者往取之也音義幾音機彀古候切丁云率循也謂彀張其弩又當循其射道令必中於表陸云率法也躍如心願中也能者從之當勤求也率讀為律躍如也丁云躍如猶言卓爾陸云躍如心願中疏正義曰此章言曲高和寡道大難追然而履正者不枉執德者不回故曰人能𢎞道丑欲下之非也公孫丑曰至孳孳也者公孫丑問孟子謂聖人之道則至高至美矣學者跂慕之宜如登天之難以其不可得而跂及也何不使彼之道幾近令人可庶幾能及而使之日孳孳自勉而至也孟子曰大匠不為拙工改廢繩墨至能者從之孟子答之曰大匠之師不為新學拙工改去其繩墨之正羿之善射不為新學拙射更變其彀率之法彀率張弓向的正體極思用巧之時也君子循循善誘而引人於道不以開發者又且躍如使進而無退也是其不高不卑但于中道而立教使賢愚智者皆能從而學之也此孟子所以譏於公孫丑也音義和胡卧切孟子曰天下有道以道殉身天下無道以身殉道未聞以道殉乎人者也注殉從也天下有道得行王政道從身施功實也天下無道道不得行以身從道守道而隱不聞以正道從俗人者也疏正義曰此章言窮達卷舒屈伸異變者也孟子言天下有治道之時則當以道從身以施其功實也以其身顯而道彰也天下無治道之時則當以身從道而卷藏守伏也以其道藏則身伏也未聞于此無道之時以道從人而叨富貴也論語云天下有道則見無道則隱同意公都子曰滕更之在門也若在所禮而不答何也注滕更滕君之弟來學於孟子也言國君之弟而樂在門人中宜答見禮而夫子不答何也孟子曰挾貴而問挾賢而問挾長而問挾有勳勞而問挾故而問皆所不答也滕更有二焉注挾接也接己之貴勢接己之有賢才接己長老接己嘗有功勞之恩接己與師有故舊之好凡恃此五者而以學問望師之待以異意而教之皆所不當答滕更有二焉接貴接賢故不答矣音義更張音庚挾音協疏正義曰此章言學尚虛已師誨貴平是以滕更恃二孟子弗應者也公都子曰至何也公都子問孟子謂滕君之弟滕更者樂在門人中宜若在所禮敬之然而有所問而夫子不答是如之何也孟子曰挾貴而問至滕更有二焉孟子答之曰有挾已之貴勢而問者有挾已之賢才而問者有挾已之長老而問者有挾已有功勞之恩而問者有挾已與師有故舊之好而問者凡恃此互者而問我皆所不答也今滕更有二於此五者之中以恃已之貴勢與恃賢才我所以不答之也挾接也此孟子於滕更所以不答者是亦不屑教之道也奈何公都子不知以此故有復而問焉孟子曰於不可已而已者無所不已於所厚者薄無所不薄也其進鋭者其退速注已棄也於義所不當棄而棄之則不可所以不可而棄之使無罪者咸恐懼也于義當厚而反薄之何不薄也不憂見薄者亦皆不自安矣不審察人而過進不肖越其倫悔而退之必速矣當翔而後集慎如之何疏正義曰此章言賞僣及淫刑濫傷害不僣不濫詩人所紀是以季文三思而後行之者也孟子言人君於不可棄去之者而反棄去之是其餘之類無所不棄也不可棄者以其無罪之人也所以棄之者以其有罪者也故棄之使人有所懼也如堯去四凶之罪是可以棄而棄之者也其於賞當所厚者反而薄之是其餘之類亦無所不薄也所以厚賞之者以其有功故厚賞之使人有所勵也如舜舉八元八凱是所厚而厚之也其於無所不棄無所不薄之君得鋭進而為仕則其被退黜亦必急速矣無他以其君不能鑒其賢否不能信任所以如是矣故詩之商頌所以於殷武之篇有云不僣不濫論語翔而後集季文子三思而後行也孟子曰君子之於物也愛之而弗仁注物謂凡物可以養人者也當愛育之而不加之仁若犧牲不得不殺也於民也仁之而弗親注臨民以非己族類故不得與親同也親親而仁民仁民而愛物注先親其親戚然後仁民仁民然後愛物用恩之次也疏正義曰此章言君子布德各有所施事得其宜故謂之義者也孟子言君子於凡物也但當愛育之而弗當以仁加之也若犧牲不得不殺也於民也當仁愛之而弗當親之也以愛有差等也是則先親其親而後仁愛其民先仁愛其民然後愛育其物耳是又見君子用恩有其倫序也故揚子所以事得其宜之謂義也孟子曰知者無不知也當務之為急仁者無不愛也急親賢之為務注知者知所務善也仁者務愛其賢也堯舜之知而不遍物急先務也堯舜之仁不遍愛人急親賢也注物事也堯舜不遍知百工之事不遍愛衆人先愛賢使治民不一一自往親加恩惠也不能三年之喪而緦小功之察放飯流啜而問無齒決是之謂不知務注尚不能行三年之喪而復察緦麻小功之禮放飯大飯也流啜長啜也齒決斷肉置其餘也於尊者前賜食大飯長啜不敬之大者齒決小過耳言世之先務捨大譏小若此類也音義知者之知音智注知者及下文之知皆同遍正體遍字啜昌恱切疏正義曰此章言君子百行先務其崇是以堯舜親賢大化以隆道為要者也孟子曰知者無不知也當務之為急至是之謂不知務者孟子言為之智者以其多知故無所有而不知者也然而但當知要務為急耳為之仁者以其泛愛故無所有而不愛者也然而但當急親其賢為之要務是以堯舜二帝之智不能遍知百工之事但急於知賢之為先務也為仁不能遍愛於衆人但能急親任其賢能使之以治民也今夫不能三年之喪為不孝之大者也而察緦小功之禮是孝之小者也放飯流啜不敬之大者也問無齒決責其不敬之小者也如不能以知賢為先務而務遍知百工之事為之先不能以親賢為急務而務遍愛衆人之為急是若執親之喪不能去不孝之大者而乃反察孝之小者食于尊者之前不能去不敬之大者而乃反責問不敬之小者也如此又安知先後之務為緩急乎蓋緦麻三月之服者小功五月之服者也荀子云若挈裘領屈五指而頓之順者不可勝數史云綱舉而綱疏提其綱則衆目張與此同意孟子注疏卷十三下孟子注疏卷十三下考證楊子取為我章疏言子莫執中和之性而專一者也而字下監本衍不字今刪有為者章注喻有為者能於中道而盡棄前行者也閣本無能於二字孟子自范之齊章疏言王子所居勢位能如此監本脫子字今補入君子之所以教者五章疏子不語怪力亂神臣邦綏按此引好古敏求以解私淑艾之義而連及子不語章於本文無涉想當時誤以兩章為一章耳道則高矣章彀率音義陸氏云率法也丁氏云率循也謂彀張其弩又當循其射道令必中於表臣宗楷按此正與趙注弩張嚮表率之正體望之極思意同與下躍如紫對丁說為優於不可已而己者章注亦皆不自安矣監本脫不字今補入孟子注疏卷十三下考證
