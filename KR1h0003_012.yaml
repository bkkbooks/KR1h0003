body:
  text: 欽定四庫全書孟子注疏卷十二上漢趙氏注宋孫奭音義并疏告子章句下疏正義曰此卷趙氏分為下卷者也此卷十有六章其一章言臨事量宜權其輕重以禮為先食色為後若有偏殊從其大者其二章言天下大道人病不由不患不能是以曹交請學孟子辭焉其三章言生之膝下一體而分當親而踈怨慕號夫是以小辨之怨未足以為愆也其四章言上之所欲下以為俗其五章言君子交接動不違道享見之儀亢答不差其六章言見幾而作不俟終日孔子將行冕不及棁其七章言王道浸衰轉為罪人其八章言招攜懷逺貴以德禮義勝為上戰勝為下其九章言善為國者必藏於民賊民以往其餘何觀其十章言先王典禮萬世可遵什一供貢下富上尊其十一章言君子除害普為人也其十二章言民無信不立其十三章言好善從人聖人一槩其十四章言仕雖正道亦有量宜聽言為上禮貌次之困而免死斯為下矣其十五章言聖賢困窮天堅其志次賢感激乃奮其意其十六章言學而見賤恥之大者教誨之方或折或引凡此十六章合上卷共二十章是告子之篇有三十六章矣任人有問屋廬子曰禮與食孰重注任國之人問孟子弟子屋廬連問二者何者為重曰禮重注答曰禮重色與禮孰重曰禮重注重如上也曰以禮食則飢而死不以禮食則得食必以禮乎親迎則不得妻不親迎則得妻必親迎乎注任人難屋廬子云若是則必待禮乎屋廬子不能對明日之鄒以告孟子孟子曰於答是也何有注於音烏歎辭也何有為不可答也不揣其本而齊其末方寸之木可使高於岑樓金重於羽者豈謂一鉤金與一輿羽之謂哉取食之重者與禮之輕者而比之奚翅食重取色之重者與禮之輕者而比之奚翅色重注孟子言夫物當揣量其本以齊等其末知其大小輕重乃可言也不節其數纍積方寸之木可使高於岑樓岑樓山之鋭嶺者寧可謂寸木髙於山邪金重於羽謂多少同而金重耳一帶鉤之金豈重一車羽邪如取食色之重者比禮之輕者何翅食色重哉翅辭也若言何其不重也往應之曰紾兄之臂而奪之食則得食不紾則不得食則將紾之乎踰東家牆而摟其處子則得妻不摟則不得妻則將摟之乎注教屋廬子往應任人如是紾戾也樓牽也處子處女也則是禮重食色輕者也音義任張音壬親迎張魚慶切下同難乃旦切卷末可難同於丁張並音烏歎辭也斷句揣初委切奚翅張云翅與啻同古字通用施智切紾張音軫又徒展切摟音婁後章同疏正義曰此章言臨事量宜稱其輕重以禮為先食色為後者也任人有問屋廬子曰禮與食孰重任人任國之人任國之人有問屋廬子曰禮與食二者何者為重曰禮重屋廬子答之以為禮重屋廬子孟子弟子也任人又問色與禮二者孰重曰禮重屋廬子又答之以為禮重曰以禮食則飢而死至必親迎乎任人又問之曰人若待有禮然後食則飢餓而死不待禮而食者則得其食而不見飢餓必待以禮然後食乎任人意以為不待禮而食也行親迎婚之禮則不得其妻不行親迎之禮則得其妻必行親迎之禮乎任人意又以為不待親迎也所謂禮食者案禮云主人親饋則客祭主人不親饋則客不祭故君子苟無禮雖美不食焉凡此之謂所謂親迎者又案禮云夏氏迎於庭商人迎於室周人迎於户凡此是也今任人不知此為重故以食色並而問之屋廬子不能對明日之鄒以告孟子屋廬子未有言以答應故不能對任人之問乃明日往鄒國以任人此言告於孟子孟子曰於答是也何有至則將摟之乎孟子見廬子不能答此言而乃歎之曰答此之言何有難乎何為不可答也言凡物有常如不揣量其本但齊等其末則雖方寸之木可令髙於岑樓岑樓山之鋭峯也此乃齊等其末而不量其本之謂也言雖金重於羽可謂之一帶鉤之金與一車羽毛之謂哉是亦不揣其本而齊其末之謂也以其揣之以本則方寸之木不能過於岑樓一帶鉤之金不能重於一車之羽也如不揣其本則取食之重者與禮之輕者比喻之何啻食為重也取色之重者與禮之輕者比並之則何啻色為重也如此是猶積纍方寸之木可使髙於岑樓積疊一車之毛羽可使重於一鉤金也是則任人不揣其本而齊其末也且為不以禮食則飢而死則人誰不以食為重也不親迎則得妻則人誰不以色為重也故孟子所以於此又教之屋廬子使往應於任人曰紾戾其兄之臂而奪之食則得其食不紾戾之則不得其食則將可以紾戾兄之臂乎踰越東家之牆而牽其處女則得為之妻不牽之則不得為之妻則將可以牽處女乎言不可如是也故以子言之所謂東家則托此言之矣如謂鄰家也然而鄰亦有西南北何不言之蓋言東則西南北不言而在矣注任國正義曰任薛同姓之國在齊楚之間後亦有案文在孟子居鄒之假注岑樓山之鋭嶺正義曰釋云山小而髙者曰岑是知岑樓即知為鋭嶺之峯也曰樓者蓋重屋曰樓亦取其重髙之意也注云處女正義曰未嫁者也曹交問曰人皆可以為堯舜有諸孟子曰然注曹交曹君之弟交名也答曰然者言人皆有仁義之心堯舜行仁義而已交聞文王十尺湯九尺今交九尺四寸以長食粟而已如何則可注交聞文王與湯皆長而聖今交亦長獨但食粟而已當如之何曰奚有於是亦為之而已矣有人於此力不能勝一匹雛則為無力人矣今曰舉百鈞則為有力人矣然則舉烏獲之任是亦為烏獲而已矣夫人豈以不勝為患哉弗為耳注孟子曰何有於是言乎仁義之道亦當為之乃為賢耳人言我力不能勝一小雛則謂之無力人言我能舉百鈞百鈞三千斤也則謂之有力之人烏獲古之有力人也能移舉千鈞人能舉其所任是為烏獲才也夫一匹雛不舉豈患不能勝哉但不為之耳徐行後長者謂之弟疾行先長者謂之不弟夫徐行者豈人所不能哉所不為也注長者老者也弟順也人誰不能徐行者患不肯為也堯舜之道孝悌而已矣子服堯之服誦堯之言行堯之行是堯而已矣子服桀之服誦桀之言行桀之行是桀而已矣注孝弟而已人所能也堯服衣服不踰禮也堯言仁義之言堯行孝悌之行桀服譎詭非常之服桀言不行仁義之言桀行淫虐之行為堯似堯為桀似桀而已矣曰交得見於鄒君可以假館願留而受業於門注交欲學於孟子願因鄒君假館舍備門徒也曰夫道若大路然豈難知哉人病不求耳子歸而求之有餘師注孟子言堯舜之道較然若大路豈有難知人苦不肯求耳子歸曹而求行其道有餘師師不少也不必留館學也音義以長之長張如字匹張如字雛士于切丁作匹雛云案注云匹雛小雛也即匹訓小而詁訓及諸書匹訓耦訓小無文今案方言匹小也音節蓋與匹字相似後人傳寫誤耳後長之長張文切下先長年長長君皆同之行之行下孟切下堯行桀行之行循行身行過行皆同見音現下享見見顔見於皆同較音角疏正義曰此章言天下大道人病不求不患不能是以曹交請學孟子辭之者也曹交問曰人皆可以為堯舜有諸曹交曹君之弟也姓曹名交曹交問孟子曰凡人皆可以為堯舜二帝有諸否乎孟子曰然孟子答之以為誠如是也交聞文王十尺至如何則可者曹交又言交嘗聞文王身長十尺湯王身長九尺今交身亦長九尺四寸但獨食粟而已當如之何則可以為堯舜曰奚有於是至是桀而已矣孟子答之曰何有於此言之謂乎言非論身長短之謂也所以為堯舜者是亦為之而已且託今有人於此其力不能舉任一匹雛之小是則為無筋力之人也今又曰能舉任三千鈞之重則為有筋力之人也如是言之則能舉烏獲千鈞之重任者此亦足為烏獲之徒而已矣且夫人豈以不能舉勝一匹雛之小而為憂患哉但不為之耳如用力舉之則勝矣以言人之所欲為堯舜者豈患其不能為之哉亦但不為之耳且以徐緩而行後於長者是謂之悌順急疾而行先於長者謂之不悌順夫徐緩而行者豈凡人所不能如是哉但所不為徐行之矣夫堯舜二帝之道孝弟而已子今若身服堯之法服以衣服不越禮口誦堯之法言以其言有法度所行則行堯所行之迹以其行不淫虐如此是亦為堯之徒矣若子於今身乃服桀非常之服口誦桀詭僻之言所行乃行桀淫虐之行如此是亦為桀而已矣交得見於鄒君至於門曹交聞孟子言至此乃曰交得見鄒君可以因而假館舍願留此而受業於夫子之門而學於孟子也曰夫道若大路至餘師孟子乃答之曰夫道若大路較然易行也豈為難知者哉言不難知也但人病不求之耳子歸曹而自能求之而行其道亦不少師也何必願受業於我孟子所以答之此者蓋謂曹交欲挾鄒君而問是挾貴而問者也是以辭之而已抑亦不屑教誨之謂也注鈞三十斤正義曰已前篇說之矣注烏獲有力人也正義曰案皇甫士安帝王世說云秦武王好多力之士烏獲之徒並皆歸焉秦王於洛陽舉周鼎烏獲兩目血出六國時人也孟子假是而開闢曹交之蔽而已矣公孫丑問曰高子曰小辨小人之詩也孟子曰何以言之曰怨注髙子齊人也小辨小雅之篇伯竒之詩也怨者怨親之過故謂之小人曰固哉髙叟之為詩也有人於此越人關弓而射之則已談笑而道之無他疏之也其兄關弓而射之則已垂涕泣而道之無他戚之也小辨之怨親親也親親仁也固矣夫高叟之為詩也注固陋也高子年長孟子曰陋哉高叟之為詩也疏越人故談笑戚親也親其凡故號泣而道之怪怨之意也伯竒仁人而父虐之故作小辨之詩曰何辜于天親親而悲怨之辭也重言固陋傷高叟不逹詩人之意也曰凱風何以不怨注詩邶風凱風之篇也公孫丑曰凱風亦孝子之詩何以獨不怨曰凱風親之過小者也小辨親之過大者也親之過大而不怨是愈疏也親之過小而怨是不可磯也愈疏不孝也不可磯亦不孝也孔子曰舜其至孝矣五十而慕注孟子曰凱風言莫慰母心母心不悅也知親之過小也小辨曰行有死人尚或墐之而曽不關己知親之過大也愈益也過已大矣而孝子不怨思其親之意何為如是是益疏之道也故曰不孝磯激也過小耳而孝子感激輒怨其親是亦不孝也孔子以舜年五十而慕其親不怠稱曰孝之至矣孝之不可以已也知高叟譏小辨為不逹矣音義辨音盤下同為詩之為丁云為猶解說也關丁張並音彎射食亦切下同重直用切邶音佩磯音機墐音僅丁云路旁冢也疏正義曰此章言生之膝下一體而分喘息呼吸氣通於親當親而疏怨慕號天是以小辨之怨未足以為愆也公孫丑問曰高子曰小辨小人之詩也高子齊人也公孫丑問孟子曰高子有云小辨之詩是小人之詩也孟子曰何以言之孟子又問公孫丑以謂高子何以言為小人之詩曰怨公孫丑又答之曰為其有怨也曰固哉高叟之為詩也又至為詩也固陋也髙子老孟子稱曰叟蓋叟長老之稱也孟子曰陋哉高叟之謂此詩為小人之詩也今且託以有人於此是為越南蠻人被人彎弓而射之則已見之則但談笑而道之也此無他是與越人疏也其兄如被人彎弓而射之則己見之必垂涕淚號泣而道之此無他是與兄為親也小辨之詩其辭有怨是親親之故也親親仁道也陋矣夫髙子之謂此詩為小人之詩也然孟子所以重言之深誚髙子不逹詩人之意之甚者也曰凱風何以不怨公孫丑再問孟子然則凱風亦孝子之詩也何以獨不怨凱風邶風之詩也曰凱風親之過小者也至五十而慕者孟子又答之曰凱風之詩是親之過小者也以詩觀之有曰有子七人莫慰母心是為親之過小者也小辨之詩是親之過大者也以詩觀之有曰何辜于天我罪伊何是則怨以責己為親之過大者也親之過大而不怨慕之是益疏其親也親之過小而怨之是懟其親也是謂父母不可以磯激之者也蓋親之過大者以其幽王信褒姒讒言疏太子宜臼之親非特放之又將以殺之是以小辨為太子之傅作焉而著父之過為大者也親之過小者以其先王制禮夫死妻稚子幼然後其妻始與適人今七子之母則非稚齒子幼者也乃反不安其室而欲去嫁是以凱風美孝子以著母之過為小者也故曰益疏其親而不怨慕之者是不孝者也謂父母不可激之者是亦不孝者也云磯者蓋磯激也若微切以感激之以幾諌者也譬如石之激水順其流而激之耳今乃謂親之不可幾諌安得謂孝子乎所以云愈疏不孝也不可磯亦不孝也又引孔子有云舜其為至孝者耳以其但亦五十之年尚能慕親矣孟子又引以此蓋謂至孝則當怨慕之也然則小辨之怨安能謂為小人乎宜髙子所以見誚於吾孟子矣注伯竒仁人而父虐之至何辜于天正義曰按史記云幽王嬖愛褒姒姒生子伯服幽王欲廢太子太子母申侯女而為后後幽王得褒似愛之欲廢申后并去太子宜臼以褒姒為后以伯服為太子後立為平王者是宜臼者也以此推之則伯竒宜臼也故小辨之詩注云幽王娶申女生太子宜臼又取褒姒生子伯服立以為后而放宜臼將殺之故也凱風至小辨曰行有死人尚或墐之正義曰凱風美孝子之詩也云莫慰母心者注云慰安也言有子七人無以安母之心也云行有死人尚或墐之者注云墐路塜也箋云相視投掩行道也視彼人將掩兔尚有先驅走之者道中有死人尚有覆掩之成其墐者言其心所不忍也宋牼將之楚孟子遇於石丘曰先生將何之注宋牼宋人名牼學士年長者故謂之先生石丘地名也道遇問欲何之也曰吾聞秦楚搆兵我將見楚王說而罷之楚王不悅我將見秦王說而罷之二王我將有所遇焉注牼自謂往說二王必有所遇得從其志也曰軻也請無問其詳願聞其指說之將何如注孟子敬宋牼自稱其名曰軻不敢詳問願聞其指欲如何說之曰我將言其不利也注牼曰我將為二王言興兵之不利也曰先生之志則大矣先生之號則不可先生以利說秦楚之王秦楚之王悅於利以罷三軍之師是三軍之士樂罷而悅於利也為人臣者懷利以事其君為人子者懷利以事其父為人弟者懷利以事其兄是君臣父子兄弟終去仁義懷利以相接然而不亡者未之有也注孟子曰先生志誠大矣所稱名號不可用也二王悅利罷三軍三軍士樂之而悅利則舉國尚利以相接待而忘仁義則其國從而亡矣先生以仁義說秦楚之王秦楚之王悅於仁義而罷三軍之師是三軍之士樂罷而悅於仁義也為人臣者懷仁義以事其君為人子者懷仁義以事其父為人弟者懷仁義以事其兄是君臣父子兄弟去利懷仁義以相接也然而不王者未之有也何必曰利注以仁義之道不忍興兵三軍之士悅國人化之咸以仁義相接可以致王何必以利為名也音義牼口莖切說而之說音稅下皆同為于僞切下為其為人自為為湯城為之皆同樂音洛下樂聞樂賢安樂皆同疏正義曰此章言上之所欲下以為俗俗化於善久而致平俗化於惡久而致傾者也宋牼將之楚孟子遇於石丘曰先生將何之宋牼宋國之人姓宋名牼孟子尊老之曰先生宋牼將欲往楚國孟子相逄於石丘之地石丘則宋國地也孟子乃問之曰先生將何往曰吾聞秦楚搆兵至我將有遇焉宋牼答孟子曰我聞秦楚二國交兵我將見楚王說而罷之如楚王不悅我說我將又見秦王說而罷之秦楚二王我將有所得從其志也曰軻也至將何如孟子敬宋牼故自稱名曰軻也請無敢問其詳悉願聞其指意說之將如何說之曰我將言其不利也牼答之曰我將說之以言其興兵之不利也曰先生之志則大矣至何必曰利孟子又答之曰先生之志則誠為大矣先生之名號則不可用也先生今以利說秦楚二王秦楚二王悅於利是必罷三軍之衆萬二千五百人為軍三軍之衆乃三萬七千五百人也如此是三軍之士卒樂罷兵而悅利也為人臣者苟懷抱其利以奉君為人子者又懷抱利以事其父為人弟者又懷抱利以奉其兄是則君臣父子兄弟終皆亡去仁義之道特懷利以相接待君臣父子兄弟皆以利相接待然而不身亡者未之有也言必亡其身矣先生將以仁義之道說秦楚之王秦楚之王悅從仁義而罷去三軍之衆也如此是三軍之士卒樂罷兵而悅從於仁義也為人臣者懷抱仁義之道以奉其君為人子者懷抱仁義之道以奉其父為人弟者懷抱仁義之道以奉其兄是則君臣父子兄弟乃去其利而抱仁義相接待也既懷抱仁義而相接待則父父子子君君臣臣兄兄弟弟如此則不為王者未之有也言如此則可以為王矣何必曰利以說之乎蓋為利則其害至於亡身為仁義則其利至於王故曰何必曰利也此孟子所以持仁義之道教宋牼事其秦楚譏其欲以利說奏楚也注宋牼宋人名牼正義曰案荀卿非十二子云不知一天下建國家之權稱曾不足以容辨異懸君臣然而其持之有故其言之成理足以欺惑愚衆是宋鈃也楊倞云宋鈃宋人與孟子尹文子彭蒙慎到同時孟子作宋牼牼與鈃同口莖反是也孟子居鄒季任為仕處守以幣交受之而不報處於平陸儲子為相以幣交受之而不報注任薛之同姓小國也季任任君季弟也任君朝㑹於鄰國季任為之居守其國致幣帛之禮以交孟子受之而不報平陸齊下邑也儲子齊相也亦致禮以交於孟子孟子亦不答之也他日由鄒之任見季子由平陸之齊不見儲子屋廬子喜曰連得間矣問曰夫子之任見季子之齊不見儲子為其為相與注連屋廬子名也見孟子答此二人有異故喜曰連今日乃得一見夫子與之間隙也俱答二人獨見季子不見儲子者以季子當君國子民之處儲子為相故輕之邪曰非也書曰享多儀儀不及物曰不享惟不役志于享為其不成享也注孟子曰非也非以儲子為相故不見尚書洛誥篇曰享多儀言享見之禮多儀法也物事也儀不及事謂有闕也故曰不成享禮儲子本禮不足故我不見也屋廬子悅或問之屋廬子曰季子不得之鄒儲子得之平陸注屋廬子已曉其意聞義而服故悅也人問之曰何為若是屋廬子曰季子守國不得越境至鄒不身造孟子可也儲子為相得循行國中但遙交禮為其不尊賢故禮答而不見之也音義間音間相息亮切下為相相得皆同與音餘下得與同隙去逆切造七到切疏正義曰此章言君子交接動不違禮享見之儀亢答不差是以孟子或見或否各以其宜者也孟子居鄒至而不報言孟子居處鄒國季任為任國居守者也以其任國之君朝㑹於鄰國季任為居守其國也季任為居守以幣帛之禮以交孟子孟子受而不答孟子為齊卿相之時居處於平陸齊之下邑儲子為齊相以幣帛交孟子孟子亦受之而不答他日由鄒之任至不見儲子言孟子異日自鄒之任國乃見其季子自平陸往齊國乃不見儲子屋廬子喜曰至為相與屋廬子見孟子於此二人見與不見故喜而言曰連於今日得間隙與夫子為語矣故問孟子曰夫子往任國乃見季子往齊國乃不見儲子是為其儲子為齊相故欲輕之歟曰非也至為其不成享也孟子答之曰非為其為相故不見而輕之耳以其尚書洛誥篇有云享多儀言享見之禮多儀法也如儀不及享獻之物是曰不享以其無儀法雖有物以享之但亦如不享耳惟在上者不役使下之志於享也是以我不見儲子者為其儀不及物不成享也我所以受之幣而不見答也屋廬子悅至得之平陸屋廬子已曉故聞孟子言而喜悅或人見屋廬子故問之曰此洛誥云是何之謂屋廬子答之曰季子以其守國故不得越境親至鄒國見孟子故但以幣交孟子孟子所以往而見答也儲子為齊相得循行國中可以親至平陸見孟子然以不親見之但亦以幣交之是其不尊賢者也是所謂儀不及物為不成享也孟子所以之齊故不見而答之也注任薛之同姓正義曰案魯隱公十一年左傳云滕侯薛侯來朝爭長公使羽父請於薛侯曰周之宗盟異姓為後寡人若朝於薛不敢與諸任齒杜預云薛任姓也齒列也是知薛與仕為同姓也注尚書洛誥篇云正義曰此篇召公既相宅周公往營成周使來告卜作此洛誥之篇也孔安國云既成洛邑將致政成王告以居洛之義也云享多儀至惟不役志于享者案安國傳云奉上謂之享言奉上之道多威儀威儀不及於禮物惟曰不奉上人君惟不役志於奉上則凡人化之惟曰不奉上矣淳于髠曰先名實者為人也後名實者自為也夫子在三卿之中名實未加於上下而去之仁者固如此乎注淳于姓髠名也齊之辨士名者有道德之名實者治國惠民之功實也齊大國有三卿謂孟子嘗處此三卿之中矣未聞名實下濟於民上匡其君而速去之仁者之道固當然邪孟子曰居下位不以賢事不肖者伯夷也五就湯五就桀者伊尹也不惡汙君不辭小官者栁下惠也三子者不同道其趨一也注伊尹為湯見貢於桀不用而歸湯湯復貢之如是者五思濟民冀得施行其道也此三人雖異道所履則一也一者何也注髠問一者何也曰仁也君子亦仁而已矣何必同注孟子言君子進退行止未必同也趨於履仁而已髠譏其速去故引三子以喻意也曰魯繆公之時公儀子為政子栁子思為臣魯之削也滋甚若是乎賢者之無益於國也注髠曰魯繆公時公儀休為執政之卿子栁泄栁也子思孔子之孫伋也二人為師傅之臣不能救魯之見削奪亡其土地者多若是賢者無所益於國家者何用賢為曰虞不用百里奚而亡秦繆公用之而霸不用賢則亡削何可得歟注孟子云百里奚所去國亡所在國霸無賢國亡何但得削豈可不用賢也曰昔者王豹處於淇而河西善謳綿駒處於高唐而齊右善歌華周把梁之妻善哭其夫而變國俗有諸內必形諸外為其事而無其功者髠未嘗覩之也是故無賢者也有則髠必識之注王豹衛之善謳者淇水名衛詩竹竿之篇泉源在左淇水在右碩人之篇曰河水洋洋北流活活衛地濵於淇水在北流河之西故曰處淇水而河西善謳所謂鄭衛之聲也綿駒善歌者也高唐齊西邑綿駒處之故曰齊右善歌華周華旋也把梁把殖也二人齊大夫死於戎事者其妻哭之哀城為之崩國俗化之則效其哭髠曰如是歌哭者尚能變俗有中則見外為之而無功者髠不聞也有功乃為賢者不見其功故謂之無賢者也如有之則髠必識之矣曰孔子為魯司寇不用從而祭燔肉不至不稅冕而行不知者以為為肉也其知者以為為無禮也乃孔子則欲以微罪行不欲為苟去君子之所為衆人固不識也注孟子言孔子為魯賢臣不用不能用其道也從魯君而祭於宗廟當賜大夫以胙燔肉不至膊炙者為燔詩云燔炙芬芬反歸其舍未及稅冕而行出適他國不知者以為不得燔肉而慍也知者以為為君無禮乃欲以微罪行燔肉不至我黨從祭之禮不備有微罪乎乃聖人之妙㫖不欲為誠欲急去也衆人固不識君子之所為謂髠不能知賢者之志也音義髠音坤惡烏路切下所惡惡為皆同汙烏路切趨張讀如趣言其趣向正道無異也下注同繆音穆下注秦繆同華胡化切注同稅音脫注同以為為肉下為字于僞切下為無為君為魯一戰為君為惡為之為人奚為皆同膊炙普各切下之石切疏正義曰此章言見幾而作不俟終日孔子將行冕不及稅庸人不識課以功實淳于雖辨終亦屈服正者勝也淳于髠曰至固如是乎淳于髠齊國之辨士也淳于髠問孟子曰先名實者為人也後名實者自為也言名生於實者也有功利之實斯有功利之名進而治國濟民則名利在所先故先名實者為人退而獨善其身則功利在所後故後名實者為自為今夫子嘗處於三卿之中而名實未加及於上下而去之仁人固肯如是乎髠之意以為仁人必不如是也故以此譏之蓋名實未加於上下以其上無以輔佐君而治國下無以惠澤而濟於民也孟子曰至其趨一也者孟子乃答曰居臣下之位不肯以賢而奉事不肖者是伯夷也所謂伯夷非其君不事是矣五就於湯五就於桀者是伊尹也所謂何事非君治亦進亂亦進是矣不恥惡汙君不辭小官者謂栁下惠也所謂爾為爾我為我爾焉能凂我哉厄窮而不憫遺佚而不怨是矣此三子者雖進退之道不同然其所履則一而已一者何也髠又問孟子所謂其趨一者是何也曰仁也君子亦仁而已矣何必同孟子又答曰其一者是一於仁也言三子進退行止皆一於仁也伯夷之仁則見於必退以為清伊尹之仁則見於必進而為任栁下惠之仁則見於不必進亦不必退而為和如此則君子進退行止亦履仁而已何用同其進退行止然後為仁也孟子所以引此三子而喻者蓋謂我之去齊是亦伯夷之清者也是亦有仁而已故以是答淳于髠曰魯繆公之時公儀子為政至無益於國也髠又問魯繆公之時公儀休為執政之卿泄栁孔伋為師傅之臣而魯國為敵國所侵削益甚如此是賢者不能拯救之是賢者無所益於國家也曰虞不用百里奚而亡至何可得歟者孟子又答之曰虞君不能信用百里奚而亡其國秦繆公任用之而得為霸是則不能用賢則國亡矣何特止於見削歟故曰削何可得歟蓋百里奚知虞公之不可諌而去之秦而繆公釋其囚授之以國政號曰五羖大夫是其事也又說於萬章首卷之未詳矣曰昔者王豹處於淇上至識之者髠又曰往日衛之善謳詠者王豹居於淇水而河西之人皆善謳齊之善歌詠者綿駒居於髙唐而齊右之人皆能善歌凡此是皆以謳相尚故然也齊之二大夫華周把梁皆死於戎事其二人妻哭哀城為之崩國俗化之而皆效其哭是以如此歌哭者尚能變化其俗則有諸中必見於外如無其功者髠未曽見之也如此是故無賢者也有賢者則髠必知之矣淳于髠所以又言之此者以其不知繆公不能師公儀休泄柳子思三子之道徒疑之以為不賢又以此明孟子名實未加於上下而去之亦若是矣故引而言之復譏於孟子淇水河西髙唐齊右皆地名也曰孔子為魯司冦至衆人固不識也孟子又答曰孔子嘗為魯國司冦之官不得用其道從魯君祭於宗廟當賜大夫以胙燔肉且不至孔子孔子遂反歸其舍未及脫祭祀之冕而適他國不知孔子者以謂孔子不得燔肉故為此而行也其知孔子者以謂為君無禮乃欲以微罪行微罪以其孔子為司寇大夫之官凡有祭則大夫之黨當從君祭既從祭之禮有不備所以有罪矣然則君子之所為者庸衆之人固不能識而知也孟子言此者又有以譏誚髠也意謂吾之去齊是亦君子之道也豈淳于髠所識也注淳于髠至然也正義曰案史記列傳云淳于髠者齊之贅壻也長不滿七尺滑稽多辨數使諸侯未嘗屈辱齊威之時喜隱好為淫樂長夜之飲沉湎不治委政卿大夫百官荒亂諸侯並侵國且危亡左右莫敢諫淳于髠曰國中有大鳥云云文恐煩更不具述注髠曰魯繆公至賢為正義曰云公儀休為執政之卿者案史記云公儀休魯博士以髙第為魯相奉法循理無所變更百官自正使食祿者不得與下民爭利受大者不得取小漢書曰公儀子相魯之其家見織帛怒而出其妻食於舍而茹葵慍而拔其葵曰吾已食祿又奪園夫織女利手是公儀休執政之事也云子栁泄柳也檀弓云子栁鄭注云子栁魯敬仲皮之子子碩兄也子思孔伋已說於前矣注孟子云百里奚去國至賢也正義曰云百里奚所去國亡所在國霸者即經所謂知虞之將亡而先去之相秦而霸其君是也云何但得削者如楊子云或人問魯用儒而削雄曰魯不用真儒故也如用真儒無敵於天下安得削亦是意也注王豹衛之善謳至知之正義曰王豹衛之善謳者注案衛詩以淇水在衛地說文云淇水出河內共北山東入河又晉世家云晉西有河西與秦接境北邉翟東至河內是也竹竿碩人皆衛國之詩也云髙唐齊西邑案齊莊公元年晉伐齊至髙唐杜氏曰髙唐在祝河縣西北是也云華周華旋也把梁把殖也二人齊大夫案魯襄公二十三年齊莊公還自晉不入遂襲莒把殖華旋載甲夜入宿于莒郊明日先遇莒子於蒲侯氏杜注云近莒之邑也莒子重賂之使無死曰請有盟華周對曰貪貨棄命亦君所惡也昏而受命日未中而棄之何以事君莒子親鼓之從而伐之獲把梁莒人行成齊侯歸遇把梁之妻於郊使弔之辭曰殖之有罪何辱命焉若免於罪猶有先人之敝廬在下妾不得與郊弔齊侯弔諸室杜注云把梁把殖也華周即華旋也或云齊莊公襲莒逐而死其妻孟姜向城而哭城為之崩注孔子為魯賢臣從魯君而祭於宗廟燔肉不至者正義曰案孔子世家魯定公九年孔子為中都宰一年四方皆則之由中都宰為司空由司空為大司寇定公十三年季氏將墮費十四年孔子由大司寇攝行相事有喜色門人曰聞君子禍至不懼福至不喜孔子曰有是言也於是誅大夫亂政者少正卯齊人歸女樂定公日怠政事子路曰夫子可以行矣孔子曰魯今且郊如致燔于大夫則吾猶可止於是不致燔俎於大夫孔子遂行宿于屯屯魯國之南地也王肅曰燔祭肉也孔子因適衛矣孟子注疏卷十二上孟子注疏卷十二上考證人皆可以為堯舜章匹雛臣宗楷按曲禮云庶人之贄匹注讀為騖又雜識云檀弓以匹為騖蓋家鳬之類注解作小雛是匹訓為匹字也音義云考訓詁及諸書匹訓耦訓小無文然則直宜作騖庶一與匹語意亦不復耳疏姓曹名交臣邦綏按曹國名非姓也交為曹君之弟故以國係之曹自姬姓之國此云曹姓誤也又此句下監本衍然字今刪又疏口誦桀詭僻之言僻監本訛懦今改正小辨章凱風親之過小者也節注是以舜年五十而慕其親不怠稱曰孝之至矣監本脫矣字今從閣本增入疏其兄如被人彎弓而射之臣齊燾按經文兩言彎弓而射之之字應是指有人於此之人疏中俱解作被人射之語意似不合又疏蓋親之過大者蓋監本訛是今改正注伯竒仁人而父虐之疏以此推之則伯竒宜臼也臣邦綏按琴操有尹吉甫子伯竒無罪為後毋所譛而見逐自傷作履霜操與幽王廢宜臼事相類今趙注以小辨為伯竒之詩疏即以宜臼為伯竒似誤孟子注疏卷十二上考證欽定四庫全書孟子注疏卷十二下漢趙氏注宋孫奭音義并疏告子章句下孟子曰五霸者三王之罪人也注五霸者大國秉直道以率諸侯齊桓晉文秦繆宋襄楚莊是也三王夏禹商湯周文武是也今之諸侯五霸之罪人也今之大夫今之諸侯之罪人也注謂當孟子之時諸侯及大夫也諸侯臣總謂之大夫罪人之事下别言之天子適諸侯曰巡狩諸侯朝於天子曰述職春省耕而補不足秋省斂而助不給入其疆土地辟田野治養老尊賢俊傑在位則有慶慶以地入其疆土地荒蕪遺老失賢掊克在位則有讓一不朝則貶其爵再不朝則削其地三不朝則六師移之是故天子討而不伐諸侯伐而不討五霸者摟諸侯以伐諸侯者也故曰五霸者三王之罪人也注巡狩述職皆以助人民慶賞也養老尊賢能者在位賞之以地益其地也掊克不良之人在位則責讓之不朝而至三則討之以六師移之就之也討者上討下也伐者敵國相征伐也五霸强摟牽諸侯以伐諸侯不以王命也於三王之法乃為之罪人也五霸桓公為盛葵丘之㑹諸侯束牲載書而不歃血初命曰誅不孝無易樹子無以妾為妻再命曰尊賢育才以彰有德三命曰敬老慈幼無忘賓旅四命曰士無世官官事無攝取士必得無専殺大夫五命曰無曲防無遏糴無有封而不告曰凡我同盟之人既盟之後言歸于好今之諸侯皆犯此五禁故曰今之諸侯五霸之罪人也注齊桓公五霸之盛者也與諸侯㑹于葵丘束縛其牲但加載書不復歃血言畏桓公不敢負之得専誅不孝樹立也已立世子不得擅易也不得立愛妾為嫡妻也尊賢飬才所以彰明有德之人敬老愛小恤矜孤寡賓客羇旅勿忘忽也仕為大臣不得世官賢臣乃得世祿也官事無攝無曠庶僚也取士必得賢也立賢無方也無専殺大夫不得以私怒行戮也無敢違王法而以己意設防禁也無遏止榖糴不通鄰國也無以私恩擅有封賞而不告盟主也言歸于好無搆怨也桓公施此五命而今諸侯皆犯之故曰罪人也長君之惡其罪小逢君之惡其罪大今之大夫皆逢君之惡故曰今之大夫今之諸侯之罪人也注君有惡命臣長大而宣之其罪在不能距逆君命故曰小也逢迎也君之惡心未發臣以諂媚逢迎之而導君為非故曰罪大今諸侯之大夫皆逢君之惡故曰罪人也音義辟音闢下辟土地同掊丁薄侯切深也聚斂也歃所洽切糴音狄于好呼報切下好戰好善皆同長君張文切丁又如字疏正義曰此章言王道浸衰轉為罪人孟子傷之是以博思古法以匡時君者也孟子曰五霸者三王之罪人也至今之大夫今之諸侯之罪人也者孟子言齊桓晉文秦繆宋襄楚莊五霸者乃為夏禹啇湯周文之罪人也今之諸侯謂孟子時之諸侯乃為五霸者之罪人也今之大夫亦謂孟子時之大夫乃為今之時諸侯之罪人也自天子適諸侯至三王之罪人也者此一假是孟子自解五霸為三王之罪人也天子適諸侯曰巡守至助不給已說在惠王篇言入其疆謂古天子行巡守之禮巡諸侯所守之地至入其諸侯疆境見其土地開辟而不蕪田野耕治而不荒又能飬其耆老尊敬賢者有俊傑之才能在位行政事如此則有慶賞以其慶賞益其地也入其封疆見土地荒蕪而不開辟又遺棄其耆老失其賢人惟以掊克多取聚斂之臣在其位以殘民如此則有責讓不特責讓之又其一不朝覲述所職則貶損其爵至二不朝則削減其土地以至三不朝則命六師以移易其位也以其不能保安社稷也是故天子於諸侯有其罪則討而不行兵征伐諸侯之於諸侯則行兵征伐而不討蓋彼有罪而布令陳辭以責之是謂討也彼有罪而用兵行師以加之是謂伐也且五霸者牽率諸侯者也故曰五霸者三王之罪人也以其五霸擅自専權不待天于錫之弓矢然後征錫之鈇鉞然後殺者也特牽率諸侯以伐諸侯而已是則豈非三王之罪人歟故齊桓率諸侯以伐蔡晉文率諸侯以滅曹秦繆率諸侯以伐晉宋襄率諸侯以伐楚楚莊率諸侯以伐陳是摟諸侯以伐諸侯者也五霸桓公為盛至五霸之罪人也此一假是孟子自解今之諸侯乃五霸之罪人也言齊桓公為五霸最盛者也以其土地之廣甲兵之衆强制諸侯懼其未盡從已也以是期約諸侯為葵丘之㑹葵丘杜預曰陳留外黃縣有葵丘魯地也諸侯皆束縳其牲但加載書而不復歃血歃血啜血也言不敢負桓公之約也桓公於是初命之曰誅不孝言所誅在不孝矣無易樹子言世子已立更不得擅自變易也無以妾為妻言不得以愛幸之妾而立嫡妻也其再命之曰尊賢育才以彰有德言賢者當尊之於朝以崇其才德者當養之於學以成其德是所謂以彰明有德者也其三命之曰敬老慈幼無忘賓旅言當敬重其耆長慈憫其幼少又當無忘忽其賓客羇旅其四命之曰士無世官官事無攝不得兼攝其職也以其一官不専則一事不舉也取士必得言所取之士必得其賢不得使之羣小殽亂之也無専殺大夫言大夫有罪者當皆請命於天子而諸侯不得専殺之也其五命之曰無曲防言不得曲防其水以専利也當通水利而防障之而已無遏糴言不得遏止榖糴不通於鄰國也無有封而不告言不得有私自封賞而不告於天子也五命之後於是又布告之曰凡我同㑹盟之人自今日既盟誓之後言當歸於交好無更搆怨也然今之諸侯皆犯此桓公之五禁故曰今之諸侯五伯之罪人也五禁即五命是也長君之惡至今之諸侯之罪人也者此一假孟子自解今之大夫為今之諸侯罪人者也蓋自諸侯之下皆為大夫者也言君有惡命臣長益而宣布之其罪猶小以其但不能距逆君之命也君之惡未著而為之臣乃諂媚逢迎而導君為非故曰其罪大以其有以啓之也然今之大夫皆有以迎君之惡而啓之故曰今之夫夫今之諸侯之罪人也注五霸至者也正義曰云齊桓晉文至楚莊五者今案史記諸侯年表云周莊王十二年齊桓公小白即位周釐王三年始霸㑹諸侯於鄄周惠王二十三年諸侯伐鄭周襄王元年夏㑹諸侯於葵丘天子使宰孔賜胙命無拜襄王九年卒是桓公自釐王三年始霸至卒凡得四十三年晉文公重耳自周襄王十六年即位五年率諸侯以伐曹襄王二十四年薨即位凡得九年而已宋襄公兹父自周襄王二年即位十三年伐楚十四年死泓戰是嵗襄王十五年矣秦繆公任好自周惠王十八年即位二十八年㑹晉伐楚朝周是嵗周襄王二十年三十五年代晉報殽敗於汪三十九年卒以人從死是嵗襄王三十一年矣楚莊王侣自周頃王六年即位十三年伐陳十六年率諸侯誅陳夏徴舒立陳成公午二十三年薨是嵗周定王十六年矣云夏禹商湯周文已說於前矣注齊桓至罪人也正義曰云與諸侯㑹於葵丘案魯僖公九年左傳云夏㑹諸侯於葵丘尋盟且修好禮也秋齊桓盟諸侯于葵丘曰凡我同盟之人既盟之後言歸于好是之謂也是嵗所謂周襄王元年矣云誅不孝者如衛世子輒拒其父蒯瞶楚世子商臣弒其父凡此之類是不孝者也云無易其世子者如晉獻公立奚齊以易申生是易世子者也云無立愛妾為嫡者正妃曰嫡也如晉獻公於驪姬是以愛妾為嫡也云尊賢育才者如南有嘉魚之詩云太平之君子至誠樂與賢者共之也菁菁者莪之詩云樂育才也凡此是尊賢飬才之意也云敬老愛小恤矜寡孤如周禮大司徒之職云以保息六養萬民一曰慈幼二曰養老孟子曰文王發政施仁必先鰥寡孤獨是其㫖也云賓客羇旅無忽忘也周禮太宰職云以禮待賓客之治是不忘賓客也孟子曰關市譏而不征是不忘忽羇旅也云仕為大臣不得世官乃得世祿者如魯有臧孫氏仲孫氏叔孫氏季孫氏晉有狐氏趙氏荀氏卻氏欒氏范氏齊有髙氏國氏崔氏衛有寧氏孫氏是皆世官之類也孟子曰文王治岐士者世祿是世祿之謂也云無曠庶僚者孔安國云僚官也曠空也尚書注云無曠庶官天工人其代之位非其人為空官言人代天理官不可以天官私非其人亦具官而事無攝則為非禮孔子曰管仲官事不攝焉得儉所以譏誚之矣云取士必得立之無方者如桓公取管仲於賊國湯立賢無方是矣若晉奚齊之於里克陳靈公於夏徴舒是取士不得矣云不得以私怒行戮者如文公六年左傳云賈季怨陽子之易其班而知其無援於晉乃使續鞠居殺處父成公八年晉殺其大夫趙括十五年宋殺其大夫山十六年楚殺其大夫公子側是也凡此之類春秋書之四十有七是専殺大夫也云無敢違王法而以己意私設防禁者然而此意亦通義矣奈何據其下文曰遏糴則無曲防是為無曲防障其水以専利者也故先王制畎遂溝洫所以為此矣是齊桓㑹諸侯于陽榖公羊以為無障谷㑹諸侯於葵丘榖梁以為無壅泉凡此可是矣云無止糴如秦饑晉閉之糴是也云無以私恩擅有封賞如成公十八年楚取彭城以封魚石是也凡此五命案左傳文則曰凡我同盟之人既盟之後言歸于好而不及五命案公羊榖梁述葵丘㑹有云無遏糴無易立子無以妾為妻無使婦人與國事無壅泉而不及誅不孝尊賢育材士無世官官事無攝取士必得無専殺大夫無有封而不告案公羊述桓公陽穀之㑹則云無障谷無貯衆無易立子無以妾為妻而不及無使婦人與國事其詳略與此不同蓋所以相終始而已又案春秋凡書諸侯㑹有四十九而齊桓十有八焉內臣㑹凡二十有六而齊居四焉書外相㑹凡十有三而齊居六焉案史記云兵車之㑹三乘車之㑹六孔子曰桓公九合諸侯一匡天下榖梁傳云衣裳之㑹十有一范注云十三年㑹北杏十四年㑹鄄十五年㑹鄄十六年㑹幽二十七年又㑹幽僖公元年㑹柳二年㑹貫三年㑹陽榖五年㑹首戴七年㑹寧母九年㑹葵丘凡十一㑹也魯欲使慎子為將軍孟子曰不教民而用之謂之殃民殃民者不容於堯舜之世一戰勝齊遂有南陽然且不可注慎子善用兵者不教民以仁義而用之戰鬬是使民有殃禍也堯舜之世皆行仁義故好戰殃民者不能自容也就使慎子能為魯一戰取齊南陽之地且猶不可山南曰陽岱山之南謂之南陽也慎子勃然不悅曰此則滑釐所不識也注滑釐慎子名不悅故曰我所不知此言何謂也曰吾明告子天子之地方千里不千里不足以待諸侯諸侯之地方百里不百里不足以守宗廟之典籍周公之封於魯為方百里也地非不足而儉於百里太公之封於齊也亦為方百里也地非不足也而儉於百里今魯方百里者五子以為有王者作則魯在所損乎在所益乎徒取諸彼以與此然且仁者不為况於殺人以求之乎注孟子見慎子不悅故曰明告子天子諸侯地制如是諸侯當來朝聘故言守宗廟典籍謂先祖常籍法度之文也周公太公地尚不能滿百里儉而不足也後世兼侵小國今魯乃五百里矣有王者作若文王武王者子以為魯在所損之乎在所益之乎言其必見損也但取彼與此為無傷害仁者尚不肯為况戰鬭殺人以求廣土地乎君子之事君也務引其君以當道志於仁而已注言君子事君之法牽引其君以當正道者仁也志仁而已欲使慎子輔君以仁也音義滑丁張並音骨釐力之切疏正義曰此章言招攜懷逺貴以德禮賤其用兵義勝為上戰勝為下明賤戰者也魯欲使慎子為將軍慎子名滑釐善用兵者也魯國遂欲使慎子為將軍戰鬭孟子曰不教民以仁義之道而用之戰鬭是謂殃禍以殘害民也故好戰而殃禍殘害其民者不容于堯舜二帝之世也以其堯舜之世民皆仁義但如四凶者則誅戮之是不容殃民者也今欲使慎子為將軍雖為魯一戰而遂取南陽之地然且猶不可况有不勝者乎慎子勃然不悅曰此則滑釐之所不識也慎子見孟子此言乃勃然變顔而不悅而憤之曰此言則滑釐所不知也故自稱名為滑釐是以因知清釐為慎子名也曰吾明告子至於仁而已孟子乃與之曰我分明告子以其不可之意也且天子之地方濶千里不濶千里則其中無可以待諸侯諸侯之地方濶百里不濶百里則其中無以守宗廟之典籍典籍常籍法度之文也謂先祖之典籍也周公之封于魯也其地為方濶百里者也非其地不足而儉用于百里然以不敢縱欲以敗王制也太公之封于齊亦然今魯國方百里之地有五以其方五百里者也子今且以為有王者興作則此魯國之地在所損之中乎在所益之中乎言必在所損也是則徒務戰鬭取彼以與此也是則仁者且不肯為而戰鬭殺人以求廣土地乎注慎子善用兵至南陽也正義曰案史記慎到趙人也學黃老道德之術著十二篇徐廣曰今慎子劉向所定有四十六篇墨子云公輸子意不過欲殺臣殺臣宋莫能守可攻也然臣之弟子滑釐等三百人已持守國之器在宋城上而待楚寇也雖殺臣不能絶也於是楚王曰善哉吾請無攻宋城矣是慎子即慎到矣荀卿非十二子篇注云慎子與宋鈃孟子同時是也墨子之云則又知是為善用兵者矣云山南曰陽岱山之南謂之南陽者案尚書禹貢嶽陽孔安國云山南曰陽岱山即太山在齊國之南者也周公封於魯太公封於齊案周禮上公之地五百里齊魯是為止公之封則百里實封之五百里兼附庸之地也今魯方五百里非兼附庸也安詩自廣而已禮記曰周公封於曲阜百里史記云周封伯禽于魯四百里太公於齊兼五侯地是皆臆說不足取信也孟子曰今之事君者皆曰我能為君辟土地充府庫今之所謂良臣古之所謂民賊也注辟土地侵小國也充府庫重賦斂也今之所謂良臣於古之法為民賊者也賊傷民也故謂之賊也君不鄉道不志於仁而求富之是富桀也注為惡君聚斂以富之為富桀也謂若夏桀也我能為君約與國戰必克今之所謂良臣古之所謂民賊也注連諸侯以戰求必勝之也君不鄉道不志於仁而求為之强戰是輔桀也注說與上同由今之道無變今之俗雖與之天下不能一朝居也注今之道非善道今之世俗漸惡久矣若不變更雖得天下之政而治之不能自安一朝之間居其位也音義鄉音向下同更音庚疏正義曰此章言善為國者必藏於民賊民以往其餘何觀變俗移風非樂不化以亂齊民不知其善者也孟子曰至不能一朝居也孟子言今之世為臣而奉事君者皆曰我能為君廣闢土地充實府庫以其皆掊克之人也今之所謂忠信良臣者皆古之先王治世所謂為殘賊民者也孟子於此又言君既不趨向慕於道其心之所之又不志於仁是為惡也而為臣者又掊克聚斂而求富之是加富於夏桀之君也又且曰我能為君期與敵國戰鬭必能勝如此是今之所謂良臣即古之所謂民賊者也君既不向慕道不志於仁而為臣者又求為之强戰鬭於敵國是輔桀也若由用今之不善之道又不能變更今之世俗如此者雖與之以天下亦且不能自安一朝之間以居其位也是以孟子於魯欲使慎子為將軍所以深闢之也白圭曰吾欲二十而取一何如注白圭周人也節以貨殖欲省賦利民使二十而稅一孟子曰子之道貉道也萬室之國一人陶則可乎注貉夷貉之人在荒服者也貉之稅二十而取一萬家之國使一人陶瓦器則可乎以此喻白圭之所言而已矣曰不可器不足用也注白圭曰一人陶則瓦器不足以供萬室之用也曰夫貉五穀不生惟黍生之無城郭宫室宗廟祭祀之禮無諸侯幣帛饔飱無百官有司故二十取一而足也注貉在北方其氣寒不生五穀黍早熟故獨生之無中國之禮如此之用故可二十而取一而足也今居中國去人倫無君子如之何其可也陶以寡且不可以為國况無君子乎欲輕之於堯舜之道者大貉小貉也欲重之於堯舜之道者大桀小桀也注今之居中國當行禮義而欲效夷貉無人倫之叙無君子之道豈可哉陶器者少尚不可以為國况無君子之道乎堯舜以耒什一而稅足以行禮故以此為道今欲輕之二十而稅一者夷貉為大貉子為小貉也欲重之過什一則是夏桀為大桀而子為之小桀也音義貉音陌饔音雍飱音孫疏正義曰此章言先王典禮萬世可遵什一供貢下富上尊裔土簡惰二十而稅夷狄有君不足為貴圭欲法之孟子斥之以王制者也白圭曰吾欲二十而取一何如白圭周人也白圭言于孟子曰我今欲省賦利民但二十中而稅一如之何孟子曰子之道貉道也萬室之國一人陶則可乎孟子欲闢之故與之曰子以二十而稅一之道乃荒服北裔貉之道也故託喻以問之曰萬家之國但以一人陶瓦器而供使用則可乎否乎曰不可器不足用也白圭答之曰一人陶器而供萬家之國則器不足用也是為不可也曰夫貉五穀不生至大桀小桀也孟子又與之言曰夫貉居於北方其也寒燥而五穀不生長惟黍為熟於寒燥故生之又以其無中國之城郭宫室又無宗廟祭祀之禮又無幣帛饔飱之費又無百官之衆供贍朝食曰饔夕食曰飱如此無有費用供贍故於貉但二十而稅一亦足給也今居中國之地如去人倫之叙使無君子之道如何為可乎然而陶器之少且尚不可以為供國之用况於國而無君子之道手且自堯舜二帝以來皆以什一而稅也今欲輕於堯舜什一之道而欲二十而取一則夷貉為大貉而子為小貉也如欲重於堯舜什一之道而過於什一則夏桀為大桀而子為小桀也以其桀暴於賦斂者也此孟子所以闢白圭也注白圭周人也正義曰案班固志貨殖傳云白圭周人也當魏文侯時李克務盡地力而白圭樂觀時變故人棄我取人取我與能薄飲食忍嗜欲節衣服曰吾治生與伊尹吕尚之謀孫吳用兵商鞅行法是也又公羊傳曰古者什一而籍古者曷為什一而籍什一者天下之中正也多乎什一大桀小桀寡乎什一大貉小貉什一者天下之中正也什一行而頌聲作矣何休云多取於民比於桀后蠻貉無百官制度之費稅薄榖梁云古者什一而籍孟子曰夏氏五十而貢殷人七十而助周人百畝而徹凡書傳云什一者衆矣杜預曰古者公田之法十取其一謂十畝內取一舊法既以十畝取一矣春秋魯宣公十五年初稅畝又履其餘畝更復十取其一乃是什取其二故魯哀公問有若曰二吾猶不足如之何其徹也周禮載師云凡任地近郊十一逺郊二十而三甸稍縣都皆無過十二漆林之征二十而五彼謂王畿之內所共多故賦稅重諸書所言什一皆謂畿外之國故鄭𤣥曰什一而稅謂之徹徹通也為天下之通法言天下皆什一耳不言畿內亦什一也孟子云方一里為井井九百畝其中為公田八家皆私百畝同飬公田公事畢然後敢治私事鄭𤣥云詩箋云井稅一夫其田百畝則九而稅一其意又異於漢食貨志云井田方一里是為九夫八家共之各受私田百畝公田十畝是為八百八十畝餘二十畝為廬舍然而諸儒多用孟子為義知孟子所言則家别一百一十畝是為十外稅一也是為鄭𤣥有異於此也又孟子對滕公請野九一而助國中什一使自賦鄭𤣥周禮匠人注孟子此言乃云是邦國亦異外內之法則鄭𤣥以為諸侯郊外郊內其法不同郊內十一使自賦其一郊外九而助一是為二十而稅一故鄭𤣥又云諸侯謂之徹者通其率以十一為正郊內郊外相通其率為十稅一也杜預直云十取其一則又異於鄭惟謂一夫百畝以十畝歸公趙注不解夏五十而貢殷七十而助助七畝好惡取於此鄭注考工記云周人畿內用夏之貢法邦國用殷之助法也白圭曰丹之治水也愈於禹注丹名圭字也當諸侯之時有小水白圭為治除之因自謂過乎禹也孟子曰子過矣禹之治水水之道也是故禹以四海為壑今吾子以鄰國為壑水逆行謂之洚水洚水者洪水也仁人之所惡也吾子過矣注子之所言過矣禹除中國之害以四海為溝壑以受其害水故後世賴之今子除水近注之鄰國觸於洚水之名仁人惡為之自以為愈於禹是子亦過甚矣音義洚張音綘又下江切丁胡貢切疏正義曰此章言君子除害普為人也白圭壑鄰亦以狹矣是故賢者志其大者逺者也白圭曰丹之治水也愈於禹丹圭名也趙注所以知其為圭字也孟子與之曰子此言有過謬矣夫大禹之治水因水道而疏通歸於海也此故禹以四海為溝壑以受其水害故當時民皆得平土而居之今吾子以鄰國為壑以受害而又有逆其水道且逆水者所以謂之洚水謂洚水即洪大之水也是為仁人之所惡之也今子如是乃云有愈於大禹是吾子之過謬矣白圭云所以言此者是又不知大禹不自滿假不自伐之謂也於禹治水之功是又白圭未得禹萬分之一也宜其孟子辭而闢之以為過謬者矣抑亦不思天下有溺者由已溺之謂也孟子曰君子不亮惡乎執注亮信也易曰君子履信思順若為君子之道舍信將安所執之邪音義惡音烏本亦無乎字舍音捨疏正義曰此章言重信之至者也孟子言君子之道如不以信為主則君子之道惡乎執言執君子之道特在乎信也亮信也然言亮而不言信者蓋亮之為義其體在信其用在明君子之道惟明為能明善在信為能誠身不明乎善不能誠其身矣是則君子不亮又惡乎執歟以其誠也者擇善而固執之者也故論語云自古皆有死民無信不立是重信之至也魯欲使樂正子為政注樂正子克也魯君欲使之執政於國孟子曰吾聞之喜而不寐注喜其人道德得行為之喜而不寐公孫丑曰樂正子强乎曰否有知慮乎曰否多聞識乎曰否注丑問樂正子有此三問之所能乎孟子皆曰否不能有此也然則奚為喜而不寐注丑問無此三者何為喜而不寐曰其為人也好善注孟子言樂正子之為人也能好善故為之喜好善足乎注丑問人但好善足以治國乎曰好善優於天下而况魯國乎夫苟好善則四海之內皆將輕千里而來告之以善夫苟不好善則人將曰訑訑豫既已知之矣訑訑之聲音顔色距人於千里之外注孟子曰好善樂聞善言是采用之也以此治天下可以優之舜是也何况於魯不能治乎人誠好善四海之士皆輕行千里以善來告之誠不好善則其人將曰訑訑賤他人之言訑訑者自足其智不嗜善言之貌訑訑之人發聲音見顔色人皆知其不欲受善言也道術之士聞之止於千里之外而不來也士止於千里之外則讒諂面諛之人至矣與讒諂面諛之人居國欲治可得乎注懷善之士止於千里之外不肯就之則邪惡順意之人至矣與邪惡居欲使國治豈可得乎音義有知之知音智訑張吐禾切云蓋言辭不正欺罔於人自誇大之貌丁云此字音他又逹可切說文云欺也字作訑者音怡訑訑自足其智不耆善言之貌今諸本皆作訑即不合注意當借讀為訑音怡見音現疏正義曰此章言好善從人聖人一槩禹聞讜言答之以拜訑訑距之善人亦逝善去惡來道若合符者也魯欲使樂正子執政故言於弟子曰我聞魯欲使樂正子為政遂喜而不寐以其樂正子將得行其道也公孫丑曰樂正子强乎至曰否公孫丑見孟子此言以為喜而不寐乃問孟子曰樂正子有强力勝乎曰否孟子答無以力勝也公孫丑問有智慮能善謀乎曰否孟子又答之曰無用智慮謀也公孫丑又問曰有多聞見識乎曰否孟子又答曰無多聞是識也然則奚為喜而不寐曰其為人也好善孟子曰樂正子為人能好善言故為之喜也好善足乎又問言樂正子但好善言足以治國乎曰好善優於天下至可得乎孟子與之曰能好善言足優為於天下也而况魯國乎夫人苟好善則四海之內有善言之士皆得不逺千里而來告之也苟不能好善則四海之內人將曰彼人之訑訑自足其智不好善言我既已知之知此則訑訑之人發聲音形顔色以距止人於千里之外是則善言之士既止於千里之外而不來告之則讒惡諂佞靣從之人至矣然而與讒惡諂佞面諛之人居國欲使之治尚可得乎言不可得而治也莊子云好言人之惡以為讒希意導言以為諂不擇是非而言以為諛注樂正子克正義曰已說於前矣注聞善言虞舜是也正義曰孟子曰舜聞一善言見一善行若決江河沛然莫之能禦是之謂也注禹聞讜言答之以拜至合符者也正義曰禹聞善言則拜尚書讜言說於前矣陳子曰古之君子何如則仕注陳臻問古之君子得何禮可以仕也孟子曰所就三所去三迎之致敬以有禮言將行其言也則就之禮貌未衰言弗行也則去之其次雖未行其言也迎之致敬以有禮則就之禮貌衰則去之其下朝不食夕不食飢餓不能出門户君聞之曰吾大者不能行其道又不能從其言也使飢餓於我土地吾恥之周之亦可受也免死而已矣注所去就謂下事也禮者接之以禮也貌者顔色和順有樂賢之容禮衰不敬也貌衰不悅也其下者困而不能與之祿則當去矜其困而周之苟免死而已此三就三去之道窮餓而去不疑也故不言去免死而留為死故也權時之宜嫌其疑也故載之也音義周與賙同救瞻也疏正義曰此章言仕雖正道亦有量宜聽言為上禮貌次之困而免死斯為下矣滿此三科無疑者也陳子曰古之君子何如則仕陳臻問孟子古之君子何如則可進為之仕孟子曰所就三所去三孟子答之曰古之君子為仕所去就有三也下文孟子解之者是也自迎之致敬至死而已矣是解所去就有三矣言國君迎接之致其敬以有禮言將行用其言也則就而仕之是所謂行可之仕也如禮貌接之以禮又有樂賢之容未衰而言弗得行也則當退而去之以其為道而仕道不行則去矣其次國君雖未行用其言然而接之致敬以有禮則就而仕之是所謂際可之仕也及其國君接之不以禮又無樂賢之容是其禮貌衰也是則退而去之以其為禮而仕禮既衰則去矣其下朝旦無以食夕昏又無以食以至飢餓困乏不能出其門户國君聞之乃曰吾大為之君者不能使之得行其道又不能聼從其言而使飢餓於我之土地吾羞恥之也如此國君有以周賜之亦可以受之而不辭也無他免其餓死而已矣以其為貧而仕是公養之仕也是以昔之孔子去就如是此孟子答陳臻之問所以執此而詳悉告之孟子曰舜發於畎畝之中傅說舉於版築之間膠鬲舉於魚鹽之中管夷吾舉於士孫叔敖舉於海百里奚舉於市故天將降大任於是人也必先苦其心志勞其筋骨餓其體膚空乏其身行拂亂其所為所以動心忍性曽益其所不能注舜耕歷山三十徴庸傅說築傅巖武丁舉以為相膠鬲殷之賢臣遭紂之亂隱遁為商文王於鬻販魚鹽之中得其人舉之以為臣也士獄官也管仲自魯囚執於士官桓公舉以為相國孫叔敖隱處耕於海濵楚莊王舉之以為令尹百里奚亡虞適秦隱於都市穆公舉之於市而以為相也言天將降下大事以任聖賢必先勤勞其身餓其體而瘠其膚使其身乏資絶糧所行不從拂戾而亂之者所以動驚其心堅忍其性使不違仁困而知勤曽益其素所不能行之者也人恆過然後能改困於心衡於慮而後作徴於色發於聲而後喻注人常以有謬思過行不得福然後乃更其所為以不能為能也困瘁於心衡橫也橫塞其慮於胄中而後作為竒計異䇿憤激之說也徴驗見於顔色若屈原憔悴漁父見而怪之發於聲而後喻若寧戚角歌桓公異之是也入則無法家拂士出則無敵國外患者國恆亡然後知生於憂患而死於安樂也注入謂國內也無法度大臣之家輔弼之士出謂國外也無敵國可難無外患可憂則凡庸之君驕慢荒怠國常以此亡也故知能生於憂患死於安樂也死亡也安樂怠慢使人亡其知能者也音義說音悅後卷傅說皆放此鬲張音隔拂丁音佛忍張如字丁音刃注同鬻字或作育音同曽張云曽與增同丁云依注曽讀當作增依字訓義亦通也瘁音萃屈九勿切拂士之拂音弼知生之和丁依注音智注同陸如字云言憂患者以生全安樂者得死亡也疏正義曰此章言聖賢困窮天堅其志次賢感激乃奮其意凡人佚樂以喪知能賢愚之叙者也孟子曰舜發於畎畝之中至死於安樂也者孟子言舜初起發自歷山畎畝之中而堯禪其位傅說築於傅岩之間而髙宗舉之為相膠鬲鬻販於魚鹽之中而周文王舉為賢臣管仲為士官之囚而桓公舉為相國孫叔敖隱遁於海濵而楚莊王舉為令尹百里奚亡虞歸秦而隱於都市秦繆公任之以為相故天欲降其大任與之卿相之位於此六人也必先所以如是苦楚其心志劬勞其身飢餓其體使之焦枯瘦瘠其皮膚又使其身空乏無資財所行不遂而拂戾其所為又所以驚動其心堅忍其性曽益其素所不能而已又言人常以過謬然後更改而遷善困瘁於心而無所通則其操心也危橫塞其思慮而無所逹而後乃能興作其人憔悴枯槁之容而驗於色而後有吟詠歎息之氣而發於聲則人見其色聞其聲而後喻曉其所為矣又言國君者入為國內無大夫循守其職而為之法家又無輔弼諌諍之士出為國外則無强敵之大國為危難之警如是者其國未為不喪亡矣故曰國常亡如是則然後因而知人以憂患謀慮而生以安樂怠慢而死也故曰生於憂患而死於安樂也注舜耕歷山至不能行正義曰自舜耕歷山至繆公舉之以為相也是皆案史記之文也注若屈原憔悴與寧戚角歌桓公異之正義曰案史記屈原名平與楚同姓事懷王為三閭大夫王甚任之上官大夫與之同列爭寵而心害其能因讒之王怒而疏平復逐放之平乃逰江濵被髮行吟澤畔顔色憔悴形容枯槁時有漁父釣於江濵怪而問之曰子非三閭大夫乎何故至此原曰舉世混濁而我獨清衆人皆醉而我獨醒漁父曰聖人不凝滯於物與世推移舉世皆濁何不隨其流而揚其波衆人皆醉何不啜其糟而餔其醨原曰吾聞新沐者必彈冠新浴者必振衣誰能以身之察察受物之汶汶者乎寧赴常流而葬魚腹中耳遂作懷沙之賦懷石自投汨羅以死後百餘年賈誼為長沙王大傅過湘投書以吊之寧戚角歌者案三齊記云齊桓公夜出迎客寧戚疾擊其牛角髙歌曰南山矸白石爛生不遭堯與舜禪短布單衣適至骭從昏飯牛薄夜半長夜曼曼何時旦桓公乃召與語說之遂以為大夫孟子曰教亦多術矣豫不屑之教誨也者是亦教誨之而已矣注教人之道多術豫我也屑潔也我不潔其人之行故不教誨之其人感此退自修學而為仁義是亦教誨之一道也疏正義曰此章言學而見賤恥之大者激而厲之能者以改教誨之方或折或引同歸殊途成之則一者也孟子言教人之道非特一術耳以其多有也我之所以於不潔人之行而不教之者此亦我有以教之也以其使彼感激自勉修為之而已是以亦為教誨之者也蓋謂教亦多術者有君子之五教或三隅不反則不復也或叩兩端而竭於鄙夫或瀆則不告或謂子之歸求有餘師或為挾貴而不答是教之多術矣音義折丁之涉切孟子注疏卷十二下孟子注疏卷十二下考證五霸者章葵邱臣宗楷按索隱云杜預於至父戍葵邱注云臨淄西有地名葵邱於桓公三十五年㑹諸侯於葵邱則云陳留外黃縣東有葵邱是葵邱有兩處而疏獨引為魯地所以别㑹在桓公不合在本國臨淄境耳考左傳周襄王元年夏㑹諸侯於葵邱天子使宰孔賜胙命無拜所謂賜者乃就其地以賜之示寵異也即云齊境亦得注得専誅不孝此句上監本衍不字今刪注疏㑹諸侯於鄄監本㑹字下衍旅字鄄字訛甄字今刪改又疏自周襄王十六年即位五年率諸侯以伐曹位字下監本衍是為霸三字今刪之臣邦綏按年表云四年救宋報曹衛恥五年侵曹伐衛取五鹿執曹伯諸侯敗楚而朝河陽周命賜公土地無率諸侯以伐曹之文又疏如魯有臧孫氏仲孫氏叔孫氏叔孫氏監本訛叔仲氏今改正又疏是専殺大夫也専監本訛尊今改正又疏案公羊榖梁述葵邱㑹有云監本脫羊字今補入魯欲使慎子為將軍章曰吾明告子節注天子諸侯地制如是地監本訛也今改正疏賤其用兵義勝為上義監本訛廟今改正白圭章注節以貨殖欲省賦利民監本脫欲字今補入注疏吾治生與伊尹吕尚之謀與字漢書作猶字又注疏古者曷為什一而籍曷監本訛易今改正又注疏甸稍縣都皆無過十二皆監本訛取今改正魯欲使樂正子為政章注禹聞讜言疏尚書讜言說於前矣此句下閣本有詩曰雨雪瀌瀌見晛曰消者此蓋角弓之詩文也注云晛日也瀌瀌雨雪之盛貌共三十一字舜發於畎畝之中章人恆過節注桓公異之是也是字下監本無也字而已矣三字今刪改孟子注疏卷十二下考證
