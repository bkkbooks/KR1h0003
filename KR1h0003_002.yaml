body:
  text: 欽定四庫全書孟子注疏卷二上漢趙氏注宋孫奭音義並疏梁惠王章句下疏正義曰此卷趙氏分别為第二卷也故云梁惠王章句下今據此卷章指凡十六章一章言人君田獵以時鐘鼓有節與民同樂二章譏王廣囿專利以嚴刑陷民三章言聖人樂天事小以勇安天下四章言與天下同憂樂者不為慢遊恣溢之行五章言齊王好色好貨孟子推以公劉大王好貨色與民同之六章言君臣上下各勤其任無墮其職七章言人君進賢退惡八章言孟子云紂以崇惡失其尊名九章言任賢使能不遺其學十章言征伐之道在順民心十一章言伐惡養善無貪其富以小王大十二章言上恤其下下赴其難惡出於已害及其身十三章言事無禮之國不若得民心與之守死善道十四章言君子之道正已在天強暴之來非已所召獨善其身而已十五章言太王居邠權也效死弗去義也十六章言讒邪構賢賢者歸於天不尤人也凡十六章合上卷七章是梁惠王篇有二十三章矣故各於卷首總列其章目而分别其指焉莊暴見孟子曰暴見於王王語暴以好樂暴未有以對也曰好樂何如注莊暴齊臣也不能決知之故無以對而問曰王好樂何如孟子曰王之好樂甚則齊國其庶幾乎注王誠能大好古之樂齊國其庶幾治乎他日見於王曰王嘗語莊子以好樂有諸注孟子問王有是語不王變乎色曰寡人非能好先王之樂也直好世俗之樂耳注變乎色慍恚莊子道其好樂也王言我不能好先聖王之樂也直好世俗之樂謂鄭聲也曰王之好樂甚則齊其庶幾乎今之樂由古之樂也注甚大也謂大要與民同樂古今何異也曰可得聞與注王問古今同異之意寧可得聞之與曰獨樂樂與人樂樂孰樂注孟子復問王獨自作樂樂邪與人共聽樂樂也曰不若與人注王曰獨聽樂不如與衆共聽之樂也曰與少樂樂與衆樂樂孰樂注孟子復問王與少之人共聽樂樂邪衆人共聽樂樂也曰不若與衆注王言不若與衆人共聽樂為樂臣請為王言樂注孟子欲為王陳獨樂與衆人樂樂狀今王鼓樂於此百姓聞王鐘鼓之聲管籥之音舉疾首蹙頞而相告曰吾王之好鼓樂夫何使我至於此極也父子不相見兄弟妻子離散注鼓樂者樂以鼓為節也管笙籥簫或曰籥若笛短而有三孔詩云左手執籥以節衆也疾首頭痛也蹙頞愁貌言王擊鼓作樂發賦徭役皆出於民而德不加之故使民愁也今王田獵於此百姓聞王車馬之音見羽旄之美舉疾首蹙頞而相告曰吾王之好田獵夫何使我至於此極也父子不相見兄弟妻子離散此無他不與民同樂也注田獵無節以非時取牲也羽旄之美但飾羽旄使之美好也發民驅獸供給役使不得休息故民窮極而離散奔走也今王鼓樂於此百姓聞王鐘鼓之聲管籥之音舉欣欣然有喜色而相告曰吾王庶幾無疾病與何以能鼓樂也注百姓欲令王康強而鼓樂也今無賦斂於民而有惠益故欣欣然而喜也今王田獵於此百姓聞王車馬之音見羽旄之美舉欣欣然有喜色而相告曰吾王庶幾無疾病與何以能田獵也此無他與民同樂也注王以農隙而田不妨民時有閔民之心因田獵而加撫恤之是以民悅之也今王與百姓同樂則王矣注孟子言王何故不大好樂效古賢君與民同樂則可以王天下也何惡莊子之言王之好樂也音義見賢遍切下他日見及後注虹見皆同語丁音御下嘗語同好呼報切此卷內皆同惟下注美好如字慍於問切恚一腄切與民同樂之樂音洛與音餘下病與愼與鼎與皆同獨樂樂丁上音嶽下音洛下文及注樂樂皆同孰樂音洛此章內孰樂樂邪樂也同樂樂其字皆同餘並音嶽為王于偽切下同舉疾首蹙頞丁云舉猶皆也屬下句蹙子六切頞音遏隙綺戟切何惡烏路切下讒惡同疏正義曰此章言人君田獵以時鐘鼓有節與民同樂也莊暴見孟子曰暴見於王王語暴以好樂暴未有以對也者莊暴齊臣也莊姓也暴名也言莊暴見孟子謂暴朝見於齊王王語暴以好樂之事暴是時未有言以對答之曰好樂何如者故莊暴問孟子以謂王之所以好樂是如之何孟子曰王之好樂甚則齊國其庶幾乎者孟子答莊暴之問也言齊王之好樂至甚則齊國庶幾其治安乎他日見於王曰王嘗語莊子以好樂有諸者是孟子自見莊暴言好樂之後他一日見於齊王而問之曰王曽與莊子語以好樂之事還有此言否乎孟子稱莊子不稱曰暴者是孟子尊王之臣故不欲稱其名也王變乎色曰寡人非能好先王之樂也直好世俗之樂耳者是齊王自孟子問之後變其常容而有憤怒之色蓋憤莊暴言己之好樂於孟子也故答孟子曰寡人不能好古聖王之樂古聖王之樂如黃帝之咸池堯之大章舜禹之韶夏商周之濩武是也但能直好世俗樂耳如鄭衛之聲是也曰王之好樂甚則齊其庶幾乎者孟子復對王而言也言王之好樂至甚則齊幾乎治安孟子言齊國其庶幾乎以對莊子對之齊王則止曰齊其庶幾乎者蓋對莊子則稱其國及對齊王故不必稱國焉耳今之樂猶古之樂者是孟子見齊王言不能好先王之樂直好世俗之樂故以此言今之樂亦若古之聖王樂也但其要在能與民同聽樂為樂耳遂以此問之曰可得聞與者是齊王問孟子言古今之樂一同寧可得而聞知之與曰獨樂樂與人樂樂孰樂者是孟子欲以此問王使王知與民同樂樂為樂也故問之曰王獨作樂為樂邪與人同樂為樂邪曰不若與人者是齊王答孟子亦以為獨樂樂不若與人同樂為樂也曰與少樂樂與衆樂樂孰樂者是孟子復問王與少人同樂為樂與衆人同樂為樂孰樂邪曰不若與衆者齊王亦復答孟子以為不若與衆人同樂為樂也臣請為王言樂孟子於此知齊王亦識與衆同樂之意乃為王陳其獨樂與衆同樂之效故不待王問而自請言之也今王鼓樂於此至與民同樂也者皆孟子陳獨樂與衆樂樂之文也言今王鼓作其樂於此國也百姓之人聞王鐘鼓之聲與管籥之音舉皆疾痛其頭又蹙頞愁悶而交相告曰我王之好作樂為樂發賦徭役使我至於此之極也父子不得以相見兄弟妻子又皆離散之以其如此故百姓所以頭痛蹙頞愁悶也又言今王田獵於此國百姓之人聞王車馬之音見羽旄之美好舉皆蹙頞愁悶疾痛其首而交相告曰我王之好田獵禽獸如何使我供給役使不得休息而至於如此之極父子不得以相見兄弟妻子皆離散之然則王之鼓樂田獵而百姓皆如此者無他事焉是王之不與民同其樂也言今王鼓樂於此國百姓聞王鐘鼓之聲管籥之音舉皆欣欣然有喜色而交相告曰我王庶幾無疾病也何以能鼓樂於此言百姓皆欲王之康強不特止於庶幾無疾病也苟即庶幾近於無疾病則王亦何以能鼓樂也又言今王田獵禽獸於此國百姓之人聞王車馬之音見羽旄之美好舉皆欣欣然有喜色而交相告曰我王即庶幾近於無疾病又何以能田獵也此言又欲王之康強不特止於庶幾無疾病也然則王之鼓樂田獵百姓皆如此欲王之康強者無他事焉是王能與民同其樂也言今之王能與民同樂為樂則為之王者矣云鼓樂者蓋鐘以止為體鼓以作為用故凡作樂所以謂之鼓樂也云音與聲者蓋鐘鼓言聲以其聲之單出故云聲也管籥車馬言音以其音之雜比故云音也然車馬亦謂之音者蓋升車則馬動馬動則鸞鳴鸞鳴則和應故也聲之與音合而言之則聲音一也别而言之則單出為聲雜比為音詩云嘒嘒管聲此言管籥之音是聲音之通論也齊王悅南郭先生吹竽廩食以數百人喜鄒忌鼓琴卒授之國政是安知與衆樂樂邪此孟子所以陳其與民同樂之意也注鄭聲也正義曰論語云鄭聲淫以其能惑人心也孔傳云鄭聲惑人心不與雅樂同也注鼓樂至使民愁正義曰周禮鼓人掌教六鼓以節聲樂鐘師掌金奏注云以鐘鼓奏者先擊鐘次擊鼓以奏九夏夏大也樂之大歌有九王夏肆夏昭夏納夏章夏齊夏族夏械夏鷔夏凡九夏是也故附于此云管笙籥簫或曰籥若笛而有三孔者案禮圖云笙長四尺諸管參差亦如鳥翼爾雅曰大笙謂之巢小者謂之和郭璞爾雅云二十三管為簫風俗通云舜作竹簫以象鳯翼周禮笙師掌教吹籥後鄭云籥如笛有三孔是也詩云左手執籥蓋邶詩簡兮之篇文也注云籥六孔言碩人多才藝又能籥舞言文武備也釋云首頭也頞鼻頸也言齊王擊鼓作樂其使民徭役苦楚皆蹙其鼻頸而愁悶也注田獵至奔走也正義曰釋云獵田也搜狩苖獮是也案魯隱公五年左傳云春搜夏苖秋獮冬狩皆於農隙講武事也杜預曰搜索擇取不孕者苖為苖除害也獮殺也以殺為名順秋氣也狩圍守也冬物畢成獲則取之無所擇也羽旄者案左傳魯襄公十四年范宣子假羽旄於齊定公四年晉人假羽旄於鄭杜預曰以析羽旄旌為王者斿車之所建也又案司常九旗之數又有全羽析羽釋云全羽析羽直有羽而無帛也云天時不如地利地利不如人和蓋公孫丑篇文也齊宣王問曰文王之囿方七十里有諸注王言聞文王苑囿方七十里寧有之孟子對曰於傳有之注於傳文有是言曰若是其大乎注王怪其大曰民猶以為小也注言文王之民尚以為小也曰寡人之囿方四十里民猶以為大何也注王以為文王在岐山之時雖為西伯土地尚狹而囿已大矣今我地方千里而囿小之民以為寡人之囿為大何故也曰文王之囿方七十里芻蕘者往焉雉兔者往焉與民同之民以為小不亦宜乎注芻蕘者取芻薪之賤人也雉兔獵人取雉兔者言文王聽民往取禽獸刈其芻薪民苦其小是其宜也臣始至於境問國之大禁然後敢入注言王之政嚴刑重也臣聞郊關之內有囿方四十里殺其麋鹿者如殺人之罪注郊關齊四境之郊皆有關則是方四十里為阱於國中民以為大不亦宜乎注設陷阱者不過丈尺之間耳今王陷阱乃方四十里民言其大不亦宜乎音義於傳直戀切下同蕘音饒刈音乂阱才性切疏正義曰此章譏王廣囿專利嚴刑陷民也齊宣王問曰文王之囿方七十里有諸者是宣王嘗聞文王有囿方闊七十里故見孟子問之還是有之否孟子對曰於傳有之者孟子答之以為書傳之文有言也曰若是其大乎者宣王怪之以為文王囿如此之闊大民猶尚以為之小也曰寡人之囿方四十里民猶以為大何也者宣王又問孟子言寡人之囿但方闊四十里而民猶尚以為之大是如之何其差也曰文王之囿方七十里芻蕘者往焉雉兔者往焉與民同之民以為小不亦宜乎者孟子言文王之囿方闊七十里而採芻草薪木之賤人與獵雉鳥兔獸者皆得往其中而有所取之是其與民同共之故民以為小不亦宜乎也臣始至於境問國之大禁然後敢入者孟子對王稱臣言自臣始初至於王之齊境問其王國禁令然後乃敢入其國中也臣聞郊關之內有囿方四十里殺其麋鹿者如殺人之罪則是方四十里為阱於國中民以為大不亦宜乎者孟子言自臣入王郊關之內乃聞王有苑囿方四十里之廣其有於中殺其麋鹿者如殺其人之罪而科之如此則是王為陷阱方四十里之廣於國中以陷其民也故民以為大不亦宜之乎凡此是皆孟子譏王之專利而不與民同也傳云天子之囿方百里大國四十里次國三十里小國二十里文王之國百里之國或者以謂有七十里為苑囿是如之何其差殊不知文王百里之國是其始封之時制也七十里之囿乃文王作西伯之時有也周制上公封四百里其食者三之一豈七十里之囿特止山川不可食之地與彼有子虛者以謂楚地方千里而囿居其九是可食之地亦鞠為遊畋之地邪是安知周制之法與注云文王在岐山之時雖為西伯土地尚狹而囿以大者正義曰案鄭玄詩譜云周之先公曰太王者避狄難自豳始遷焉商王帝乙之初命其子王季為西伯至紂又命文王典治南國江漢汝墳之諸侯是文王繼父之業為西伯於岐邑也商之州長曰伯謂為雍州伯也子夏云王季以九命作伯於西文王因之亦為西伯焉論語云三分天下有其二以服事殷是時宜七十里之囿而民猶以為小也注郊關齊四境之郊皆有關者正義曰周官閭師掌國中及四郊之人民司馬法曰王國百里為郊二百里為州三百里為野四百里為縣五百里為都載師掌任土之法以宅田土田賈田任近郊之地以官田牛田賞田牧田任遠郊之地杜子春云五十里為近郊百里為遠郊云四境郊皆有關者蓋四郊之門也齊宣王問曰交鄰國有道乎注問與鄰國交接之道孟子對曰有注欲為王陳古聖王之交也惟仁者為能以大事小是故湯事葛文王事昆夷注葛伯放而不祀湯先助之祀詩云昆夷兌矣惟其喙矣謂文王也是則聖人行仁政能以大事小者也惟智者為能以小事大故大王事獯鬻勾踐事吳注獯鬻北狄強者今胸奴也大王去邠避獯鬻越王勾踐退於會稽身自臣事吳王夫差是則智者用智是故以小事大而全其國也以大事小者樂天者也以小事大者畏天者也樂天者保天下畏天者保其國詩云畏天之威于時保之注聖人樂行天道如天無不蓋也故保天下湯文是也智者量時畏天故保其國大王勾踐是也詩周頌我將之篇言成王尚畏天之威於是時故能安其太平之道也王曰大哉言矣寡人有疾寡人好勇注王謂孟子之言大不合於其意答之云寡人有疾在於好勇不能行聖賢之所履也對曰王請無好小勇夫撫劒疾視曰彼惡敢當我哉此匹夫之勇敵一人者也注疾視惡視也撫劒瞋目曰人安敢當我哉此一匹夫之勇足以當一人之敵者也王請大之詩云王赫斯怒爰整其旅以遏徂莒以篤周祜以對于天下此文王之勇也文王一怒而安天下之民注詩大雅皇矣之篇也言文王赫然斯怒於是整其師旅以遏止往伐莒者以篤周家之福以揚名於天下文王一怒而安民願王慕其大勇無論匹夫之小勇而已書曰天降下民作之君作之師惟曰其助上帝寵之四方有罪無罪惟我在天下曷敢有越厥志注書尚書逸篇也言天生下民為作君為作師以助天光寵之也四方善惡皆在已所謂在豫一人天下何敢有越其志者也一人衡行於天下武王恥之此武王之勇也注衡橫也武王恥天下一人有橫行不順天道者故伐紂也而武王亦一怒而安天下之民今王亦一怒而安天下之民民惟恐王之不好勇也注孟子言武王好勇亦則文王一怒而安天下之民也今王好勇亦則武王一怒而安天下之民民恐王之不好勇耳王何為欲小勇而自謂有疾也音義昆夷丁音混昆夷犬戎别名喙許穢切困也大王音泰後大師大王皆放此獯鬻丁云上音熏下音育夏曰獯鬻商曰鬼方周曰獫狁秦漢曰胸奴魏曰突厥勾踐古侯切會音鱠夫音扶樂音洛此卷內惟下文相説之樂及注樂師樂章樂詩樂正皆音嶽餘並皆音洛彼惡音烏瞋尺真切書曰天降下民至越厥志丁曰注云尚書逸篇也案今尚書大誓有此文但三五字詳略不同耳此注云逸書者古文太誓自孔安國注遭巫蠱事亦遂寢藏於私家故先儒鄭康成馬季長杜元凱等皆以為逸書故此注亦云逸書不見古文也衡丁音橫云詳注意即依字疏正義曰此章言聖人樂天賢者知時仁者必有勇也齊宣王問曰交鄰國有道乎者是宣王問孟子以交接鄰國其有道乎孟子對曰有者孟子欲陳古之聖王而比之故答之曰有道也惟仁者為能以大事小是故湯事葛文王事昆夷至于時保之者是皆孟子陳古之聖王而比之湯文也言惟有仁者之君乃能以大而奉事其小是故葛國之伯不祭祀而湯且遺之牛羊而助之是湯事葛也文王西有昆夷之患而以采薇薄伐肆不殄厥慍是文王事昆夷也昆夷西戎之國也惟智者乃能以小奉事其大是故大王去邠避狄始事之以皮幣珠玉犬馬而不免是大王事獯鬻也勾踐退會稽身自臣事吳王夫差是勾踐事吳也勾踐越王也以大奉事其小是樂行天道如天無不覆者也以小奉事其大以其量時畏天者也故樂天者如湯文遂能安天下畏天者如大王勾踐遂能安其國故詩之周頌我將之篇有云畏天之威于時保之蓋言成王能欽畏上天之威故能安持盈守成太平之道也此孟子所以引之而證其言王曰大哉言矣寡人有疾寡人好勇者宣王謂孟子之言大不合己意故答之曰大哉言矣以言其寡人有疾而疾在於好勇也對曰王請無好小勇夫撫劒疾視曰彼惡敢當我哉此匹夫之勇敵一人者也者是孟子又答宣王言宣王也今請之無好其小勇也夫按劒瞋目疾視而號於衆曰彼安敢當敵我哉此則一匹夫之小勇只可以抵敵於一人者也故曰王請大之也詩云王赫斯怒爰整其旅以遏徂莒以篤周祜以對于天下者此詩大雅皇矣之篇文也孟子所以引此者蓋欲言文王之勇而陳于王也故曰此文王之勇也其詩蓋言文王赫然大怒以整其師旅以止往伐莒以篤厚周家之福以揚天下之名也言文王亦一怒而安天下之民者謂文王亦以此一怒而安天下之民也書曰天降下民作之君作之師惟曰其助上帝寵之四方有罪無罪惟我在天下曷敢有越厥志者此周書之文也孟子所以又引此書云者蓋又欲言武王之勇而陳于王也言天生下民而立之君師以治以教之惟曰其在助相上帝寵安四方有善有惡皆在我天下安有敢違越其志者也一人衡行於天下武王恥之此武王之勇也者一人指紂而言之也言紂一人縱橫逆行其道而不順其天故武王心愧恥之於是伐紂也凡此是武王之大勇也而武王於是亦一怒而安天下之民故曰武王亦一怒而安天下之民今王亦一怒而安天下之民民惟恐王之不好勇也者孟子言今王若能如文王武王一怒而安天下之民則天下之民惟恐王之不好勇也注葛伯放而不祀至小者也正義曰書云葛伯不祀湯始征之孔安國云葛國也伯爵也湯居亳與葛為鄰葛伯不祀湯使人遺之牛羊又不祀湯又使人往為之耕是其助之也詩云昆夷兌矣惟其喙矣謂文王也者蓋引大雅綿之篇文也箋云昆夷夷狄國也見文王之使者將士衆過已國則惶怖驚走奔突入柞棫之中而逃甚困劇也又云駾突也喙困也趙注引此而證以解作文王事昆夷大與詩注不合又云大王避狄文王伐昆夷成道興國其志一也是文王未嘗事之也今孟子乃曰文王事昆夷者昆夷西戎之國也詩之采薇云文王之時西有昆夷之患注云昆夷西戎也是也今據詩之箋云乃曰伐昆夷與孟子不合者蓋文王始初事之卒不免故伐之也始初之時乃服事殷之時也趙注引昆夷兌矣惟其喙矣蓋失之矣注獯鬻至其國也正義曰案胸奴傳云唐虞以上有山戎獫狁獯戎居于北邊夏道衰公劉變于西戎邑于豳其後三百有餘歲戎狄攻大王亶父亶父走于岐山後至六國遂為胸奴是也云越王勾踐退會稽而身自臣事吳王夫差者案史記世家云吳王闔廬十五年伐越至吳王夫差元年悉以精兵伐越敗之越王勾踐乃以甲兵五千人棲於會稽請委國為臣妾是也賈逵曰會稽山名也注周頌我將之篇至太平之道正義曰箋云于時於是也成王畏天之威於是得安文王之道是其解也注疾視至敵者也正義曰莊書云蓬頭突鬢瞋目而語此庶人之劒無異於鬭雞一旦命已絶矣是與此同意注大雅至小勇正義曰案大雅皇矣之篇其文乃曰以遏徂旅今孟子乃曰以遏徂莒者又案春秋魯隱公二年書莒子盟于密則莒耆密之近地詩言密之衆孟子言密之地其旨同也注尚書逸篇正義曰案周書泰誓篇今有云天佑下民作之君作之師惟其克相上帝寵綏四方有罪無罪豫曷敢有越厥志孔安國云寵綏四方言當能助寵安天下越遠也言已志欲為民除惡是與否不敢遠其志趙注乃以其助上帝寵之而斷其句以四方為下文則其意俱通故二解皆録焉注衡橫也至伐紂也正義曰周書泰誓篇云惟十有一年武王伐紂是也釋文云衡橫也齊宣王見孟子於雪宫王曰賢者亦有此樂乎注雪宫離宮之名也宮中有苑囿臺池之飾禽獸之饒王自多有此樂故問曰賢者亦有此之樂乎孟子對曰有人不得則非其上矣不得而非其上者非也為民上而不與民同樂者亦非也注有人不得人有不得其志也不責已仁義不自修而責上之不用已此非君子之道人君適情從欲獨樂其身而不與民同樂亦非在上不驕之義也樂民之樂者民亦樂其樂憂民之憂者民亦憂其憂注言民之樂君與之同故民亦樂使其君有樂也民之所憂者君亦助之憂故民亦能憂君之憂為之赴難也樂以天下憂以天下然而不王者未之有也注言古賢君樂則以已之樂與天下同之憂則以天下之憂與已共之如是未有不王者孟子以是答王者言雖有此樂未能與人共之昔者齊景公問於晏子曰吾欲觀於轉附朝儛遵海而南放於琅邪吾何修而可以比於先王觀也注孟子言往者齊景公嘗問其相晏子若此也轉附朝儛皆山名也又言朝水名也遵循也放至也循海而南至於琅邪琅邪齊東境上邑也當何修治可以比先王之觀遊乎先王先聖王也晏子對曰善哉問也天子適諸侯曰巡狩巡狩者巡所守也諸侯朝於天子曰述職述職者述所職也無非事者春省耕而補不足秋省斂而助不給注言天子諸侯出必因王事有所補助於民無非事而空行者也春省耕補耒耜之不足秋省斂助其力不給也夏諺曰吾王不遊吾何以休吾王不豫吾何以助一遊一豫為諸侯度注晏子道夏禹之世民之諺語也言王者巡狩觀民其行從容若遊若豫豫亦遊也遊亦豫也春秋傳曰魯季氏有嘉樹晉范宣子豫焉吾王不遊吾何以得見勞苦蒙休息也吾王不豫我何以得見賑贍助不足也王者一遊一豫行恩布德應法而出可以為諸侯之法度也今也不然師行而糧食飢者弗食勞者弗息睊睊胥讒民乃作慝注今也者晏子言今時天下之民人君行師興軍皆遠轉糧食而食之有飢不得飽食者勞者致重亦不得休息在位在職者又睊睊側目相視更相讒惡民由是化之而作其慝惡也方命虐民飲食若流流連荒亡為諸侯憂注方猶逆也逆先王之命但為虐民之政恣意飲食若水流之無窮極也謂沈湎于酒熊蹯不熟怒而殺人之類也流連荒亡皆驕君之溢行也言王道虧諸侯行霸由當相匡正故為諸侯憂也從流下而忘反謂之流從流上而忘反謂之連從獸無厭謂之荒樂酒無厭謂之亡先王無流連之樂荒亡之行惟君所行也注言驕君放遊無所不為或浮水天下樂而忘反謂之流若齊桓與蔡姬乘舟於囿之類也連引也使人徒引舟船上行而忘反以為樂故謂之連書曰罔水行舟丹朱慢遊是好無水而行舟豈不引舟於水上而行乎此其類也從獸無厭若羿之好田獵無有厭極以亡其身故謂之荒亂也樂酒無厭若殷紂以酒喪國也故謂之亡言聖人之行無此四者惟君所欲行也晏子之意不欲使景公空遊於琅邪而無益於民也景公説大戒於國出舍於郊於是始興發補不足注景公説晏子之言也戒備也大修戒備於國出舍於郊示憂民困始興惠政發倉廩以賑貧困不足者也召太師曰為我作君臣相説之樂蓋徵招角招是也注太師樂師也徵招角招其所作樂章名也其詩曰畜君何尤畜君者好君也注其詩樂詩也言臣朂君謂之畜何尤者無過也孟子所以道晏子景公之事者欲以感喻宣王非其矜誇雪宮而欲以若賢者音義從欲丁音縱本亦作縱為之赴難為難二字並去聲儛音舞放方往反琅音郎邪以嗟切觀丁音貫亦如字其相息亮切下相土同春省息井切下同從容之從七容切睊睊字亦作張古縣切云側目視貌言睊睊然怒目相嫉而相讒也慝他得切湎彌兗切蹯音煩行下孟切下之行同厭丁一兼切公説音悅下相説臣説皆同徵招張音韶下同畜君許六切下注子畜同疏正義曰此章言與天下同憂者不為慢遊之樂不循肆溢之行也齊宣王見孟子於雪宮者雪宮離宮之名也中間有池囿言宣王在雪宮之中而見孟子來至也王曰賢者亦樂此乎者是宣王稱孟子為賢者問之孟子亦嘗有此雪宮之樂也云乎者亦未知孟子可否若何所以云乎而疑之之辭也亦梁惠王存沼上而問孟子賢者亦樂此乎同意孟子對曰有人不得則非其上矣至然而不王者未之有也者孟子答宣王之言而欲宣王有此雪宮之樂在與民同其樂也故言有為人下者不得此樂則必非謗其上矣為人下者既不得此樂而以非謗其上非也以其不可也無他是不知命與分定故也為民之上者既有此樂而不與下民同其樂亦非也以其亦不可也無他是不知義而失之於驕也蓋為之君在民之上凡有所樂皆出於民之賦役而成之也豈可驕之哉故曰亦非也苟為君能以民之所樂而為已之樂則在下之民見君之所樂亦樂之而不敢非謗也以民之所憂而已亦為憂之則在已憂所憂而在下之民亦分憂之矣凡此皆君民憂樂施報之效也故曰在上為君者凡有所樂與天下之民同其樂凡有所憂與天下之民同其憂然而天下不歸往而為之王者未之有也言其無也昔者齊景公問於晏子曰吾欲觀於轉附朝儛遵海而南放於琅邪吾何修而可比於先王觀也至好君也者是皆孟子引景公問晏子晏子告景公之言而誨齊宣王也昔往也齊景公齊莊公之後景公杵臼是也魯襄公二十六年立在位五十八年薨轉附朝儛皆山名也又云朝水也言往者齊景公嘗問於晏子曰我欲遊觀於轉附朝儛循海而南至於琅邪我何以修治而可以比效於先聖王之遊觀也晏子齊景公之相齊大夫也姓晏名嬰者晏子答曰善哉王之問也乃言天子往於諸侯謂之巡狩巡狩者謂巡諸侯為天子所守土也如歲二月東巡狩五月南巡狩八月西巡狩十一月北巡狩是也諸侯朝覲於天子謂之述職述職者謂述已之所守職如春朝以圖天下之事夏宗以陳天下之謨秋覲以比邦國之功冬遇以協諸侯之慮是也然此皆無非事而已春則省察民之耕而食不足者則補之如周禮旅師春頒其粟是也秋則省察民之收而有力不足者則助之如遂師巡其稼穡而移用其民以救時事是也凡如此是皆下之所以有望於上而巡也故夏禹之世民俗諺有曰我王不遊我何以得其休息我王不豫我何以得助其力此先聖王所以一遊一豫而為諸侯之法度也統而言之則遊與豫皆巡行也别而言之則遊者有所縱至於適也豫者有所適而至於樂也故於遊則未至於豫豫則不止於遊也今也景公則不如此其興師行軍皆逺轉糧食而食之有飢之民而不得飽食有勞乏之民則不得休息在位者皆睊睊然側目相視而非其上而下民又皆作為邪恩也故方命虐民飲食若流流連荒亡為諸侯憂方逆也凡物圓則行方則止行則順止則逆所謂方命虐民者是逆先王之命而下則暴虐民人也凡遊豫補助皆先王之命也今則方命而虐民又飲食無窮極而若水之流蓋流連荒亡四行皆為諸侯之所憂也以其皆能喪亡其身而已故流者是從流下而忘反之謂也如齊桓與蔡姬乘舟於囿是也連者從流上而忘反之謂也如書曰罔水行舟若丹朱是也荒者從獸無厭之謂也如羿之好田獵無有厭極以亡其身是也亡者樂酒無厭之謂也如殷紂以酒喪國是也故曰從流下而忘反謂之流從流上而忘反謂之連從獸無厭謂之荒樂酒無厭謂之亡以其晏子自解之耳言先王無流連之樂荒亡之行惟君所行也者謂古之先王無此流連之極樂荒亡之極行惟獨在君所行也君者指景公而言也景公自知己小有流連之樂大有荒亡之行遂一聞晏子之言而喜悅之景公所以悅者以其能悟而改過也乃大戒勑於國而不敢慢其事出舍於郊而不敢寧其居於是能興發倉廩而補贍其不足者又召樂師之官曰為我作君臣相説之樂以作徵招角招是也必作其徵招角招之樂者蓋徵以為事角以為民皆以招名之曰亦舜作歌以康庶事鼓琴歌南風以阜民財之意也此所以謂之徵招角招矣又引樂詩曰畜君何尢畜君者好君也言悅君所以好君何有其過也故又曰畜君者是好君也凡此皆晏子所言是其畜君者也孟子引此誨宣王亦欲宣王如景公悅晏子之言而悟之也注轉附朝儛至邑也正義曰云轉附朝儛皆山名今案諸經並未詳據梁時顧野王釋云潕水名出南陽恐誤潕為儛他並未詳云琅邪為齊東境上邑者案地理志云齊地東有琅邪南越志云琅邪邑名是也注沈湎於酒熊蹯不熟怒而殺人之類也正義曰書云義和湎淫胤往征之孔安國云義和氏世掌天地四時之官自唐虞至三代世職不絶承太康之後沈湎于酒過差非度又曰紂沈湎冒亂敢行暴虐孔安國傳云沈湎嗜酒春秋魯宣公二年晉靈公不君厚斂以雕牆從臺上彈人而觀其避丸也宰夫胹熊蹯不熟殺之置諸畚使婦人載以過朝釋云胹煮也畚草器也注齊桓與蔡姬乘舟於囿正義曰案魯僖公三年左傳云齊侯與蔡姬乘舟於囿蕩公公怒杜預曰蔡姬齊侯夫人蕩搖也囿苑也蓋魚池在苑中耳注書云罔水行舟若丹朱慢遊者正義曰案書益稷篇云無若丹朱敖惟慢遊是好傲虐是作罔晝夜額額罔水行舟朋淫于家用殄厥世孔安國云丹朱堯之子傲戲而為虐無晝夜常額額肆惡無休息習於無水陸地行舟言無度羣淫於家妻妾亂用是絶其世不得嗣注羿之好田獵無有厭極以亡其身正義曰案書云太康尸位以逸豫滅厥德黎民咸二乃盤遊無度畋于有洛之表十旬弗反有窮后羿因民弗忍距于河孔注曰有窮國名羿諸侯名距太康於河不得入遂廢之魯襄公四年左傳云事録在梁惠王首章賈逵曰羿之先祖世為射官故帝嚳賜羿弓矢使司射淮南子云堯十日並出堯使羿射九日而落之歸藏易云羿彈十日凡此其説羿為諸侯名皆難取信欲言帝嚳時有羿堯時亦有羿則亦是善射之號非為人名信如是則不知言以羿為窮國君號為諸侯者何也注殷紂以酒喪國正義曰案史記云殷王紂樂戲於沙丘以酒為池以肉為林使男女裸相逐其間為長夜之飲百姓怨望而諸侯有畔於是有炮烙之法後為武王所伐是也注徵招角招至樂章名也正義曰凡宮商角徵羽蓋樂之五聲也晉志云宮土音數有八十一為聲之始屬土者以其最濁者也君之象也宮亂則荒其君驕商金音三分徵益一以生其數七十二屬金者以其濁次宮臣之象也商亂則詖其官壞也角木音三分羽益一以生其數六十四屬木者以其清濁中人之象也角亂則憂其人怨也徵火音三分宮去一以生其數五十四屬火者以其次清事之象也徵亂則哀其事勤也羽水音三分商去一以生其數四十八屬水者以其最清物之象也羽亂則危其財匱也凡此乃為樂章之名也然則景公所以作角徵樂以其為民為事也注文王不敢盤于遊畋也正義曰注云此者蓋引周書無逸之篇文也孔注云文王不敢盤于遊畋者是不敢樂於遊逸田獵者也故録此焉齊宣王問曰人皆謂我毁明堂毁諸已乎注謂泰山下明堂本周天子東巡狩朝諸侯處也齊侵地而得有之人勸齊宣王諸侯不用明堂可毁壞故疑而問於孟子當毁之乎已止也孟子對曰夫明堂者王者之堂也王欲行王政則勿毁之矣注言王能行王道者則可無毁也王曰王政可得聞與注王言王政當何施其法寧可得聞對曰昔者文王之治岐也耕者九一仕者世祿關市譏而不征澤梁無禁罪人不孥注言往者文王為西伯時始行王政使岐民修井田八家耕八百畝其百畝者以為公田及廬井故曰九一也紂時稅重文王復行古法也仕者世祿賢者子孫必有土地關以譏難非常不征稅也陂池魚梁不設禁與民共之也孥妻子也詩云樂爾妻孥罪人不孥惡惡止其身不及妻子也老而無妻曰鰥老而無夫曰寡老而無子曰獨幼而無父曰孤此四者天下之窮民而無告者文王發政施仁必先斯四者注言此四者皆天下之窮民而文王常恤鰥寡存孤獨也詩云哿矣富人哀此煢獨注詩小雅正月之篇哿可也詩人言居今之世可矣富人但憐憫此煢獨羸弱者耳文王行政如此也王曰善哉言乎注善此王政之言曰王如善之則何為不行注孟子言王如善此王政則何為不行也王曰寡人有疾寡人好貨注王言我有疾疾於好貨故不能行對曰昔者公劉好貨詩云乃積乃倉乃裹餱糧于橐于囊思戢用光弓矢斯張干戈戚揚爰方啓行故居者有積倉行者有裹糧也然後可以爰方啓行王如好貨與百姓同之於王何有注詩大雅公劉之篇也乃積穀於倉乃裹盛乾食之糧於橐囊也思安民故用有寵光也戚斧揚鉞也又以武備之日方啓行道路孟子言公劉好貨若此王若則之於王何有不可也王曰寡人有疾寡人好色注王言我有疾疾於好色不能行也對曰昔者太王好色愛厥妃詩云古公亶父來朝走馬率西水滸至于岐下爰及薑女聿來胥宇當是時也內無怨女外無曠夫王如好色與百姓同之於王何有注詩大雅綿之篇也亶父太王名也號稱古公來朝走馬遠避狄難去惡疾也率循也水滸涯也循西方水滸來至岐山下也薑女太王妃也於是與薑女俱來相土居也言大王亦好色非但與薑女俱行而已普使一國男女無有怨曠王如則之與百姓同欲皆使無過時之思則於王之政何有不可乎音義孥音奴譏難乃旦切下狄難之難赴難其難免難皆同惡惡之惡烏路切下如字哿工可切煢音瓊橐音託戢詩作輯同音集啓行如字道也裹盛音成滸音虎疏正義曰此章言齊王好貨色孟子推以公劉太王好貨色責難於君也齊宣王問曰人皆謂我毁明堂毁諸已乎者是齊王問孟子以為在國之人皆謂勸我毁壞其明堂今毁壞之已而勿毁壞乎魯太山下有明堂後為齊侵其地故齊有明堂齊宣王尚疑之所以問也孟子對曰夫明堂者王者之堂也王欲行王政則勿毁之矣者孟子欲使宣王行王政所以勸之勿毁耳王曰王政可得聞與者是宣王問孟子以謂王政之法寧可得而聞之歟對曰昔者文王之治岐也耕者九一仕者世祿關市譏而不征澤梁無禁罪人不孥至必先斯四者是孟子對答宣王為王政之法也言往者文王為西伯行政自岐邑耕者皆以井田之法制之一人受私田百畝八夫家計受私田八百畝井田中百畝是為公田以其九分抽一分為公以抵其賦稅也仕者不特身受其祿而至子孫之世亦與士地祿焉關市司關司市之所但譏問之不令姦人出入而不征取其稅川澤魚梁之所但與民共之而設禁止之法罪人但誅辱止其一身而不誅辱其妻子孥妻子也老而無妻曰鰥老而無夫曰寡老而無子曰獨幼而無父曰孤凡此鰥寡孤獨四者是皆天下之民窮而無告者也文王發政施仁必先及此四者焉無告者以其鰥寡孤獨單隻上下無所告者之人也是皆孟子言文王在岐邑之時為王政之法如此而已詩云哿矣富人哀此煢獨者哿可也蓋詩之小雅正月之篇文也其意蓋言當今之世可矣富人但先哀憫此煢獨羸弱者耳孟子所以引之謂其文王行政是如此也故援之以答宣王王曰善哉言乎者是宣王聞孟子答之以文王行王政之法而善其言也故曰善哉言乎曰王如善之則何為不行者孟子言王如能善此王政之言則何為不行此也王曰寡人有疾寡人好貨者宣王言我有疾疾在於好貨財也昔者公劉好貨詩云至於王何有者孟子引公劉好貨故詩有大雅公劉之篇文而答於宣王也言往者公劉好其貨財其詩蓋謂乃積穀于倉乃裹乾食之糧於囊橐之中其思在於輯和其民以光顯于時張其弓矢執其干戈斧鉞告其士卒曰為女方開道路而行如此故居者有穀積于倉行者有糧裹于囊然後可以曰方開道路而行王如能好貨與民人同之亦若公劉之如此則於王也何有不可云橐囊者大曰囊小曰橐也爰曰也王曰寡人有疾寡人好色者是宣王又言我有疾疾在於好色也對曰昔者大王好色愛厥妃詩云至於何有者是孟子又引大王好色故詩大雅綿之篇文也答宣王也亶父大王名也古公號也言往者大王好色愛厥妃其詩蓋謂古公亶父來朝走馬而避惡且早又疾急循西水涯而至于岐山之下曰與薑女自來相土居如此故當是之時內無怨女外無曠夫皆男女嫁娶過時者謂之怨女曠夫也女生向內故云內男生向外故云外王如能好色與百姓同之亦若大王之如此則於王也又何有不可薑女太薑也是大王之妃也注謂泰山下明堂至已止也正義曰案地理志云齊南有泰山史記封禪書云舜二月東巡狩至于岱宗岱宗泰山也遂覲東后又云此山黃帝之所常遊自古受命帝王未有睹符瑞見而不臻乎泰山也云泰山下明堂本周天子東巡狩朝諸侯之地案禮記明堂位云明堂者明諸侯之尊卑昔殷紂亂天下脯鬼侯以享諸侯是以周公相武伐紂武王崩成王幼弱周公踐天子之位六年朝諸侯於明堂七年致政於成王成王封周公於曲阜令魯世世祀周公以天子之禮樂然則泰山下明堂即周公朝諸侯之處蓋魯封內有泰山後嘗為齊所伐故齊南有泰山文中子云如有用我者當處於泰山矣注云泰山黃帝有合宮在其下可以立明堂之制焉禮器云魯人將有事於上帝必先有事於頖宮齊人將有事於泰山必先有事於配林則泰山在齊明矣案周制明堂云周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵賈釋云明堂者明政教之堂又夏度以步殷度以尋周度以筵是王者明政也周堂高九尺殷三尺以一相參之數而卑宮室則夏堂高一尺矣又上注云堂上為五室象五行以宗廟制如明堂明堂中有五天帝五人神之座皆法五行以五行先起於東方故東北之堂為木其實兼水矣東南火室矣兼木西南金室兼火西北水室兼金以中央太室有四堂四角之室亦皆有堂乃知義然也賈釋大史閏月下義云明堂路寢及宗廟皆有五室十二堂門是也四角之堂皆於太室外接四角為之則五室南北止有二筵東西各二筵有六尺乃得其度若聽朔皆於時之堂不於木火等室居若閏月則關門左扉立其中而聽朔焉注往者文王為西伯至妻子也正義曰史記云古公亶父為獯鬻戎狄所攻遂去邠踰梁山止於岐下古公少子季歷生昌有聖瑞立季歷以傳昌昌立是為西伯西伯隂行善諸侯皆來徐廣曰文王九十七乃崩云修井田八家八百畝以為公田者亦以孟子云方百里而井井九百畝是也小司徒佐大司徒當都鄙三等之菜地而為井田經云九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任役萬民使營地事而貢軍賦出軍徒又菜地之中每一井之田出一夫之稅以入於官也故曰九一也云紂時稅重者史記云紂為人資辨捷疾聞見甚敏材力過人手格猛獸智足以拒諫言足以飾非好酒淫樂嬖於婦人愛妲已於是厚賦稅以實鹿臺之財盈巨橋之粟是紂時稅重也關譏不征稅魚梁不設禁者周禮司關國凶札則無關門之征猶譏司市國凶荒則市無征而作布澤虞掌國澤之政令為之厲禁川衡以時舍其守犯禁者執而罰之司厲男子入于罪𨽻女子入于舂藁此而推之則關市非無征也澤梁非無禁也罪人非不孥也而文王必皆無者蓋亦見文王權一時之宜不得不然耳故孟子於宣王之一時亦以此引之以救弊矣注詩小雅正月之篇者正義曰注云哿可也獨單也箋云此言王政如是富人已可惸獨困也注詩大雅公劉之篇也至不可也正義曰注云公劉居於邰而遭夏人亂迫逐公劉公劉乃避中國之難遂平西戎而遷其民邑於邠焉乃積乃倉言民事時和國有積倉也小曰橐大曰囊思戢用光言民相與和睦以顯於時也箋云公劉乃有積倉積委及倉也安安而能遷積而能散為夏人迫逐已之故不忍鬭其民用裹糧食於橐囊之中棄其餘而去思在和其人民用光其道為足子孫之基又毛注云戚斧也揚鉞也張其弓矢秉其干戈戚揚以方閛道路去之蓋諸侯之從者十有八國焉箋云干盾也戈勾矛戟也爰曰也公劉之去邰整其師設其兵器告其士卒曰為方閛道而行明已之遷非為迫逐之故乃欲全民也注詩大雅綿之篇也至不可乎正義曰綿詩興也綿綿不絶貌也毛注云古公豳公也古言久也亶父字或因以名言質也古公處豳狄人侵之事之以皮幣不得免焉事之以犬馬不得免焉事之以珠玉不得免焉乃屬其耆老而告之曰狄之所欲者吾土地吾聞君子不以所養人者害人於是踰梁山邑于岐山之下居焉率循也滸水涯也薑女太薑也胥相也宇居也箋云來朝走馬言其辟惡早且疾也循西水涯沮漆水側也爰於也及與也聿自也於是與其妃太薑自來相可居者著太薑之賢知也孟子注疏卷二上孟子注疏卷二上考證莊暴見孟子章籥注詩云左手執籥以節衆也陸陛經世驪珠曰周禮笙師掌教吹籥鄭衆云籥如笛有三孔以竹為之爾雅云大籥謂之産其中謂之仲小者謂之箹三禮圖云籥春分之音動萬物也據趙注是碩人執舞之籥與左傳舞南籥同非本章本義疏末云天時不如地利地利不如人和蓋公孫丑篇文也本注無此二句乃傳寫之誤文王之囿章若是其大乎節注王怪其大大監本訛惟今改正交鄰國有道章文王事昆夷節注昆夷兌矣詩經昆作混兌作駾注謂畏之而奔突竄伏也韻會音娧玉篇云馬疾行貌趙注作兌字按説文兌説也與詩文義不合疑有誤天降下民節注言天生下民為作君為作師以助天光寵之也臣齊燾按趙注將其助上帝寵之作一句讀與孔安國解寵安天下異疏史記公劉變於西戎邑於豳其後三百有餘歲戎狄攻太王監本變於西戎下多邑於西戎四字三百下脫有字餘字下脫歲字今並依史記改正齊宣王見孟子於雪宮章放於琅邪注齊東境上邑陸陛經世驪珠曰按地里志云齊地東有琅邪水經注云琅邪山名勾踐并吳欲伯中國往都琅邪秦始皇二十六年滅齊以為郡城遂登琅邪蓋山之在東境者邑以是名所謂賜履東至於海也相如子虛賦云齊東渚巨海南有琅邪非孟子注疏卷二上考證欽定四庫全書孟子注疏卷二下漢趙氏注宋孫奭音義并疏梁惠王章句下孟子謂齊宣王曰王之臣有託其妻子於其友而之楚遊者注假此言以為喻比其反也則凍餒其妻子則如之何注言無友道當如之何王曰棄之注言當棄之絶友道也曰士師不能治士則如之何注士師獄官吏也不能治獄當如之何王曰已之注已之者去之也曰四境之內不治則如之何注境內之事王所當理不勝其任當如之何孟子以此動王心令戒懼也王顧左右而言他注王慙而左右顧視道他事無以答此言也音義比其丁必二切及也疏正義曰此章言君臣上下各勤其任無墮厥職乃安其身也孟子謂齊宣王曰王之臣有託其妻子於其友而之楚遊者是孟子欲以此比喻而諷之也言王之臣下有寄託妻子於交友而往楚國遊戲者比其反也則凍餒其妻子則如之何者言寄妻子於交友而往楚國在近則反歸而妻子在交友之所皆寒凍其膚飢餒其腹則為交友之道當如之何凍者寒之過之謂也王曰棄之者是宣王答孟子以為交友之道既如此當棄去之而不必與為友也曰士師不能治士則如之何者孟子因循又問宣王言為之獄吏者而不能主治其士則為士師者當如之何處之王曰己之者言當止之而不可與為士師也曰四境之內不治則如之何者孟子因循問至於此乃欲諷諫之故問之曰自一國四境之內皆亂而不治則為之君當如之何處之王顧左右而言他者宣王知罪在諸已乃自慙羞之而顧視左右道其他事無以答此言也注士師獄吏也正義曰士師即周司寇之屬有士師卿士皆以士為官鄭玄云士察也主察獄訟之事是士師為獄官之吏者也音義墮許規切亦音惰下不墮同孟子見齊宣王曰所謂故國者非謂有喬木之謂也有世臣之謂也注故者舊也喬高也人所謂是舊國也者非但見其有高大樹木也當有纍世修德之臣常能輔其君以道乃為舊國可法則也王無親臣矣注今王無可親任之臣昔者所進今日不知其亡也注言王取臣不詳審往日之所知今日為惡當誅亡王無以知也王曰吾何以識其不才而舍之注王言我當何以先知其不才而舍之不用也曰國君進賢如不得已將使卑踰尊疏踰戚可不愼與注言國君欲進用人當留意考擇如使忽然不精心意而詳審之如不得已而取備官則將使尊卑疏戚相踰豈可不愼歟左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之注謂選大臣防比周之譽核其鄉願之徒論語曰衆好之必察焉左右皆曰不可勿聽諸大夫皆曰不可勿聽國人皆曰不可然後察之見不可焉然後去之注衆惡之必察焉惡直醜正實繁有徒防其朋黨以毁忠正也左右皆曰可殺勿聽諸大夫皆曰可殺勿聽國人皆曰可殺然後察之見可殺焉然後殺之故曰國人殺之也注言當愼行大辟之罪五聽三宥古者刑人於市與衆棄之如此然後可以為民父母注行此三愼之聽乃可以子畜百姓也音義舍音捨下舍女同防比毗志切核音核惡直如字又烏路切辟婢亦切疏正義曰此章言人君進賢退惡翔而後集有世賢臣乃為舊可法則也孟子見齊宣王曰所謂故國者非謂有喬木之謂也者是孟子見齊宣王而問之言人所謂舊國者非謂有高大木而謂之舊國也以其有世世修德之舊臣也故謂之舊國故曰有世臣之謂也故舊也喬高也世臣纍世修德之舊臣也王無親臣矣昔者所進今日不知其亡也者孟子言今王無有親任用之臣矣往日所進者今日為惡而王又不知誅亡之王曰吾何以識其不才而舍之者宣王言我何以知其臣之不才而舍去之而不用也曰國君進賢如不得已將使卑踰尊疏踰戚可不愼歟者孟子言國君進用賢人當留意揀擇如使混然不能精心揀擇但如不得已而取備官職則將使其卑踰尊疏踰戚而殽亂之矣其如是豈可不重愼之歟左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之至如此然後可以為民父母者此皆孟子教宣王進退賢不肖之言也言於進用賢人之際雖自王之左右臣者皆曰此人賢當進用之則王未可進而用之也以至諸大夫皆曰此人之賢當進用之則王又未可進而用之也逮至一國之人皆曰此人之賢當進而用之則王然後詳察亦見其真足為賢人故然後進而用之矣如左右皆曰此人不賢不可進用則王莫聽之以至諸大夫皆曰此人不賢不可進用當去之則王亦當莫聽逮至一國之人皆曰此人不賢不可進用然後去之乃不進用也如左右皆曰此人之罪可以殺之則王又當莫聽以至諸大夫皆曰此人之罪當殺之則王又當勿聽逮至一國之人皆曰此人之罪可以殺之則王然後詳察亦見其人實有可殺之罪故然後方可殺之也無他以其一國之人皆曰可殺而殺之也夫如此則王然後可以為民父母而子畜百姓矣注故舊也至可法則也正義曰釋云故舊也文從古故也詩伐木之篇云出自幽谷遷于喬木注云喬高也故知喬木為高大之木郭璞云喬樹枝曲卷似鳥羽也書云圖任舊人共政又遲任有言曰人惟求舊是故臣之謂也注鄉原之徒正義曰語云鄉原德之賊也周氏注曰所至之鄉輒原其人情而為意以待之是賊亂其德也何晏云一曰鄉向也古字同謂人不能剛毅而見人輒原其趣嚮容媚而合之言此所以賊德也故有三説焉注大辟之罪五聽三宥正義曰孔安國傳云大辟死刑也周禮大司寇以五聲聽獄訟求民情一曰辭聽二曰色聽三曰氣聽四曰耳聽五曰目聽鄭注云辭聽者觀其出言不直則煩也色聽者觀其顏色不直則赧然也氣聽者觀其氣息不直則喘也耳聽者觀其聽聆不直則惑也目聽者觀其眸子視不直則眊然也凡此五聽是也三宥者司刺掌三宥一宥曰不識再宥曰過失三宥曰遺忘鄭司農云不識謂愚民無所識則宥之過失若今律過失殺人不坐死鄭玄云遺忘若間帷薄忘有在焉而以兵矢投射之凡此三宥也注云行此三愼之聽也蓋指孟子言自左右皆曰賢至國人殺之也者是為之解也齊宣王問曰湯放桀武王伐紂有諸注有之否乎孟子對曰於傳有之注於傳文有之矣曰臣弒其君可乎注王問臣何以得弒其君豈可行乎曰賊仁者謂之賊賊義者謂之殘殘賊之人謂之一夫聞誅一夫紂矣未聞弒君也注言殘賊仁義之道者雖位在王公將必降為匹夫故謂之一夫也但聞武王誅一夫紂耳不聞弒君也書云獨夫紂此之謂也疏正義曰此章言孟子云紂崇惡失其尊名不得以君臣論之欲以深寤宣王垂戒于後也齊宣王問曰湯放桀武王伐紂有諸者是宣王問孟子言商之湯王放其夏王桀於南巢之地周武王伐商王紂於鹿臺之中還是有此言也否乎孟子對曰於傳有之者孟子答宣王以為傳文有是言也故書云湯放桀於南巢惟十有一年武王伐紂又史記武王伐紂紂走入登鹿臺蒙衣其珠玉自燔于火而死武王以黃鉞斬紂頭縣大白之旗是也曰臣弒其君可乎者宣王問孟子如是則為臣下者得以弒其君上豈可乎曰賊仁者謂之賊賊義者謂之殘殘賊之人謂之一夫聞誅一夫紂矣未聞弒君也者孟子答宣王以謂賊害其仁者名謂之賊賊害其義者名謂之殘名謂殘賊者皆謂之一匹夫也我但聞誅亡其一匹夫紂矣未嘗聞知有弒君者也故尚書有云獨夫紂是其證也孟子謂齊宣王曰為巨室則必使工師求大木工師得大木則王喜以為能勝其任也匠人斫而小之則王怒以為不勝其任矣注巨室大宮也爾雅曰宮謂之室工師主工匠之吏匠人工匠之人也將以比喻之也夫人幼而學之壯而欲行之王曰姑舍女所學而從我則何如注姑且也謂人少學先王之道壯大而仕欲施行其道而王止之曰且舍置汝所學而從我之教命此如何也今有璞玉於此雖萬鎰必使玉人雕琢之至於治國家則曰姑舍女所學而從我則何以異於教玉人雕琢玉哉注二十兩為鎰雕琢治飾玉也詩云雕琢其章雖有萬鎰在此言衆多也必須玉人能治之耳至於治國家而令從我是為教玉人治玉也教人治玉不得其道則玉不得美好教人治國不以其道則何由能治乎音義舍女音汝少詩妙切鎰音溢疏正義曰此章言任賢使能不遺其學則功成而不墮也孟子謂齊宣王曰為巨室則必使工師求大木工師得大木則王喜以為能勝其任也匠人斫而小之則王怒以為不勝其任矣者是孟子謂齊宣王言為大宮則王必遣使工匠之吏求其大木工匠之吏求得其大木則王喜以為工匠之吏能勝其所任用矣至於匠人斫削而小之則王怒以為匠人不勝其任矣凡此皆孟子將以比喻而言也以其欲使宣王易曉其意也巨室大宮也工師主工匠之吏也又言夫人幼而學之壯而欲行之王曰姑舍女所學而從我則何如者是孟子又言夫人既以幼少而學先王之道及壯大仕而欲施行其幼之所學之道而王乃曰且舍去汝所學之道而從我教道則如之何也今有璞玉於此雖萬鎰必使玉人雕琢之至於治國家則曰姑舍女所學而從我則何以異於教玉人雕琢玉哉者是孟子又復以此而比喻于宣王也言今假有素璞之玉於此雖有萬鎰之多然必使治玉之人雕琢而治飾之耳至於治國家則固當以先王之道治之而曰且舍去女所學而令從我教命則何以有異於教玉人治飾玉哉言其無以異也以其治國家當取學先王之道者乃能治之今乃至於治國家則曰且舍汝所學而從我教命是何以異於此哉蓋巨室則國家比也用人猶制木木則君子之道比也工師則君子比也匠人則人君比也意言治國家必用君子之道施而後治人君反小而用之未有能治國家者也不特若此又有以喻焉璞玉則亦國家比也玉人則亦君子比也意謂璞玉人之所寶也然不敢自治飾之必用使治玉人然後得成美器也若國家則人君之所寶也然人君不能自治必用君子之治然後安也今也君子不得施所學之道以治國家反使從已所教以治之此亦教玉人雕琢玉同也固不足以成美器適所以殘害人也故孟子所以有此譬之注巨室大宮也至喻之也正義曰字林云巨大也白虎通曰黃帝始作宮室是知巨室則大宮也周禮考工記云審曲靣藝以飾五材以辨民器謂之工凡攻木之工七攻金之工六攻皮之工五設色之工五刮摩之工五搏埴之工二輪輿弓廬匠車梓凡此者是攻木之工也餘工不敢煩述所謂工師者師範也教也即掌教百工者如漢書云將作少府秦官掌理宮室者是也匠人即斫削之人也風俗通云凡是於事巫卜陶匠是也然則此言匠人者即攻木之匠也注金二十兩為鎰正義曰國語云二十四兩為鎰禮云朝一鎰米注亦謂二十四兩今注誤為二十兩齊人伐燕勝之宣王問曰或謂寡人勿取或謂寡人取之以萬乘之國伐萬乘之國五旬而舉之人力不至於此不取必有天殃取之何如注萬乘非諸侯之號時燕國皆侵地廣大僭號稱王故曰萬乘五旬五十日也書曰期三百有六旬言五旬未久而取之非人力乃天也天與不取懼有殃咎取之何如孟子對曰取之而燕民悅則取之古之人有行之者武王是也注武王伐紂而殷民喜悅篚厥玄黃而來迎之是以取之也取之而燕民不悅則勿取古之人有行之者文王是也注文王以三仁尚在樂師未奔取之懼殷民不悅故未取之也以萬乘之國伐萬乘之國簞食壺漿以迎王師豈有他哉避水火也如水益深如火益熱亦運而已矣注燕人所以持簞食壺漿來迎王師者欲避水火難耳如其所患益甚則亦運行奔走而去矣今王誠能使燕民免於水火亦若武王伐紂殷民喜悅之時則可取之而已音義簞食音丹下音嗣後簞食皆放此疏正義曰此章言征伐之道當順民心也齊人伐燕勝之宣王問曰或謂寡人勿取或謂寡人取之至何如者言齊國之人伐燕之人必強勝之齊宣乃問孟子以謂或有人教我勿取此燕國或有人又教我取之今以萬乘之國伐萬乘之國但五十日足以興舉之非人力所能至此乃天也天與之而勿取必有天殃而禍之今則取之何如故以此問孟子孟子對曰取之而燕民悅則取之古之人有行之者武王是也者是孟子答齊宣以為今伐取之燕國而燕國之民悅樂則可以伐取之也古之人有行征伐之道如此國者若武王伐紂是也書曰肆豫東征綏厥士女惟其士女篚厥玄黃紹我周王是其武王伐紂之事耳孟子所以引此答齊宣蓋欲齊宣征伐順民心亦若武王也取之而燕民不悅則勿取古之人有行之者文王是也者孟子又以此答齊宣言今欲取燕國苟燕國之民愁怨而不悅則當勿取之故古之人有欲行征伐之道若此者如文王於紂是也孔子有云文王三分天下有其二猶服事殷是文王於紂之事耳孟子所以又引此答齊宣者復欲齊宣如文王順民心而未取之耳以萬乘之國伐萬乘之國簞食壺漿以迎王師至亦運而已矣者孟子言今且托以萬乘之國伐取萬乘之國其有以簞食壺漿而來迎王兵師者豈有他事哉蓋欲避去水火之患難耳如若水彌深火彌熱則民亦運行而奔走矣豈來迎王之兵師哉意謂今齊誠能使燕民得免水火之難亦若武王伐紂殷民皆悅樂之則可以取燕也如不然則若文王之於紂故未取之耳云萬乘者蓋六國之時為諸侯者皆僭王號故皆曰萬乘云簞笥者案曲禮曰圓曰簞方曰笥飯器也書云衣裳在笥則笥亦盛衣云壺漿者禮圖云酒壺受一斛口徑尺足高二寸徑尺又公羊傳云齊侯唁公于野井國子執壺漿何休云壺禮器腹方口圓曰壺釋名曰漿水也飲也或云漿酒也注篚厥玄黃正義曰孔安國傳云以筐篚盛其絲帛也禮圖云篚以竹為之長三尺廣一尺深六寸足高三寸上有蓋也注萬乘非諸侯之號至如何正義曰云萬乘非諸侯之號時燕國皆侵地僭號稱王者説在上卷首章書曰期三百有六旬者案孔安國傳云匝四時曰期一歲十二月月三十日正三百六十日除小月六日為六日是為一歲有餘十二日未盈三歲足得一月則置閠焉是其解也注武王伐紂至取之也正義曰書云惟十一年武王伐紂史記云武王伐紂紂發兵七十萬人距武王紂師倒兵以戰以閛武王武王馳之紂兵崩叛紂走反入鹿臺蒙衣其珠玉自燔于火而死武王以黃鉞斬紂懸其頭於大白之旗是也注文王以三仁尚在樂師未奔者正義曰語云殷有三仁焉蓋微子箕子比干是也呂氏春秋仲冬祀云紂之母生微子啓與仲衍其時猶尚為妾改而為妻後生紂紂之父欲立微子啓為太子太史曰妻之有子不可立妾之子故立紂為後微子名啓世家曰開孔安國曰微圻內國名子爵為紂卿士箕子者莊子云箕子名胥鄭玄云箕亦在圻內比干者家語曰比干是紂之親則諸父知比干乃紂之諸父也宋世家云箕子乃紂之親戚也言為親戚又莫知其為父為兄也鄭玄王肅皆以箕子為紂之諸父杜預以為紂之庶兄皆以意言之耳趙云三仁尚在者蓋文王為西伯之時三仁尚未之亡去及西伯卒武王東伐至盟津諸侯會者八百皆曰紂可伐武王猶曰爾未知天命紂愈淫亂不止微子諌不聽乃與大師謀遂去比干曰為人臣者不得不以死諫乃強諌紂紂怒曰吾聞聖人心有七竅刳比干觀其心箕子懼乃徉狂為奴紂又囚之後因武王乃釋之耳齊人伐燕取之諸侯將謀救燕宣王曰諸侯多謀伐寡人者何以待之注宣王貪燕而取之諸侯不義其事將謀救燕伐齊宣王懼而問之孟子對曰臣聞七十里為政於天下者湯是也未聞以千里畏人者也注成湯修德以七十里而得天下今齊地方千里何畏懼哉書曰湯一征自葛始天下信之東面而征西夷怨南面而征北狄怨曰奚為後我民望之若大旱之望雲霓也歸市者不止耕者不變誅其君而弔其民若時雨降民大悅書曰徯我后后來其蘇注此二篇皆尚書逸篇之文也言湯初征自葛始誅其君恤其民天下信湯之德面者向也東向征西夷怨者去王城四千里夷服之國也故謂之四夷言遠國思望聖化之甚也故曰何為後我霓虹也雨則虹見故大旱而思見之傒待也后君也待我君來則我蘇息而已今燕虐其民王往而征之民以為將拯已於水火之中也簞食壺漿以迎王師若殺其父兄係纍其子弟毁其宗廟遷其重器如之何其可也注拯救也係纍猶縳結也燕民所以悅喜迎王師者謂濟救於水火之中耳今又殘之若此安可哉天下固畏齊之強也今又倍地而不行仁政是動天下之兵也注言天下諸侯素謂齊強今復并燕一倍之地以是行暴則多所危是動天下之兵共謀齊也王速出令反其旄倪止其重器謀於燕衆置君而後去之則猶可及止也注速疾也旄老耄也倪弱小倪倪者也孟子勸王急出令先還其老小止勿徙其寶重之器與燕民謀置所欲立君而去之歸齊天下之兵猶可及其未發而止之也音義霓五稽切徯胡禮切係纍張音繫下力追切并音併下并得同旄倪丁云上音耄下音齯老也詳注意倪謂繄倪小兒也疏正義曰此章言伐惡養善無貪其富以小王大將何懼也齊人伐燕取之諸侯將謀救燕者齊國伐其燕國而取其地天下諸侯皆將謀度救燕國也宣王曰諸侯多謀伐寡人者何以待之者是齊宣見諸侯將謀度救燕國而共伐我乃曰天下多有謀度與燕共伐我者則我當如之何以待他故以此問孟子孟子對曰臣聞七十里為政於天下者湯是也未聞以千里畏人也者孟子答齊宣以為臣嘗聞有地但方闊七十里而能為王政於天下者如商湯王是也未嘗聞有地方闊千里而猶畏人者也蓋湯為夏方伯之時但有七十里而後為天下商王今天下方千里者有九而得其一是齊之有千里地也所以云然書曰湯一征自葛始天下信之東面而征西夷怨至民大悅者此皆尚書遺亡篇文也今據商書仲虺之誥篇則云乃葛伯仇餉初征自葛東征西夷怨南征北狄怨曰奚為後豫太抵孟子引此者蓋恐齊王為已之臆説以引此而證之欲使齊宣信之也故言書云湯一征自葛國為始天下皆信湯王之德後湯東向而征伐則西夷之人思望而怨不先自此而正君之罪南嚮而征伐則北夷之人又皆思望而怨以為不先自此而正君之罪乃曰何為後去其我而先向他國而征之故其民望湯之來皆若於大旱而望雲霓如也不特此也又使歸市者不止以其皆得貨易有無也耕于郊野者又不變易其事以言其常得耕作也雖誅亡其君又弔問而存恤其民其如時之旱而雨降民皆悅樂之也書曰徯我后后來其蘇者注云自上文與此皆逸篇之文也今據仲虺之篇有云大抵孟子引此而言者又欲齊王知民如此之慕湯而則法湯也蓋謂民皆喜曰傒待我君來而蘇息我也今燕虐其民王往而征之民以為將拯已於水火之中也至如之何其可也者是孟子又言今燕國之暴虐其民而王以兵往征伐之民皆以為王兵之來將拯救已於水火之中如也故以簞食壺漿迎其王師之來今乃若以殺其民之父兄繫縳其民之子弟又毁壞其國中之宗廟使民不得其祀復遷徙其國中之寶器如之何其可也天下固畏齊之強也今又倍地而不行王政至可及止也者孟子又言天下之諸侯素畏齊國之強也今王又并燕國一倍之地而且復不行其王政是所以興動天下諸侯之兵而共伐之也今玉即速疾出其命令還其老耄幼小勿遷移其寶器復謀度於燕國之衆為置立其君而後去之而歸齊則天下諸侯之兵尚可得及止之也注云去王城四千里夷服之國至蘇息正義曰周禮九服又案禮圖云自王畿千里至夷服凡四千里是也云霓虹也爾雅云雲出天之正氣霓出地之正氣雄謂之虹雌謂之霓則雲陽物也隂陽和而既雨則雲散而霓見矣注旄老耄倪弱小倪倪者正義曰釋云耄齯案爾雅云黃髮倪齒壽也然則趙注云倪弱小非止幼童之弱小亦老之有弱小爾鄒與魯閧穆公問曰吾有司死者三十三人而民莫之死也誅之則不可勝誅不誅則疾視其長上之死而不救如之何則可也注閧鬭聲也猶構兵而鬭也長上軍帥也鄒穆公忿其民不赴難而問其罰當謂何則可也孟子對曰凶年飢歲君之民老弱轉乎溝壑壯者散而之四方者幾千人矣而君之倉廩實府庫充有司莫以告是上慢而殘下也注言往者遭凶年之死民困如是有司諸臣無告白於君有以振救之是上驕慢以殘賊其下也曾子曰戒之戒之出乎爾者反乎爾者也注曾子有言上所出善惡之命下終反之不可不戒也夫民今而後得反之也君無尤焉注尤過也孟子言百姓乃今得反報諸臣不哀矜耳君無過責之也君行仁政斯民親其上死其長矣注君行仁恩憂民困窮則民化而親其上死其長矣音義魯鬨張胡弄切云鬭聲從鬥下者下降切義與巷同此字從鬥丁豆切與門不同丁又胡降切劉熙曰鬨構也構兵以鬬也説文云鬭也長上張丈切下其長長者皆同帥所類切忿敷吻切厄音厄疏正義曰此章言上恤其下則下赴其難惡出於己則害及其身如影響也鄒與魯鬨者言鄒國與魯國相鬨也穆公問曰吾有司死者三十三人而民莫之死也誅之則不可勝誅不誅則疾視其長上之死而不救如之何則可也者是鄒穆公問孟子言我國與魯國相鬭戰而有司死者有三十三人而民皆莫之死我今欲誅亡其民不可勝誅不可勝誅者是民衆之多難以誅亡也不誅其民則我惡疾視其長上有司之死而不救故問孟子當如何則可以誅亡也孟子對曰凶年飢歲君之民老弱轉乎溝壑至是上慢而殘下也者孟子答穆公以為凶荒之年而民皆飢餓君之民人老羸者轉落死於溝壑之中強壯者又離散之於四方者幾近千人矣而君之倉廩盈實府庫充塞為君之有司者皆莫以告白其上發倉廩以濟其食之不給開府庫以佐其用之不足如此則有司在民之上而以驕慢殘害其下也曽子曰戒之戒之出乎爾者反乎爾者孟子言曽子有云在戒愼之戒愼之以其凡有善惡之命苟善之出乎爾則終亦以善反歸乎爾也有出乎爾以惡則其終反歸爾亦以惡也夫民今而後得反之也君無尤焉者孟子言夫民今所以不救長上之死者以其在凶荒飢饉之歲君之有司不以告白其君發倉廩開府庫以救帳之所以於今視其死而不救以報之也然非君之過也是有司自取之爾故曰君無尤焉君行仁政斯民親其上死其長矣者孟子言君能行仁為政則在下之民皆親其上樂其君而輕其死以為其長上矣注鬨鬭聲釋云鬨鬭也故曰猶構兵而鬭也滕文公問曰滕小國也間於齊楚事齊乎事楚乎注文公言我居齊楚二國之間非其所事不能自保也孟子對曰是謀非吾所能及也無已則有一焉鑿斯池也築斯城也與民守之效死而民弗去則是可為也注孟子以二大國之君皆不由禮義我不能知誰可事者也不得已則有一謀焉惟施德義以養民與之堅守城池至死使民不畔去則是可以為也音義已音以疏正義曰此章言事無禮之國不若得民心與之守死善道也滕文公問曰滕小國也間於齊楚事齊乎事楚乎者是滕文公問孟子言我之滕國則小國也今間厠在楚齊二國之間而我今當奉事齊國乎楚國乎故以此問孟子孟子對曰是謀非吾所能及也無已則有一焉鑿斯池至是可為也者是孟子答文公以謂若此之謀而指誰國可事非我所能及知也以其齊楚二國皆是無禮義之國孟子所以答曰是謀非吾所能及也言不得已則有一謀計焉言但鑿此滕國之池築此滕國之城與人民堅守此滕國至死使民不畔去則是一謀可以為也其他非吾所及滕文公問曰齊人將築薛吾甚恐如之何則可注齊人并得薛築其城以逼於滕故文公恐也孟子對曰昔者大王居邠狄人侵之去之岐山之下居焉非擇而取之不得已也注大王非好岐山之下擇而居之焉迫不得已困於強暴故避之苟為善後世子孫必有王者矣注誠能為善雖失其地後世乃有王者若周家也君子創業垂統為可繼也若夫成功則天也君如彼何哉強為善而已矣注君子創業垂統貴令後世可繼續而行耳又何能必有成功成功乃天助之也君其如彼齊何乎但當自強為善法以遺後世而已矣音義逼音逼遺去聲疏正義曰此章言君子之道正已在天強暴之來非已所招謂窮則獨善其身也滕文公問曰齊人將築薛吾甚恐如之何則可者言齊人并得薛地將欲築其城於此故滕文公恐其逼乃問孟子當如何則可免為不見迫孟子對曰昔者太王居邠狄人侵之去之岐山之下居焉非擇而取之不得已也者孟子答滕文公以謂往者太王居邠國後為戎狄之國所侵伐遂去之岐山下為居焉當此之時非太王擇此岐山之下為居焉不得已而避狄所侵患故之岐山下為居耳苟為善後世子孫必有王者矣者孟子言滕文公誠能為善修德而布政於民今雖失其薛地至後世子孫必有王者興作矣君子創業垂統為可繼也若夫成功則天也君如彼何哉強為善而已矣者孟子又言君子在上基創其業垂統法於後世蓋令後世可以繼續而承之耳若夫其有成功乃天助之也於人又不可必其成功君今其奈彼齊之大國何但勉強自為善以遺法於後世也滕文公問曰滕小國也竭力以事大國則不得免焉如之何則可注問免難全國於孟子孟子對曰昔者太王居邠狄人侵之事之以皮幣不得免焉事之以犬馬不得免焉事之以珠玉不得免焉注皮狐貉之裘幣繒帛之貨也乃屬其耆老而告之曰狄人之所欲者吾土地也吾聞之也君子不以其所以養人者害人二三子何患乎無君我將去之去邠踰梁山邑于岐山之下居焉注屬會也土地生五穀所以養人也會長老告之如此而去之矣邠人曰仁人也不可失也從之者如歸市注言樂隨大王如歸趨於市若將有得也或曰世守也非身之所能為也效死勿去君請擇於斯二者注或曰土地乃先人之所受也世世守之非已身所能專為至死不可去也欲令文公擇此二者惟所行也音義貉音鶴屬丁音燭會聚也疏正義曰此章言太王去邠權也效死守業義也滕文公問曰滕小國也竭力以事大國則不得免焉如之何則可者是滕文公問孟子言我之滕國小國也今竭盡其力以奉事大國則不得免其侵伐當如何則可以免焉孟子對曰昔者大王居邠狄人侵之至事之以珠玉不得免焉者孟子答文公以謂往大王所居邠國後為戎狄所侵伐是時也大王事之以其皮幣且尚不免其侵伐又事之以犬馬又不得免其侵伐復事以珠玉又且猶不免其侵伐焉乃屬耆老而告之曰至邑于岐山居焉邠人曰仁人也不可失也從之者如歸市者孟子言大王以皮幣犬馬珠玉奉事戎狄猶不免其侵伐乃會耆老而告之曰狄人所欲者在我之土地也我聞君子不以所養人之土地而殘賊其民汝三三子何憂患乎無君我將去之以讓狄也遂去邠國踰梁山而邑于岐山下居焉邠國之人遂聞太王此言乃曰仁人之君不可失去也故從之者如歸趨於市若將有所得耳或曰世守也非身之所能為也效死勿去者孟子又言或人有云土地者乃先人之所受也非已身所能為者也乃世世守之也當效死而不可去也故請文公擇斯二者而處之二者其一如大王去邠其二如或云效死勿去是也注皮狐貉之裘幣繒帛之貨正義曰蓋狐貉之皮為裘也釋云狐貉妖獸也後人以其狐貉性多疑故以皮為之裘也孔子曰黃未狐裘又曰狐貉之厚以居是也周禮行人職云合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼此六物以和諸侯之好鄭注云合同也六幣所以享也是幣即繒帛之貨也云屬會也釋文云會也又曰付也魯平公將出嬖人臧倉者請曰他日君出則必命有司所之今乘輿已駕矣有司未知所之敢請注平諡也嬖人愛幸小人也公曰將見孟子注平公敬孟子有德不敢請召將往就見之曰何哉君所為輕身以先於匹夫者以為賢乎禮義由賢者出而孟子之後喪踰前喪君無見焉注匹夫一夫也臧倉言君何為輕千乘而先匹夫乎以為孟子賢故也賢者當行禮義而孟子前喪父約後喪母奢君無見也公曰諾注諾止不出樂正子入見曰君奚為不見孟軻也注樂正姓也子通稱孟子弟子也為魯臣問公何為不便見孟軻也曰或告寡人曰孟子之後喪踰前喪是以不往見也注公言以此故也曰何哉君所謂踰者前以士後以大夫前以三鼎而後以五鼎與注樂正子曰君所謂踰者前以士後以大夫禮士祭三鼎大夫祭五鼎故也曰否謂棺椁衣衾之美也注公曰不謂鼎數也以其棺椁衣衾之美惡也曰非所謂踰也貧富不同也注樂正子曰此非薄父厚母令母喪踰父也喪父時為士喪母時為大夫大夫祿重於士故使然貧富不同也樂正子見孟子曰克告於君君為來見也嬖人有臧倉者沮君君是以不果來也注克樂正子名也果能也曰克告君以孟子之賢君將欲來臧倉者沮君故君不能來也曰行或使之止或尼之行止非人所能也吾之不遇魯侯天也臧氏之子焉能使豫不遇哉注尼止也孟子之意以為魯侯欲行天使之矣及其欲止天令嬖人止之耳行止天意非人所能為也如使吾見魯侯冀得行道天欲使濟斯民也故曰吾之不遭遇魯侯乃天所為也臧氏之子何能使我不遇哉音義鼎與音餘否方久切本亦作不音同後不出者皆放此沮慈呂切本亦作阻各隨字讀之尼女乙切郭璞注爾雅引孟子作此字丁本作居云居字焉能於虔切疏正義曰此章言讒邪構賢賢者歸天不尤人也魯平公將出嬖人臧倉者請曰他日君出則必命有司所之今乘輿已駕矣有司未知所之敢請者魯平公魯國之君也諡曰平嬖人平公愛幸之人也臧嬖人姓也倉名也言魯平公將欲出見孟子有司皆未知惟臧倉為平公愛幸之人乃請問之曰所往他日君之所出則必揮命有司同所往今君乘車已駕行矣有司之人皆未知君之所往敢請問之君何所往駕行也之往也公曰將見孟子者魯平公答臧倉言將欲出見孟子也曰何哉君所為輕身以先於匹夫者以為賢乎禮義由賢者出而孟子之後喪踰前喪君無見焉者臧倉者言君今欲見孟子以其為何往哉君今所為自輕薄其身以先往見於一匹之夫夫以謂之為賢乎臧倉言此謂孟子一匹之賤夫不足謂之為賢也故曰禮義之道皆由賢者之所出而孟子乃以後喪其母之喪事奢過於前喪其父之喪事請君無更往而見焉倉謂孟子母喪用事豐備父喪用事儉約父母皆已之所親也其喪用事有厚薄者此孟子所以不知禮義也故云禮義由賢者出而孟子之後喪踰前喪君無見焉公曰諾者平公許允止而不出也樂正子入見曰君奚為不見孟軻也者是日樂正子見平公乘輿既行而止之遂入見平公而問之曰君何為不往見於孟子也樂正子為平公之臣亦是孟子之弟子也姓樂正名克稱子者蓋男子之通稱也曰或告寡人曰孟子之後喪踰前喪是以不往見也者平公答樂正子以謂或有臧倉者告我曰孟子後有母喪用事豐備過于前父之喪用事我是以見其如此遂止其駕而不往見也曰何哉君所謂踰者前以士後以大夫前以三鼎而後以五鼎與者樂正子見平公為此而不往見孟子乃曰君不往見是為其何哉君今所謂孟子以後喪過前喪者蓋孟子前喪父之時孟子止為之士故以士禮用之後喪母之時孟子以為之大夫故得以大夫禮用之為其前為士即得以三鼎之禮祭之其後為大夫遂得以五鼎之禮祭之故也曰否謂棺椁衣衾之美也者平公以謂否不為鼎數之有不同也是為棺椁衣衾被服之美好有前後之不同也曰非所謂踰也貧富不同也者樂正子謂非所謂孟子有過於前也為其前後貧富之不同也非薄其父厚其母也樂正子見孟子曰克告於君君為來見也嬖人有臧倉者沮君君是以不果來也者蓋平公先欲見孟子者以其樂正子告之也故樂正子入見平公所問君之不往意已畢乃出而見於孟子遂曰克前告其君嘗言孟子君是以欲往來見之平公愛幸之人有一姓臧名倉者沮止其君所以不能來也曰行或使之止或尼之行止非人所能也吾之不遇魯侯天也臧氏之子焉能使豫不遇哉者孟子見樂正子告之以此意遂曰君所欲行天使之行也君所欲止天使之止也臧氏之子安能使我不遇魯侯哉注平諡也嬖人愛幸小人也正義曰諡法云法治而清省曰平春秋左傳魯隱公有云嬖人之子杜預曰嬖親幸也釋云賤而得幸曰嬖注樂正姓也為魯臣孟子弟子也正義曰自微子之後宋戴公四世孫樂莒為大司寇又左傳宋上卿正考甫之後是樂正皆姓也趙注樂正者為姓案禮記有樂正子春是樂正之姓有自矣云孟子弟子者蓋嘗受教於孟子者無非弟子也為魯臣者蓋非魯平公之臣何以克告於君是以知為魯臣明矣趙注詳其意故云為魯臣如於他經書則未詳注士祭三鼎大夫祭五鼎正義曰如子路有列鼎之奉主父在漢有五鼎之食是其爵有差也蓋士則爵卑而賤大夫則爵尊而貴孟子前以士後以大夫是其爵命貴賤之不同耳經云衣衾者蓋衾今之被也案喪大記小斂君錦衾大夫縞士緇凡衾皆五幅鄭汪云衾單被也孟子注疏卷二下孟子注疏卷二下考證所謂故國章注言當愼行大辟之罪疏周禮觀其氣息不直則喘也喘監本訛揣今改正為巨室章注二十兩為鎰疏禮記及國語俱云二十四兩為鎰臣邦綏按許氏説文鎰益同數登於十則滿又益倍之謂鎰則趙氏之云二十兩似為有義齊人伐燕勝之宣王問曰或謂寡人勿取或謂寡人取之臣邦綏按史記梁惠王之三十五年乙酉孟子始至梁其後二十三年當齊湣王之十年丁未齊人伐燕而孟子在齊是伐燕乃湣王時事按蘇氏古史及荀子所載皆從史記年月孟子作宣王時事與三書異考司馬溫公通鑑齊人伐燕又作宣王十九年事與孟子大同小異滕小國也章去邠踰梁山臣宗萬按唐書邠州故作豳開元十三年以字類幽故改為邠今惟孟子書用邠字孟子注疏卷二下考證
