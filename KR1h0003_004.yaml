body:
  text: 欽定四庫全書孟子注疏卷四上漢趙氏注宋孫奭音義并疏公孫丑章句下疏正義曰此卷趙氏分上篇為此卷也此卷凡十四章一章言民和為貴二章言人君以尊德樂義為賢君子以守道不回為志三章言取與之道必得其禮於其可雖少不辭義之無處兼金不顧四章言人臣以道事君否則奉身以退五章言執職者劣藉道者優六章言道不合者不相與言七章言孝必盡心匪禮之踰八章言誅不義者必須聖賢九章言聖人親親不文其過小人順非以諂其上十章言君子正身行道道之不行命也不為利回十一章言惟賢能安賢智能知微十二章言大德洋洋介士察察賢者志其大者不賢者志其小者十三章言聖賢興作與天消息天非人不因人非天不成十四章言禄以食功志以率事無事而食其禄君子不由也此十四章合上篇卷是公孫丑有二十三章矣孟子曰天時不如地利地利不如人和三里之城七里之郭環而攻之而不勝夫環而攻之必有得天時者矣然而不勝者是天時不如地利也注天時謂時日支干五行旺相孤虚之屬也地利險阻城池之固也人和得民心之所和樂也環城圍之必有得天時之善處者然而城有不下是不如地利城非不髙也池非不深也兵革非不堅利也米粟非不多也委而去之是地利不如人和也注有堅强如此而破之走者不得民心民不為守衛懿公之民曰君其使鶴戰余焉能戰是也故曰域民不以封疆之界固國不以山谿之險威天下不以兵革之利注域民居民也不以封疆之界禁之使懐德也不依險阻之固恃仁惠也不馮兵革之威仗其道德而已矣得道者多助失道者寡助寡助之至親戚畔之多助之至天下順之以天下之所順攻親戚之所畔故君子有不戰戰必勝矣注得道之君何嚮不平君子之道貴不戰耳如其當戰戰則勝矣音義王相並去聲樂音洛下樂道樂義同不下丁去聲後注下士同馮皮冰切寡助之至或作主畔張云叛同疏正義曰此章言民和為貴也孟子曰天時不如地利地利不如人和至是地利不如人和也者孟子言其用兵之要也謂古之用兵者莫不布䇿挾龜迎日計月望雲占風說星候氣以察吉凶以明利害必有得天時者矣然而内有三里之城外有七里之郭以為之禦雖環轉而攻之則莫能勝焉是天時不如地利也鑿池深之使其不可踰築城髙之使其不可攻又以甲兵之堅利米粟之多積是地利亦有得矣然而上下異政君民異心不能効死以守至皆委却而去之是地利又不如人和也孟子於前言天時不如地利地利不如人和乃設此文於後而解其言也故云三里之城七里之郭環而攻之而不勝夫環而攻之必有得天時者矣然而不勝者是天時不如地利也至是地利不如人和而已矣故曰域民不以封疆之界至戰必勝矣者此又孟子復言而詳說之也故曰所居之民不在以封疆之為界欲牢固其國又不在以山谿之為險威震天下又不在以兵甲之為堅利以其得道之君則人多助之失道之君則人寡助之而已孟子所以言此者盖謂但在得其道不在於封疆山谿兵甲之為矣故復言人者寡助之至極者則親戚離畔之親戚離畔者戰必不勝而敗績有多助之至者則天下皆順從之以天下之所順從而攻伐其親戚所離畔者故君子左有不戰而已如戰則必勝注天時謂時日支干五行旺相孤虚之屬正義曰時日支干者子丑寅卯辰巳午未申酉戌亥是為支甲乙丙丁戊己庚辛壬癸是為干干支所以配時日而用之也云五行旺相孤虚之屬者五行金木水火土是也金旺在巳午未申酉木旺在亥子丑寅卯水旺在申酉戌亥子火旺左寅卯辰巳午土旺在申酉戌亥孤虚者盖孤虚之法以一畫為孤無畫為虚二畫為實以六十甲子日定東西南北四方然後占其孤虚實而向背之即知吉凶矣又如周武王犯歲星以伐商魏太祖以甲子日破慕容凡用師之道有太史以抱天時太師之執同律之類是也注衛懿公之民曰君其使鶴戰正義曰案左傳魯閔公二年云狄人伐衛衛懿公好鶴鶴有乘軒者將戰國人受甲者皆曰使鶴鶴實有禄位余焉能戰是其文也注得乎丘民而為天子正義曰此盖經之文孟子將朝王王使人來曰寡人如就見者也有寒疾不可以風朝將視朝不識可使寡人得見乎注孟子雖仕齊處師賓之位以道見敬或稱以病未嘗趨朝而拜也王欲見之先朝使人往謂孟子云寡人如就見者若言就孟子之館相見也有惡寒之疾不可見風儻可來朝欲力疾臨視朝因得見孟子也不知可使寡人得相見否對曰不幸而有疾不能造朝注孟子不悅王之欲使朝故稱其有疾而拒之也明日出弔於東郭氏公孫丑曰昔者辭以病今日弔或者不可乎注東郭氏齊大夫家也昔者昨日也丑以為不可曰昔者疾今日愈如之何不弔注孟子言我昨日病今日愈我何為不可以弔王使人問疾醫來注王以孟子實病遣人將醫來且問疾也孟仲子對曰昔者有王命有采薪之憂不能造朝今病小愈趨造於朝我不識能至否乎注孟仲子孟子之從昆弟從學於孟子者也權辭以對如此憂病也曲禮云有負薪之憂使數人要於路曰請必無歸而造於朝注仲子使數人要告孟子君命宜敬必當造朝也不得已而之景丑氏宿焉注孟子迫於仲子之言不得已而心不欲至朝因之其所知齊大夫景丑之家而宿焉具以語景丑氏耳景子曰内則父子外則君臣人之大倫也父子主恩君臣主敬丑見王之敬子也未見所以敬王也注景子責孟子不敬何義也曰惡是何言也齊人無以仁義與王言者豈以仁義為不美也其心曰是何足與言仁義也云爾則不敬莫大乎是注曰惡者深嗟嘆云景子之責我何言乎今人皆謂王無知不足與言仁義云爾絶語之辭也人之不敬無大於是者也我非堯舜之道不敢以陳於王前故齊人莫如我敬王也注孟子言我每見王常陳堯舜之道以勸勉王齊人豈有如我敬王者也景子曰否非此之謂也禮曰父召無諾君命召不俟駕固將朝也聞王命而遂不果宜與夫禮若不相似然注景子曰非謂不陳堯舜之道謂為臣固自當朝也今有王命而不果行果能也禮父召無諾無諾而不至也君命召輦車就牧不坐待駕而夫子若是事宜與夫禮若不相似然乎愚竊疑焉曰豈謂是與曾子曰晉楚之富不可及也彼以其富我以吾仁彼以其爵我以吾義吾何慊乎哉夫豈不義而曾子言之是或一道也注孟子答景丑云我豈謂是君臣呼召之間乎謂王不禮賢下士故道曾子之言自以不慊晉楚之君慊少也曾子豈常言不義之事邪是或者自得道之一義欲以喻王猶晉楚我猶曾子我豈輕於王乎天下有逹尊三爵一齒一德一朝廷莫如爵鄉黨莫如齒輔世長民莫如德惡得有其一以慢其二哉注三者天下之所通尊也孟子謂賢者長者有德有齒人君無德但有爵耳故云何得以一慢二乎故將大有為之君必有所不召之臣欲有謀焉則就之其尊德樂道不如是不足與有為也注言古之大聖大賢有所興為之君必就大賢臣而謀事不敢召也王者師臣霸者友臣也故湯之於伊尹學焉而後臣之故不勞而王桓公之於管仲學焉而後臣之故不勞而霸注言師臣者王桓公能師臣而管仲不勉之於王故孟子於上章陳其義譏其烈之卑也今天下地醜德齊莫能相尚無他好臣其所教而不好臣其所受教注醜類也言今天下之人君土地相類德教齊等不能相絶者無他但好臣其所教勅役使之才可驕者耳不能好臣大賢可從而受教者也湯之於伊尹桓公之於管仲則不敢召管仲且猶不可召而况不為管仲者乎注孟子自謂不為管仲故非齊王之召已也是以不往而朝見於齊王也音義惡寒烏路切造朝七倒切下同之從才用切數人要丁上色主切下音邀曰惡音烏注及下惡得曰惡惡知皆同宜與丁音餘下是與死與言與伐與殺與之與過與皆同此宜與亦如字慊曰簟切長民張丈切注及下長者同好呼報切下同疏正義曰此章言人君以尊徳樂義為賢君子以守道不回為志者也孟子將朝王王使人來曰寡人如就見者也至得見乎者言孟子自將欲朝見王未及行而齊王欲見之乃先使人來曰寡人如往而就孟子所館處相見以其有惡寒之疾不可見風儻可以來朝見而我將視其來朝不知可使寡人因此而得見孟子否乎此皆齊王使人而言也對曰不幸而有疾不能造朝者王之使人旣以見孟子而導王之言孟子乃答王之使人亦曰我之不幸而有其疾不能趨造而朝見王以其孟子不喜王欲使來朝故云有疾以拒之也明日出弔於東郭氏公孫丑曰昔者辭以疾今日弔或者不可乎者言孟子自辭王以為疾不能造朝之明日乃出弔問於齊大夫東郭氏之家其弟子公孫丑問孟子曰昨日辭王之使以為疾不能造朝而今日以出弔問於東郭氏或者以為不可出弔曰昔者疾今日愈如之何不弔者孟子答公孫丑以謂昨日有疾今日已差愈如之何為不可弔孟子於是往弔之王使人問疾醫來者王見使人回報以謂孟子有疾乃謂實有疾遂遣人問疾醫者來問其疾孟仲子對曰昔者有王命有采薪之憂不能造朝今病小愈趨造於朝我不識能至否乎者孟仲子孟子從昆弟學於孟子者也孟仲子時見王使人問疾醫來至而孟子已往弔於東郭氏乃權其言而答問疾醫者曰昨日有王命來使孟子朝孟子辭之以其有采薪之憂小疾不能趨造而朝王今日病以小愈已趨造於王朝我不知于今能至於王朝否乎以為未曾至乎使數人要於路曰請必無歸而造於朝者孟仲子恐孟子歸以為失言乃使數人而求告孟子於路曰請必無歸而趨造於王朝不得已而之景丑氏宿焉者孟子見孟仲子使數人要於路乃見迫於仲子之言遂不得已而往齊大夫景丑氏之家宿焉以其心不欲朝王故往景丑氏家宿而已景子曰内則父子外則君臣人之大倫也父子主恩君臣主敬丑見王之敬子也未見所以敬王也者景丑見孟子不造朝而乃止其家宿焉於是曰在閨門之内則有父子之親出而邦國之外則有君臣之義此人之大倫而不可沮也父子則存乎慈孝之恩君臣則存乎㳟敬之義今丑毎見王之敬重於子也而未嘗見子之所以能尊敬於王也曰惡是何言也至莫大乎是者孟子答景丑言乃嘆惜言是何言而責我也齊人皆無以仁義之道與王言者豈以仁義之道為不嘉美也其齊人心已謂是王何足與言仁義之道也言爾之不尊敬於王莫大乎此者也我非堯舜之道不敢以陳於王前故齊人莫如我敬王也者孟子言我非是堯舜二帝之道則不敢鋪陳於王之前故齊人未有如我如此之敬王也所謂堯舜之道即仁義之道也景子曰否非此之謂也禮曰父召無諾至若不相似然者景丑言否我不謂不陳堯舜之道也以其禮云父召而子無諾而不至君有命召不坐待駕今子固將欲自朝於王而聞王命以遂不果行是宜與夫禮若不相似然以其有逆此禮也曰豈謂是歟曾子曰晉楚之富至是或一道也者孟子又言於景丑曰我豈謂是君臣呼召之間乎以其曾子言晉楚二國之富人不可及也然彼既以其富我但存吾之仁彼既有其爵而我但存吾之義我何慊不足於彼乎哉夫晉楚之富豈為不義然於曾子言是止於一道而言之也一於道而言之則曾子所以但言吾仁吾義而不慊於晉楚之富與其爵也盖謂晉楚於富者以其不過有所施而已然我之仁固足以有施矣晉楚貴於爵者以其足以有制而已然我之義固足以有制矣然則富之與爵而仁義得以并而有焉耳此曾子所以一於仁義之道而晉楚富貴不足以為富貴也孟子所以執此而語景子者意欲以比齊王之有富貴亦晉楚之富貴不足為富貴也而我猶曾子但以仁義敵之何有不足於齊王哉此所以不欲朝王之意也天下有達尊三至惡得有其一以慢其二哉者達通也孟子又言天下有達尊者有三爵一齒一德一是也自朝廷之間莫如以爵為之尊自鄉黨之間莫如以齒為之尊自輔治其世長飬其民莫如以德為之尊以其朝廷貴貴在爵故以爵為朝廷之所尊郷黨長長在齒故以齒為鄉黨之所尊賢者有德故以之輔世而佐佑之則天下待之而後治以之長民則天下之民待之而後安故以德為輔世長民之所尊今齊王但有其爵而安可止以一而慢去其齒德二者哉此孟子所以言齊王不能尊有德之士故於景子而云然也故將大有為之君至而况不為管仲者乎者孟子又言故將大有興為之君必有所不可命召之臣凡欲有所謀計則就而謀以其不敢召也其尊德樂道不如此有謀則就而不召是不足有大興為也故湯王之於伊尹乃就而師之然後方敢得而為臣故湯王自七十里而有天下但不待勞而為之王者齊桓公之於管仲乃就而師之然後方敢得而為臣故桓公亦不勞而為諸侯之霸者今天下於齊國其地亦有類於湯桓其德又與湯桓齊等其未能有相加尚者無他事焉但湯桓好受臣其所教而齊王不好臣其所受教也夫以湯王之於伊尹齊桓之於管仲則不敢召而見之管仲霸者之佐且猶尚不可召見之而况我不為管仲者乎此孟子所以見齊王之召已是以不徃而見也注云東郭氏齊大夫家也正義曰東郭者齊國之東地號為東郭也經云卒之東郭墦間之祭者則東郭是齊國之東地也氏者未詳其人注曰齊大夫家也以理推之孟子之所以弔問者必齊之賢大夫也如非大夫之等孟子亦何由而弔之注孟仲子孟子之從昆弟而學於孟子者也正義曰未詳以理推之則與孟子同姓必孟子從昆弟而學於孟子者也注景丑氏齊大夫亦未詳其人也陳臻問曰前日於齊王餽兼金一百而不受於宋餽七十鎰而受於薛餽五十鎰而受前日之不受是則今日之受非也今日之受是則前日之不受非也夫子必居一於此矣注陳臻孟子弟子兼金好金也其價兼倍於常者故謂之兼金一百百鎰也古者以一鎰為一金一鎰是為二十四兩也故云兼金一百百鎰也孟子曰皆是也當在宋也予將有逺行行者必以贐辭曰餽贐予何為不受注贐送行者贈賄之禮也時人謂之贐當在薛也予有戒心辭曰聞戒故為兵餽之予何為不受注戒有戒備不虞之心也時有惡人欲害孟子孟子戒備薛君曰聞有戒此金可鬻以作兵備故餽之我何為不受也若於齊則未有處也無處而餽之是貨之也焉有君子而可以貨取乎注我在齊時無事於義未有所處也義無所處而餽之是以貨財取我欲使我懐惠也安有君子而可以貨財見取之乎是其禮當其可也音義餽音饋後皆倣此贐囚刃切為兵于偽切下必為之為王為其所以為為我為孟下為子為皆同鬻本或作育音同有處昌呂切下同焉有於䖍切疏正義曰此章言取與之道必得其禮於其可也雖少不辭義之無處兼金不顧也陳臻問曰前日於齊王餽兼金一百而不受至必居一於此矣者陳臻孟子弟子也問孟子前日於齊王之所而齊王餽賜兼金百鎰而不受於宋國但餽以七十鎰而受之於薛國餽以五十鎰而受之如為前日在齊不受百鎰是則今日之受宋七十鎰受薛五十鎰為非也如今日之受宋七十鎰受薛五十鎰為是則前日在齊不受一百鎰為非也夫子於此三者之間必居一於此矣孟子曰皆是也至而可以貨取乎者孟子答弟子陳臻以為此三者之間受與不受之所皆是也無有非也言我在宋之時以其我將有逺行行者必以有贐故餽之者乃為之辭曰餽贐我何為不受是所以受之也而不為非也贐送行者之賄也我當在薛之時我有戒不虞之心以其時人欲害孟子也餽之者乃為之辭曰聞孟子有戒欲以此金餽之可為兵備之用也知此我何為不受是所以受之也若於齊之時其以無事於我未有所處於我未有所處而餽我以金是以貨財見取於我也安有君子而可以貨取之乎是所以於齊不受百鎰亦為是也云有處未有處者如宋以逺行乃以贐為餽於薛有戒乃以兵為餽是皆若有處以餽之也於齊亦無逺行亦無戒備餽之者亦無以辭處之而餽於我亦無有辭處而受之故也注云陳臻孟子弟子至二十四兩正義曰云弟子者盖時有所問於孟子者即知為弟子也如非弟子又安得有問於孟子云二十四兩為鎰案國語有云二十四兩為鎰又鄭注之文亦然孟子之平陸謂其大夫曰子之持㦸之士一日而三失伍則去之否乎注平陸齊之邑也大夫治邑大夫也持㦸戰士也一日三失其行伍則去之否乎去之殺之也以昭果毅曰不待三注大夫曰一失之則行罰不及待三失伍也然則子之失伍也亦多矣凶年饑歲子之民老羸轉於溝壑壯者散而之四方者幾千人矣注轉轉尸於溝壑也此則子之失伍也曰此非距心之所得為也注距心大夫名曰此乃齊王之大政不肯賑窮非我所得專為也曰今有受人之牛羊而為之牧之者則必為之求牧與芻矣求牧與芻而不得則反諸其人乎抑亦立而視其死與注牧牧地以此喻距心不得自專何不致為臣而去乎何為立視民之死也曰此則距心之罪也注距心自知以不去位為罪者也他日見於王曰王之為都者臣知五人焉知其罪者惟孔距心為王誦之王曰此則寡人之罪也注孔姓也為都治都也邑有先君之宗廟曰都誦言也為王言孔距心語者也王知本之在已故受其罪也音義去起呂切其行之行胡郎切幾千丁蟣祈二音賑丁音振疏正義曰此章言人臣以道事君否則奉身以退也孟子之平陸謂其大夫曰子之持㦸之士一日而三失伍則去之否乎者孟子徃齊平陸之邑謂其邑之大夫曰子之持㦸之戰士一日三次失其行伍則殺之否乎曰不待三者邑大夫答孟子以為不待三次失行伍也言一次失行伍則殺之也然則子之失伍也亦多矣凶年饑歲子之民老羸轉於溝壑壯者散而之四方者幾千人矣者凶年饑歲子之邑民老羸弱者皆轉乎溝壑壯健者皆散而奔往於四方者幾近於一千人矣此孟子首以持㦸之士失伍比之故終以此諷之故也盖軍法以五人為伍而以下士一人為之長則持㦸之士伍長之士也所以保衛其伍者也不能保衛其伍故一日三失伍此不稱其職也如齊之平陸大夫所以保衛其邑之民不能保衛其邑之民故老弱轉溝壑壯者散四方其亦不稱職也孟子故以此喻而終歸諷之曰此非距心之所得為也者距心齊大夫之名也距心言是其齊王行政故不肯發倉廪而賑救其民非我所得而專為者也曰今有受人之牛羊而為之牧之者則必為之求牧與芻矣求牧與芻而不得則反諸其人乎抑亦立而視其死與者孟子又以此比諭而歸諷之也言今有受人之牛羊而為牧養者則必於牛羊之主求其牧養之芻草矣求牧養與芻草而不得則歸反還於其主乎抑亦但立視牛羊之死而不為求牧與芻草歟故以比喩而諷問之曰此則距心之罪也者距心因孟子以此比喩乃自知以不去位為罪也他日見於王曰王之為都臣者臣知五人焉至此則寡人之罪也者言他日孟子自見於王曰王之治都之臣者臣知五人焉然於此五人之中能知其有罪者惟孔距心故為王言誦之孔距心之姓也王亦自知治都之臣有其罪者以其本皆自於已故云此則寡人之罪也注邑有先君之宗廟曰都正義曰周禮云都鄙鄭注云都之所居曰鄙都鄙公卿大夫之采邑王弟子所食邑周召毛聃畢原之屬在畿内者祭祀其先君社稷者也孟子謂蚳鼃曰子之辭靈丘而請士師似也為其可以言也今既數月矣未可以言與注蚳鼃齊大夫靈丘齊下邑士師治獄官也周禮士師曰以五戒先後刑罰無使罪麗於民孟子見蚳鼃辭外邑大夫請為士師知其欲近王以諌正刑罰之不中者數月而不言故曰未可以言歟以感責之也蚳鼃諫於王而不用致為臣而去注三諫不用致仕而去齊人曰所以為蚳鼃則善矣所以自為則吾不知也注齊人論者譏孟子為蚳鼃謀使之諫不用而去則善矣不知自諫不用而不去故曰我不見其自為謀者公都子以告注公都子孟子弟子也以齊人語告孟子也曰吾聞之也有官守者不得其職則去有言責者不得其言則去我無官守我無言責也則吾進退豈不綽綽然有餘裕哉注官守居官守職者言責獻言之責諫諍之官也孟子言人臣居官不得守其職諫正君不見納者皆當致仕而去今我居師賓之位進退自由豈不綽綽然舒緩有餘裕乎綽裕皆寛也音義蚳音遲鼃丁烏花切張烏媧切先後丁云並去聲不中張仲切疏正義曰此章言執職者劣藉道者優也孟子謂蚳鼃曰子之辭靈丘而請士師似也至未可以言與者孟子謂齊大夫蚳鼃曰子之辭去其靈丘之邑而請為王治獄之官以近王得諌其刑罰不中者今既已數月矣而不言是其未可以言歟否故以此責而感之也蚳鼃諫於王而不用致為臣而去者於是蚳鼃諫於王而王不用其諫乃致其臣而去之齊人曰所以為蚳鼃則善矣所以自為則吾不知也者齊國之人見孟子謂蚳鼃乃言曰孟子所以為蚳鼃使之諫不納用而去之則善矣美矣其所以自為其己之諫不見納用而不去則我不知也以言其為蚳鼃謀使之去而不知自去之故也公都子以告者公都子孟子弟子也公都子見齊國之人有此言乃以此言告於孟子曰吾聞之也有官守者不得其職則去有言責者不得其言則去我無官守我無言責則吾進退豈不綽綽然有餘裕哉者孟子答公都子以為我嘗聞之有居官守職者不得其職而守之則去之而致仕有言責諫諍之任不得其言而諫正其君則亦去而致仕今我無官職之所守又無言責而諫諍則我進退自由豈不綽綽然舒緩有餘裕哉綽綽皆寛裕也注蚳鼃齊大夫靈丘齊下邑至罪麗於民正義曰蚳鼃於他經傳未詳其人靈丘者案地理志曰代郡有靈丘縣是也云周禮士師曰以五戒先後刑罰毋使罪麗於民者今案其文云一曰誓用之于軍旅二曰誥用之于會同三曰禁用諸田役四曰糾用諸國中五曰憲用諸都鄙鄭注云先後猶左右也誓誥於書則甘誓大誥之屬禁則軍禮曰無干車無自後射此其類也糾憲未有聞焉孟子為卿於齊出弔於滕王使蓋大夫王驩為輔行王驩朝暮見反齊滕之路未嘗與之言行事也注孟子嘗為齊卿出弔於滕君蓋齊下邑也王以治蓋之大夫王驩為輔行輔副使也王驩齊之謟人有寵於齊後為右師孟子不悅其為人雖與同使而行未嘗與之言行事不願與之相比也公孫丑曰齊卿之位不為小矣齊滕之路不為近矣反之而未嘗與言行事何也注丑怪孟子不與驩議行事也曰夫旣或治之予何言哉注既已也或有也孟子曰夫人既自謂有治行事我將復何言哉言其専知自善不知諮於人也音義蓋古盍切驩音歡使所吏切相比毗志切亦如字曰夫之夫音扶注夫人同疏正義曰此章言道不合者不相與言也孟子為卿於齊出弔於滕至未嘗與言行事也者言孟子嘗為卿相於齊時自齊國出弔於滕國之君齊王使齊之下邑大夫名曰王驩者為之輔行輔行言其為副使也王驩旦夕見孟子及反歸自齊滕之道路而孟子未嘗與之言行事也公孫丑問曰齊卿之位不為小矣齊滕之路不為近矣反之而未嘗與言行事何也者公孫丑問孟子言齊王卿相之位不為卑小矣自齊至滕其相去之路又不為近矣然而自滕反歸齊其於道路之中未嘗與王驩言行治之事是如之何也以其公孫丑有怪孟子不與王驩言故問之以此耳曰夫既或治之予何言哉者孟子答公孫丑以謂夫王驩既以嘗自謂有治行事我將復何言哉以其王驩自専為善不諮訪人故孟子所以未嘗與之言也注王驩後為右師正義曰此章推經於離婁篇有云孟子不與右師言右師不悅是知王驩後為右師也王驩姓王名驩字子敖又云至於公行之喪以其禮解之者盖亦經之文也孟子注疏卷四上孟子注疏卷四上考證天時章疏末注得乎邱民而為天子正義曰此蓋經之文注中無此文孟子將朝王章昔者有王命節注孟仲子孟子之從昆弟從學於孟子者也臣齊燾按陸璣詩經草木疏云子夏傳魯人申公申公傳魏人李克李克傳魯人孟仲子孟仲子傳趙人孫卿孫卿傳魯人大毛公大毛公傳小毛公毛氏詩傳維天之命章引孟仲子曰大哉天命之無極而美周之禮也閼宫章引孟仲子曰是禖宫也詩經正義引趙氏注云孟仲子孟子從昆弟而學於孟子者也詩譜云孟仲子者子思弟子盖與孟軻共事子思後學於孟軻著書論詩毛氏取以為說然則孟仲子别有書而今不傳也孟子謂蚳鼃章所以為蚳鼃節注孟子為蚳鼃謀謀監本訛諫今改正疏末糾憲未有聞焉下閣本有云彼君子不素餐兮者詩國風伐檀之篇文也箋云彼君者指伐檀之人仕有功者乃肯受禄毛氏云熟曰餐箋云如魚餐之餐共四十八字皆衍文也今從監本孟子注疏卷四上考證欽定四庫全書孟子注疏卷四下漢趙氏注宋孫奭音義并疏公孫丑章句下孟子自齊葬於魯反於齊止於嬴充虞請曰前日不知虞之不肖使虞敦匠事嚴虞不敢請今願竊有請也木若以美然注孟子仕於齊喪母而歸葬於魯也嬴齊南邑充虞孟子弟子敦匠厚作棺也事嚴喪事急木若以泰美然也曰古者棺椁無度中古棺七寸椁稱之自天子逹於庻人非直爲觀美也然後盡於人心注孟子言古者棺椁厚薄無尺寸之度中古謂周公制禮以來棺厚七寸椁薄於棺厚薄相稱相得也從天子至於庶人厚薄皆然但重累之數墻翣之飾有異非直爲人觀視之美好也厚者難腐朽然後盡於人心所不忍也謂一世之後孝子更去辟世是爲人盡心也過是以徃變化自其理也不得不可以爲悅無財不可以爲悅得之爲有財古之人皆用之吾何爲獨不然注悅者孝子之欲厚送親得之則悅也王制所禁不得用之不可以悅心也無財以供則度而用之禮喪事不外求不可稱貸而爲悅也禮得用之財足備之古人皆用之我何爲獨不然不然者言其不如是也且比化者無使土親膚於人心獨無恔乎注恔快也棺椁敦厚比親體之變化且無令土親膚於人子之心獨不快然無所恨也吾聞之也君子不以天下儉其親注我聞君子之道不以天下人所得用之物儉約於其親言事親竭其力者也論語曰生事之以禮死葬之以禮可謂孝也已音義稱之之稱尺證切翣山洽切辟音避度而之度大各切不可稱之稱丁如字且比丁音庇及也恔音效方言云快也丁音皎說文云憭也疏正義曰此章言孝必盡心匪禮之踰也孟子自齊葬於魯反於齊止於嬴者言孟子仕於齊國喪其母乃歸葬於魯國旣葬又反於齊下嬴邑而止焉充虞請曰前日不知虞之不肖使虞敦匠事嚴虞不敢請今願竊有請也木若以美然者充虞孟子弟子也言孟子止於嬴邑弟子充虞請見於孟子曰前日孟子喪母之時孟子不知虞之不肖乃使虞敦匠厚作其棺以其是時喪事嚴急故虞不敢請問孟子今孟子旣葬而反願竊得而請問也木若以美然此充虞請問以此也其問孟子爲棺椁之木若以泰美然也曰古者棺椁無度中古棺七寸椁稱之自天子達於庶人非直爲觀美也然後盡於人心至吾聞之君子不以天下儉其親者此皆孟子答充虞而言也言上古之人棺椁厚薄無尺寸之度自中古以來棺厚七寸以椁相稱之自天子通於庶人皆然非謂直爲人觀美好也然後乃為盡於人心也以其不得其厚用之則不可以為悅於心也旣得以此厚用之而財物無以供贍其度亦不可以為悅於心如得之以此厚用又有財物以供其度古之人皆用之以厚葬其親也我何爲而獨不如是也且棺椁敦厚比親體之變化無使其土壤親其肌膚於人子之心獨無快乎恔快也以其人子之心如此得厚葬其親乃快然而弗恨也我聞之君子者不以天下所得用者而儉薄其親也注嬴齊南邑正義曰案魯桓公三年左傳杜預注云嬴齊邑今泰山嬴縣是也注重累之數墻翣之飾正義曰案禮記檀弓云周人墻置翣鄭注云墻栁衣也凡此皆後王之制又案阮氏圖云栁栁車也四輪一轅車長丈二尺髙五尺案喪大記云君飾棺黼翣二黻翣二畫翣二龍翣二禮器云天子八翣大夫四翣又鄭注喪大記引漢禮翣以木為筐廣三尺髙二尺四寸方兩角髙衣以白布畫者畫雲氣其餘各如其象柄長五尺車行使人持之而從以障旣窆樹於壙中障柩也注論語曰生事之以禮死葬之以禮正義曰經於滕文之篇亦引為曽子言也已說在前沈同以其私問曰燕可伐與孟子曰可子噲不得與人燕子之不得受燕於子噲注沈同齊大臣自以私情問非王命也故曰私子噲燕王也子之燕相也孟子曰可者以子噲不以天子之命而擅以國與子之子之亦不受天子之命而私受國於子噲故曰其罪可伐有仕於此而子悅之不告於王而私與之吾子之祿爵夫士也亦無王命而私受之於子則可乎何以異於是注子謂沈同也孟子設此以譬燕王之罪齊人伐燕注沈同以孟子言可因歸勸其王伐燕或問曰勸齊伐燕有諸注有人問孟子勸齊王伐燕有之曰未也沈同問燕可伐與吾應之曰可彼然而伐之也注孟子曰我未勸王也同問可伐乎吾曰可彼然而伐之也彼如曰孰可以伐之則將應之曰爲天吏則可以伐之注彼如將問我曰誰可以伐之我將曰為天吏則可以伐之天吏天所使謂王者得天意者也彼不復問孰可便自徃伐之矣今有殺人者或問之曰人可殺與則將應之曰可彼如曰孰可以殺之則將應之曰爲士師則可以殺之今以燕伐燕何爲勸之哉注今有殺人者問此人可殺否將應之曰可爲士官主獄則可以殺之矣言燕雖有罪猶當王者誅之耳譬如殺人者雖當死士師乃得殺之耳今齊國之政猶燕政也不能相踰又非天吏也我何為勸齊國伐燕國乎音義沈張音審或作沉誤噲苦壞切燕易王子疏正義曰此章言誅不義者必須聖賢禮樂征伐自天子出王道之正者也沈同齊之大臣沈同以其私問曰燕可伐與孟子曰可子噲不得與人燕子之不得受燕於子噲者子噲燕王名也子之燕相之名也言沈同非王命以其私情自問孟子曰燕王可伐之與孟子答之以為可伐之也蓋以燕王不得天子之命而擅與其國於子之子之亦不得天子之命而私受燕國於子噲故其専擅如此可以伐之也有仕於此而子悅之不告於王而私與之吾子之祿爵夫士也亦無王命而私受之於子則可乎何以異於是者此皆孟子設此譬喻燕之罪而可伐者也吾子謂沈同也言今有為之仕於此齊國而子喜悅其爲人乃不告於王而私自與之吾子之祿爵夫為之士者又無王之所命而私自受爵禄於子則可乎否乎今燕王所以為可伐之罪何以有異於此齊人伐燕者以其沈同問以孟子之言為燕可伐於是歸勸齊王而伐之或問勸齊伐燕有諸者言有人或問於孟子以為孟子勸齊伐燕是有勸之之言否曰未也沈同問燕可伐與吾應之曰可彼然而伐之也者孟子答或人以謂我未嘗勸王也以其沈同問我謂燕可伐之與我應之曰可彼以為是而伐之也彼如曰孰可以伐之則將應之曰爲天吏則可以伐之者孟子又答之或人言彼如問我曰誰可以伐之我將應之曰為天吏天所使者則可以伐之矣今有殺人者或問之曰人可殺與至何為勸之哉者孟子又以此言而比喻齊之伐燕也言今有殺人者或問我曰人可以殺之與我將應之曰可以殺之彼如復問誰可以殺之我則將應之曰為士師主獄之官則可以殺之矣今以齊國之政亦若燕之政是皆有燕之罪以燕伐燕我何為勸齊王以伐燕乎以其燕雖有其罪亦當王者則可以誅之耳注子噲燕王也子之燕相也正義曰案史記世家云易王立十二年子燕噲立噲立齊人殺蘇秦蘇秦之在燕與其相子之為婚燕噲三年與楚三晉攻秦不勝而還子之相燕貴重主斷蘇代為齊使於燕燕王問曰齊王奚如對曰必不霸燕王曰何也對曰不信其臣於是燕王大信子之子之遺蘇代百金乃謂燕王不如以國譲子之人之謂堯賢者譲天下於許由由不受有譲天下之名而實不失天下今王以燕國譲子之子之亦必不敢受是王與堯同行也燕王因屬國於子之子之大重於是南靣行王事而噲老不聽政國事皆決於子之三年國大亂百姓恫怨孟軻謂齊王曰今伐燕此文武之時不可失也齊王因令章子將五都之兵以伐燕燕噲死齊大勝燕子之亾凡此是其事也注云禮樂征伐自天子出正義曰此蓋論語季氏孔子之言也言王者功成制禮治定作樂立司馬之官掌九伐之法諸侯不得制禮作樂賜弓矢然後専征伐是禮樂征伐自天子出也燕人畔王曰吾甚慙於孟子注燕人畔不肯歸齊齊王聞孟子與沈同言為未勸王今竟不能有燕故慙之陳賈曰王無患焉王自以爲與周公孰仁且智王曰惡是何言也注陳賈齊大夫也問王曰自視何如周公仁智乎欲為王解孟子意故曰王無患焉王歎曰是何言言周公何可及也曰周公使管叔監殷管叔以殷畔知而使之是不仁也不知而使之是不智也仁智周公未之盡也而况於王乎賈請見而解之注賈欲以此說孟子也見孟子問曰周公何人也注賈問之也曰古聖人也注孟子曰周公古之聖人也曰使管叔監殷管叔以殷畔也有諸注賈問有之否乎曰然注孟子曰如是也曰周公知其將畔而使之與注賈問之也曰不知也注孟子曰周公不知其將畔也然則聖人且有過與注過謬也賈曰聖人且猶有謬誤曰周公弟也管叔兄也周公之過不亦宜乎注孟子以為周公雖知管叔不賢亦必不知其將畔周公惟管叔弟也故愛之管叔念周公兄也故望之親親之恩也周公之此過謬不亦宜乎且古之君子過則改之今之君子過則順之古之君子其過也如日月之食民皆見之及其更也民皆仰之今之君子豈徒順之又從而為之辭注古之所謂君子眞聖人賢人君子也周公雖有此過乃誅三監作大誥明勅庶國是周公改之也今之所謂君子非眞君子也順過飾非就為之辭孟子言此以譏賈不能匡君而欲以辭解之音義監古咸切更古衡切疏正義曰此章言聖人親親不文其過小人順非以諂其上者也燕人畔王曰吾甚慙於孟子者言燕人皆離畔不肯歸齊王齊王聞孟子與沈同言未嘗勸王伐燕今果不能得燕乃曰我甚慙恥而見於孟子陳賈曰王無患焉王自以為與周公孰仁且智者陳賈齊國之大夫也言於齊王以為無用憂患慙於孟子也且王自以為與周公孰仁且智乎賈欲以此解王故問之以此王曰惡是何言也者齊王乃歎曰此是何言也周公大聖人安可得而及之曰周公使管叔監殷管叔以殷畔知而使之是不仁也不知而使之是不智也仁智周公未之盡也而况於王乎賈請見而解之者言陳賈謂周公使管叔為三監於殷管叔乃背畔於殷周公知管叔有背畔之心而復使為監是周公不仁也周公不知管叔將有背畔之心而使之為監是周公之不智也仁與智而周公大聖人也尚未之能盡而况於齊王乎賈今請以此見孟子為王解之見孟子問曰周公何人也賈遂見孟子果以此說問於孟子以為周公是何等人也曰古之大聖人也孟子答之以為周公是古之大聖人也曰使管叔監殷管叔以殷畔也有諸賈又問孟子以謂周公使管叔為監於殷管叔以殷而背畔之有之否乎曰然孟子答之以是有之也曰周公知其將畔而使之與賈又問之以謂周公知管叔將欲背畔故使之為監與曰不知也孟子答之以為周公不知管叔將背畔然則聖人且有過與賈又問之如是則周公為古之大聖人尚且有遇謬乎曰周公弟也管叔兄也周公之過不亦宜乎孟子以為周公雖知管叔不賢亦不能知其將有畔之心周公惟管叔弟也故愛之而使為監管叔念是周公兄也故亦望之是則周公有是之過謬不亦宜之也以親親之故不得不然耳且古之君子過則改之至今之君子又從為之辭者孟子又言古之君子如周公雖有此過然而乃能誅三監作大誥以明勅庶國則周公故能改之也今之君子非眞君子有過則順而不改古之君子其有過也如日月之蝕焉民皆得知而見之及其更也民皆得而仰望之今之君子豈徒順其過而不改又且從其有過復作言辭以文飾其過耳孟子所以言此者以其欲譏陳賈不能匡正齊王之過又從為此周公管叔之辭順其王之過而文之也注燕人畔王聞孟子與沈同言正義曰此蓋前叚案史記世家言之詳矣注誅三監作大誥明勅庶國正義曰案尚書大誥篇云武王崩三監及淮夷叛周公相成王將黜殷作大誥孔安國云三監管蔡商是也言作大誥以誥天下又案史記云周公奉成王命興師東伐作大誥遂誅管叔殺武庚放蔡叔收殷餘民孟子致爲臣而歸注辭齊卿而歸其室也王就見孟子曰前日願見而不可得注謂未來仕齊也遙聞孟子之賢而不能得見之得侍同朝甚喜注來就為卿君臣同朝得相見故喜之也今又棄寡人而歸注今致為臣棄寡人而歸也不識可以繼此而得見乎注不知可以續今日之後遂使寡人得相見否乎對曰不敢請耳固所願也注孟子對王言不敢自請耳固心之所願也孟子意欲使王繼今當自來謀也他日王謂時子曰我欲中國而授孟子室養弟子以萬鍾使諸大夫國人皆有所矜式子盍爲我言之注時子齊臣也王欲於國中而為孟子築室使養教一國君臣之子弟與之萬鍾之祿中國者使學者逺近均也矜敬也式法也欲使諸大夫國人皆敬法其道盍何不也謂時子何不為我言之於孟子知肯就之否時子因陳子而以告孟子注陳子孟子弟子陳臻也陳子以時子之言告孟子孟子曰然夫時子惡知其不可也如使予欲富辭十萬而受萬是為欲富乎注孟子曰如是夫時子安能知其不可乎時子以我為欲富故以祿誘我我徃者饗十萬鍾之祿以大道不行故去耳今更當受萬鍾是為欲富乎距時子之言所以有是云也季孫曰異哉子叔疑注二子孟子弟子也季孫知孟子意不欲而心欲使孟子就之故曰異哉弟子之所聞也子叔心疑惑之亦以為可就之矣使已爲政不用則亦已矣又使其子弟為卿人亦孰不欲富貴而獨於富貴之中有私龍斷焉注孟子解二子之異意疑心曰齊王使我爲政不用則亦自止矣今又欲以其子弟故使我為卿而與我萬鍾之祿人亦誰不欲富貴乎是猶獨於富貴之中有此私登龍斷之類也我則恥之古之爲市也以其所有易其所無者有司者治之耳有賤丈夫焉必求龍斷而登之以左右望而罔市利人皆以爲賤故從而征之征商自此賤丈夫始矣注古者市置有司但治其爭訟不征稅也賤丈夫貪人可賤者也入市則求龍斷而登之龍斷謂堁斷而髙者也左右占視望見市中有利罔羅而取之人皆賤其貪者也故就征取其利後世緣此遂征商人孟子言我苟貪萬鍾不恥屈道亦與此賤丈夫何異也古者謂周公以前周禮有關市之征也音義龍斷趙云龍斷謂堁斷而髙者丁云案龍與隆聲相近隆髙也蓋古人之言耳如胥須之類也張云斷如字或讀如斷割之斷非也陸云龍斷謂岡壟斷而髙者如陸之釋則龍音壟堁丁云廣雅音課開元文字音塊疏正義曰此章言君子正身行道道之不行命也不為利回也孟子致為臣而歸是孟子辭齊卿而歸處於室也王就見孟子曰前日願見而不可得至不識可以繼此而得見乎是齊王見孟子辭齊卿而歸於室乃就孟子之室而見孟子曰前日未仕齊時聞孟子之賢願見之而不能得見後得侍於我而為之卿遂得同朝相見故甚喜之今乃又棄去寡人而歸處於室我不知可以繼今日之後而使寡人得相見否故以此問孟子孟子對曰不敢請耳固所願也孟子意欲使王繼今日之後當自來就見故云不請見固我心之所願也他日王謂時子曰我欲中國而授孟子室至盍為我言之時子齊王之臣也言自見孟子已徃他日齊王又謂其臣時子曰我今欲以中國授孟子為築其室教飬一國之子弟故賜予以萬鍾之祿使其諸大夫與一國之人皆有所敬法時子何不為我以此言說之時子因陳子而以告孟子陳子陳臻也是孟子弟子也時子於是因陳臻而以齊王之言使陳臻告於孟子也陳子以時子之言告孟子至是為欲富乎是陳子乃以時子所告齊王之言而告於孟子孟子乃答之曰然如是也夫時子又安知其有不可也如使我欲富其祿我以辭去十萬之祿而受其萬是以為我欲其富乎云乎者是不為欲富也孟子欲以此言距時子也季孫曰異哉子叔疑季孫子叔二子皆孟子弟子也季孫知孟子意不欲遂時子之言而心尚欲孟子就之故但言異哉弟子之所聞也子叔疑之亦以為可就使已為政不用則亦已矣又使其子弟為卿至有私龍斷焉者孟子又言齊王使已為政之道旣以不得用則我亦以辭之而止於其室矣又欲以弟子之教而使我為卿以與我萬鍾之禄人亦誰不欲其富貴乎然以此者是亦猶獨於富貴之中私登龍斷之類也以其恥之所以言然古之為市也以其所有易其所無者至自此賤丈夫始矣者孟子又言古之所以為市也以其有無相貿易耳有司者但治其爭訟而不征稅也有賤丈夫則必求丘龍堁斷之髙者而登之以左右占望見市中有利罔羅而取之人皆以為賤丈夫焉故後世亦從而征取其市中之稅以其所以征商之稅於後世者亦自此賤丈夫登龍斷而罔市利為之始矣故曰故從而征之征商自此賤丈夫始矣周禮有司關司市是有司者也注云古者謂周公以前周禮有關市之征正義曰此蓋前篇說之詳矣此不復說孟子去齊宿於晝有欲爲王畱行者注晝齊西南近邑也孟子去齊欲歸鄒至晝地而宿也齊人之知孟子者追送見之欲為王畱孟子行坐而言不應隱几而臥注客危坐而言畱孟子之言也孟子不應答因隱倚其几而臥也客不悅曰弟子齊宿而後敢言夫子臥而不聽請勿復敢見矣注齊敬宿素也弟子素持敬心來言夫子慢我不受我言言而遂起退欲去請絶也曰坐我明語子注孟子止客曰且坐我明吿語子昔者魯繆公無人乎子思之側則不能安子思泄栁申詳無人乎繆公之側則不能安其身注徃者魯繆公尊禮子思子思以道不行則欲去繆公常使賢人徃畱之說以方且聽子為政然則子思復畱泄栁申詳亦賢者也繆公尊之不如子思二子常有賢者在繆公之側勸以復之其身乃安矣子爲長者慮而不及子思子絶長者乎長者絶子乎注長者老者也孟子年老故自稱長者言子為我慮不如子思時賢人也不勸王使我得行道而但勸我畱畱者何為哉此為子絶我乎又我絶子乎何為而愠恨也音義隱几於靳切據也齊宿之齊側皆切字亦作齋語魚據切繆音穆愠於問切疏正義曰此章言惟賢能安賢智能知微以愚喻知道之所以乖也孟子去齊宿於畫有欲為王畱行者晝齊之近邑也言孟子去齊欲歸鄒至晝而宿齊人見之有欲為王畱行者也坐而言不應隱几而臥言為王畱行者危坐而說畱孟子之行孟子乃隱倚其几但臥而不應答也客不悅曰弟子齊宿而後敢言夫子卧而不聽請勿復敢見矣客為王畱行者也齊敬也宿素也言客見孟子不應答其言但隱几而卧焉遂欲退乃曰弟子素齊敬其心而後方敢言畱夫子之行夫子今乃臥而不聽其言自今請絶於此後勿復更敢見夫子矣曰坐我明語子孟子遂止客且坐言我分明言告於子云自昔繆公至長者絶子乎是皆明告之言也言徃日魯國繆公無人於子思之側以導逹其意則不能安子思泄栁申詳無人於魯繆公之側以稱譽其賢則泄栁申詳不能安其身以其子思之於繆公師道也非求容者也故繆公無人於子思之側則不能安子思泄栁申詳之於繆公臣道也則求容者也故無人於繆公之側則不能安其身今孟子所以言此者是謂齊之士不能為王謀安於孟子未去之前逮至出晝然後方為畱行此所以隱几卧而不答也齊之畱行之士不知以此但以為孟子不應遂不恱而請勿復見如此是畱行之士不以安子思而謀安孟子但請勿復見為言以其自絶於孟子矣故孟子所以言子為長者慮而不及於子思是子絶其長者乎是長者絶子乎以其不以安子思而謀安孟子於未去之前是為孟子慮者不及子思特欲為泄栁申詳之所為耳故孟子所以有是言之以曉其所以隱几而卧不應之意也長者孟子以年已之老自稱為長者也注晝齊西南近邑正義曰蓋以鄒在魯而魯又在齊之西南上孟子去齊歸鄒至晝而宿是知晝之地為齊之西南近邑者也故云近邑孟子去齊尹士語人曰不識王之不可以爲湯武則是不明也識其不可然且至則是干澤也千里而見王不遇故去三宿而後出晝是何濡滯也士則兹不悅注尹士齊人也干求也澤祿也尹士與論者言之云孟子不知則為求祿濡滯淹久也旣去近畱於晝三日怪其淹久故云士於此事則不悅也高子以告注高子亦齊人孟子弟子以尹士之言告孟子也曰夫尹士惡知予哉千里而見王是予所欲也不遇故去豈予所欲哉予不得已也注孟子曰夫尹士安能知我哉我不得已而去耳何汲汲而驅馳乎予三宿而出晝於予心猶以爲速王庶幾改之王如改諸則必反予注我自謂行速疾矣冀王庶幾能反覆招還我矣夫出晝而王不予追也予然後浩然有歸志注浩然心浩浩有逺志也予雖然豈舎王哉王由足用爲善王如用予則豈徒齊民安天下之民舉安王庶幾改之予日望之注孟子以齊大國知其可以行善政故戀戀望王之改而反之是以安行也豈徒齊民安言君子達則兼善天下也予豈若是小丈夫然哉諫於其君而不受則怒悻悻然見於其面去則窮日之力而後宿哉注我豈若狷狷急小丈夫恚怒其君而去極日力而宿懼其不逺者哉論曰悻悻然小人哉言已志大在於濟一世之民不為小節也尹士聞之曰士誠小人也注尹士聞義則服故曰士誠小人也音義舎音捨下舍我同悻悻丁云字當作婞形項切狠也直也又胡耿切字或作􅬝􅬝然論語音鏗見於之見丁音現狷古縣切恚一睡切疏正義曰此章言大德洋洋介士察察賢者志其大者不賢者志其小者也孟子去齊者言孟子去齊而歸鄒也尹士語人曰至士則兹不悅尹士齊人也尹士見孟子去齊而宿於晝乃語人曰不知齊王不可以為湯武之王則是孟子蒙昧而不明鑒也知齊王不可為湯武之王然且自鄒至齊而為仕則是孟子干求其祿也今自千里之逺而見齊王不遇不行其道故復去而歸然而三宿而後方出晝而行是何其濡滯淹久也我則以此不恱之也高子以告髙子亦齊人為孟子弟子也高子以此尹士語人之言而告於孟子曰夫尹士惡知予哉至而後宿哉孟子答高子以謂夫尹士者安知我之志哉我千里而見王是我欲行道也不遇於齊王不得行其道故去豈我心之所欲哉我不得已而去之矣我三宿而後出晝邑而行於我心尚以為急速也齊王如能改之使我得行其道則必反畱我回耳夫出晝邑至三宿而齊不我追而還齊國我然後浩浩然有歸志也我雖然有浩然歸之之志然而豈肯舎去王哉王猶可足用為之善政王如用我則豈徒使齊國之民安泰天下之民亦皆安泰矣王庶幾能改而反我我日常望之於王矣我豈若狷狷急小丈夫恚怒其君而去為其諌於君而不受則悻悻然心有所怒而見於面容去則極日力而後方止宿哉孟子如此所以云然也尹士聞之曰士誠小人也尹士聞孟子言之以此故服其義而言於孟子曰士實小人也以其不能知孟子之志有如此矣孟子去齊充虞路問曰夫子若有不豫色然前日虞聞諸夫子曰君子不怨天不尤人注路道也於路中問也充虞謂孟子去齊有恨心顔色故不悅也曰彼一時此一時也五百年必有王者興其間必有名世者由周而來七百有餘歲矣以其數則過矣以其時考之則可矣注彼時前聖賢之出是其時也今此時亦是其一時也五百年王者興有興王道者也名世次聖之才物來能名正於一世者生於聖人之間也七百有餘歲謂周家王迹始興大王文王以來考驗其時則可有也夫天未欲平治天下也如欲平治天下當今之世舎我其誰也吾何爲不豫哉注孟子自謂能當名世之士時又値之而不得施此乃天自未欲平治天下耳非我之愆我固不怨天何為不悅豫乎是故知命者不憂不懼與天消息而已矣疏正義曰此章言聖賢興作與天消息天非人不因人非天不成也孟子去齊充虞路問曰至不尤人言孟子歸鄒弟子充虞於路中問孟子曰夫子若有不悅豫之顔色然前日虞聞夫子有言君子之人凡於事不怨恨於天不見過於人也曰彼一時此一時也至吾何為不豫哉孟子答充虞以謂彼時聖賢之所出是其時也此時今時亦是其一時也五百年之後必有王者興為於其間亦必有名世大賢者今自周興太王文王以來已有七百有餘嵗矣以其年數推之則過於五百年矣以其時考之而其時亦可有也今天自未欲平治天下也如天欲使平治天下則當今之世捨我其誰哉此孟子所以歸於天命道行與不行皆未嘗有不悅之色也故曰吾何為不豫哉蓋孟子所以言此者以其自謂能當名世之士而時又値不得施耳孟子去齊居休公孫丑問曰仕而不受祿古之道乎注休地名丑問古人之道仕而不受祿邪怪孟子於齊不受其祿也曰非也於崇吾得見王退而有去志不欲變故不受也注崇地名孟子言不受祿非古之道於崇吾始見齊王知其不能納善退出志欲去矣不欲即去若為變詭見非太甚故且宿留心欲去故不復受其祿也繼而有師命不可以請久於齊非我志也注言我本志欲速去繼見之後有師旅之命不得請去故使我久而不受祿耳久非我本志也音義宿畱上音秀下音霤疏正義曰此章言祿以食功志以率事無其事而食其祿君子不由也孟子去齊居休休乃地名也言孟子去齊乃居於休之地蓋齊下邑之地也公孫丑問曰仕而不受祿古之道乎公孫丑問孟子曰夫為仕而不受爵祿古之道誠然乎丑以其怪孟子於齊不受祿故以此問之曰非也於崇吾得見王至非我志也者孟子答之曰我非不受祿也亦非古之道如此也然我於崇之地我得始見於齊王知王不能納善故退而有去之心又其不欲遽變為苟去故於祿有所不受也無他以其道不行不敢無功而受祿也已既去而齊王續以賔師之命而禮貌之故由足為善遂不敢請去是以久畱於齊非我之志也但不得已而已矣音義食功丁音嗣孟子注疏卷四下孟子注疏卷四下考證孟子自齊葬於魯日知錄曰自齊葬於魯言葬而不言䘮此改葬也禮改葬緦麻服事畢而除故反於齊止於嬴而充虞乃得乘間而問若曰奔喪而還營葬方畢即出赴齊卿之位而門人未得發言可謂三月無君則皇皇如也而身且不行三年之喪何以教滕世子哉注疏畫者畫雲氣其餘各如其象畫者畫三字監本訛著紫餘三字餘字監本訛畫字俱考禮器改正沈同以其私問章有仕於此辨疑云仕當作士傳寫之訛也疏此皆孟子設此譬喻燕之罪燕監本訛王今改正孟子去齊宿於晝章注晝齊西南近邑也臣邦綏按朱註晝如字或曰晝當作畫音獲通鑑周赧王三十一年燕伐齊聞晝邑人王蠋賢令軍中環晝三十里無入史炤曰晝齊西南邑據此則或云當作畫者良是疏危坐而說留孟子之行此句下監本衍一言字今從閣本刪孟子注疏卷四下考證
