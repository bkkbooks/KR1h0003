body:
  text: 欽定四庫全書孟子注疏卷六上漢趙氏注宋孫奭音義並疏滕文公章句下疏正義曰此卷趙注分上卷為之者也此卷凡有十章一章言修禮守正非招不往枉道富貴君子不許二章言以道正君非禮不運稱大丈夫阿意用謀善戰務勝事雖有剛心歸柔順三章言君子務仕思播其道逹義行仁待禮而動苟容干祿踰墻之女人之所賤四章言百工食力以祿養賢修仁尚義國之所尊移風易俗其功可珍雖食諸侯不為素飱五章言德修無小暴慢無强六章言白沙在泥不染自黑蓬生麻中不扶自直言輔之者衆也七章言道異不謀迫斯强之假泄已甚瞰亡得宜正已直行不納於邪八章言從善改非坐以待旦知而為之罪重於故九章言憂世機亂勤以濟之義以正之十章言聖人之道親親尚和志士之操耿介竒特凡此十章合上卷五章是滕文公一篇十有五章也陳代曰不見諸侯宜若小然今一見之大則以王小則以霸且志曰枉尺而直尋宜若可為也注陳代孟子弟子也代見諸侯有來聘請見孟子孟子有所不見以為孟子欲以是為介故言此介得無為狹小乎如一見之儻得行道何以輔致霸王乎志記也枉尺直尋欲使孟子屈己信道故言宜若可為也孟子曰昔齊景公田招虞人以旌不至將殺之注虞人守苑囿之吏也招之當以皮冠而以旌故招之而不至也志士不忘在溝壑勇士不忘喪其元孔子奚取焉取非其招不往也如不待其招而往何哉注志士守義者也君子固窮故常念死無棺槨沒溝壑而不恨也勇士義勇者也元首也以義則喪首不顧也孔子奚取取守死善道非禮招已則不往言虞人不得其招尚不往如何君子而不待其招直事妄見諸侯者何為也已且夫枉尺而直尋者以利言也如以利則枉尋直尺而利亦可為與注尺小尋大不可枉大就小而以要其利也昔者趙簡子使王良與嬖奚乘終日而不獲一禽嬖奚反命曰天下之賤工也注趙簡子晉卿也王良善御者也嬖奚簡子幸臣也以不能得一禽故反命於簡子謂王良天下鄙賤之工師也或以告王良良曰請復之注聞嬖奚賤之故請復與乘强而後可注强嬖奚乃肯行一朝而獲十禽嬖奚反命曰天下之良工也注以一朝得十禽故謂之良工簡子曰我使掌與女乘注掌主也使王良主與女乘謂王良良不可注王良不肯曰吾為之範我馳驅終日不獲一為之詭遇一朝而獲十注範法也王良曰我為之法度之御應禮之射正殺之禽不能得一橫而射之曰詭遇非禮之射則能獲十言嬖奚小人也不習於禮也詩云不失其馳舍矢如破我不貫與小人乘請辭注詩小雅車攻之篇也言御者不失其馳驅之法則射者必中之順毛而入順毛而出一發貫臧應矢而死者如破矣此君子之射也貫習也我不習與小人乘不願掌與嬖奚同乘故請辭御者且羞與射者比比而得禽獸雖若丘陵弗為也如枉道而從彼何也注孟子引此以喻陳代云御者尚知羞恥此射者不欲與比子如何欲使我枉正道而從彼驕慢諸侯而見之乎且子過矣枉己者未有能直人者也注謂陳代之言過謬也人當以直矯枉耳已自枉曲何能正人音義志曰丁云志記也謂志記之言也介音界丁云謂狷介也信道之信音伸為與音餘下食與善與築與樹與皆同要音邀下章要其同奚乘之乘音剩下同强而之强其丈切注同射食亦切範或作范氏范氏古之善御者詭遇陸云詭遇詭計以要禽也舍音捨下舍其同貫丁音慣注貫習同中張仲切貫臧如字比毗志切下同疏正義曰此章言修禮守正非招不往枉道富貴君子不許也陳代曰不見諸侯宜若小然今一見之大則以王小則以霸且志曰枉尺而直尋宜若可為也者陳代孟子之弟子也問孟子以謂今不見諸侯是宜若小其身然今一往見諸侯大則行道可以輔佐君為王小則得行道而佐君為之霸且記云枉一尺而直其一尋宜若可以為之也尺十寸為尺尋十丈為尋也陳代欲孟子往見諸侯故以此言問之孟子曰昔齊景公田至何哉者孟子言往日齊國景公田獵招聘其虞人以旌斾招聘之如有虞人不至者則將殺戮之虞人掌山澤苑囿之吏也然而志士守其義者常念雖死無棺椁但沒在於溝壑之中而不恨也勇義之士念雖喪去其首而且不顧也孔子於此何取焉蓋孔子以取非其所招而能不往者也如此則虞人不得其所招之禮尚且守義雖死而且不往應其招如何為之君子且以不待所招聘而往見諸侯是何為哉蓋先王制招聘之禮旌所以招其大夫者虞人之招但以皮冠而已今齊景公以旌招虞人虞人守其義分所以雖死而不往也孟子引此意以謂今之諸侯所以間有能招已者又非招己之所招而待之也故我何往見之哉所以不往見之也且夫枉尺而直尋者至亦可為歟孟子又言且夫子今以謂枉其尺而直其尋以利言之而已如以利為之雖枉其尋而但直其尺而利亦可得而為之耳孟子所以言之以此者蓋謂我苟志於利雖枉尋而直尺我亦為之况子以為枉尺而直尋乎奈其我志於分義不肯枉道以徇利所以不欲屈已而求見於諸侯也以其見之諸侯但為之徇利者矣故雖枉尺而直尋不為也昔者趙簡子使王良與嬖奚乘終日而不獲一禽嬖奚反命曰天下之賤工也孟子又引往者晉卿趙簡子常使善御人王良與幸人奚乘而畋終日而不能得一禽奚乃反命報於簡子曰王良天下之賤工師也或以告王良良曰請復之或有人以嬖奚報簡子之言為王良之賤遂告王良王良聞之故請復與嬖奚乘而畋强而後可王良强勉嬖奚乃肯行一朝而獲十禽反命曰天下之良工也言一日遂得十禽嬖奚乃反命報於簡子曰王良乃天下之良善工師也非賤者也簡子曰我使掌與女乘謂王良良不可至我不貫與小人乘請辭趙簡子言於嬖奚曰我使王良與女乘於是簡子謂王良而使之良乃不肯遂言於簡子曰我為之法度之御我與嬖奚驅馳而畋終一日而不能獲其一禽後為之詭而橫射之止一朝而以能獲之十禽且詩小雅車攻之篇有云不失其馳驅之法而所中者應矢而死如破矣此君子之所射也我今不慣習與嬖奚小人同乘而畋也故請辭之不與掌乘御者且羞與射者比至未有能直人者也孟子引至此乃自為之言曰夫王良但為之御者且尚能羞恥與嬖奚之射者比並雖使王良與嬖奚比之如得禽獸若丘陵之多亦必不為之比矣今子欲使我枉正道而從彼驕傲之諸侯而往見之是何如哉且子言此者已失之過謬也如枉已之正道者未有能直其人者也必自正己之道然後可以直人矣是亦楊子所謂詘道而伸身雖天下不可為也同意注招虞人當以皮冠正義曰經於萬章篇云萬章問孟子招虞人何以孟子曰以皮冠是其文也注趙簡子晉卿至工師也正義曰案史記世家云趙景叔卒生趙鞅是為簡子為晉卿晉出公十七年卒張華云簡子冢在臨水界冢上氣成樓閣注詩小雅車攻之篇正義曰此篇蓋言宣王復古也箋云不失其馳舍矢如破謂御者之良得舒疾之中射者之工矢發則中如錐破物也注伯夷亦不屑就也正義曰此乃公孫丑篇末之文也景春曰公孫衍張儀豈不誠大丈夫哉一怒而諸侯懼安居而天下熄注景春孟子時人為縱橫之術者公孫衍魏人也號為犀首常佩五國相印為從長秦王之孫故曰公孫張儀合從者也一怒則構諸侯使强陵弱故言懼也安居不用辭說則天下兵革熄也孟子曰是焉得為大丈夫乎子未學禮乎丈夫之冠也父命之女子之嫁也母命之往送之門戒之曰往之女家必敬必戒無違夫子以順為正者妾婦之道也注孟子以禮言之男子之道當以義正君女子則當婉順從人耳男子之冠則命曰就爾成德今此二子從君順指行權合從無輔弼之義安得為大丈夫也居天下之廣居立天下之正位行天下之大道得志與民由之不得志獨行其道富貴不能淫貧賤不能移威武不能屈此之謂大丈夫注廣居謂天下也正位謂男子純乾正陽之位也大道仁義之道也得志行正與民共之不得志隱居獨善其身守道不回也淫亂其心也移易其行也屈挫其志也三者不惑乃可以為之大丈夫矣音義熄音息從橫之從音蹤下從長合從皆同從長之長張文切下長幼長逸皆同焉得之焉於䖍切安也冠音貫女家女字音汝疏正義曰此章言以道匡君非禮不運故妾婦以况儀衍者也景春曰公孫衍張儀豈不誠大丈夫哉一怒而諸侯懼安居而天下熄景春問孟子曰公孫衍張儀二者豈不實為大丈夫之人哉夫二人一怒則諸侯懼之以其能使强陵弱故也安居處而不用辭說則天下兵革於是乎熄滅景春故以此遂謂二人實為大丈夫孟子曰是焉得為大丈夫乎子未學禮乎至妾婦之道孟子答之景春曰二人如此安得為之大丈夫乎子未嘗學禮也夫禮言丈夫之冠也父則命之女子之嫁也母則命之蓋以冠者為丈夫之事故父命之以責其成人之道嫁者女子之事故母命之以責其為婦之道也以女子之臨嫁母則送之於門而戒之女子曰歸往女之家必當敬其舅姑亦必當戒慎以貞潔其已無違逆其夫子以其夫在則從順其夫夫沒則從其子以順從無違為正而已固妾婦之道如此也乃若夫之與子在所制義固不可以從婦矣苟為從婦以順為正是焉得為大丈夫乎孟子所以引此妾婦而言者蓋欲以此妾婦比之公孫衍張儀也以其二人非大丈夫耳蓋以二人處六國之亂期合六國之君希意導言靡所不至而當世之君讒毁稱譽言無不聽喜怒可否勢無不行雖一怒而諸侯懼安居而天下熄未免夫從人以順為正者也是則妾婦之道如此也豈足為大丈夫乎居天下之廣居立天下之正位行天下之大道至此之謂大丈夫孟子言能居仁道以為天下廣大之居立禮以為天下之正位行義以為天下之大路得志達而為仕則與民共行乎此不得志則退隱獨行此道而不回雖使富貴亦不足以淫其心雖貧賤亦不足以移易其行雖威武而加之亦不足屈挫其志夫是乃得謂之大丈夫也今且以公孫衍張儀但能從人而不知以此正其已是則妾婦以順為正之道固不足以為大丈夫者焉注景春至革熄也正義曰云景春孟子時人經傳未詳公孫衍魏人也號為犀首為秦王之孫故曰公孫案史記云犀首者魏之隂晉人也名衍姓公孫氏與張儀不善張儀之魏魏王相張儀犀首弗利故令人謂韓公叔曰張儀已合秦魏矣魏王所以欲貴張儀者但欲得韓地且韓之南陽已舉矣子何不少委焉以為衍功則魏必圖秦而棄儀後相衍張儀去復相秦卒犀首入相秦常佩五國之相印為從長司馬彪曰犀首者魏之官名若今虎牙將軍是也張儀者案史家本傳云張儀魏人也常事鬼谷先生後相魏而卒凡此是皆公孫衍張儀之事矣周霄問曰古之君子仕乎注周霄魏人也問君子之道當仕否孟子曰仕傳曰孔子三月無君則皇皇如也出疆必載質注質臣所執以見君者也三月一時也物變而不佐君化故皇皇如有所求而不得爾公明儀曰古之人三月無君則弔注公明儀賢者也言古人三月無君則弔明當仕也三月無君則弔不以急乎注周霄怪乃弔於三月無君何其急也曰士之失位也猶諸侯之失國家也禮曰諸侯耕助以供粢盛夫人蠶繅以為衣服犧牲不成粢盛不潔衣服不備不敢以祭惟士無田則亦不祭牲殺器皿衣服不備不敢以祭則不敢以宴亦不足弔乎注諸侯耕助者躬耕勸率其民收其藉助以供粢盛粢稷盛稻也夫人親執蠶繅之事以率女功衣服祭服不成不實肥腯也惟辭也言惟絀祿之士無圭田者不祭牲必特殺故曰殺皿所以覆器者也不祭則不宴猶喪人也不亦可弔乎出疆必載質何也注周霄問出疆何為復載質曰士之仕也猶農夫之耕也農夫豈為出疆舍其耒耜哉注孟子言仕之為急若農夫不可不耕曰晉國亦仕國也未嘗聞仕如此其急仕如此其急也君子之難仕何也注魏本晉也周霄曰我晉人也亦仕而不知其急若此君子何為難仕君子謂孟子何為不急仕也曰丈夫生而願為之有室女子生而願為之有家父母之心人皆有之不待父母之命媒妁之言鑽穴隙相窺踰墻相從則父母國人皆賤之注言人不可觸情從欲須禮而行古之人未嘗不欲仕也又惡不由其道不由其道而往者與鑽穴隙之類也注言古之人雖欲仕如不由其道亦與鑽穴隙者無異音義疆音姜質張音贄云義與贄同以見之見音現下注願見同粢音咨盛音成繅素刀切皿武永切藉秦昔切腯徒忽切絀音黜為于僞切下為之為其為匹夫為此皆同難丁乃憚切又如字妁音酌丁云謂媒氏酌二姓之可否故謂之媒妁也隙去逆切又惡烏路切下又惡楚惡惡無禮皆同疏正義曰此章言君子務仕思播其道達義行仁待禮而動也周霄問曰古之君子仕乎周霄問孟子曰古之君子欲為仕乎否孟子曰仕傳曰三月無君則皇皇如也出疆必載質者此孟子答之以為古之君子欲為仕也傳文有云孔子三月不得佐其君則心皇皇如有所求而不得也出其疆土必載贄而行贄者如所謂三帛二生一死之贄也臣所以執此而見君也公明儀曰古之人三月無君則弔又引公明儀亦云古之人三月天時之一變如不得佐其君乃弔問之明其欲仕也三月無君則弔不以急乎周霄怪此言復問之曰三月無君則弔問之不以失之太急乎曰士之失位也猶諸侯之失國家也至亦不足弔乎孟子又答之曰夫仕者欲行其道若失其職位則如諸侯之失其國家也如此三月無君則弔豈足謂之急歟且禮有云諸侯躬耕藉田勸率其民收其藉助以供給其粢盛稷稻夫人乃親養蠶繅絲以為之祭服如犧牲不成肥腯稷稻無以致潔衣服又無以致備則不敢以祭社稷宗廟惟士之失位無有田祿者則亦不祭無他以其牲殺器皿衣服不備不敢以祭也非特不敢祭又且不敢以宴樂也如此是亦不足為弔之意矣若公子重耳失其晉國而且稱喪人孔子失魯司冠之位亦謂之喪以至士大夫之去國必為壇位嚮國而哭素衣素裳素冠徹緣三月而復蓋亦此意也然則士之三月無君則弔尚何以為急乎牲殺器皿牲必特殺故曰殺器皿所以覆器者也出疆必載質何也周霄又問孟子士之出疆必載其質是如之何曰士之仕也猶農夫之耕也農夫豈為出疆舍其耒耜哉孟子答之曰士之進於為仕也若農夫之於耕也夫農夫豈為出疆而耕乃以舍去其耒耜哉此士之為仕所以出疆亦必執其贄也曰晉國亦仕國也未嘗聞仕如此其急仕如此其急也君子之難仕何也周霄又問孟子曰今之晉國亦可為仕之國也然而未嘗聞有仕者如此之急又以仕既如此之急然而君子之難進於仕是如之何故以並問之曰丈夫生而願為之有室女子生而願為之有家父母之心人皆有之至鑽穴隙之類也孟子又答之曰夫丈夫之生乃願為之有室婦女子之生乃願為之有家而事之其於欲慕為人子之父母心人皆有之矣然而欲為父母其為室家乃不待父母之命媒妁而言之遂私鑽穴隙而相窺踰墻而擅自相從終雖得為父母其於國中之衆人亦且皆賤之而不美矣夫古之人未嘗不欲為之仕也然而又惡其不由其道而為之仕所以君子難仕也如不由其道而往為之仕者是與此鑽穴隙相窺而慕為人子之父母之類也孟子所以終答之周霄以此者以其士之仕猶男女之相求亦必待父母之命媒妁之言也注質臣所執以見君至不得爾正義曰蓋贄之為言至也自五玉三帛二生一死皆所以為贄以見其君與自相贄同也彭更問曰後車數十乘從者數百人以傳食於諸侯不以泰乎注泰甚也彭更孟子弟子怪孟子徒衆多而傳食於諸侯之國得無為甚奢泰者也孟子曰非其道則一簞食不可受於人如其道則舜受堯之天下不以為泰子以為泰乎注簞笥也非其道一笥之食不可受也子以舜受堯之天下為泰乎曰否士無事而食不可也注彭更曰不以舜為泰也謂士無功而虛食人者不可也曰子不通功易事以羡補不足則農有餘粟女有餘布子如通之則梓匠輪輿皆得食於子注孟子言凡人當通功易事乃可各以奉其用梓匠木工也輪人輿人作車者也交易則得食於子之所有矣周禮攻木之工七梓匠輪輿是其四羡餘者也於此有人焉入則孝出則悌守先王之道以待後之學者而不得食於子子何尊梓匠輪輿而輕為仁義者哉注入則事親孝出則敬長悌悌順也守先王之道上德之士可以化俗者若此不得食子之祿子何尊彼而賤此也曰梓匠輪輿其志將以求食也君子之為道也其志亦將以求食與注彭更以為彼志於食此亦但志食也曰子何以其志為哉其有功於子可食而食之矣且子食志乎食功乎注孟子言祿以食功子何食乎曰食志注彭更以為當食志也曰有人於此毁瓦畫墁其志將以求食也則子食之乎注孟子言人但破碎瓦畫地則復漫滅之此無用之為也然而其志反欲求食則可食乎曰否注彭更曰不食也曰然則子非食志也食功也注孟子曰如是則子果食功也非食其志也音義彭更古衡切從才用切傳食之傳丁直戀切言轉食也簞食之食音嗣此章內文注可食而食食志食功食乎子食不食皆同餘皆如字笥相吏切羡似面切又余見切畫音獲墁張武安切云與謾同疏正義曰此章言百工食力以祿養賢修仁尚義國之所尊移風易俗其功可珍雖食諸侯不為素餐也彭更問曰後車數十乘從者數百人以傳食於諸侯不以泰乎彭更孟子弟子問孟子以謂車有數十乘之多從徒又有數百人之衆皆以傳食於諸侯不以為泰甚乎傳食蓋以孟子食於諸侯車徒又食於孟子要之所食之祿皆出於諸侯之所供耳故云傳食諸侯孟子曰非其道則一簞食不可受於人如其道則若舜受堯之天下不以為之泰子今以車徒傳食於諸侯為之泰以其不足為泰也曰否士無事而食不可也彭更又曰否不以舜為泰而言也蓋以士之無功事於諸侯固不可虛食於諸侯也曰子不通功易事以羡補不足至皆食於子孟子又答之曰今且以子言之知子不通功易事而相濟以有餘而補其不足則農夫有餘粟而人有受其飢女有餘布而人有受其寒子如通功易事乃可以各奉其事業則梓人成其器械以利用匠人營其宮室以安居輪人作車輪以運行輿人作車輿以利載是皆得食於子矣事與功者蓋所作未成則謂之事事之成則謂之功孟子所以言之者蓋謂梓匠輪輿皆小人之功也如得以通功易事而皆得食於子況有君子之功功於道者而乃不得傳食之於諸侯乎故以下文言之於此有人焉入則孝出則悌守先王之道以待後之學者而不得食於子子何尊梓匠輪輿而輕為仁義者哉孟子又言今有人焉入於閨門之內則以孝為仁出於鄉黨邦國之間則以悌為義是守先王仁義之道以待覺於後之學者是有功於道者也而乃不得食於子是則子何獨尊於梓匠輪輿小人之功而以輕為仁義有功於道者哉曰梓匠輪輿其志將以求食君子之為道也其志亦將以求食歟彭更又以此言於孟子曰彼梓匠輪輿者是其有志將以此業而求食者也今以君子之為於道其志亦將以為道而求食歟彭更之意以謂士志於道不志於食故以此疑乃問孟子也曰子何以志為哉其有功於子可食而食之矣然以子言之則子今有食於人者是則食其有志於為食者乎是則食其有功者乎曰食志彭更又答之以為有食則食其有志於求食者矣曰有人於此毁瓦畫墁其志將以求食也則子食之乎孟子又欲排之故以此喻之言今有人於此但以毁破碎之瓦而畫地又復墁滅之是其志將以此求其食也則子食之乎曰否彭更以為如此者不食之也曰然則子非食志也食功也孟子乃言之曰如是則子非食其有志於求食者也是則食其有功者也以其毁瓦畫墁但有志而無功者而彭更不食之是則知彭更是亦食於有功者矣然則孟子志非欲傳食於諸侯而諸侯所以食之者亦以孟子有功而已矣注周禮攻木之工正義曰此蓋梁惠王下卷說之矣音義餐七丹切萬章問曰宋小國也今將行王政齊楚惡而伐之則如之何注問宋當如齊楚何也孟子曰湯居亳與葛為鄰葛伯放而不祀湯使人問之曰何為不祀曰無以供犧牲也湯使遺之牛羊葛伯食之又不以祀注葛夏諸侯嬴姓之國放縱無道不祀先祖湯又使人問之曰何為不祀曰無以供粢盛也湯使亳衆往為之耕老弱饋食葛伯率其民要其有酒食黍稻者奪之不授者殺之有童子以黍肉餉殺而奪之書曰葛伯仇餉此之謂也注童子未成人殺之尤無狀尚書逸篇文仇怨也言湯伐葛伯怨其害此餉也為其殺是童子而征之四海之內皆曰非富天下也為匹夫匹婦復讎也注四海之民皆曰湯不貪天下富也為一夫報讎也湯始征自葛載十一征而無敵於天下東面而征西夷怨南面而征北狄怨曰奚為後我民之望之若大旱之望雨也歸市者弗止藝者不變誅其君弔其民如時雨降民大悅書曰徯我后后來其無罰注載始也言湯初征自葛始也十一征而服天下一說言當作再字再十一征而言湯再征十一國再十一凡征二十二國也書逸篇也民曰待我君來我則無罰矣歸市不止不以有軍來征故市者止不行也不使藝者變休也有攸不惟臣東征綏厥士女匪厥𤣥黃紹我周王見休惟臣附于大邑周其君子實𤣥黃于匪以迎其君子其小人簞食壺漿以迎其小人救民於水火之中取其殘而已矣注從有攸以下道周武王伐紂時也皆尚書逸篇之文也攸所也言武王東征安天下士女小人各有所執往無不惟念執臣子之節篚厥𤣥黃謂諸侯執𤣥三纁二之帛願見周王望見休善使我得附就大邑周家也其君子小人各有所執以成其類也言武王之師救殷民於水火之中討其殘賊也太誓曰我武惟揚侵于之疆則取于殘殺伐用張于湯有光注太誓古尚書百二十篇之時泰誓也我武王用武之時惟鷹揚也侵紂之疆界則取于殘賊者以張殺伐之功也民有簞食壺漿之歡比於湯伐桀為有光寵美武王德優前代也今之尚書泰誓篇後得以充學故不與古太誓同諸傳記引泰誓皆古泰誓也不行王政云爾苟行王政四海之內皆舉首而望之欲以為君齊楚雖大何畏焉注萬章憂宋迫於齊楚不得行政故孟子為陳殷湯周武之事以喻之誠能行之天下思以為君何畏齊楚之國焉音義亳音薄遺惟季切餉式亮切傒胡禮切匪丁云義當作篚篚以盛贄幣此作匪古字借用下同救字或作救同疏正義曰此章言修德無小暴慢無强也萬章問曰宋小國也今將行王政齊楚惡而伐之則如之何萬章問孟子言宋國小國也今將欲行王者之政齊楚大國惡其行之而欲伐之則宋國當如之何而處之孟子曰湯居亳與葛為鄰葛伯放而不祀湯使人問之曰何為不祀至此之謂也孟子答之曰湯王居亳地與葛國為鄰葛國之伯放縱無道而不祀先祖湯王使人問之葛伯何為而不祀先祖乃答之曰無以供其犧牲也牲之色純無雜色謂之犧牲湯乃使人遺賜之牛羊葛伯既受之牛羊又自食之而不祀先祖湯又使人問葛伯何為而又不祀葛伯又曰又無以供其粢盛也湯復使亳之衆往為葛伯耕作以助其粢盛有老弱者饋耕者之食葛伯又率己之民於路要其有酒食黍稻者奪而食之有不授與之者乃殺之有童子以黍肉飯餉其耕者葛伯率民殺其子而奪其黍肉故書有云葛伯仇餉怨其有所餉者故害之是此之謂也為其殺是童子而征之四海之內皆曰非富天下也為匹夫匹婦復讎也孟子又言為其葛伯殺此童子而湯乃往而征伐之四海之內人皆曰湯王非貪富於天下而征葛也是為天下一匹之夫一匹之婦復報其讎也湯始征自葛載至后來其無罰者言湯王初征自葛國始也湯之十一征而天下無敢敵者故東面而征其君則西夷之國怨之以為不先征其我君之罪南面而征其君則北夷之國怨之以為不征其我君之罪而先於彼故怨云何為而後去其我民之望其湯之來若大旱之時人望其雲霓而雨之降也遂使歸市者得奔趨而貿易藝田者亦得藝而不為之休亦以湯即誅其君之有罪者而又能弔問存恤其人民故如時雨之降民皆大喜悅之書云民徯待我君之來言我君之來則我無誅罰矣一說云載十一征當作再字再十一征者言湯再征十一國再十一是征二十二國也有攸不惟臣至取其殘而已矣此皆逸書之文也言殷之民有所征之則無不惟念臣服之節故武王東征而綏撫其士女則為之士女皆以箱篚盛其𤣥黃之帛以昭明我之周王見休美惟臣皆得就附于大邑周家也故其君子實貯𤣥黃之帛以迎其君子小人簞食壺漿以迎其小人是各從其類也武王之師衆中有君子有小人故商民有君子有小人迎之者也言武王所拯救殷民於水火之中獨取伐其殘賊其民者也今據書乃曰昭我周王而此乃曰紹我周王蓋紹者繼也民皆以𤣥黃之帛盛於篚而隨武王之師後而繼送之也蓋周王者即武王也然必以𤣥黃於篚者蓋天謂之𤣥地謂之黃武王能革殷之否而泰之是能如天地之覆載以養民者也必言士女者以其武王所綏不特匹夫匹婦而已雖未冠之士未笄之女亦且綏之故曰綏厥士女太誓曰我武惟揚侵于之疆則取于殘殺伐用張于湯有光此古之太誓篇之文也言太誓有云我武王用武之時惟鷹揚也侵于紂之疆界則取于殘賊者於是殺伐之功用張行之故比于湯王伐桀之時又有以光于前代也不行王政云爾苟行王政至齊楚雖大何畏焉孟子於此乃曰今宋國不行王者之政故云齊楚惡而伐之爾如宋國苟能行其王者之政則四海之內人皆舉首引領而望之欲以為之君也齊楚二國雖大然何畏之有注葛夏諸侯嬴姓之國正義曰案地理志云葛今梁國寧陵有葛鄉裴駰亦引之而證史記毫都亦在梁國故云為鄰書曰湯征諸侯葛伯不祀湯始征之孔安國云葛國伯爵也廢其土地山川及宗廟神祗皆不祀湯始伐之言伐始於葛也書於是乎作湯征今尚書仲虺之誥曰乃葛伯仇餉初征自葛東征西夷怨南征北狄怨曰奚獨後子孔傳云葛伯逰行見農民之餉於田者殺其人奪其餉故謂之仇餉仇怨也湯為是以不祀之罪伐之從此後遂征無道西夷北狄舉逺以言則近者著矣曰奚獨後豫者蓋怨者之辭也注從有攸下至殘賊也正義曰云篚厥𤣥黃謂諸侯執𤣥三纁二之帛者禮云諸侯世子執纁公之孤執𤣥附庸之君執黃是帛也鄭司農云三染謂之纁此亦周禮鍾氏有三入為纁故也孟子謂戴不勝曰子欲子之王之善與我明告子注不勝宋臣有楚大夫於此欲其子之齊語也則使齊人傅諸使楚人傅諸注孟子假喻有楚大夫在此欲變其子使學齊言當使齊人傅之使楚人自傅相之邪曰使齊人傅之注不勝曰使齊人曰一齊人傅之衆楚人咻之雖日撻而求其齊也不可得矣引而置之莊嶽之間數年雖日撻而求其楚亦不可得矣注言使一齊人傅相衆楚人咻之咻之者嚾也如此雖日撻之欲使齊言不可得矣言寡不勝衆也莊嶽齊街里名也多人處之數年而自齊也子謂薛居州善士也使之居於王所在於王所者長幼卑尊皆薛居州也王誰與為不善注孟子曰不勝常言居州宋之善士也欲使居於王所如使在王所者小大皆如居州則王誰與為不善者也在王所者長幼卑尊皆非薛居州也王誰與為善一薛居州獨如宋王何注如使在王左右者皆非居州之疇王當誰與為善乎一薛居州獨如宋王何而能化之也周之末世列國皆僭號自稱王故曰宋王也音義咻音休嚾丁云案玉篇音囂召呼也今釋注意音歡為便蓋字歡譁同疏正義曰此章言自非聖人在所變化故諺曰白沙在泥不染自黑蓬生麻中不扶自直之類也孟子謂戴不勝曰至亦不可得矣不勝宋王之臣也姓戴名不勝孟子謂之曰子今欲子之宋王為善歟我今明言而告子且假喻今有楚國之大夫於此欲使其子學齊人之言則當使齊人傳諸使楚人傅諸曰使齊人傅之不勝答之以為當使齊人傅相之孟子又言如使一齊人傅相其子之言而衆楚人皆咻嚾之雖日加鞭撻其子而求為齊言也不可得矣如引其子置之閭巷之間數年之久雖日加鞭撻而求其子為楚言亦不可得已子謂薛居州善士也至如宋王何孟子又言今不勝謂薛居州善士者也使之居於宋王之所如在宋王之所者長幼卑尊皆如薛居州善士者也則宋王誰與為不善也如在宋王之左右長幼卑尊皆非薛居州之善者也則宋王誰能與為善今以一薛居州獨佐於宋王為善其能如宋王何無他以其一人之寡不能勝其衆也故孟子所以齊人楚人而比喻之也薛居州宋國之善士者也孟子注疏卷六上孟子注疏卷六上考證不見諸侯章且夫枉尺而直尋者節注尺小尋大不可枉大就小監本大字訛者字不字訛尚字今從閣本改正注趙簡子晉卿也疏趙景叔卒生趙鞅叔監本訛公今從史記改正疏末伯夷亦不屑就也正義曰此乃公孫丑篇末之文也注無此句疑有錯簡公孫衍張儀章疏歸往女之家歸監本訛雖今改正宋小國章要其有酒食黍稻者奪之四書辨疑云中原古注本要其有酒肉黍稻者奪之食字係肉字有攸不惟臣東征尚書惟字係為字篚厥元黃陸㙄經世驪珠曰注謂諸侯執元三纁二之帛是照下君子立說疏謂民皆以元黃之帛盛于篚而隨武王之師後而繼送之也則兼下小人立說禮書云膳篚之辨則上篚在堂下篚在庭又篚之為物可以盛絲帛可以盛苴茅可以實臘俎黍稷蓋不必其皆精考禹貢球琳琅玕不盡入篚可見疏義為備即援下文分承為說則上本統迎周王下乃各迎其類義本不同疏一說云載十一征當作再字監本無載字今從閣本增入孟子謂戴不勝章一齊人傅之節注莊嶽齊街里名也日知録曰莊是街名嶽是里名左傳襄公二十八年得慶氏之木於莊注云六軌之道反陳於嶽注云嶽里名昭公十年又敗諸莊哀公六年戰於莊敗注亦同子謂薛居州節注如使在王所者如監本訛即今改正孟子注疏卷六上考證欽定四庫全書孟子注疏卷六下漢趙氏注宋孫奭音義并疏滕文公章句下公孫丑問曰不見諸侯何義注丑怪孟子不肯每輒應諸侯之聘不見之於義謂何也孟子曰古者不為臣不見注古者不為臣不肯見不義而富且貴者也段于木踰垣而辟之泄栁閉門而不內是皆已甚迫斯可以見矣注孟子言魏文侯魯繆公有好善之心而此二人距之太甚迫窄則可以見之陽貨欲見孔子而惡無禮大夫有賜於士不得受於其家則往拜其門注陽貨魯大夫也孔子士也陽貨瞰孔子之亡也而饋孔子蒸豚孔子亦瞰其亡也而往拜之當是時陽貨先豈得不見注瞰視也陽貨視孔子亡而饋之者欲使孔子來答恐其便答拜使人也孔子瞰其亡者心不欲見陽貨也論語曰饋孔子豚孟子曰蒸豚豚非大牲故用熟饋也是時陽貨先加禮豈得不往拜見之哉曾子曰脅肩諂笑病于夏畦注脅肩竦體也諂笑强笑也病極也言其意苦勞極甚於仲夏之月治畦灌園之勤也子路曰未同而言觀其色赧赧然非由之所知也注未同志未合也不可與言而與之言謂之失言也觀其色赧赧然面赤心不正之貌也由子路名子路剛直故曰非由所知也由是觀之則君子之所養可知已矣注孟子言由是觀曾子子路之言以觀君子之所養志可知矣謂君子養正氣不以入邪也音義辟音避內音納繆音穆瞰或作瞰同音勘使所吏切脅虛業切又許及切畦胡圭切竦音聳强其文切赧女簡切疏正義曰此章言道異不謀迫斯强之段泄已甚瞰亡得其宜正已直行不納於邪赧然不接傷若夏畦也公孫丑問曰不見諸侯何義丑怪孟子不見諸侯故問之曰不見諸侯其義謂何也孟子曰古者不為臣不見至可知己矣孟子答之公孫丑言古之不為臣者不肯見不義而叨富貴者也如段干木踰垣墻而避魏文侯於外泄栁閉門而拒魯繆公於內然皆不見之者是皆文侯繆公而就見已甚迫切斯可以見矣然干木泄栁且不見之耳陽貨欲願見於孔子而畏孔子惡已之無禮而不見之意以謂已為大夫而有遺賜孔子但為之士彼不得受其遺賜於其家則必往謝已門故陽貨視孔子不在遂饋孔子蒸豚之禮然而孔子至後亦以視陽貨不在乃往其門而拜謝之故當是之時陽貨豈先不得見孔子以其不合視孔子不在乃饋蒸豚孔子所以不欲見亦復視其亡而往謝之也蒸豚熟豚也曾子又有云脅肩諂笑竦縮其身强容而笑者其勞苦有甚於夏之五六月而灌園也治畦曰灌園也子路有云未合其志而與之言觀其色赧赧然面赤而心不正者非我之所知也由子路自稱名也孟子曰由此數者觀之則君子之所養以義可得而知矣蓋就此數者論之孟子必答公孫丑以此者則孟子不見諸侯是亦分也義也公孫丑乃不知之奈之何哉今且以孟子不見諸侯必以段干泄栁為言者蓋謂魏文魯繆二君欲見此二子如此之迫切而二子尚不見之而況己往見諸侯哉必以陽貨為言者蓋謂孔子不見陽貨者乃陽貨自取之爾今己之不見諸侯者亦以諸侯不禮於我矣必以曾子所謂而言者蓋謂已如往見諸侯亦是脅肩諂笑者也必以子路所謂而言者蓋謂已如就見諸侯亦是未同而觀其色赧赧然之人也此孟子所以執此而喻其意於公孫丑也說文云畦菜畦也是知即園也注論語曰饋孔子豚正義曰案孔安國傳云陽貨欲使孔子往謝故遺孔子豚陽貨陽虎也名虎字貨為季氏家臣而専魯國之政欲見孔子將使之仕也豚豕之小者故論語於陽貨篇云陽貨欲見孔子孔子不見歸孔子豚孔子時其亡也而往拜之遇諸塗謂孔子曰來豫與爾言曰懷寶而迷邦可謂仁乎好從事而亟失時可謂知乎曰不可日月逝矣嵗不我與孔子曰諾吾將仕矣凡此是其事也注子路剛直正義曰案孔子弟子列傳云子路性鄙好勇力志伉直是為剛直也後死於衛戴盈之曰什一去關市之征今兹未能請輕之以待來年然後已何如注戴盈之宋大夫問孟子欲使君去關市征稅復古行什一之賦今年未能盡去且使輕之待來年然後復古何如孟子曰今有人日攘其鄰之雞者或告之曰是非君子之道曰請損之月攘一雞以待來年然後已如知其非義斯速已矣何待來年注攘取也取自來之物也孟子以此為喻知攘之惡當即止何可損少月取一雞待來年乃止乎謂盈之之言若此類者也音義去起吕切攘如羊切疏正義曰此章言從善改非坐而待旦知而為之罪重於故譬猶攘雞多少同盜變惡速然後可也戴盈之曰什一去關市之征今兹未能請輕之以待來年戴盈之即戴不勝字盈之也為宋國之大夫問於孟子曰欲使宋君去關市之征稅今年未能盡去且使輕取之以待來年然後盡去之如之何孟子曰今有人日攘其鄰之雞至何待來年孟子以此比喻之以答盈之之言非也言今有人日日攘取其鄰家之雞者或有人告之曰此攘雞乃小人盜賊之道非君子大公至正之道也乃曰請損之但月攘一雞以待來年然後止而勿攘今子如知宋君取關市之稅為非義若此攘雞之非道斯可速而止之耳何可待來年然後已乎此孟子所以告之是耳公都子曰外人皆稱夫子好辨敢問何也注公都子孟子弟子外人他人論議者也好辨言孟子好與楊墨之徒辨爭孟子曰豫豈好辨哉豫不得已也注曰我不得已耳欲救正道懼為邪說所亂故辨之也天下之生久矣一治一亂當堯之時水逆行汜濫於中國蛇龍居之民無所定下者為巢上者為營窟注天下之生生以來也迭有治亂非一世水生蛇龍水盛則蛇龍居民之地也民患水避之故無定居卑下者於樹上為巢猶鳥之巢也上者髙原之上也鑿岸而營度之以為窟穴而處之書曰洚水警余洚水者洪水也注尚書逸篇洪水逆行洚洞無涯故曰洚水也洪大也使禹治之禹掘地而注之海驅蛇龍而放之菹水由地中行江淮河漢是也險阻既逺鳥獸之害人者消然後人得平土而居之注堯使禹治洪水通九州故曰掘地而注之海也菹澤生草者也今青州謂澤有草為菹水流行於地而去之民人下髙就平土故逺險阻也水去故鳥獸害人者消盡也堯舜既沒聖人之道衰暴君代作壞宮室以為汙池民無所安息棄田以為園囿使民不得衣食邪說暴行又作園囿汙池沛澤多而禽獸至注暴亂也亂君更興殘壞民室屋以其處為汚池棄五穀之田以為園囿長逸遊而棄本業使民不得衣食有飢寒並至之厄其小人則放辟邪侈故作邪僞之說為姦寇之行沛草木之所生也澤水也至衆也田疇不墾故禽獸衆多謂羿桀之時也及紂之身天下又大亂周公相武王誅紂伐奄三年討其君驅飛廉於海隅而戮之滅國者五十驅虎豹犀象而逺之天下大悅注奄東方無道國武王伐紂至于孟津還歸二年復伐前後三年也飛廉紂諛臣驅之海隅而戮之猶舜放四罪也滅與紂共為亂政者五十國也奄大國故特伐之尚書多方曰王來自奄書曰丕顯哉文王謨丕承哉武王烈佑啓我後人咸以正無缺注書尚書逸篇也丕大顯明承纘烈光也言文王大顯明王道武王大纘承夫光烈佑開後人謂成康皆行正道無虧缺也此周公輔相以撥亂之功也世衰道微邪說暴行有作臣弒其君者有之子弒其父者有之孔子懼作春秋春秋天子之事也是故孔子曰知我者其惟春秋乎罪我者其惟春秋乎注世衰道微周衰之時也孔子懼正道遂滅故作春秋因魯史記設素王之法謂天子之事也知我者謂我正綱紀也罪我者謂時人見彈貶者言孔子以春秋撥亂也聖王不作諸侯放恣處士橫議楊朱墨翟之言盈天下天下之言不歸楊則歸墨楊氏為我是無君也墨氏兼愛是無父也無父無君是禽獸也注言孔子之後聖王之道不興戰國縱橫布衣處士游說以干諸侯若楊墨之徒無尊異君父之義而以橫議於世也公明儀曰庖有肥肉廄有肥馬民有飢色野有餓莩此率獸而食人也注公明儀魯賢人言人君但崇庖廚養犬馬不恤民是為率禽獸而食人也楊墨之道不息孔子之道不著是邪說誣民充塞仁義也仁義充塞則率獸食人人將相食注言仁義塞則邪說行獸食人則人相食此亂之甚也吾為此懼間先聖之道距楊墨放淫辭邪說者不得作注間習也淫放也孟子言我懼聖人之道不著為邪說所乘故習聖人之道以距之作於其心害於其事作於其事害於其政聖人復起不易吾言矣注說與上篇同昔者禹抑洪水而天下平周公兼夷狄驅猛獸而百姓寧孔子成春秋而亂臣賊子懼注抑治也周公兼懷夷狄之人驅害人之猛獸也言亂臣賊子懼春秋之貶責也詩云戎狄是膺荆舒是懲則莫我敢承注此詩已見上篇說無父無君是周公所膺也注是周公所欲伐擊也我亦欲正人心息邪說距詖行放淫辭以承三聖者豈好辨哉豫不得已也注孟子言我亦欲正人心距詖行以奉禹周公孔子也不得已而與人辨耳豈好之哉能言距楊墨者聖人之徒也注孟子自謂能距楊墨也徒黨也可以繼聖人之道謂名世者也故曰聖人之徒也音義好呼報切下注及文皆同汜孚劍切卑音埤度大各切洚張音絳又下江切丁胡貢切說文胡工切洚洞丁云案玉篇下江切從降降下江切今注宜音胡貢切從夆夆音逢浲洪水也洞徒送切又音同菹側魚切丁音嗟逺丁于願切壞音怪汙音烏邪說如字張音稅暴行張下孟切注及下詖行操行皆同沛丁蒲內切更音庚辟音僻相息亮切素王之王于況切又如字橫去聲為于僞切莩皮表切或作􅣻或作殍皆同丁音孚詖音賁疏正義曰此章言憂世撥亂勤以濟之義以匡之也公都子問孟子曰外人皆稱夫子好與楊墨之徒爭辨敢問是何如孟子曰豫豈好辨哉豫不得已也孟子答之曰我豈好與彼爭辨之哉但欲正人心不得已而用辨之也天下之生久矣一治一亂至上者為營窟孟子言天下之生民以來至于今以久矣其間一治一亂甚多當堯之時水逆勢而流行汜濫濁於中國蛇龍由是居處於其間民亦無所安其居處以至居於埤下者乃於樹上為巢如鳥之居於巢也居於髙原之上者乃鑿為穴窟而處之書曰洚水警余洚水洪水也使禹治之禹掘地而注之海至然後人得平土而居之言尚書逸篇之文云洚水警懼我此蓋舜言故稱余余我也孟子引之故自解之洚水言洚水則洪大之水也故舜使禹治其洪水禹乃掘地因其勢順而流注之海又驅遣蛇龍而放之菹菹澤生草之所也於是水從地中流行故不汜逆所謂導江導淮導河導入漢之水是禹之治也危險艱阻既以逺去而無汜濫之患鳥獸之害於人者遂消滅然後人皆得平坦之地而居之所謂水逆行汜濫於中國蛇龍居之為巢營窟之難於是免矣堯舜既沒聖人之道衰至及紂之身又至咸以正無缺者孟子言自堯舜既沒之後聖人所行之道衰微暴虐之君更興乃毁壞民之宮室以為之汚池而民皆無所安居休息又棄五穀之田以為之園囿而恣逰傲乃使民不得衣食於是民有飢寒其小人皆放辟邪侈作邪僞之說為姦寇之行又作園囿汚池於是草木沛澤茂盛而禽獸至衆及紂之世又為大亂周公乃輔相武王誅伐其紂又伐奄國終始三年討戮殘賊之君乃驅逐飛廉諛臣於海隅之地而戮殺之遂滅與紂共為亂之國者有五十國然後驅遣其虎豹犀象之野獸而逺去之天下之人已皆大悅而歸武王書所謂丕顯哉文王謨丕承哉武王烈佑啓我後人咸以正無缺是斯之謂歟蓋言大明文王創始之謀謨大纘集武王之功烈佑開後人皆以正道行之故無虧缺也後人是為成王康王在後者也世衰道微邪說暴行至其惟春秋乎孟子又言至周世之道衰於是微滅邪說暴行之人又有起作於是臣弒其君者有之子弒其父者有之惟孔子於此時乃恐懼正道遂滅而害人正心故因魯史記而作春秋之經蓋春秋者乃設素王之道皆天子之事迹也孔子云知我正王綱者其惟以春秋知我矣罪我以謂迷亂天下者其亦惟以春秋罪我矣聖王不作諸侯放恣至是禽獸也孟子又言自孔子之後聖王無有興作於其間諸侯乃放恣為亂布衣之處士乃橫議而逰說於諸侯於是楊朱墨翟偏蔽之言盈滿於天下天下之言者不歸從楊朱之為已則歸從墨翟之兼愛以其為已之言行是使天下無其君也兼愛之言行是使天下無其父也無父無君是禽獸之類也非人也公明儀曰至率獸而食人也孟子又引昔公明儀有云君之廄廚乃多有其肥肉棧廄之中多養其肥馬而下民以有飢餓之顏色郊野之間以有餓死之莩者如此是國君率獸而食人也楊墨之道不息孔子之道不著至吾為此懼又至吾言矣孟子又言楊墨自為兼愛之道不熄滅則孔子之正道不著明是邪說欺誣其民而充溢掩其仁義之道也仁義既以邪說充塞而掩之則不特率獸食人而人亦將自相食也孟子故言我為此恐懼乃欲防間衛其先聖之正道而排斥距其楊墨放逐其淫辭使邪說者不得興作於其間所謂作於其心害於其事作於其事害於其政聖人復起必從吾言矣此蓋說在上篇此更不說昔者禹抑洪水而天下平周公兼夷狄驅猛獸而百姓寧孔子作春秋而亂臣賊子懼此皆孟子言至於此又復自堯至於孔子再詳總說之也言往者自舜使禹抑治其水而天下於是乎得平安至周公相武王兼征夷狄驅逐暴獸而人民於是乎得寧靜以至孔子作成春秋而褒貶著而亂臣賊子於是乎恐懼之詩云戎狄是膺荆舒是懲則莫我敢承說在上篇詳矣孟子言知是則無父無君者是周公所欲膺擊而伐之也我今亦欲正其人心息滅其邪說距止其險陂之行放逐其淫辭以奉承禹周公孔子三聖者豈我好與楊墨之辨哉是我不得已故當與之爭辨也然而能言距止楊墨之道者是亦為聖人之徒黨也故曰我亦欲正人心息邪說距詖行放淫辭以承三聖者豈好辨哉豫不得已也能言距楊墨者聖人之徒也注堯使禹治洪水通九州至消盡也正義曰禹通九州者蓋始自堯所都冀州而起遂從東南通於兗州兗州既達又東南通於青州青州既達又從南通於徐州徐州既達又南通於揚州揚州既達又西通於荆州荆州既達又從荆而北通於豫州豫州既達又從豫而西通於梁州梁州既達又從梁而北通於雍州雍州既達於是又通乎冀州冀州乃帝都也凡此是皆禹通之耳注奄東方無道國至王來自奄正義曰案鄭𤣥云奄國在淮夷之北裴駰亦引而證史記云伐奄者孔安國云周公歸政之明年淮夷奄國又叛成王東伐淮夷遂滅奄而徙其君五月自奄還至鎬京是王自奄也云飛廉紂諛臣案史記云飛廉乃顓頊之苖裔也飛廉善走其子惡來惡來有力父子俱以材力事殷紂周武王伐紂并殺之是矣舜放四罪所謂流共工于幽州放歡兜于崇山竄三苗于三危殛鯀于羽山四罪而天下咸服凡此是也注禹稷胼胝周公仰思仲尼皇皇正義曰經云禹稷手足胼胝周公仰而思之夜以繼日揚雄云仲尼皇皇是也凡此蓋言皆能勤於為生民耳匡章曰陳仲子豈不誠廉士哉居於陵三日不食耳無聞目無見也井上有李螬食實者過半矣匍匐往將食之三咽然後耳有聞目有見注匡章齊人也陳仲子齊一介之士窮不苟求者是以絶糧而餒也螬蟲也李實有蟲食之過半言仲子目不能擇也孟子曰於齊國之士吾必以仲子為巨擘焉雖然仲子惡能廉充仲子之操則蚓而後可者也夫蚓上食槁壤下飲黃泉注巨擘大指也比於齊國之士吾必以仲子為指中大者耳非大器也蚓丘蚓之蟲也充滿其操行似蚓而可行者也蚓食土飲泉極廉矣然無心無識仲子不知仁義苟守一介亦猶蚓也仲子所居之室伯夷之所築與抑亦盜跖之所築與所食之粟伯夷之所樹與抑亦盜跖之所樹與是未可知也注孟子問匡章仲子豈能必使伯夷之徒築室樹粟乃居食之邪抑亦得盜跖之徒使作也是殆未可知也曰是何傷哉彼身織屨妻辟纑以易之也注匡章曰惡人作之何傷哉彼仲子身自織屨妻緝纑以易食宅耳緝績其麻曰辟練其麻曰纑故云辟纑曰仲子齊之世家也兄戴蓋祿萬鍾以兄之祿為不義之祿而不食也以兄之室為不義之室而不居也避兄離母處於於陵注孟子言仲子齊之世卿大夫之家兄名戴為齊卿食采於蓋祿萬鍾仲子以為事非其君行非其道以居富貴故不義之竄於於陵也他日歸則有饋其兄生鵝者已頻顣曰惡用是鶂鶂者為哉注他日異日也歸省其母見兄受人之鵝而非之已仲子也頻顣不悅曰安用是鶂鶂者為乎鶂鶂鵝鳴聲他日其母殺是鵝也與之食之其兄自外至曰是鶂鶂之肉也出而哇之以母則不食以妻則食之以兄之室則弗居以於陵則居之是尚為能充其類也乎若仲子者蚓而後充其操者也注異日母食以鵝不知是前所頻顣者也兄疾之告曰是鶂鶂之肉也仲子出門而哇吐之孟子非其不食於母而食妻所作屨纑易食也不居兄室而居於於陵人所築室也是尚能充人類乎如蚓之性然後可以充其操也是以孟子喻以丘蚓而比諸巨擘而已音義螬音曹匍音蒲匐蒲北切咽音宴擘博厄切惡音烏下惡用同辟音劈纑音盧蓋丁張並音盍鵝張云與鵝同已頻顣丁上音紀頻亦作嚬同下子六切鶂五歷切鵝也哇丁張並於佳切母食之食音嗣疏正義曰此章言聖人之道親親尚和志士之操耿介特立可以激濁不可常法者也匡章曰陳仲子豈不誠廉士哉至目有見者匡章齊國之人也仲子齊國一介之士也匡章謂孟子曰陳仲子之為人豈不誠為廉士者哉言仲子居處於於陵之地三日無食故不求食以至飢餓使耳聾而無聞目盲而無見井里之上有李果為螬蟲所食者其實已過半矣但匍匐往而取食之食至三吞然後耳方有所聞而不聾目方有所見而不盲言仲子之至如此之甚尚不肯苟求於人是所謂豈不誠廉潔之士哉孟子曰於齊國之士至下飲黃泉孟子答之以謂於齊國之衆士中吾必以陳仲子但如指中之大者耳雖然大指又安能為廉潔之士哉如充滿其仲子之操守則必似丘蚓而後可行也故蚓但上食其槁壤之土下飲其黃泉之水是謂極廉矣今仲子所居處之屋且以為伯夷之所築而居之歟抑亦即盜跖為利者之所築而居歟仲子所食之粟米且以伯夷之所種而食歟抑亦即為盜跖者之所種而食歟故孟子以此問之匡章乃曰仲子所居之室伯夷之所築歟抑亦盜跖之所築歟所食之粟伯夷之所樹歟抑亦盜跖之所樹歟然孟子必以伯夷言之又必以盜跖言之者蓋謂伯夷之清最為潔者盜跖最為貪利者而仲子必不能使伯夷之徒築室樹粟乃居食之也但亦盜跖所築樹而居食之也豈足謂之廉士哉故曰是未可知也以其但亦盜跖所築樹也殆未可得而知也曰是何傷哉彼身織屨妻辟纑以易之也匡章又言於孟子曰此何傷於仲子為亷哉言雖盜跖之徒而築樹之而仲子所居食之亦不足傷害仲子為亷潔之士矣以其彼仲子親織其草屨妻緝績其麻以更易室與粟而居食之也曰仲子齊之世家也兄戴蓋祿萬鍾以兄之祿為不義之祿至蚓而後可充其操者也孟子又言仲子者乃齊國世卿大夫之家也其仲子之兄名戴者食采於蓋之邑祿受萬鍾之秩仲子乃以兄之祿為不義之祿而不食以兄所居之室為不義之室而不居遂逃避其兄離去其母而自處於於陵於陵齊之别邑也異曰歸省其母見有饋遺其兄之生鵝者乃頻顣不悅而言曰安用是鶂鶂者為饋哉又至異曰其仲子之母乃殺此鵝與仲子而食之其仲子之兄自外而歸至見仲子食此鵝肉乃疾告之曰此是前日所饋我鶂鶂者之肉也仲子覺為鵝肉出門外哇而吐之以其母所殺之食而且不食乃食於妻子所辟纑而易所食而食之以兄所居之屋而且不居乃以於陵之人所居之屋而居之如此尚何能充為人之類乎若仲子者但如蚓之性然後可充其所操也孟子意謂仲子之亷以此是不足為亷者矣人安可得而法之邪匡章子所以言仲子為亷士者以其欲則法之宜孟子以是言而比喻巨擘丘蚓之類而排拒之也巨擘大指也注緝績其麻曰辟練麻曰纑正義曰釋名云辟分辟也纑布縷也是知為緝績練麻也注食采於蓋正義曰蓋齊之下邑也公孫丑之篇亦有說焉孟子注疏卷六下孟子注疏卷六下考證不見諸侯章疏亦復視其亡而往謝之也監本脫視字今從閣本增正外人皆稱夫子好辨章天下之生久矣節注卑下者於樹上為巢卑一本作埤書曰洚水警余節注尚書無逸篇今見大禹謨篇吾為此懼間先聖之道節注間習也朱子作間邪之間不作習解匡章曰陳仲子章已頻顣注已仲子也臣宗楷按四書辨疑云已當作已與以同音謂初見所饋生鵝固已頻顣而惡之矣接下他日意有倫次已字文亦自然孟子注疏卷六下考證
