body:
  text: 欽定四庫全書孟子注疏卷五上漢趙氏注宋孫奭音義并疏滕文公章句上注滕文公者滕國名文諡也公者國人尊君之稱也文公於當時尊敬孟子問以古道猶衛靈公問陳於孔子論語因以題篇疏正義曰前篇章首論公孫丑有政事之才問管晏之功故曰公孫丑為篇題蓋謂行政莫大乎反古之道是以此篇滕文公尊敬孟子問以古道如論語衛靈公問陳於孔子遂以目為篇題不亦宣乎故次公孫丑之篇所以揭滕文公為此篇之題也此篇凡十五章趙注分之遂成上下卷據此上卷凡五章而已一章言人當上則聖人秉仁行義二章言事莫當於奉禮孝莫大於哀慟三章言尊賢師智采人之善修學校勸禮義勑民事正經界均井田賦什一四章言神農務本教於世民許行蔽道君臣同耕陳相背師降於幽谷孟子博陳堯舜上下之叙以正之五章言聖人緣情制禮以直正枉其餘十章趙注分為下卷各有叙焉注滕文公至題篇正義曰案春秋魯隱公十一年滕侯薛侯來朝爭長滕侯曰我周之卜正也乃長滕侯隱公七年杜預注云滕國在沛國公丘縣東南是滕文公之國即滕侯之後也諡法曰慈惠愛民曰文忠信接禮曰文論語第十五篇衛靈公問陳於孔子孔子對俎豆之事則嘗聞之軍旅之事未之學也遂以為之篇題故也滕文公為世子將之楚過宋而見孟子孟子道性善言必稱堯舜注文公為世子使於楚而過宋孟子時在宋與相見也滕侯周文王之後也古紀世本録諸侵之世滕國有考公麇與文公之父定公相直其子元公𢎞與文公相直以後世避諱改考公為定公以元公行文德故謂之文公也孟子與世子言人生皆有善性但當充而用之耳又言堯舜之治天下不失仁義之道故勉世子世子自楚反復見孟子注從楚還復詣孟子欲重受法則也孟子曰世子疑吾言乎夫道一而已矣注世子疑吾言有不盡乎天下之道一而已矣惟有行善耳復何疑邪成覸謂齊景公曰彼丈夫也我丈夫也吾何畏彼哉注成覸勇果者也與景公言曰尊貴者與我同丈夫我亦能為之我何為畏之哉顔淵曰舜何人也豫何人也有為者亦若是注言欲有為當若顔淵庶幾成覸不畏乃能有所成耳又以是勉世子也公明儀曰文王我師也周公豈欺我哉注公明儀賢者也師文王信周公言其知所法則也今滕絶長補短將五十里也猶可以為善國注滕雖小其境界長短相補可得大五十里子男之國也尚可以行善者也書曰若藥不瞑眩厥疾不瘳注書逸篇也瞑眩藥攻人疾先使瞑眩憒亂乃得瘳愈喻行仁當精熟德惠乃洽也音義使所吏切麇居筠切從禾直音值復扶又切重直用切下同覸古筧切一音間瞑眩莫甸切下音縣又作眠眴音同瞑眩憒亂瞑或作傎即音顚憒古對切又音潰疏正義曰此章言人主當則聖人秉仁行義者也滕文公為世子將之楚過宋而見孟子孟子道性善言必稱堯舜者世子諸侯適子之稱也言滕文公為世子之時往楚國而在宋國過見孟子孟子乃與世子文公道其人性皆有善但當行之而已凡有言則必以堯舜為言蓋堯舜古之受禪之帝其治國所行之事皆為後世所法故言必堯舜之事言於世子文公以其欲勉世子文公也文公者後諡世子為文公也世子自楚反復見孟子者是世子文公自宋而見孟子之後往至楚國又自楚國反歸復見孟子於宋國也孟子曰世子疑吾言乎夫道一而已矣者孟子見世子復見再有所問乃曰世子是疑我言有不盡故復見乎言道之在天下一而已惟當善行焉何必復疑而再欲問邪成覸謂齊景公曰彼丈夫也我丈夫也吾何畏彼哉者孟子又引往日成覸嘗謂齊景公曰彼之尊貴者即丈夫也我亦丈夫也言即一耳我何為畏之哉是言我能為之亦如彼之尊貴矣又何畏顔淵有曰舜何人也我何人也亦言其人即一耳但有能為之者亦若此舜矣故曰舜何人也豫何人也有為者亦若是公明儀曰文王我師也周公豈欺我哉者孟子又以公明儀有曰文王者我師法者也周公豈欺誣我哉言周公我亦信而師法之耳今滕絶長補短將五十里也猶可以為善國者孟子謂世子言今之滕國之地絶長補短其廣大亦將有五十里也尚可以為行善之國也五十里者子男之國也故曰猶可以為善國書曰若藥弗瞑眩厥疾不瘳者此蓋今之尚書說命之篇文也孟子引書云若藥之攻人人服之不以瞑眩憒亂則其疾以不愈也所以引此者蓋孟子恐云今滕國絶長補短將有五十里猶可為善國有致世子之所嫌乃引此而喻之抑亦所謂良藥苦口忠言逆耳之意而解世子又有以勸勉焉注文公為世子至勉世子也正義曰此蓋古紀世本之文也云滕有考公麇與文公之父定公相直其子元公洪與文公相直後世因避諱之故更考公為定公元公為文公以其能安民大慮故以定為諡以其能慈惠愛民故以文為諡魯有文公定公之號周有文王定王之名其諡雖與滕君同然稱其實蓋不無異焉凡稱公者蓋古者天子有三公稱公王者之後稱公其餘大國稱侯伯小國稱子男之君亦得稱公者非僭之也以其國人尊之故稱公而已注云成覸勇果者也公明儀賢者也正義曰以意推之則成覸之勇果公明儀之賢者可知矣人亦未詳禮於檀弓有公明儀而注亦無所說亦以孟子之時事罕有所載學者亦不必規規務求極焉注若藥不瞑眩厥疾不瘳正義曰商書說命篇孔氏傳云開汝心沃我心如服藥必瞑眩極其病乃除欲其出切言以自警滕定公薨世子謂然友曰昔者孟子嘗與我言於宋於心終不忘今也不幸至於大故吾欲使子問於孟子然後行事注定公文公父也然友世子之傅也大故謂大喪也然友之鄒問於孟子注孟子歸在鄒也孟子曰不亦善乎親喪固所自盡也注不亦者亦也問此亦其善也曾子曰生事之以禮死葬之以禮祭之以禮可謂孝矣注曾子傳孔子之言孟子欲令世子如曾子之從禮也時諸侯皆不行禮故使獨行之也諸侯之禮吾未之學也雖然吾嘗聞之矣三年之喪齊疏之服飦粥之食自天子達於庶人三代共之注孟子言我雖不學諸侯之禮嘗聞師言三代以前君臣皆行三年之喪齊疏齊縗也飦􅪪粥也然友反命定為三年之喪父兄百官皆不欲曰吾宗國魯先君莫之行吾先君亦莫之行也至於子之身而反之不可注父兄百官滕文同姓異姓諸臣也皆不欲使世子行三年滕魯同姓俱出文王魯周公之後滕叔繡之後敬聖人故宗魯者也且志曰喪祭從先祖曰吾有所受之也注父兄百官且復言也志記也周禮小史掌邦國之志曰喪祭之事各從其先祖之法言我轉有所受之不可於已身獨改更也一說吾有所受之世子言我受之於孟子也故曰吾有所受也謂然友曰吾他日未嘗學問好馳馬試劒今也父兄百官不我足也恐其不能盡於大事子為我問孟子注父兄百官見我他日所行謂我志行不足似恐我不能盡大事之禮故止我也為我問孟子當何以服其心使其信我也然友復之鄒問孟子孟子曰然不可以他求者也孔子曰君薨聽於冢宰啜粥面深墨即位而哭百官有司莫敢不哀先之也注孟子言如是不可用他事求也喪尚哀惟當以哀戚感之耳國君薨委政冢宰大臣嗣君但盡哀情啜粥不食顔色深墨深甚也墨黑也即喪位而哭百官有司莫敢不哀者以君先哀之也上有好者下必有甚焉者矣君子之德風也小人之德草也草上之風必偃是在世子注上之所欲下以為俗尚加也偃伏也以風加草莫不偃伏也是在世子以身帥之也然友反命世子曰然是誠在我注世子聞之知其在身欲行之也五月居廬未有命戒百官族人可謂曰知注諸侯五月而葬未葬居倚廬於中門之內也未有命戒居喪不言也異姓同姓之臣可謂曰知世子之能行禮也及至葬四方來觀之顔色之戚哭泣之哀弔者大悅注四方諸侯之賔來弔會者見世子之憔悴哀戚大悅其孝行之高美也已音義齊音資疏所居切飦諸延切縗或作衰同音崔􅪪亦作音義與糜同更古衡切好呼報切下好者好聚好施皆同為于僞切下既為復為為天下親為非為皆同啜川說切帥音率疏正義曰此章言事莫當於奉禮孝莫大於哀慟從善如流文公之謂也滕定公薨者滕文公之父死也世子謂然友曰昔者孟子嘗與我言於宋於心終不忘今也不幸至於大故吾欲使子問於孟子然後行事者然友世子之傅也世子謂然友言往日孟子曾與我言於宋國之事於我心至今常存終為不忘之也今也不幸至於父母之大故我欲使子問於孟子然後行其父喪之事然友之鄒問於孟子者孟子將以自宋歸鄒也然友乃往鄒國問孟子以世子所問之事孟子曰不亦善乎親喪固所自盡也者孟子答然友謂不亦善然友以世子所問也曾子曰生事之以禮死葬之以禮祭之以禮可謂孝矣至三代共之者孟子以此答然友之問言曾子謂父母在生之時當以禮奉事之如冬溫夏凊昏定晨省是其禮也父母死之時當以禮安葬之如躃踊哭泣哀以送之卜其宅兆而安厝之是其禮也及祭之禮如春秋祭祀以時思之陳其簠簋而哀戚之是也能如此則可謂之能孝者矣如問其諸侯所行之禮則我未之學也雖然為未嘗學諸侯之禮我嘗聞知之矣言嘗聞三年父母之喪以齊疏齊衰之服以􅪪粥之食凡此三年之喪自上至於天子下而逹於庶人三代夏商周共行之矣然友反命者然友自鄒得孟子之言乃反歸命告於滕公也定為三年之喪父兄百官皆不欲也故曰吾宗國魯先君莫之行也至於子之身而反之不可者是世子因然友問孟子歸後乃定為三年之喪事其滕之同姓與異姓諸臣皆不欲為三年之喪遂曰我宗國魯先君莫之嘗行此三年喪禮我之先君亦莫之嘗行也今至於子之身而反違之以為三年之喪不可言其不可反背先君而以自為三年喪之禮也且志曰喪祭從先祖曰吾有所受之也父兄百官言之後復引記有曰喪祭之事各從其先祖之法我但有所承受之也不可於己身獨改更為三年喪耳滕與魯同姓俱出魯周公之後故云吾宗國魯先君志記也謂然友曰吾他日未嘗學問好馳馬試劒今也父兄百官不我足也恐其不能盡於大事子為我問孟子者滕文公既定為三年之喪禮而父兄百官見之皆不欲為乃復謂然友曰我所往他日未嘗學問禮但好驅馳走馬試劒事今也定為三年之喪父兄百官見之皆謂我志不足以行此三年之喪恐其不能盡於大事之禮子復為我之鄒問孟子以為如何當使父兄百官服其心而信我也然友復之鄒問孟子者是然友自文公所乃因其命復往鄒國見孟子而問焉孟子曰不可以他求也孔子曰君薨聽於冢宰啜粥面深墨即位而哭百官有司莫敢不哀先之也至是在世子者孟子答然友為世子之問言如此則不可更以他事求也惟當以哀戚感之耳故引孔子曰國君之薨其政事皆委冢宰大臣聽行之嗣君者但啜􅪪粥而不食面之顔色亦變為甚黑之色即喪位而哀哭之故百官有司莫敢不哀先之也是所謂上有所好者下必有甚焉者耳且君子之德如風也小人之德如草也草加之以風必偃伏而從風所趨耳是在世子但以身率之爾凡此皆孟子答然友為世子之問而以此復教之矣然友反命世子曰是誠在我者然友自問孟子之後乃以孟子之言反歸告於世子世子於是五月居於喪廬不敢入處故未有命以令人未有戒以號人以其在外思之而不言也百官族人皆以為知禮能行三年之喪乃曰可謂曰知以其百官族人指文公而言也及至葬四方來觀之顔色之戚哭泣之哀弔者大悅者言及至葬日四方諸侯來弔慰而觀之顔色之戚而形於容哭泣之哀而形於聲於是弔之者皆大悅以喜其有孝行也注定公文公父也正義曰說在前假已詳矣注曾子傳孔子之言正義曰案論語孟孫問孝於孔子孔子對曰生事之以禮死葬之以禮祭之以禮是曾子傳孔子之言而云孟子所以引為曾子言矣注滕魯國同姓俱出魯周公之後正義曰案魯隱公十一年滕侯與薛侯爭長薛侯曰我先封滕侯曰我周之卜正也薛庶姓也我不可以後之公使羽父請於薛侯曰君與滕侯辱在寡人周諺有之曰山有木工則度之賓有禮主則擇之周之宗盟異姓為後寡人若朝於薛不敢與諸任齒君若辱貺寡人則願以滕君為請薛侯許之乃長滕侯杜預云薛任姓以此推之則知滕為魯之後與魯同姓也注周禮小史掌邦國之志至孟子也正義曰鄭司農云志謂記也春秋傳所謂周志國語所謂鄭書之屬也兩說者其意皆行謂之父兄百官言亦行謂之世子亦行但不逆意則可矣注諸侯五月而葬未葬居倚廬於中門之內也正義曰案左傳隱公元年云天子七月而葬同軌畢至諸侯五月而葬同盟至大夫三月同位至士踰月外姻至又大喪記云父母之喪居倚廬是也滕文公問為國孟子曰民事不可緩也注問治國之道也民事不可緩之使怠惰當以政督趣教以生産之務也詩曰晝爾于茅宵爾索綯亟其乘屋其始播百榖注詩邠風七月之篇言教民晝取茅草夜索以為綯綯絞也及爾閒暇亟而乘蓋爾野外之屋春事起爾將始播百榖矣言農民之事無休已民之為道也有恆産者有恆心無恆産者無恆心苟無恆心放僻邪侈無不為己及陷乎罪然後從而刑之是罔民也焉有仁人在位罔民而可為也注義與上篇同孟子既為齊宣王言之滕文公問復為究陳其義故各自載之也是故賢君必恭儉禮下取於民有制注古之賢君身行恭儉禮下大臣賦取於民不過什一之制也陽虎曰為富不仁矣為仁不富矣注陽虎魯季氏家臣也富者好聚仁者好施施不得聚道相反也陽虎非賢者也言有可采不以人廢言也夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一也徹者徹也助者藉也注夏禹之世號夏后氏后君也禹受禪於君故夏稱后殷周順人心而征伐故言人也民耕五十畝貢上五畝耕七十畝者以七畝助公家耕百畝者徹取十畝以為賦雖異名而多少同故曰皆什一也徹猶取人徹取物也藉者借也猶人相借力助之也龍子曰治地莫善於助莫不善於貢貢者校數歲之中以為常注龍子古賢人也言治土地之賦無善於助者也貢者校數歲以為常類而上之民供奉之有易有不易故謂之莫不善於貢也樂歲粒米狼戾多取之而不為虐則寡取之凶年糞其田而不足則必取盈焉注樂歲豐年狼戾猶狼藉也粒米粟米之粒也饒多狼藉棄捐於地是時多取於民不為暴虐也而反以常數少取之至於凶年饑歲民人糞其田尚無所得不足以食而公家取其稅必滿其常數焉不若從歲饑穰以為多少與民同之也為民父母使民盻盻然將終歲勤動不得以養其父母又稱貸而益之使老稚轉乎溝壑惡在其為民父母也注盻盻勤苦不休息之貌動作稱舉也言民勤身動作終歲不得以養食其父母公賦當畢有不足者又當舉貸子倍而益滿之至使老少轉尸溝壑安可以為民之父母也夫世祿滕固行之矣注古者諸侯卿大夫士有功德則世祿賜族者也官有世功也其子雖未任居官得世食其父祿賢者子孫必有土之義也滕固知行是矣言亦當恤民之子弟閔其勤勞者也詩云雨我公田遂及我私惟助為有公田由此觀之雖周亦助也注詩小雅大田之篇言太平時民悅其上願欲天之先雨公田遂以次及我私田也惟殷人助者為有公田耳此周詩也而云雨公田知雖周家之時亦有助之之制也設為庠序學校以教之注以學習禮教化於國庠者養也校者教也序者射也夏曰校殷曰序周曰庠學則三代共之皆所以明人倫也注養者養耆老教者教以禮義射者三耦四矢以逹物導氣也學則三代同名皆謂之學學乎人倫人倫者人事也猶洪範曰彝倫攸序謂其常事有序者也人倫明於上小民親於下有王者起必來取法是為王者師也注有行三王之道而興起者當取法於有道之國也詩云周雖舊邦其命維新文王之謂也子力行之亦以新子之國注詩大雅文王之篇言周雖后稷以來舊為諸侯其受王命惟文王新復修治禮義以致之耳以是勸勉文公欲使庶幾新其國也使畢戰問井地注畢戰滕臣也問古井田之法時諸侯各去典籍人自為政故井田之道不明也孟子曰子之君將行仁政選擇而使子子必勉之夫仁政必自經界始經界不正井地不均穀祿不平注子畢戰也經亦界也必先正其經界勿侵鄰國乃可均井田平榖祿榖所以為祿也周禮小司徒云乃任土地而井其田野言正其土地之界乃定受其井牧之處也是故暴君汙吏必慢其經界經界既正分田制祿可坐而定也注暴君殘虐之君汙吏貪吏也慢經界不正也必相侵陵長爭訟也分田賦廬井也制祿以庶人在官者比上農夫轉以為差故可坐而定也夫滕壤地褊小將為君子焉將為野人焉無君子莫治野人無野人莫養君子注褊小謂五十里也為有也雖小國亦有君子亦有野人言足以為善政也請野九一而助國中什一使自賦注九一者井田以九頃為數而供什一郊野之賦也助者殷家稅名也周亦用之龍子所謂莫善於助也時諸侯不行助法國中什一者周禮園㕓二十而稅一時行重法賦責之什一也而如也自從也孟子欲請使野人如助法什一而稅之國中從其本賦二十而稅一以寬之也卿以下必有圭田圭田五十畝餘夫二十五畝注古者卿以下至於士皆受圭田五十畝所以供祭祀也圭潔也上田故謂之圭田所謂惟士無田則亦不祭言絀士無潔田也井田之民養公田者受百畝圭田半之故五十畝餘夫者一家一人受田其餘老少尚有餘力者受二十五畝半於圭田謂之餘夫也受田者田萊多少有上中下周禮曰餘夫亦如之亦如上中下之等也王制曰夫圭田無征謂餘夫圭田皆不出征賦也時無圭田餘夫孟子欲令復古所以重祭祀利民之道也死徙無出鄉注死謂葬死也徙謂受土易居平肥磽也不出其鄉易為功也鄉田同井出入相友守望相助疾病相扶持則百姓親睦注同鄉之田共井之家各相營勞也出入相友相友耦也周禮大宰曰八曰友以任得民守望相助助察姦惡也疾病相扶持扶持其羸弱救其困急皆所以教民相親睦之道和睦也方里而井井九百畝其中為公田八家皆私百畝同養公田公事畢然後敢治私事所以别野人也注方一里者九百畝之地也地為一井八家各私得百畝同共養其公田之苖稼公田八十畝其餘二十畝以為廬井宅園圃家二畝半也先公後私遂及我私之義也則是野人之事所以别於士伍者也此其大略也若夫潤澤之則在君與子矣注略要也其井田之大要如是也而加慈惠潤澤之則在滕君與子共戮力撫循之也音義督丁音促茅張云或作苖誤也索綯桑洛切下音桃亟丁云音棘乘登也閒音間辟音僻後放辟同侈張云諸本作移誤也罔張云或作司誤也徹直列切禪音擅數色主切有易之易丁以豉切下及後章不易同樂音洛捐與専切肹說文五禮切恨視也亦四莧切丁作肸許乙切養餘亮切下莫養奉養皆同稱貸並如字惡在音烏安也後章惡得惡能皆同養食之食音嗣任音壬雨于付切校音效下同射神夜切去起呂切汙烏路切又音烏長爭之長張丈切絀音黜萊音來草田曰萊夫圭田丁云夫如字謂餘夫也鄭康成注禮記訓夫為治也磽苦交切别彼列切下有别同疏正義曰此章言尊賢師知采人之善修學校勸禮義勑民事正經界均井田賦什一則為國之大本也滕文公問為國者滕文公問孟子治國之道也孟子曰民事不可緩也者孟子答文公言治國之道惟民事當急而不可緩也詩云晝爾于茅宵爾索綯亟其乘屋其始播百榖者此蓋詩之邠風七月之篇文也言民事於日中則取茅夜中以索綯綯絞索也晝日中也宵夜中也及爾閒暇之時則亟疾乘蓋其野外之屋春事始興以為播百穀為也以其民事當無休已孟子所以引此而教之文公也亦欲文公教民如此者焉民之為道也有恆産者有恆心無恆産者無恆心苟無恆心放僻邪侈無不為己及陷乎罪然後從而刑之是罔民也焉有仁人在位罔民而可為也者此義同前篇此所以復言之者以其前篇孟子為齊宣陳之也此篇蓋因文公為治國之道故孟子復此為答遂兩載焉此更不說是故賢君必恭儉禮下取民有制者言古之賢君必身行恭儉恭則不侮人儉則不奪人非特不侮人不奪人且又禮下接於賢人其取民之賦又有什一之制什一蓋十分則取一而已陽虎曰為富不仁矣為仁不富矣者陽虎魯季氏之家臣也孟子言陽虎有云凡為富者則常聚民之財賄為己所有故不仁凡為仁者以其常務博施濟衆故不能富矣孟子今引之而教文公者蓋欲使得其中矣夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一也徹者徹也助者藉也者言夏后氏之時民耕五十畝田其於貢上之賦但五畝而已是夏后氏五十而貢也殷人之時民耕七十畝田其助公家則七畝而已是殷人七十而助也周人之時民耕百畝其徹取之賦則十而已是周人百畝而徹也總而論之其實皆什一之賦也徹者徹也助者藉也此孟子自解之義也徹猶徹取助但借民力而耕之矣故藉借也夏后氏與殷人周人之稱不同者蓋禹之受禪以繼舜有天下故夏稱后后君也殷周以征伐順人心而有天下故云人也龍子曰治地莫善於助莫不善於貢貢者校數歲之中以為常者龍子蓋古之賢人也孟子言龍子有云治土地之賦莫善於助者也莫不善於貢也以其助則借民力而耕之其所出在嵗之所熟如何耳貢者以其檢校數歲之中以為有常之例也其歲之所熟則貢之數亦然歲之荒則貢之數亦然蓋以歲荒則有損於民也故曰莫善於助莫不善於貢樂歲粒米狼戾多取之而不為虐則寡取之凶年糞其田而不足則必取盈焉者此亦孟子自解其上文之旨也言豐樂之歲其粒米狼藉饒多雖多取之而不為暴虐則以寡取之凶荒之年糞其田尚不足則以取滿其常數焉是則校數歲之中以為常之意也為民父母使民盻盻然將終歲勤動不得以養其父母又稱貸而益之使老稚轉乎溝壑惡在其為民父母也孟子言人君為下民之父母使民盻盻相顧將至終歲勤苦勞動不得以贍養其父母人君在上又更稱貸而益之以滿其常數之貢致使老少羸弱飢餓而轉尸於溝壑之中如此安更可在上為下民父母也言其不足以為民父母矣以其為民父母當子養其民不當如此故也夫世祿滕固行之矣孟子言今夫滕國於世祿固已知行之矣但亦當憐憫民之老少與其勤勞者也世祿者以其有功德之臣則世祿之賜其土地也謂其子雖未任居官得食其父之祿亦必有土地祿之也詩云雨我公田遂及我私惟助為有公田由此觀之雖周亦助也者此詩蓋小雅大田之篇文也惟助至助也孟子又自言之因詩而解周之亦助也其詩蓋謂民樂其上願欲天之先雨及公田次及我等私田也孟子緣此而觀之遂知雖周百畝而徹取之賦其亦有助之制焉以其惟行助則為有公田如貢徹則非有公田矣孟子於此所以復辨其周之亦有助法而取民之賦蓋謂其莫善於助之義也設為庠序學校以教之者此孟子亦欲文公富而教之之意也言又不特止於制民之賦而已既制其祿又當開設為之庠序學校以教之矣故曰庠者養也校者教也序者射也至是為王者師也者此孟子欲詳說其庠序學校之意也言庠者所以養耆老於此者也校者所以教禮義於此者也序者所以講射於此而行尊卑揖遜之禮者也夏之時謂之校殷之時謂之序周之時謂之庠然而為學則三代皆共之皆所以於此而明人倫之序大倫既備明於上小民既親之於其下如有王者興起而用之必來取法於此是為王者之師也孟子所以區區為滕文公言及此又欲文公由此化民成俗故也詩云周雖舊邦其命維新文王之謂也子力行之亦以新子之國者詩云蓋詩大雅文王之篇文也其詩周雖自后稷以來但為之舊邦其受王命復修治而維新之是文王之謂也孟子言文公但能力行如此而修治亦以新子之國矣以其欲以此勉文公使庶幾新其國也使畢戰問井地畢戰滕文公之臣也滕文公自問為國之道孟子告之民事貢賦勑禮義之意其後又使其臣畢戰問孟子以井地之制也孟子曰子之君將行仁政選擇而使子子必勉之夫仁政必自經界始經界不正井地不均榖祿不平者自此至在君與子矣皆孟子答畢戰問井地之制也孟子言子之君將欲行其仁政選擇而使子來問以井地之制子必當勉力與民同行之耳夫仁政必自經界為始如經界不能正之則井地由此不均齊井地不均則穀祿亦不平矣穀所以為祿故云榖祿是故暴君汙吏必慢其經界至定也者孟子言此故暴虐之君汙濫之吏必慢其經界所以告之以此者孟子欲滕君不為暴君畢戰不為汙吏也故如是云然經界既以正則田由此而分平祿由是而得制是其分田制祿可坐而定之也以言其易定也夫滕壤地褊小將為君子焉將為野人焉無君子莫治野人無野人莫養君子孟子言今夫滕國土壤之地褊小即止於五十里然將為之君子人焉為之野人焉以其無君子則莫能治其野人無野人則莫能養其君子孟子所以言此者蓋以滕國亦有君子亦有野人足以為善政也請野九一而助國中什一使自賦至若夫潤澤之則在君與子矣者此皆孟子欲滕國為善政故以是請教之也今言請於郊野行井田之制以九一而助佐公田為之賦國中㕓園以什一之法使貢自賦之以其十中取一也古者自卿以下皆有其圭田謂之圭田者所以名其潔而供祭祀之田也言自卿以下皆受此圭田五十畝餘夫二十五畝以其一家一人受田其餘老少尚有餘力者亦受此圭田二十五畝而已死徙無出鄉以其死葬易居無出其本鄉耳鄉田同井出入相友守望相助疾病相扶持則百姓親睦以其為同鄉之田共井之家者凡有出入皆相交友為伴所以同其心也相助以守而此不可以威武奪相助以望而彼不得以投隙來疾病則相扶持其羸弱而救其困急則百姓於是相親和睦矣方里而井以其方一里之地為之井田九百畝以其一井之田有九百畝其中為公田以其九百畝於井中抽百畝為公田之苖稼八家皆私百畝以八口之家皆受八百畝以為己之私田苖稼同養公田公事畢然後敢治私事以其八口之家同共耕養其公田及至公田之事了畢然後耕治己之私田以為之私事所以别野人也此所以為野人之事以别於士伍者也此其大略也若夫潤澤之則在君與子矣孟子言此則井田之大要如是也若夫加之以慈惠潤澤之則有在於滕君與子矣子者稱畢戰為子也注詩邠風七月之篇至無休已正義曰毛氏云宵夜也綯絞也乘升也箋云爾汝也汝當晝日往取茅歸夜作絞索以待時用亟急也乘治也十月定星將中急當治野廬之屋其始播百榖謂期來年百榖于公社也此詩蓋陳王業之艱難注陽虎魯季氏家臣非賢者也正義曰案論語云陽貨欲見孔子孔子不見孔傳云陽貨陽虎也季氏之家臣而專魯國之政是則姓陽名虎字貨也孔子不見所以知其非賢故也注詩小雅大田之篇至亦助也正義曰此蓋幽王之詩也箋云其民之心先公後私令天注雨於公田因及私田爾言民怙君德蒙其餘惠注洪範彜倫攸叙正義曰孔安國云彞倫常道也言常道所以大叙也洪大也範道也此箕子陳之於武王者也注詩大雅文王之篇正義曰此詩蓋言文王受命作周箋云大王聿來胥宇而國於周王迹起矣而未有天命至文王而受命言新者美之也注周禮小司徒曰乃經土地而井牧其田野正義曰鄭注云小司徒為經之立其五溝五塗之界其制似井之字因取名焉鄭司農云井牧者春秋傳所謂井衍沃牧隰臯者也鄭𤣥云隰臯之地九夫為牧二牧而當一井今造都鄙授民田有不易者有一易者有再易者通率二而當一是之謂井牧昔少康在虞思有田一成有衆一旅一旅之衆而田一成則井牧之法先古然矣九夫為井者方一里九夫所治之田也此制小司徒經之匠人為之溝洫相包乃成耳注周禮園廛二十而稅一正義曰鄭司農云園廛亦輕之者廛無穀園少利也注周禮云餘夫亦如之王制曰夫圭田無征正義曰鄭司農云戶計一夫一婦而賦之田其一户有數口者餘夫亦受此田也夫圭田無征者鄭氏云夫猶治也征稅也治圭田者不稅所以厚賢也此則周禮之士田以在近郊之地者也注周禮大宰曰八曰友以任得民正義曰案大宰之職以九兩繫邦國之民一曰牧以地得民二曰長以貴得民三曰師以賢得民四曰儒以道得民五曰宗以族得民六曰主以利得民七曰吏以治得民八曰友以任得民九曰藪以富得民注云兩猶耦也所以協耦萬民繫聯綴也牧州長也長諸侯也師諸侯師氏有德行教民者也儒諸侯保氏有六藝以教民者也宗繼别為大宗收族者也鄭司農云主謂公卿大夫世世食采不絶者也吏小吏在鄉邑者友謂同井相合耦鋤作者藪亦有虞掌其政令為之厲禁者使其地之民守其財物者此大宰之職有是以掌之也音義戮音六師知音智孟子注疏卷五上孟子注疏卷五上考證滕文公章句上疏忠信接禮曰文史記世家云愍民惠禮曰文無忠信接禮句疑誤滕文公問為國章子之君將行仁政節注勿侵鄰國侵監本訛慢今從閣本改正必有圭田注圭潔也上田故謂之圭田所以奉祭祀也所謂惟士無田則亦不祭言絀士無潔田也臣宗楷按鄭樵曰圭田商制也周則士田矣考周官制度云圭田自卿至士皆五十畝第王制言有田則祭無田則薦既皆有田何以又云無田則薦以此知賜圭田亦有功德則賜圭田耳趙惠云德行潔白始與之田孟子注疏卷五上考證欽定四庫全書孟子注疏卷五下漢趙氏注宋孫奭音義并疏滕文公章句上有為神農之言者許行自楚之滕踵門而告文公曰遠方之人聞君行仁政願受一廛而為氓注神農三皇之君炎帝神農氏許姓行名也治為神農之道者踵至也廛居也自稱逺方之人願為氓氓野人也文公與之處其徒數十人皆衣褐捆屨織席以為食注文公與之居處舍之宅也其徒學其業者也衣褐貧也捆猶叩㧻也織屨欲使堅故叩之也賣屨席以供飲食也陳良之徒陳相與其弟辛負耒耜而自宋之滕曰聞君行聖人之政是亦聖人也願為聖人氓注陳良儒者也陳相良之門徒也辛相弟聖人之政謂仁政也陳相見許行而大悅盡棄其學而學焉注棄陳良之儒道更學許行神農之道也陳相見孟子道許行之言曰滕君則誠賢君也雖然未聞道也注陳相言許行以為滕君未逹至道也賢者與民並耕而食饔飱而治今也滕有倉廩府庫則是厲民而以自養也惡得賢注相言許子以為古賢君當與民並耕而各自食其力饔飱熟食也朝曰饔夕曰飱當身自具其食兼治民事耳今滕賦稅有倉廩府庫之富是為厲病其民以自奉養安得為賢君乎三皇之時質朴無事故道若此者也孟子曰許子必種粟而後食乎注問許子必自身種粟乃食之邪曰然注相曰然許子自種之許子必織布而後衣乎注孟子曰許子自織布然後衣之乎曰否許子衣褐注相曰不自織布許子衣褐以毳織之若今馬衣也或曰褐枲衣也一曰粗布衣也許子冠乎注孟子問相冠乎曰冠注相曰冠也曰奚冠注孟子問許子何冠也曰冠素注相曰許子冠素曰自織之與曰否以粟易之注相言許子以粟易素曰許子奚為不自織注孟子曰許子何為不自織素乎曰害於耕注相曰織紡害於耕故不自織也曰許子以釜甑爨以鐵耕乎注爨炊也孟子曰許子寧以釜甑炊食以鐵為犂用之耕否邪曰然注相曰用之自為之與注孟子曰許子自冶鐵陶瓦器邪曰否以粟易之注相曰不自作鐵瓦以粟易之也以粟易械器者不為厲陶冶陶冶亦以其械器易粟者豈為厲農夫哉且許子何不為陶冶舍皆取諸其宫中而用之何為紛紛然與百工交易何許子之不憚煩注械器之總名也厲病也以粟易器不病陶冶陶冶亦何以為病農夫乎且許子何為不自陶冶舍者止也止不肯皆自取之其宫宅中而用之何為反與百工交易紛紛而為之煩也曰百工之事固不可耕且為也注相曰百工之事固不可耕且為故交易也然則治天下獨可耕且為與注孟子言百工各為其事尚不可得耕且兼之人君自天子以下當治天下政事此反可耕且為邪欲以窮許行之非滕君不親耕也孟子謂五帝以來有禮義上下之事不可復若三皇之道也言許子不知禮者也有大人之事有小人之事且一人之身而百工之所為備如必自為而後用之是率天下而路也注孟子言人道自有大人之事謂人君行教化也小人之事謂農工商也一人而備百工之所作作之乃得用之者是率導天下人以羸困之路也故曰是率天下而路也故曰或勞心或勞力勞心者治人勞力者治於人治於人者食人治人者食於人天下之通義也注勞心君也勞力民也君施教以治理之民竭力治公田以奉養其上天下通義所常行者也當堯之時天下猶未平洪水橫流汜濫於天下草木暢茂禽獸繁殖五穀不登禽獸逼人獸蹄鳥跡之道交於中國堯獨憂之舉舜而敷治焉注遭洪水故天下未平水盛故草木暢茂草木盛故禽獸繁息衆多也登升也五穀不足升用也猛獸之迹當在山林而反交於中國懼害人故堯獨憂念之敷治也書曰禹敷土是言治其土也舜使益掌火益烈山澤而焚之禽獸逃匿注掌主也主火之官猶古之火正也烈熾益視山澤草木熾盛者而焚之故禽獸逃匿而奔走逺竄也禹疏九河瀹濟漯而注諸海決汝漢排淮泗而注之江然後中國可得而食也當是時也禹八年於外三過其門而不入雖欲耕得乎注疏通也瀹治也排壅也於是水害除故中國之地可得耕而食也禹勤事於外八年之中三過其門而不入書曰辛壬癸甲啓呱呱而泣如此寧可得耕也后稷教民稼穡樹藝五榖五榖熟而民人育注棄為后稷也樹種藝植也五榖謂稻黍稷麥菽也五穀所以養人也故言民人育也人之有道也飽食暖衣逸居而無教則近於禽獸聖人有憂之使契為司徒教以人倫父子有親君臣有義夫婦有别長幼有序朋友有信注司徒主人教以人事父父子子君君臣臣夫夫婦婦兄兄弟弟朋友貴信是為契之所教也放勳曰勞之來之匡之直之輔之翼之使自得之又從而振德之注放勳堯號也遭水災恐其小民放僻邪侈故勞來之匡正直其曲心使自得其本善性然後又從而振其羸窮德恩惠之德也聖人之憂民如此而暇耕乎注重喻陳相堯以不得舜為已憂舜以不得禹臯陶為已憂夫以百畝之不易為已憂者農夫也分人以財謂之惠教人以善謂之忠為天下得人者謂之仁注言聖人以不得賢聖之臣為已憂農夫以百畝不易治為已憂是故以天下與人易為天下得人難注為天下求能治天下者難得也故言以天下傳與人尚為易也孔子曰大哉堯之為君惟天為大惟堯則之蕩蕩乎民無能名焉君哉舜也巍巍乎有天下而不與焉堯舜之治天下豈無所用其心哉亦不用於耕耳注天道蕩蕩乎大無私生萬物而不知其所由來堯法天故民無能名堯德者也舜得人君之道哉德盛而巍巍乎有天下之位雖貴盛不能與益舜巍巍之德言德之大大於天子位也堯舜蕩蕩巍巍如此但不用心於躬自耕也吾聞用夏變夷者未聞變於夷者也注當以諸夏之禮義化變蠻夷之人耳未聞變化於夷蠻之人同其道也陳良楚産也悅周公仲尼之道北學於中國北方之學者未能或之先也彼所謂豪傑之士也子之兄弟事之數十年師死而遂倍之注陳良生於楚北逰中國學者不能有先之也可謂豪傑過人之士也子之兄弟謂陳相陳辛也數十年師事陳良良死而倍之更學於許行非之也昔者孔子沒三年之外門人治任將歸入揖於子貢相嚮而哭皆失聲然後歸子貢反築室於場獨居三年然後歸注任擔也失聲悲不能成聲場孔子冢上祭祀壇場也子貢獨於場左右築室復三年慎終追逺也他日子夏子張子游以有若似聖人欲以所事孔子事之彊曾子曾子曰不可江漢以濯之秋陽以暴之皓皓乎不可尚已注有若之貌似孔子此三子者思孔子而不可復見故欲尊有若以作聖人朝夕奉事之禮如事孔子以慰思也曾子不肯以為聖人之潔白如濯之江漢暴之秋陽秋陽周之秋夏之五六月盛陽也皓皓白甚也何可尚而乃欲以有若之質於聖人之坐席乎尊師道故不肯也今也南蠻鵙舌之人非先王之道子倍子之師而學之亦異於曾子矣吾聞出於幽谷遷于喬木者未聞下喬木而入于幽谷者注今此許行乃南楚蠻夷其舌之惡如鵙鳥耳鵙博勞鳥也詩云七月鳴鵙應隂而殺物者也許子託於太古非先聖王堯舜之道不務仁義而欲使君臣並耕傷害道德惡如鵙舌與曾子之心亦異逺也人當出深谷止喬木今子反下喬木入於幽谷魯頌曰戎狄是膺荆舒是懲周公方且膺之子是之學亦為不善變矣注詩魯頌閟宫之篇也膺擊也懲艾也周家時擊戎狄之不善者懲止荆舒之人使不敢侵陵也周公常欲擊之言南蠻之人難用而子反悅是人而學其道亦為不善變更矣孟子究陳此者深以責陳相也從許子之道則市賈不二國中無僞雖使五尺之童適市莫之或欺布帛長短同則賈相若麻縷絲絮輕重同則賈相若五穀多寡同則賈相若屨大小同則賈相若注陳相復為孟子言此如使從許子淳朴之道可使市無二價不相僞詐不相欺愚長短謂丈尺輕重謂斤兩多寡謂斗石大小謂尺寸皆言同價故曰市無二價者也曰夫物之不齊物之情也或相倍蓰或相什伯或相千萬子比而同之是亂天下也巨屨小屨同賈人豈為之哉從許子之道相率而為僞者也惡能治國家注孟子曰夫萬物好醜異賈精粗異功其不齊同乃物之情性也蓰五倍也什十倍也至於千萬相倍譬若和氏之璧雖與凡玉之璧尺寸厚薄適等其價豈可同哉子欲以大小相比而同之則使天下有爭亂之道也巨粗屨也小細屨也如使同價而賣之人豈肯作其細哉時許子教人僞者耳安能治其國家者也音義許行之行丁音衡又下孟切下同踵之隴切氓亡庚切與氓同衣褐於既切下同捆丁音閫案許叔重曰捆織也埤倉曰捆􅥚也從才從木者誤也張作裍音同㧻丁音卓擊也從才旁豖陳相丁云去平並通饔音雍飱音孫當身丁去聲粗音粗後注同之與音餘下為與同舍皆之舍丁音赦止也路丁張並云路與露同羸力為切字亦作裸郎果切食人之食音嗣食於人如字汜音泛逼音逼瀹濟漯丁云上音藥中子禮切下他合切作濕誤也􅈱音孤契音薛放方往切曰丁音馹或作日誤勞之來之丁云並去聲不與焉下音豫亦如字倍之丁云義當作偝古字借用耳下子倍同治任丁而針切云治任謂治擔任之具彊其丈切暴蒲木切皓音杲鵙舌丁音決又古役切鳴鵙丁云毛詩作鵙古役切大古之大音泰閟丁音祕清淨之宫謂姜嫄之廟膺擊丁本作應云案古訓應訓當此注訓擊蓋以當對是擊敵之義故轉訓耳懲艾丁廢切賈音嫁下皆同倍蓰丁音師云從竹下徙開元禮文字音義曰倍謂半倍而益之又音灑山綺切史記作倍灑徐廣曰一作五倍曰蓰子比之比丁音鼻次比也疏正義曰此章言神農務本教以凡民許行蔽道同之君臣陳相倍師降於幽谷不理物情謂之淳朴者有為神農者許行至願受一㕓而為氓者神農炎帝氏也許行南蠻之人也姓許名行也自楚蠻之地往至滕國至門而言告於文公曰我是逺方楚蠻之人聞滕君行仁政於此我今所以來至心願受一㕓居之以為之氓也氓野人之稱已說在公孫丑篇文公與之處其徒數十人皆衣褐捆屨織席以為食言文公乃與許行之居而處之其許行之徒弟有數十人皆衣短褐叩㧻織屨席以供其飲食也陳良之徒陳相與其弟辛至願為聖人氓陳良儒者也陳相與其弟辛二人皆陳良徒弟也言陳良徒弟陳相與其弟辛背負其耒耜而從宋國往滕國而向滕君曰我聞知君行聖人之政事是為聖人者也今願為聖人之氓陳相見許行而大悅盡棄其學而學焉言陳相至滕乃見許行而大悅樂之遂盡棄去陳良之儒學而就學於許行之道陳相見孟子道許行之言曰至惡得賢言陳相後見孟子乃道許行之言曰滕君則誠為賢君者也雖然未聞至道也古之賢君乃與民同耕而食饔飱而兼治政事朝食曰饔夕曰飱今也滕君乃取財稅而有倉廩府庫之富則是厲病其民以自奉養也安得謂之賢君乎倉廩釋名曰倉藏也藏穀物也廪倉有屋曰廩孟子問許子必種粟而後食乎曰然陳相答之以為許行是自種而後食也許子必織布然後衣乎孟子又問許子必自織布然後衣著乎曰否許子衣褐陳相答之許子不自紡織其布為衣以其即著枲布也許子冠乎孟子問許子戴冠乎曰冠陳相答之許子戴冠也曰奚冠孟子又問許子戴何冠曰冠素陳相答之許子冠以素為之爾素帛也曰自織之與孟子又問許子以素為冠其自織之與曰否以粟易之陳相答之許子不自織為冠以粟更易之而已曰許子奚為不自織孟子又問許子何為而不自織為之乎曰害於耕陳相答之以謂許子不自織為之也以其自織有妨害於耕也曰許子以釜甑爨以鐵耕乎孟子又問許子寧以釜甑炊食以鐵為犁用之耕否乎曰然陳相答之以為許子用之也自為之與孟子又問許子是自為釜甑炊食鐵犂耕乎曰否以粟易之陳相答以為許子之不自為也以粟更易之而已以粟易械器者不為厲陶冶至何許子之不憚煩孟子又復問以許子將粟更易械器者不以厲病於陶冶陶冶亦以器更易之以粟豈為病厲其農夫哉陶作瓦器之匠也冶鑄金之匠也且許子何不自為之陶冶止皆取其宫室之中而用之乎何為更紛紛然交易於百工與何許子之不畏其煩故以此欲排之陳相也曰百工之事固不可耕且為也陳相又答之以謂百工之事固不可耕且為之也所以用交易而用之耳然則治天下獨可耕且為之與孟子又排之如是則為國君治天下獨可自耕且又為政事以治天下與陳相及此無以應答故孟子一向自言而排之乃曰有大人之事大人之事則國君行教化也有小人之事小人之事即農工商也且以一人之身而用百工之所作為備具如必皆用自為然後方行用之也此則驅率天下之人以羸困之路也又一說云如此是驅率天下之人如道路之人但泛視而不知上下貴賤耳以其許行陳相皆欲君民並耕不知有上下貴賤相待故以此說據下文意義相通堪以此說為尚所以云羸困之路者但趙注之說耳詳而推之羸困之路不若此說故曰或勞心或勞力至天下之通義也者此下文之如此也言天下之人有但或勞其力但或勞其心者勞其心所以制政教而治天下之人耳勞其力所以見治於上人而已見治於上之人者竭力治公田以奉養上之人也治天下之人者以其爵祿皆出民之賦稅故食於人而已言此是天下通義人所常行者也上之人君為言也下之人民為言也以此推之則上下貴賤有所相待耳當堯之時天下猶未平至舉舜而敷治焉孟子又言當古之唐堯盛帝之時天下猶尚未平泰以其大水橫流逆其勢汛汛濫濁遍於天下草木由是暢茂敷實禽獸又由此而繁息而生殖焉五穀黍稷稻麥菽於是不豐登禽獸亦逼害於人猛獸之迹交馳於中國之道堯帝乃獨自憂懼之以其有傷害於人民故舉用虞舜而廣治之廣治其水土也舜使益掌火至禹疏九河后稷教民稼穡又至使契為司徒止於亦不用於耕耳言舜因堯帝舉用乃使伯益為掌火之官益視山澤草木煩盛乃烈山澤而焚燒之禽獸於是懼而逃匿逺竄而不敢出乃使禹疏通九河又瀹治濟漯之水而流注歸海又開決汝漢之水而排壅淮泗二水而同流注歸之江九河在東北案爾雅云九河一曰徒駭二曰太史三曰馬頰四曰覆釜五曰湖蘇六曰簡七曰潔八曰鈎盤九曰鬲津是也江九江也案潯陽地記有云一曰烏江二曰蚌江三曰烏白江四曰嘉靡江五曰箘江六曰堤江七曰廩江八曰源江九曰畎江是也然後中國之地人方可耕藝而食也當此之時大禹八年在外治水土經三次過家門而不得入其家雖欲於時耕作之其可得乎又使后稷棄教天下民稼穡種樹藝殖五穀五穀既豐熟而天下人民於是得養育其生稼穡者說文云種曰稼斂曰穡也人民於是有養生之道飽食而暖衣逸樂居處而無以教之則近類於禽獸以其不知高下也聖人有憂懼其民如此舜又使契為司徒之官教以人倫使天下之人知父子有親親慈孝君臣有尊卑之義夫婦有交别長幼有等叙朋友有忠信又言放勳有曰勞之來之匡之直之輔之翼之使自得之又從而振德之民之有勤勞於事者有以償其勞故曰勞之因其民之來歸者有以償其來故曰來之民之既能直其心故以正其直為之正故曰匡之民之或曲其心故以正其曲為之直故曰直之輔之如車輔使民有所安於業故曰輔之翼之如羽翼使民有所進於道故曰翼之勞之來之匡之直之輔之翼之所以欲使其自得悅樂之而已矣民既自得而悅樂之於是又從加之恩惠而振德之振德即恩惠耳言聖人之憂於天下之民如此尚何暇以耕為乎又言堯以不得舜而舉用使敷治焉則為已之憂舜既得堯舉而用之如舜復不得臯陶禹為輔則亦為已之憂今夫以百畝之難耕恐為己所憂者農夫也分人以財謂之惠教人以善謂之忠為天下得人謂之仁以言其以己之財物布與人者是謂恩惠也以己之有善而以教諸人謂其心之忠也中心之謂忠為天下求得其人而治天下者是謂其仁者也愛人之謂仁所以為天下求得其人不過愛天下之人故如是也是故以天下與人易為天下得人難孟子言如此故以天下傳與其人尚以為易也為天下得其人而治天下者猶以為難孔子曰大哉堯之為君惟天為大惟堯則之蕩蕩乎民無能名焉至亦不用於耕耳孟子又引孔子有云大哉堯帝之為君也惟上天之為大而不可尚惟堯帝又能則法上天而行之故蕩蕩然其德之大而民無有能指名之者亦若上天之蕩蕩其覆燾之德人亦不能指名而窮極之故也德於堯如此其大故孔子所以曰大哉堯之為君君哉舜也巍巍乎其功德之大如此而天下之事未嘗自與及焉無他以其急於得人而輔之耳所以但無為而享之故不必自與及焉然則堯帝舜帝之治天下豈為無所用其心哉以其但急用心於得賢亦且不用於躬耕耳孟子所以言至於此者蓋欲排許子於陳相欲以滕君與民並耕而食故演之以此也是所以闢之之云耳吾聞用夏變夷者未聞變於夷者也至亦為不善變矣者此蓋孟子又欲以此而譏陳相學於許行者也言我聞用中夏之禮義而變化於蠻夷之人未聞以蠻夷之道而變化於中夏也且陳良自楚國而生也悅樂其周公仲尼之大道乃自楚之南而往北求學於中國蓋中國以楚地觀之則中國在北之地故也北方之學者未能有人或先之陳良彼陳良所謂豪傑過人之士者也子之兄弟以師事數十年矣至師死而遂背去其所學而學於許行故以此而譏之言往日孔子喪沒至於三年之外其門人有治擔任而將歸室者乃至子貢之所入揖於子貢相嚮面而哭乃至悲不成聲然後歸之室復感發子貢追思孔子又反至築室於孔子冡上之壇獨居又至三年然後方辭冢室而歸處又及他日子夏子張子游三人以有若之貌狀似孔子聖人三人遂欲以往日所事孔子之禮旦夕奉事有子至勉强曾子同以此事之曾子乃曰不可言江漢以濯之則至清而不可污秋陽以曝之則至明而不可掩其孔子如此江漢秋陽皓皓然清潔明白不可得而尚耳故不可以有若比之而以事孔子之禮事之也孟子所以言之以此者蓋謂孔子之事至三年之久而門人尚歸與子貢相嚮而哭乃至悲而不成聲又感子貢復築室於冡上而追思之以至子張子游子夏欲慰其心思乃强曾子同以往日事孔子之禮而事之有若曾子尚不忍以有若加於孔子而今子之兄弟但自師死之未久遂便以背去之而欲以許行為師而就學之何忍之如是邪故以此非之然前文所謂用夏變夷即陳良北學中國以周公仲尼之道為悅是又孟子明言之也豈見如許行陳相兄弟用蠻夷之事而欲變於滕國也今也南蠻鵙舌之人非先王之道子倍子之師而學之至為不善變矣孟子言今也許行乃南蠻鵙舌之惡如於鳥者也所行皆非先王之正道而子之兄弟皆背去其已之師陳良而以學許行是亦有異於曾子不忍以有若加孔子矣我聞出自幽谷之內而遷登于高大之木者未聞有下高大之木而遷入于幽谷之內者也又魯頌閎宫之篇有曰戎狄之人不善周公於是膺擊之荆舒之人亦不善周公於是懲誡之然則戎狄之人周公方且膺擊之今以南蠻之人反悅其道而以學之亦為不善變更者矣蓋戎狄荆舒皆南蠻之地也然周公一則膺擊之一則但懲誡之是何邪夫以戎狄之地逺荆舒之地近以逺者有所膺擊則近者自然從而治也故戎狄是膺荆舒是懲矣此孟子所以又執此而非之陳相兄弟學於許行為不善更變其師者焉從許子之道則市價相若者此乃陳相之言從許行之道為美之之意於孟子也言今從許行之道而行之則市中物價貴賤則一而不二也國中亦無姦僞欺詐雖使五尺之童子往市中亦莫有人或敢欺瞞之也以其布與絹帛長短則同其價例則相若不異麻縷絲絮四者輕重又同而價例亦相若而更無高低五榖斗量多寡亦則同而價例亦相若腳屨大小亦同而價則相若凡此是皆市無二價也故以此言於孟子曰夫物之不齊物之情也至惡能治國家此孟子又從而排之也言夫萬物之不齊等是物有貴賤好惡之情也然或相倍蓰或相什伯或相千萬其不同之有如此而子今以為比皆同之而無二價是使天下交爭而亂之也大屨與小屨同其價則人必為之小屨而賣之而大屨豈為之哉言凡屨之大小則其他物之貴賤不言而可知矣今從許行之道者是相率而作詐僞者也又安能治國家焉此孟子至終而闢之以此也注神農三皇之君炎帝神農氏也正義曰案皇甫謐曰易稱包羲氏沒神農氏作是為炎帝班固云教民耕農故號曰神農注褐馬衣至粗布衣也正義曰案說文云編枲襪也一曰短衣也又曰袍也馬被衣也注古火正正義曰案左傳昭公二十九年有五行之官木正曰勾芒火正曰祝融金正曰蓐收水正曰𤣥冥土正曰后土顓頊氏之子曰犂為祝融是為火正故也注書曰辛壬癸甲啓呱呱而泣正義曰案孔傳云辛日娶妻至于甲日復往治水啓禹之子禹治水過門不入聞啓泣聲不暇子名之以大治度水土之功故也注放勳堯名也正義曰案徐廣云放勳號陶唐也孔安國云堯能放上世之功化也注場孔子冡上祭祀壇場正義曰案史記云孔子葬魯城北泗上皇覽曰孔子冢去城一里冢塋百畝南北廣十步東西十三步高一丈二尺冢前以缶甓為祠壇方六尺與地平本無祠堂冢塋中樹以百數皆異種魯人世世無能名其樹者民傳言孔子弟子異國人各持其方樹來種之其樹柞枌雒離女貞五味毚檀之樹塋中不生荆棘及刺人草注魯頌閟宫之篇正義曰此詩頌僖公能復周公之宇也箋云懲艾也僖公與齊桓舉義兵北當戎狄南艾荆與羣舒是其解也墨者夷之因徐辟而求見孟子注夷之治墨家之道者徐辟孟子弟子也求見孟子欲以辨道也孟子曰吾固願見今吾尚病病愈我且往見注我常願見之今值我病不能見也病愈將自往見以辭郤之夷子不來他日又求見孟子注是日夷子聞孟子病故不來他日復往求見之孟子曰吾今則可以見矣不直則道不見我且直之注告徐子曰今我可以見夷之矣不直言之則儒家聖道不見我且欲直攻之也吾聞夷子墨者墨之治喪也以薄為其道也夷子思以易天下豈以為非是而不貴也然而夷子葬其親厚則是以所賤事親也注我聞夷子為墨道者墨者治喪貴薄而賤厚夷子欲以此道易天下之化使從已豈肯以薄為非是而不貴之也始使夷子葬其父母厚也是以所賤之道奉其親也如其薄也下言上世不葬者又可鄙足以為戒也吾欲以此攻之者也徐子以告夷子夷子曰儒者之道古之人若保赤子此言何謂也之則以為愛無差等施由親始注之夷子名也言儒家者曰古之治民若安赤子此何謂乎之以為當同其恩愛無有差次等級相殊也但施厚之事先從已親屬始耳若此何為獨非墨道也徐子以告孟子孟子曰夫夷子信以為人之親其兄之子為若親其鄰之赤子乎彼有取爾也赤子匍匐將入井非赤子之罪也注親愛也夫夷子以為人愛兄子與愛鄰人之子等邪彼取赤子將入井雖他人子亦驚救之故謂之愛同也但以赤子無知故救之耳夷子必似此一之未盡逹人情者也故曰赤子匍匐將入井非赤子之罪也且天之生物也使之一本而夷子二本故也注天生萬物各由一本而出今夷子以他人之親與已親等是為二本故欲同其愛也蓋上世嘗有不葬其親者其親死則舉而委之於壑注上世未制禮之時壑路傍坑壑也其父母終舉而委之棄於壑也他日過之狐狸食之蠅蚋姑嘬之其顙有泚睨而不視夫泚也非為人泚中心達於面目蓋歸反虆梩而掩之掩之誠是也則孝子仁人之掩其親亦必有道矣注嘬相共食之也顙額也泚汗出泚泚然也見其親為獸蟲所食形體毁敗中心慙故汗泚泚然出於額非為他人而慙也自出其心聖人緣人心而制禮也虆梩籠臿之屬可以取土者也而掩之實是其道則孝子仁人掩其親亦有道矣徐子以告夷子夷子憮然為間曰命之矣注孟子言是以為墨家薄葬不合道也徐子復以告夷子夷子憮然者猶悵然也為間者有頃之間也命之猶言受命教矣音義徐辟之辟音璧又音闢道不見之見音現注不見同匍音蒲匐蒲北切蠅蚋姑張音汭云諸本或作䗜誤也丁云䗜未詳所出或以䗜與䖻同謂蜉䖻也音由又一說云䗜姑即螻姑也嘬楚怪切說文云飲㰱也泚七禮切睨音詣虆丁力追切土籠也或作虆梩力知切土輿也籠臿楚洽切鍬也憮音武疏正義曰此章言聖人緣情制禮奉終墨子互同質而違中以直正枉憮然改容而受命也墨者夷之因徐辟而見孟子夷之治墨家之道者姓名也徐辟孟子之弟子也言治墨家之道者夷之因孟子弟子徐辟而見孟子也孟子曰吾固願見今吾尚正病且待病之瘥愈我以往而見之也夷子不來他日又求見孟子夷子聞孟子以為尚病故不來見至於他日復往求見孟子孟子曰吾今則可以見矣不直則道不見我且直之孟子見夷子復來求見遂不得已先言於徐子曰我今則可以見矣欲不見則不得直己之道而正之儒家先王之正道則泯而不見我且見而直己之道而正彼也吾聞夷子墨者墨之治喪也以薄為其道也至是以所賤事親也此孟子以此告徐子是其直己之道而正夷子也以其夷子既以厚葬其親而尚治其墨家之道故不知以此厚其親是儒家之正道而已孟子所以反覆直而正之乃因徐子而告之曰我聞夷子治墨家之道者也夫墨者治喪不厚但以薄之是為其道也夷子思以墨道以變易天下之化豈以薄其喪而不貴之者也然而夷子葬其父母以厚為之則是以墨家所賤者而事父母之親喪也以其墨家賤厚而貴薄也徐子以告夷子徐子因孟子此言以告之夷子也夷子曰儒者之道古之人若保赤子至施由親始此又夷子以言於徐子而以墨道為是也乃曰儒者之道有云古之人治民若保安赤子者是言何謂之乎之則以為恩愛之道無有差等之異也但施行恩愛之道當自父母之親為始耳我所以厚葬其親何為獨非以墨道也之夷子自稱己之名也徐子又以夷子此言告於孟子孟子曰夫夷子信以為人之親其兄之子至亦必有道矣孟子又言今夷子以為愛無差等是夷子信以為人親愛其兄之子為若親愛其鄰家之赤子乎然彼夷子蓋亦有所取而云耳故亦不足怪也彼夷子必謂孺子有將入井人皆有怵惕惻懚之心故云愛無差等又以古之人若保赤子為言也蓋其赤子匍匐將入於井非赤子之罪惡也但以赤子未有知人故不忍見焉故救之耳今夷子必以此況之而遂以為愛無差等如親其兄之子為若親其鄰之赤子同是則親兄之子必亦待將入井然後救之矣是夷子未逹人情者也且天之生萬物也皆使其由一本而出矣今夷子以他人之親猶己之親同是為有二本也又安知先王制禮而稱人之情以為之厚薄施於父子者不以同於兄弟行於同宗者不以行於鄰族也蓋上世於太古未制禮之時常有不葬其親者其親之死則擡舉而委棄於路傍坑壑之中他日子過之於此見其狐狸野獸食之蠅蚋飛蟲且共嘬食其子之額泚泚然出汗故䀝睨而不敢詳視夫子所以有泚泚然之汗於額而出者非為他人而慙也故如是而汗泚泚然而出於額也以其中心有所不忍其親之如是故自中心之所痛遂逹而之於面目所以有泚泚然之汗出於額也蓋不忍之如是乃歸取虆梩籠臿取土而遮掩之誠是其不忍其親之道也是則孝子仁人之心而掩其親亦必有道耳孟子所以言此者蓋非墨家薄葬為非而以厚葬為是故以直其正道矣意以謂太古未制禮之時子有不忍其親為獸蟲所食尚知掩之之道况今之世先王所制定其禮而可蔽之墨家道而薄葬為是而以厚葬為非邪夷子既以能厚其親而尚不知以墨家之所薄為非所以執此而直之使正耳徐子以告夷子至命之矣者徐子又因孟子此言而告於夷子夷子乃憮然而覺悟其己之罪故頃然為間曰我今受孟子之教命而不敢逆矣孟子注疏卷五下孟子注疏卷五下考證有為神農之言章許子奚為不自織節注許子何為不自織素乎監本脫何為不三字今從閣本增入決汝漢排淮泗而注之江臣邦綏按禹貢惟漢水發源嶓冡入江汝水則源出天息山泗水源出陪尾山皆入於淮淮自入海孟子云注之江者朱子謂記者誤也注排壅也臣宗楷按元儒吳氏曰林少穎云禹時江淮未通故揚州貢道必由江入海然後逹於淮泗至吳夫差掘溝通水與晉㑹黃池江淮始通孟子第指所通之水以為禹跡雖江北淮南地高于水實祗掘一橫溝兩端築堤壅水于中以行舟耳黃震日記云兩端築堤今瓜儀淮安壩是從許子之道節注長短謂丈尺長短監本訛大小今改正疏有小人之事小人之事即農工商也監本脫小人之事四字今從上文增入又疏排壅淮泗二水排壅監本訛斟酌今改正又疏四曰覆釜爾雅水經注或作釜或作釜又疏六曰簡七曰潔臣宗楷按爾雅六曰簡潔蔡沈從輿地記亦合為一云其一即河之經流吳澄謂以水道考之南皮縣明有簡河未嘗合潔為一且徒駭乃河之本道九者之外安得更有經流考方輿紀要云簡亦在渤海潔與簡相近又疏二曰蚌江蚌監本誤碎今從潯陽地記改正墨者夷之章徐子以告夷子節注之以為當同其恩愛無有差次等級相殊也相殊二字一本作親踈疏故自中心之所痛遂逹而之於面目監本痛字下衍恨字又脫遂逹二字今從閣本增刪孟子注疏卷五下考證
