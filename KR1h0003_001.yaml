body:
  text: 欽定四庫全書孟子注疏卷一上漢趙氏注宋孫奭音義并疏梁惠王章句上音義丁云案史記梁惠王魏武侯之子名罃罃音鶯注梁惠王者魏惠王也魏國名惠諡也王號也時天下有七王皆僭號者猶春秋之時吳楚之君稱王也魏惠王居於大梁故號曰梁王聖人及大賢有道德者王公侯伯及卿大夫咸願以為師孔子時諸侯問疑質禮若弟子之問師也魯衛之君皆専事焉故論語或以弟子名篇而有衛靈公季氏之篇孟子亦以大儒為諸侯師是以梁惠王滕文公題篇與公孫丑等而為之一例者也音義為于僞切下為王為其曰為抑為為是故為皆同疏正義曰自此至盡心是孟子七篇之目及次第也總而言之則孟子為此書之大名梁惠以下為當篇之小目其次第蓋以聖王之盛唯有堯舜堯舜之道仁義為首故以梁惠王問利國對以仁義為七篇之首也此篇凡二十三章趙氏分為上下卷此上卷只有七章一章言治國以仁義為名二章言聖王之德與民共樂恩及禽獸三章言王化之本在於使民養生喪死之用足備四章言王者為政之道生民為首五章言百里行仁天下歸之六章言定天下者一道而已不貪殺人者人則歸之七章言典籍攸載帝王之道無傳霸之事其餘十六章分在下卷各有言說大抵皆是君國之要務故述為篇章之先凡此二十三章既以梁惠王問利國為章首遂以梁惠王為篇名公孫丑以下諸篇所以次當篇之下各有所說云章句者章文之成也句者辭之絶也又言章者明也總義包體所以明情者也句必聨字而言句者局也聨字分疆所以局言者也注云梁惠至例者也正義曰案史記世家云魏之先畢公髙之後也武王伐紂而髙封於畢是為畢姓其後絶封為庶人或在夷狄其裔曰畢萬事晉獻公獻公十六年以魏封畢萬為大夫卜偃曰畢萬之後必大矣萬滿數也魏大名也畢萬封十一年獻公卒畢萬之世彌大從其國名為魏氏生武子武子生悼悼生嬴嬴生魏獻子子生侈侈之孫曰魏桓子桓子孫曰文侯文侯卒子擊立為武侯武侯卒子罃立為惠王惠王三十一年齊趙共伐我邑於是徒都大梁然則梁惠王是武侯之子名罃諡曰惠諡法云愛人好與曰惠汲冡紀年云梁惠成王九年四月甲寅徙都大梁字林云王者天地人一貫三為王天下所法也是時天下有七王者魏趙韓齊秦楚燕七雄之王也云論語或以弟子名篇而有衛靈季氏之篇者如顔淵子路子張是弟子名篇也趙岐所以引而為例孟子見梁惠王注孟子適梁魏惠王禮請孟子見之王曰叟不逺千里而來亦將有以利吾國乎注曰辭也叟長老之稱猶父也孟子去齊老而之魏王尊禮之曰父不逺千里之路而來此亦將有以為寡人興利除害者乎孟子對曰王何必曰利亦有仁義而已矣注孟子知王欲以富國强兵為利故曰王何以利為名乎亦有仁義之道可以為名以利為名則有不利之患矣因為王陳之王曰何以利吾國大夫曰何以利吾家士庶人曰何以利吾身上下交征利而國危矣注征取也從王至庶人故言上下交爭各欲利其身必至於篡弒則國危矣論語曰放於利而行多怨故不欲使王以利為名也又言交為俱也萬乘之國弒其君者必千乘之家注萬乘兵車萬乘謂天子也千乘兵車千乘謂諸侯也夷羿之弒夏后是以千乘取其萬乘者也千乘之國弒其君者必百乘之家注天子建國諸侯立家百乘之家謂大國之卿食采邑有兵車百乘之賦者也若齊崔衛寧晉六卿等是以其終亦皆弒君此以百乘取千乘也上千乘當言國而言家者諸侯以國為家亦以避萬乘稱國故稱家君臣上下之辭萬取千焉千取百焉不為不多矣注周制君十卿祿君食萬鍾臣食千鍾亦多矣不為不多矣苟為後義而先利不奪不饜注苟誠也誠令大臣皆後仁義而先自利則不篡奪君位不足自饜飽其欲矣未有仁而遺其親者也未有義而後其君者也注仁者親親義者尊尊人無行仁而遺棄其親無行義而忽後其君者王亦曰仁義而已矣何必曰利注孟子復申此者重歎其禍也音義放方往切夷羿音詣羿夷姓饜一鹽切又於豔切復扶又切下章注同重直用切下申重重言皆同疏正義曰此章言治國之道當以仁義為名也孟子見梁惠王者是孟子自齊至梁見惠王也王曰叟不逺千里而來亦將有以利吾國乎者王號也以業為言也曰發語詞也叟尊老之稱也言惠王尊老孟子也惠王尊孟子曰叟不逺千里之路而至此相將亦有以利益我國乎云亦與乎者凡外物不可必又非可止於一事耳故云亦乎與論語云不亦說乎不亦樂乎同孟子對曰王何必曰利亦有仁義而已矣者是孟子答惠王也言王何必特止曰財利我亦有仁義之道以利益而已上利以財利為言下利以利益為言王曰何以利吾國大夫曰何以利吾家士庶人曰何以利吾身上下交征利而國危矣者是孟子託言也言惠王今問我曰何以利益我國則為王之大夫必問我曰何以利益我家為大夫既欲利益其家則為王之士庶人亦必問我曰何以利益我身假使上自王至於士庶人皆且取其利益而國必危亂喪亡矣王以國為問大夫以家為問士庶人以身為問者王稱國故以國問大夫稱家故以家問士庶人無稱故以身問而已萬乘之國弒其君者必千乘之家千乘之國弒其君者必百乘之家者孟子言上下交取其利而國喪亡者是萬乘之國弒其君者必千乘之家所弒也無他焉則千乘之家欲以萬乘之利為多也千乘之國弒其君者必百乘之家所弒也亦無他焉是百乘之家欲以千乘之利為多也云弒者自下殺上謂之弒萬取千焉千取百焉不為不多者孟子言凡欲天子之萬乘者且於其內取千乘而為天子之諸侯欲諸侯之千乘者且於其內但取百乘而為之大夫是亦不為少矣何必交相爭奪慕多為勝邪苟為後義而先利不奪不饜者孟子言且令臣庶皆後去其仁義而先且以自利則不交相殺奪故不足自飽饜言必殺奪如千乘奪取萬乘百乘奪取千乘然後為飽足也未有仁而遺其親者也未有義而後其君者也者孟子言未有心存乎仁而遺棄其親者亦未有存義而後去其君者王亦曰仁義而已矣何必曰利者孟子重嗟歎其禍故曰王今亦當曰亦有仁義而已矣何必特止言其利一說云是惠王悟孟子之言為是而以已言為非故亦應之曰仁義而已矣何必言利注云孟子至見之正義曰案魏世家云惠王三十五年惠王以厚幣招賢者鄒衍淳于髠孟子皆至梁是也注曰辭也至之魏正義曰詞也從口乙聲亦象口氣出也劉熙曰叟長老之稱依皓首之言父矩也家長率教者云去齊之魏者案史記列傳云孟子事齊宣王宣王不能用乃適魏是也注征取也至俱也正義曰征正也蓋言君子之於利也非釋之而弗取也特不可交征而正取之爾猶季氏聚斂以弱魯趙孟資以傾晉之類故也引論語曰放於利而行多怨者證其上下交征利而國危亡之意也孔氏曰放依也每事依利而行取怨之道也云交俱也蓋云俱皆也注萬乘至萬乘者也正義曰案司馬法云六尺為步步百為畝畝百為夫夫三為屋屋三為井井十為通通十為成成方十里成十為終終十為同同方百里同十為封封十為畿畿方千里有稅有賦稅以足食賦以足兵一同百里提封萬井定出賦六千四百井戎馬四百匹兵車百乘此卿大夫采地之大者也是謂百乘之家一封三百一十六里提封十萬井定出賦六萬四千井戎馬四千匹兵車千乘此諸侯之大者也是謂千乘之國天子畿方千里提封百萬井定出賦六十四萬井戎馬四萬匹兵車萬乘故稱萬乘之主云夷羿弒夏后者引之以證千乘取萬乘也案魯襄四年左傳曰昔有夏之方衰也后羿自鉏遷於窮石因夏民以代夏政杜預曰禹孫太康淫放失國夏人立其弟仲康仲康亦微弱仲康卒子相立羿遂代相號曰有窮後為少康所滅注云夷羿者左傳襄四年杜注云夷氏也故云夷羿注云齊崔衛寧晉六卿等正義曰此引之以證百乘取千乘也齊崔崔杼也為齊大夫語云崔子弒齊君襄公三十五年左傳云崔杼作亂是也衛寧寧喜也為衛大夫史記世家衛獻公十八年寧惠子與孫文子逐獻公獻公奔齊齊置獻公於聚邑孫寧共立定公弟秋為衛君是為殤公殤公十二年為晉平公所執獻公復入衛後元年誅寧喜又襄公二十六年書寧喜弒其君剽是也六卿魏獻子與韓宣子趙簡子智文子中行文子范獻子六人是也史記世表云昭公二十八年六卿誅公族分其邑各使其子為大夫故也注周制至不多矣正義曰周制蓋言周之所制也王制云君十卿祿是也云鍾量名也晏子曰齊舊四量豆區釡鍾四升為豆四豆為區四區為釜釜十為鍾是也注苟誠也至欲矣正義曰語云苟子之不欲苟能正其身之苟同云饜者說文云饜飽也字從厭從食也飽則厭食也此一章遂為七篇之首章孟子見梁惠王王立於沼上顧鴻鴈麋鹿曰賢者亦樂此乎注沼池也王好廣苑囿大池沼與孟子遊觀乃顧視禽獸之衆多其心以為娛樂誇咤孟子曰賢者亦樂此乎孟子對曰賢者而後樂此不賢者雖有此不樂也注惟有賢者然後乃得樂此耳謂修堯舜之道國家安寧故得有此以為樂也不賢之人亡國破家雖有此亦為人所奪故不得以為樂也詩云經始靈臺經之營之庶民攻之不日成之注詩大雅靈臺之篇也言文王始初經營規度此臺衆民並來治作之不與期日自來成之也經始勿亟庶民子來注言文王不督促使之亟疾也衆民自來趣之若子來為父使之也王在靈囿麀鹿攸伏麀鹿濯濯白鳥鶴鶴注麀鹿牝鹿也言文王在囿中麀鹿懷妊安其所而伏不驚動也獸肥飽則濯濯鳥肥飽則鶴鶴而澤好而已王在靈沼於牣魚躍注文王在池沼魚乃跳躍喜樂言其德及鳥獸魚鱉也文王以民力為臺為沼而民歡樂之謂其臺曰靈臺謂其沼曰靈沼樂其有麋鹿魚鱉注孟子為王誦此詩因曰文王雖以民力築臺鑿池民猶歡樂之謂其臺沼若神靈之所為欲使其多禽獸以養文王者也古之人與民偕樂故能樂也注偕俱也言古賢之君與民同樂故能得其樂湯誓曰時日害喪豫及女偕亡注湯誓尚書篇名也時是也日乙卯日也害大也言桀為無道百姓皆欲與湯共伐之湯臨士衆誓言是日桀當大喪亡我與女俱往亡之民欲與之偕亡雖有臺池鳥獸豈能獨樂哉注孟子說詩書之義以感喻王言民欲與湯共亡桀雖有臺池禽獸何能獨樂之哉復申明上言不賢者雖有此不樂也音義樂音洛盡此卷皆同好呼報切下好戰同咤丁丑嫁切云誇也玉篇作詫規度大各切下忖度同亟音棘督音篤丁作子六切趣丁音趨亦如字麀音憂鶴鶴張云詩本作翯翯戶角切古字假借今依詩本音於牣於如字牣音刃丁本作仍歡樂本亦作勸樂害喪如字張音曷書作曷喪女音汝疏正義曰此章言聖王之德與民共樂恩及鳥獸也孟子見梁惠王王立於沼上顧鴻鴈麋鹿者是孟子在梁時見惠王立於沼之上而顧盼鴻鴈麋鹿之狀也曰賢者亦樂此乎者是惠王稱譽孟子為賢者問孟子亦樂此池沼之上而顧盼鴻鴈麋鹿乎云乎意恐孟子樂與不樂所以云乎而作疑之之辭也孟子對曰賢者而後樂此不賢者雖有此不樂也者是孟子答惠王言惟有德之賢者為君然後得樂於此如君之不賢雖有此鴻鴈麋鹿之顧亦不得其樂也詩云經始靈臺經之營之庶民攻之不日成之經始勿亟庶民子來者至魚躍是孟子為王誦此靈臺之詩以證賢者而後樂此也言文王規度始於靈臺而經營之際衆民皆作治之故臺不期日而有成言其成之速也既成之速文王未嘗亟疾使民成之用如此之速也是衆民自然若子來如為父之使耳故如此之速也王在靈囿麀鹿攸伏麀鹿濯濯白鳥鶴鶴者言文王在靈囿之時麀鹿皆安其所而伏卧以懷其妊又且不驚動非特不驚動又且濯濯然而肥飽非特麀鹿之肥飽其於白鳥又且鶴鶴然而肥澤也麀鹿牝鹿也王在靈沼於牣魚躍者言文王在靈沼之時則魚盈滿沼中又且跳躍喜樂如也言其魚之微物亦且得其所也文王以民力為臺為沼而民歡樂之謂其臺曰靈臺謂其沼曰靈沼樂其有麋鹿魚龞者是孟子至此又自言文王作臺沼之意而感喻于惠王也文王雖以民力為其臺沼然而民皆喜樂而為之如謂其臺沼則曰靈臺靈沼也以靈臺靈沼云者謂其文王之德化亦樂其有之行如神靈之所至故謂其臺沼必曰為靈臺靈沼凡此者無他焉是衆民感文王之德化亦樂其有魚鱉禽獸之多以奉養文王也云古之人與民偕樂故能樂也者言古之賢君如此文王與民同其樂故能得此臺池之樂也湯誓曰時日害喪豫及女偕亡者是孟子引商書謂桀於是時無道暴虐百姓故百姓皆欲與湯王共伐之湯於是往伐臨於衆中誥誓之曰是日桀當大滅我與女衆共往滅之一云時日害喪豫及女偕亡者是桀云故湯誓引而言之也謂桀云天有是日猶吾之有民日曷有亡哉日亡則吾與民亦俱亡矣民欲與之偕亡雖有臺池鳥獸豈能獨樂哉者是孟子首對惠王曰不賢者雖有此不樂也故引此桀品證其言也言桀為不賢之君民亦欲與湯共伐之雖有臺池鳥獸豈能獨享其此樂哉言不能得樂也注云詩大雅至成之也正義曰周詩大雅篇名曰靈臺注云天子在靈臺者所以觀祲象察氣之妖祥也神之精眀者稱曰靈四方而髙曰臺文王受命于周作邑于豐立靈臺又案春秋傳曰公既視朔遂登觀臺以望而書雲物為備注言文王至使之也正義曰案靈臺之詩箋云亟急也度始靈臺之基衆民各以子成父事而來攻之注云麀鹿至澤好正義曰毛詩注云麀鹿牝鹿也囿所以域養禽獸也天子百里諸侯四十里箋云攸所也言所遊伏毛注云濯濯娛遊也鶴鶴肥澤也注文王至魚鱉正義曰詩注云沼池也牣滿也箋云靈沼之魚盈滿其中皆跳躍亦言得其所注云湯誓至亡之正義曰湯誓商書之篇名也案史記云是日何時喪豫與女偕亡駰注曰尚書大傳云桀云天之有日猶吾之有民日有亡哉日亡則吾亦亡矣尚書孔安國注云比桀於日曰是日何時喪我與女皆亡欲殺身以喪桀是也檀弓云子卯不樂鄭注云紂以甲子死桀以乙卯亡也梁惠王曰寡人之於國也盡心焉耳矣注王侯自稱孤寡言寡人於治國之政盡心欲利百姓焉耳者懇至之辭河內凶則移其民於河東移其粟於河內河東凶亦然注言凶年以此救民也魏舊在河東後為强國兼得河內也察鄰國之政無如寡人之用心者注言鄰國之君用心憂民無如己也鄰國之民不加少寡人之民不加多何也注王自怪為政有此惠而民人不增多於鄰國者何也孟子對曰王好戰請以戰喻注因王好戰故以戰事喻解王意填然鼓之兵刃既接棄甲曵兵而走或百步而後止或五十步而後止以五十步笑百步則何如注填鼓音也兵以鼓進以金退孟子問王曰今有戰者兵刃已交其負者棄甲曳兵而走五十步而止足以笑百步者不曰不可直不百步耳是亦走也注王曰不足以相笑也是人俱走直爭不百步耳曰王如知此則無望民之多於鄰國也注孟子曰王如知此不足以相笑王之政猶此也王雖有移民轉粟之善政其好戰殘民與鄰國同而獨望民之多何異於五十步笑百步者乎不違農時穀不可勝食也注從此以下為王陳王道也使民得三時務農不違奪其要時則五穀饒穰不可勝食數罟不入汙池魚鱉不可勝食也注數罟密網也密細之網所以捕小魚龞也故禁之不得用魚不滿尺不得食斧斤以時入山林材木不可勝用也注時謂草木零落之時使材木茂暢故有餘穀與魚鱉不可勝食材木不可勝用是使民養生喪死無憾也注憾恨也民所用者足故無恨養生喪死無憾王道之始也注王道先得民心民心無恨故言王道之始五畝之宅樹之以桑五十者可以衣帛矣注廬井邑居各二畝半以為宅各入保城二畝半故為五畝也樹桑牆下古者年五十乃衣帛矣雞豚狗彘之畜無失其時七十者可以食肉矣注言孕字不失時也七十不食肉不飽百畝之田勿奪其時數口之家可以無饑矣注一夫一婦耕耨百畝百畝之田不可以徭役奪其時功則家給人足農夫上中下所食多少各有差故總言數口之家也謹庠序之教申之以孝悌之義頒白者不負戴於道路矣注庠序者教化之宫也殷曰序周曰庠謹修教化申重孝弟之義頒者斑也頭半白斑斑者也壯者代老心各安之故頒白者不負戴也七十者衣帛食肉黎民不饑不寒然而不王者未之有也注言百姓老稚溫飽禮義修行積之可以致王也孟子欲以風王何不行此可以王天下有率土之民何但望民多於鄰國狗彘食人食而不知檢塗有餓莩而不知發注言人君但養狗彘使食人食不知以法度檢斂也塗道也餓死者曰莩詩云莩有梅莩零落也道路之旁有餓死者不知發倉廪以用賑救之也人死則曰非我也嵗也是何異於刺人而殺之曰非我也兵也注人死謂餓疫死者也王政使然而曰非我殺之嵗殺之也此何以異於用兵殺人而曰非我也兵自殺之也王無罪嵗斯天下之民至焉注戒王無歸罪於嵗責己而改行則天下之民皆可致也音義填音田者不之不方久切後皆放此直如字丁音直勝音升下同數罟七欲切網也丁張音朔下音古汙音烏喪死丁如字衣帛於既切注及下文衣帛同數口之數丁色主切不王者之王丁云去聲下文以意讀之風王之風音諷餓莩之莩平表切義同殍字丁張毗小切莩有梅之莩毗小切又平表切丁云韓詩也詩作摽與莩同刺七亦切又七四切行下孟切下德行同疏正義曰此章言王化之本在於使民養生送死之用足備也王侯自稱曰寡惠王與孟子曰寡人之於國盡其心而為民耳矣耳矣者言至極也言河內凶荒我則移徙民於河東之地河東粟多我則移之於河內河東之地凶荒我則又如此而移民故曰亦然也察鄰國之政無如寡人之用心者察詳視也言詳視鄰國之君無有似寡人如此之用心者然而鄰國之人民不加益其損寡人之人民不加益其多是如之何故曰鄰國之民不加少寡人之民不加多何也遂以此而問孟子孟子對曰王好戰請以戰喻是孟子答慝王言惠王心好征戰故孟子請以戰事比喻而解王意填然鼓之兵刃既接棄甲曳兵而走或百步而後止或五十步而後止以五十步笑百步則何如者是孟子言戰事之語也填塞也又滿也趙氏云鼓音蓋言鼓音之充塞洋洋而盈滿也言鼓音既充塞盈滿於戰陳之際則兵刃刀鎗既以交接兵刃既交接乃棄去其甲曳散其兵而反走者或百步之間而止或五十步之間而止以五十步之間而止者則笑走至百步之間而止者則王以為如何曰不可直不百步耳是亦走也惠王答孟子言凡征戰之際鼓音既填然則不可棄去其甲曳散其兵而相笑走也雖有走或只止於五十步或有止於百步言其但自棄甲曳兵而反走者是雖止於五十步不至於百步然皆是走也豈可以五十步笑百步哉故曰直不百步耳是亦走也曰王如知此則無望民之多於鄰國者是孟子答惠王言惠王如能知此不可以五十步笑百步則王無更望其國民加多於鄰國也意謂王既好征戰而殘民而以轉粟移民為盡心欲望民加多於鄰國是亦五十步笑百步之走者也不違農時穀不可勝食至不王未之有也者是皆孟子又為王陳其王道也言使民無違奪其春耕夏耘秋收三時之要則五穀豐盛饒穰雖勝食之多亦不可盡也密細之網不入於汙池則魚龞不可勝食斧斤以草木零落之時入山林不以草木生長之時入之則材木不可勝用也穀與魚龞既不可勝食材木既不可勝用是使民得以養生喪死無怨恨於不足也五畝之宅栽牆下以桑則年至五十之老可以著其絹帛雞豚狗彘不失其養字之時則年至七十之老可以食其肉百畝之田不奪其耕耨之時則七八口之家可以無飢凡云可者但得過而已未至於富足有餘也謹庠序教化之宫以申舉孝悌之義而富以教之則頭斑斑然而半白者不自負戴於道塗之間矣無他人皆知孝悌之義為之壯者必代之爾故曰斑白者不負戴於道路矣是則五十之老足以衣帛七十之老足以食肉而黎庶之民故不飢不寒然而君上能如此而民不歸往而王之者必無也故曰未之有也狗彘食人食而不知檢塗有餓莩而不知發人死則曰非我也歲也是何異於刺人而殺之曰非我也兵也者是孟子以此諷惠王也言人君但養其狗彘而食人之所食而王不知檢斂道塗之間有餓死者而王不知發倉廩以救賑之見其人死則推之曰非我之罪是嵗之罪也言是歲之凶荒而疫死之也是何異於執其兵器而刺殺人而曰非我殺也是兵器自殺之類也王無罪於歲則天下之民至焉者是孟子諷之而又誡之也言王儻人餓死不歸罪於歲但責己而改行則天下之民莫不歸往而至焉耳為惠王好征戰以麋爛其民故以此諷之注云王侯自稱孤寡正義曰禮云諸侯與民言自稱曰寡人在凶服曰孤老聃云王侯自稱孤寡不穀是也注云魏舊在河東至河內正義曰案地理云魏地觜觹參之分野其界自髙陵以東盡河東河內河東本殷之舊都周既滅殷分其地畿內為三國詩風邶鄘衛是也注云戰事正義曰莊公十一年左傳曰皆陳曰戰杜預云堅而有備各得其所成敗決於志力者也注填鼓音兵以鼓進以金退正義曰賈逵云填塞也滿也禮云色容填填史云車馬駢填云兵以鼓進以金退者案周官大司馬辨鼓鐸鐲鐃之用以教坐作進退疾徐疏數之節云鼓人三鼓司馬振鐸羣吏作旗車徒鼓行鳴鐲車徒皆行鳴鐃且卻是也注使民得三時務農不違奪其要時正義曰王制云用民之力歲不過三日周禮內人職云凡均力政以歲上下豐年則公旬用三日焉中年則公旬用二日焉無年則公旬用一日焉語云使民以時包注曰作使民必以其時不妨奪農務荀卿曰春耕夏耘秋收冬藏四者不失時故五穀不絶而百姓有餘食是五穀不可勝食也注數罟至不得食正義曰釋云數密也罟網也荀子曰網罟毒藥不入澤汙池淵沼謹其時禁故魚鱉優多而百姓有餘用注云食足之外可貨易也注時謂至有餘正義曰周官山虞掌山林之政令云仲冬斬陽木仲夏斬隂木鄭注云陽木春夏生隂木秋冬生者若松柏之屬一云陽木生山陽在南者隂木生山隂在北者荀卿曰斬伐養長不失其時故山林不童而百姓有餘材也注廬井至衣帛矣正義曰案周禮云乃經土地而井牧其田野九夫為井四井為邑遂人掌邦之野辨其野之土地上地夫一廛田百畝萊五十畝餘夫亦如之中地夫一廛田百畝萊百畝餘夫亦如之下地夫一廛田百畝萊二百畝餘夫亦如之鄭司農云戶計一夫一婦而賦之田其一戶有數口者餘夫亦受此田也廛居也萊謂休不耕者鄭𤣥云廛城邑之居漢志云六尺為步步百為畝畝百為夫夫三為井井方一里是為九夫八家共之各受私田百畝公田十畝是為八百八十畝餘為廬舍里有序而鄉有庠序以眀教庠以行禮而視化焉其有秀異者移鄉學于庠序庠序之異者移國學于小學小學之異者移于大學命曰造士行同能偶則别之以射然後爵命焉此先王制士處居富而教之之大略也王制云五十異粻始衰六十非肉不飽七十非帛不暖八十非人不暖九十雖得人不暖是古者五十乃衣帛矣注言人君至救之也正義曰餓死者曰莩詩曰莩有梅莩零落也者案毛詩而言也毛詩云莩落也箋云梅實尚餘而未落是其解也梁惠王曰寡人願安承教注願安意承受孟子之教令孟子對曰殺人以梃與刃有以異乎注梃杖也曰無以異也注王曰梃刃殺人無以異也以刃與政有以異乎注孟子欲以政喻王曰無以異也注王復曰梃刃殺人與政殺人無異也曰庖有肥肉廄有肥馬民有飢色野有餓莩此率獸而食人也注孟子言人君如此是率獸而食人也獸相食且人惡之為民父母行政不免於率獸而食人惡在其為民父母也注虎狼食禽獸人猶尚惡視之牧民為政乃率禽獸食人安在其為民父母之道也仲尼曰始作俑者其無後乎為其象人而用之也如之何其使斯民飢而死也注俑偶人也用之送死仲尼重人類謂秦穆公時以三良殉葬本由有作俑者也惡其始造故曰此人其無後嗣乎如之何其使斯民飢而死也孟子陳此以教王愛其民也音義梃丁徒頂切從木惡烏路切注及下夫惡同惡在之惡音烏惡猶安也下惡乎定惡知皆同俑音勇疏正義曰此一段宜與前段合為一章趙氏分别之蓋言王者為政之道在生民為首也梁惠王曰寡人願安承教者是惠王願安意承受孟子之教令也孟子對曰殺人以梃與刃有以異乎者是孟子答惠王故託此而問惠王言殺人以杖與刃有以各異乎云乎者是又孟子未知惠王以為如何故疑之也曰無以異者是惠王答孟子之問言以杖殺人與刃殺人無以各異是皆能殺人也以刃與政有以異乎者孟子復問以刃與政殺人有以異曰無以異也者惠王復曰政之殺人與刃之殺人亦無以異也言致人死則一也曰庖有肥肉廄有肥馬民有飢色野有餓莩此率獸而食人也者是孟子之諷惠王也言庖厨之間有肥肉棧廄之中有肥馬而民皆有飢餓之顔色郊野之間又有餓而死者此乃是王率獸而食人也獸相食且人惡之為民父母行政不免於率獸而食人惡在其為民之父母也者孟子言獸畜自相食如虎狼食牛羊且人猶尚惡見之况為民之父母其於行政以治民尚不免驅率獸而食人安在其為民之父母也言行政如此不足為民之父母也仲尼曰始作俑者其無後乎是孟子引仲尼之言也言仲尼有云始初作俑偶人者其無後嗣乎無他焉是為其象人而用之也故後有秦穆公以生人從葬故曰其無後嗣也注梃杖也正義曰釋文云梃木片也注俑偶人也正義曰記云孔子謂為俑者不仁埤蒼云木人送葬設關而能俑跳故名之曰俑魯文公六年秦穆公卒以子車氏之三子奄息仲行針虎為殉杜預曰以人從葬曰殉詩有黃鳥之篇以哀三良是也孟子諷之故曰如之何使斯民飢餓而死梁惠王曰晉國天下莫强焉叟之所知也注韓魏趙本晉六卿當此時號三晉故惠王言晉國天下莫强焉及寡人之身東敗於齊長子死焉西喪地於秦七百里南辱於楚寡人恥之願比死者一灑之如之何則可注王念有此三恥求䇿謀於孟子孟子對曰地方百里而可以王注言古聖人以百里之地以致王天下謂文王也王如施仁政於民省刑罰薄稅斂深耕易耨壯者以暇日修其孝悌忠信入以事其父兄出以事其長上可使制梃以撻秦楚之堅甲利兵矣注易耨藝苗令簡易也制作也王如行此政可使國人作杖以捶敵國堅甲利兵何患恥之不雪也彼奪其民時使不得耕耨以養其父母父母凍餓兄弟妻子離散彼陷溺其民王往而征之夫誰與王敵注彼謂齊秦楚也彼困其民願王往征之也彼失民心民不為用夫誰與共禦王之師而為王之敵乎故曰仁者無敵王請勿疑注鄰國暴虐已修仁政則無敵矣王請行之勿有疑也音義長子之長張丈切下長上長者皆同灑丁音洗謂洗雪其恥也省所梗切斂丁力劒切耨以豉切丁奴豆切字亦作蓐音同養餘亮切疏正義曰此章言百里行仁則天下歸之也梁惠王曰晉國天下莫强焉叟之所知也者是梁惠王欲問孟子之謀䇿也言晉國為天下之最强叟必知之及寡人之身東敗於齊長子死焉西喪地於秦七百里南辱於楚寡人恥之願比死者一灑之如之何則可者是惠王言晉國逮及寡人之身東則見敗於齊而殺死其長子西又喪去其地於秦七百里南又常受辱於楚寡人心甚愧恥之今願為死不惜命者一洗除之當如之何謀則可以洗除此恥孟子對曰地方百里而可以王者是孟子答惠王言古之聖君其地但止於百里尚可以王天下也王如施仁政於民省刑罰薄稅斂深耕易耨壯者以暇日修其孝悌忠信入以事其父兄出以事其長上可使制梃以撻秦楚之堅甲利兵矣者是孟子言王自今能施仁政以及民又省去其刑罰輕其稅斂使民皆得深耕易耨壯者以閒暇日修孝悌忠信入閨門之內以奉事其父兄出鄉黨之間以奉事其長上凡能如此雖作一捶梃亦可以鞭撻秦楚之堅甲利兵矣然以秦楚有堅甲利兵而以一梃可鞭撻者蓋秦楚常違奪其農時使民不得耕耨也故云彼奪其民時使不得耕耨以養父母又云父母凍餓兄弟妻子離散彼陷溺其民王往而征之夫誰與王敵者言民既不得耕耨以奉養父母則為父母者被寒凍飢餓兄弟者與妻子者皆離背散亡彼秦楚陷溺其人民如此而王往彼正其罪夫更誰敢禦王之師而為王之敵者故曰仁者無敵王請勿疑者是孟子請惠王行此仁政而往正其罪而無敵如所謂仁者無敵是也遂請之行而無更遲疑也前所謂閒暇日者蓋言民於耕耨田地之外有休息閒暇之日也注韓魏趙至强焉正義曰案史記年表云定王十六年魏桓子與韓康子趙襄子三人敗智伯于晉陽乃三分其地故號為三晉是為强國云東敗於齊而喪長子者案史記世家惠王三十年魏伐趙趙告急於齊齊宣王用孫子計救趙魏遂大興師太子申自將攻齊遂與齊人戰敗於馬陵是也云西喪地於秦者案史記年表云周顯王十五年秦與魏戰元里斬首七千取少梁南則常辱於楚馬陵者案徐廣云地在於元城孟子注疏卷一上孟子注疏卷一上考證梁惠王章句上注魏惠王居於大梁故號曰梁王臣齊燾按漢書地理志魏初都安邑在漢河東郡安邑縣至惠王徙大梁在漢陳留郡浚儀縣魏地有少梁故以大梁别之疏魏武子生悼悼生嬴臣邦綏按史記魏世家武子生悼子悼子生絳諡昭子昭子生嬴此云悼生嬴誤又疏惠王三十一年齊趙共伐我邑三監本訛二今改正孟子見梁惠王章萬取千焉節注臣食千鍾亦多矣矣監本訛故今改正未有仁而遺其親節注人無行仁而遺棄其親此句下監本衍也字今刪又注無行義而忽後其君者者監本訛長今改正王立於沼上章鴻鴈注疏無明文臣宗楷按格物總論云鴻其鴈之大者博物志曰鴈色蒼鴻色白一異也鴈多羣鴻寡侣二異也鴈飛不過髙山鴻上薄雲表三異也蓋為兩類注大雅靈臺之篇也疏文王受命於周作邑於豐立靈臺臣宗楷按服䖍曰天子曰靈臺諸侯曰觀臺劉瑾曰文王之臺其名如此豈至周有天下遂以為天子之臺而諸侯别名觀臺也歟范處義曰文王未嘗稱王凡詩謂文王為王者皆非作于文王之時是詩亦作于後世故以王在言之又疏毛注云濯濯娛遊也鶴鶴肥澤也臣人龍按詩集傳濯濯肥澤貌翯翯潔白貌與此小異又詩集傳伏言安其所處不驚擾也此注云伏卧以懷其妊亦異寡人之於國也章百畝之田節注農夫上中下所食多少各有差故總言數口之家也口監本訛日今改正注殷曰序周曰庠疏里有序而鄉有庠臣宗萬按儀禮鄉射鄭注云周立四代之學於國而又以有虞之庠為鄉學故庠序皆為周學名孟子注疏卷一上考證欽定四庫全書孟子注疏卷一下漢趙氏注宋孫奭音義并疏梁惠王章句上孟子見梁襄王出語人曰望之不似人君注裏諡也魏之嗣王也望之無儼然之威儀也就之而不見所畏焉注就與之言無人君操柄之威知其不足畏卒然問曰天下惡乎定注卒暴問事不由其次也問天下安所定言誰能定之吾對曰定于一注孟子謂仁政為一也孰能一之注言孰能一之者對曰不嗜殺人者能一之注嗜猶甘也言今諸侯有不甘樂殺人者則能一之孰能與之注王言誰能與不嗜殺人者乎對曰天下莫不與也注孟子曰時人皆苦虐政如有行仁天下莫不與之王知夫苗乎七八月之間旱則苗槁矣天油然作雲沛然下雨則苗浡然興之矣其如是孰能禦之注以苗生喻人歸也周七八月夏之五六月也油然興雲之貌沛然下雨以潤槁苗則浡然已盛孰能止之今夫天下之人牧未有不嗜殺人者也如有不嗜殺人者則天下之民皆引領而望之矣誠如是也民歸之由水之就下沛然誰能禦之注今天下牧民之君誠能行此仁政民皆延頸望欲歸之如水就下沛然而來誰能止之音義語魚據切下語人同卒七沒切槁音考沛亦作霈普蓋切浡音勃由水之由與猶同古字通用疏正義曰此章言定天下者一道而已不貪殺人人則歸之也孟子見梁襄王出語人曰望之不似人君就之而不見所畏焉者是孟子在梁見襄王而語於人曰逺望之襄王而不似人君言無人君之威儀也就而近之而不見所畏焉言無人君操柄之威也卒然問曰天下惡乎定者是孟子語於人言襄王卒暴而問我曰天下誰能定吾對曰定于一者言我對之曰定天下者在乎仁政為一者也孰能一之是孟子言襄王又問誰能仁政為一對曰不嗜殺人者能一之者是孟子言我復答之唯不好殺人者能以仁政為一也孰能與之者言襄王又問誰能與之不好殺人者對曰天下莫不與也言我對曰天下之人無有不與之也王知夫苗乎七八月之間旱則苗槁矣天油然作雲沛然下雨則苗浡然興之矣其如是孰能禦之者是孟子比喻而解王之意也故問襄王曽知夫苗乎言夫苗自七八月之時則乾旱而無水苗於是枯槁上天油然而起雲沛然而降雨則枯槁之苗又浡然興起而茂其不嗜殺人者能一之有如此苗而興茂誰能止之也又言如有行仁而天下莫不與之誰能止之而不與也今夫天下之人牧未有不嗜殺人者也至誰能禦之者是孟子因比喻苗而解王之意又以此復詳明之欲使襄王即曉之也言今天下為牧養人民之君未有不好殺人者也言皆好殺人若有不好殺人者則天下之人民皆延頸而望王以歸之矣誠如此上言之者則民皆歸之亦若水之流自上而下其勢沛然而來誰能止之言無人能止之也注襄諡也至威儀正義曰案世家云惠王在位三十六年卒子赫立是為襄王襄王在位六年卒諡曰襄諡法云因事有功曰襄又曰辟土有德曰襄注周七八月夏之五六月正義曰周之時蓋以子之月為正夏之時建寅之月為正是知周之七八月即夏之五六月也齊宣王問曰齊桓晉文之事可得聞乎注宣諡也宣王問孟子欲庶幾齊桓公小白晉文公重耳孟子冀得行道故仕於齊齊不用乃適梁建篇先梁者欲以仁義為首篇因言魏事章次相從然後道齊之事孟子對曰仲尼之徒無道桓文之事者是以後世無傳焉臣未之聞也注孔子之門徒頌述宓羲以來至文武周公之法制耳雖及五霸心賤薄之是以儒家後世無欲傳道之者故曰臣未之聞也無以則王乎注既不論三皇五帝殊無所問則尚當問王道耳不欲使王問霸者之事曰德何如則可以王矣注王曰德行當何如而可得以王乎曰保民而王莫之能禦也注保安也禦止也言安民則惠而黎民懷之若此以王無能止也曰若寡人者可以保民乎哉注王自恐德不足以安民故問之曰可注孟子以為如王之性可以安民也曰何由知吾可也注王問孟子何以知吾可以保民曰臣聞之胡齕曰王坐於堂上有牽牛而過堂下者王見之曰牛何之對曰將以釁鐘王曰舍之吾不忍其觳觫若無罪而就死地對曰然則廢釁鐘與曰何可廢也以羊易之不識有諸注胡齕王左右近臣也觳觫牛當到死地處恐貌新鑄鐘殺牲以血塗其釁郤因以祭之曰釁周禮大祝曰墮釁逆牲逆尸令鐘鼓天府上春釁寶鎮及寶器孟子曰臣受胡齕言王嘗有此仁不知誠有之否曰有之注王曰有之曰是心足以王矣百姓皆以王為愛也臣固知王之不忍也注愛嗇也孟子曰王推是仁心足以至於王道然百姓皆謂王嗇愛其財臣知王見牛恐懼不欲趨死不忍故易之也王曰然誠有百姓者齊國雖褊小吾何愛一牛即不忍其觳觫若無罪而就死地故以羊易之也注王曰亦誠有百姓所言者矣吾國雖小豈愛惜一牛之財費哉即見其牛哀之釁鐘又不可廢故易之以羊耳曰王無異於百姓之以王為愛也以小易大彼惡知之王若隱其無罪而就死地則牛羊何擇焉注異怪也隱痛也孟子言無怪百姓謂王愛財也見王以小易大故也王如痛其無罪羊亦無罪何為獨釋牛而取羊王笑曰是誠何心哉我非愛其財而易之以羊也宜乎百姓之謂我愛也注王自笑心不然而不能自免為百姓所非乃責己之以小易大故曰宜乎其罪我也曰無傷也是乃仁術也見牛未見羊也君子之於禽獸也見其生不忍見其死聞其聲不忍食其肉是以君子逺庖厨也注孟子解王自責之心曰無傷於仁是乃王為仁之道也時未見羊羊之為牲次於牛故用之耳是以君子逺庖厨不欲見其生食其肉也王說曰詩云他人有心豫忖度之夫子之謂也夫我乃行之反而求之不得吾心夫子言之於我心有戚戚焉此心之所以合於王者何也注詩小雅巧言之篇也王喜恱因稱是詩以嗟嘆孟子忖度知己心戚戚然心有動也寡人雖有是心何能足以合於王也曰有復於王者曰吾力足以舉百鈞而不足以舉一羽明足以察秋毫之末而不見輿薪則王許之乎注復白也許信也人有白玉如此王信之乎百鈞三千斤也曰否注王曰我不信也今恩足以及禽獸而功不至於百姓者獨何與然則一羽之不舉為不用力焉輿薪之不見為不用明焉百姓之不見保為不用恩焉故王之不王不為也非不能也注孟子言王恩及禽獸而不安百姓若不用力不用明者也不為耳非不能也曰不為者與不能者之形何以異注王問其狀何以異也曰挾太山以超北海語人曰我不能是誠不能也為長者折枝語人曰我不能是不為也非不能也故王之不王非挾太山以超北海之類也王之不王是折枝之類也注孟子為王陳為與不為之形若是王則不折枝之類也折枝案摩折手節解罷枝也少者恥是役故不為耳非不能也太山北海皆近齊故以為喻也老吾老以及人之老幼吾幼以及人之幼天下可運於掌注老猶敬也幼猶愛也敬吾之老亦敬人之老愛我之幼亦愛人之幼推此心以惠民天下可轉之掌上言其易也詩云刑于寡妻至于兄弟以御于家邦言舉斯心加諸彼而已注詩大雅思齊之篇也刑正也寡少也言文王正已適妻則八妾從以及兄弟御享也享天下國家之福但舉己心加於人而已故推恩足以保四海不推恩無以保妻子古之人所以大過人者無他焉善推其所為而已矣注大過人者大有為之君也善推其心所好惡以安四海也今恩足以及禽獸而功不至於百姓者獨何與注復申此言非王不能不為之耳權然後知輕重度然後知長短物皆然心為甚王請度之注權銓衡也可以稱輕重度丈尺也可以度長短凡物皆當稱度乃可知心當行之乃為仁心比於物尤當為之甚者也欲使王度心如度物也抑王興甲兵危士臣構怨於諸侯然後快於心與注抑辭也孟子問王抑亦如是乃快邪王曰否吾何快於是將以求吾所大欲也注王言不然我不快是也將欲以求吾心所大欲者矣曰王之所大欲可得聞與注孟子雖心知王意而故問者欲令王自道遂因而陳之王笑而不言注王意大而不敢正言曰為肥甘不足於口與輕暖不足於體與抑為采色不足視於目與聲音不足聽於耳與便嬖不足使令於前與王之諸臣皆足以供之而王豈為是哉注孟子復問此五者欲以致王所欲也故發異端以問之也曰否吾不為是也注王言我不為是也曰然則王之所大欲可知已欲辟土地朝秦楚蒞中國而撫四夷也注蒞臨也言王意欲庶幾王者臨蒞中國而安四夷者也以若所為求若所欲猶緣木而求魚也注若順也順嚮者所為謂構兵諸侯之事求順今之所欲蒞中國之願其不可得如緣喬木而求生魚也王曰若是其甚與注王謂比之緣木求魚為大甚曰殆有甚焉緣木求魚雖不得魚無後災以若所為求若所欲盡心力而為之後必有災注孟子言盡心戰鬭必有殘民破國之災故曰殆有甚於緣木求魚者也曰可得聞與注王欲知其害也曰鄒人與楚人戰則王以為孰勝注言鄒小楚大也曰楚人勝注王曰楚人勝也曰然則小固不可以敵大寡固不可以敵衆弱固不可以敵强海內之地方千里者九齊集有其一以一服八何以異於鄒敵楚哉注固辭也言小弱固不可以敵强大集㑹齊地可方千里譬一州耳今欲以一州服八州猶鄒欲敵楚也蓋亦反其本矣注王欲服之之道蓋當反王道之本耳今王發政施仁使天下仕者皆欲立於王之朝耕者皆欲耕於王之野商賈皆欲藏於王之市行旅皆欲出於王之塗天下之欲疾其君者皆欲赴訴於王其若是孰能禦之注反本道行仁政若此則天下歸之誰能止之也王曰吾惛不能進於是矣願夫子輔吾志明以教我我雖不敏請嘗試之注王言我情思惛亂不能進行此仁政不知所當施行也欲使孟子明言其道以教訓之我雖不敏願嘗使少行之也曰無恆産而有恆心者惟士為能若民則無恆産因無恆心注孟子為王陳其法也恆常也産生也恆産則民常可以生之業也恆心人常有善心也惟有學士之心者雖窮不失道不求苟得耳凡民迫於飢寒則不能守其常善之心也苟無恆心放辟邪侈無不為已及陷於罪然後從而刑之是罔民也注民誠無恆心放溢辟邪侈於姦利犯罪觸刑無所不為乃就刑之是猶張羅罔以罔民者也焉有仁人在位罔民而可為也注安有仁人為君罔陷其民是政何可為也是故明君制民之産必使仰足以事父母俯足以畜妻子樂嵗終身飽凶年免於死亡然後驅而之善故民之從之也輕注言衣食足知榮辱故民從之教化輕易也今也制民之産仰不足以事父母俯不足以畜妻子樂嵗終身苦凶年不免於死亡此惟救死而恐不贍奚暇治禮義哉注言今民困窮救死恐凍餓而不給何暇修禮行義乎王欲行之則盍反其本矣五畝之宅樹之以桑五十者可以衣帛矣雞豚狗彘之畜無失其時七十者可以食肉矣百畝之田勿奪其時八口之家可以無飢矣謹庠序之教申之以孝悌之義頒白者不負戴於道路矣老者衣帛食肉黎民不飢不寒然而不王者未之有也注其說與上同八口之家次上農夫也孟子所以重言此者乃王政之本常生之道故為齊梁之君各具陳之當章究義不嫌其重也音義宓音伏羲音戲齕恨沒切釁許覲切舍音捨觳觫丁斛速二音恐貌與音餘下何與心與聞與甚與口與體與目與前與皆同郤音隙大祝之大音泰墮許規切遠于萬切王說之說音悅挾音協超或作趨折之舌切趙云折枝按摩折手節解罷枝也陸善經云折枝折草樹枝罷音疲少者之少詩妙切以御如字鄭箋詩云御治也思齊之齊音齊適丁亦切好惡皆去聲度待各切注稱度度心度物皆同餘並音渡便婢綿切嬖音臂辟土之辟音闢賈音古訴音訴惛音昏辟音僻侈張尺氏切丁作移為己之已音以絶句罔民張如字丁作司民下音同焉於䖍切畜許六切當丁浪切譎音決疏正義曰此章言典籍攸載帝王之道無傳霸者之事也齊宣王問曰齊桓晉文之事可得聞乎者齊宣是齊威王之子辟疆是也諡為宣言齊宣王問孟子曰齊桓公小白晉文公重耳二霸之事可得而聞之乎孟子對曰仲尼之徒無道桓文之事者是以後世無傳焉臣未之聞也者是孟子答齊宣王之言也言自孔子之門徒無有道及桓文二霸者事是以後世無傳焉故臣于今未之曽聞知也云臣者是孟子對王而言故自稱已為臣也無以則王乎者孟子言無以問及宓犧以來至文武周公之法尚當以王者之道為問耳曰德何如則可以王矣者齊宣又問孟子言德當何如則可以為王曰保民而王莫之能禦也者孟子言當安民而為之王則天下之民莫之能止禦之也曰若寡人者可以保民乎哉者宣王又自問只如寡人之德可以安民乎王恐德不足以安民故問之也曰可者孟子言如王之德可以安民也曰何由知吾可也者宣王又問孟子何緣而知吾之德可以安民曰臣聞之胡齕曰王坐於堂上有牽牛而過堂下王見之曰牛何之至以羊易之者是孟子因胡齕之言而答宣王之問也胡齕王之左右近臣言嘗聞胡齕曰王坐於廟堂之上有牽牛自堂下而過者王見之而問牽牛者曰其牛牽去何所牽牛者對之曰相將以為釁鐘也王對牽牛者曰舍去之我不忍其牛之恐栗若無罪之人而就於所死之地者也牽牛者又對曰如若王之所不忍則廢去釁鐘之禮與王復與牽牛者曰塗釁祭鐘之禮何可得而廢以羊更易之而已不識有諸者是孟子又未知齊宣王還是有此言故問宣王曰不識有諸曰有之者宣王答孟子以為是有此言也曰是心足以玉矣者是孟子於此言知王有此不忍之心故足以為王矣百姓皆以王為愛也臣固知王之不忍也者孟子言然百姓盡以王為愛財也臣素知王有不忍之心故如此也王曰然者宣王復亦自謂百姓是有此疑也誠有百姓者齊國雖褊小吾何愛一牛即不忍其觳觫若無罪而就死地故以羊易之也者宣王言誠有百姓以我為愛財者齊國雖曰褊小狹隘我亦何獨止愛其一牛即是不忍見其牛之恐栗如無罪而就於所死之地又為釁鐘不可廢故以羊更之也宣王必以羊易牛者以其羊之為牲次於牛也故以羊易之曰王無異於百姓之以王為愛也以小易大彼惡知之王若隱其無罪而就死地則牛羊何擇焉者孟子對宣王言王無怪百姓皆謂我為愛財也以羊之小而易牛之大彼百姓之人安知王以為不忍見其恐栗又為釁鐘不可廢故以羊易之之意也彼必曰王若隱痛不忍見牛若無罪而就所死之地則牛與羊何擇焉言羊之與牛是皆若無罪而就死也何獨擇取其牛而以羊就死也王笑曰是誠何心哉我非愛其財而易之以羊也宜乎百姓之謂我愛也者是宣王自笑以其己之心不如是故笑之也笑而言曰儻如此者是何心哉然我非愛其財故以羊易牛也云此者宣王又疑孟子亦以為然故以此言復答之也宜乎百姓不知我之意而謂我愛財也曰無傷也是乃仁術也見牛未見羊也君子之於禽獸也見其生不忍見其死聞其聲不忍食其肉是以君子遠庖厨也者孟子復解王之自責之意也言如此亦無傷害於為王也此亦為仁之一術耳無他是見其牛之觳觫未見其羊之觳觫也凡君子之於禽獸見其生貌則不忍見其就死聞其鳴聲則不忍食其肉是以君子之人凡於庖厨烹炙之事所以遠去之也王恱曰詩云他人有心豫忖度之夫子之謂也者是宣王見孟子解其己意故喜悅之而引詩之文而言也他人有心豫忖度之二句是小雅巧言之詩也宣王引之以為如夫子之所謂也云夫子者宣王尊孟子為夫子也夫我乃行之反而求之不得吾心夫子言之於我心有戚戚焉者宣王言我既行之事尚且反而求之於已而不得其心之所之自今夫子言之於我心中戚戚然有動也此心之所以合於王者何也者宣王言雖有是心其所以得契合於王者是如之何也曰有復於王者曰吾力足以舉百鈞而不足以舉一羽眀足以察秋毫之末而不見輿薪則王許之乎者是孟子欲以此比喻而解王也言今有人復白於王曰我力能舉得三千斤之重而不能舉一羽毛之輕目之眀能觀視其秋毫之末鋭而不能見一大車之薪木則王信乎否乎曰否者是宣王答之曰凡如此云者我不信也今恩足以及禽獸而功不至於百姓者獨何與者孟子復以此諷之也言今王有恩德足以及其禽獸而其功績不至於百姓者王獨以為何如然則一羽之不舉為不用力焉輿薪之不見為不用眀焉百姓之不見保為不用恩焉故王之不王不為也非不能也者孟子又言苟如是一羽之輕所以不能舉者為其不用力也一車薪之大所以不見之者為其不用眀也今百姓所以不見安者為其不用恩也故王之所以不為王是王之不為也非不能也曰不為者與不能者之形何以異者是宣王問孟子言不為與不能二狀何以為異也曰挾太山以超北海語人曰我不能是誠不能也為長者折枝語人曰我不能是不為也非不能也故王之不王非挾太山以超北海之類也是折枝之類也者是孟子又以此比喻而解王問不為與不能之異狀也言今有人云挾太山而超過北海而語人曰我不能挾太山超北海此真不能也如為長者按摩手節而語人曰我不能為長者按摩手節是恥見役使但不為之耳非不能也今王之所以不王非是挾太山超北海之類也是不為長者折枝之類也以其不為之耳老吾老以及人之老幼吾幼以及人之幼天下可運於掌者是孟子欲以此教宣王也言敬吾之所敬以及他人之所敬者愛吾之所愛以及他人之所愛者凡能推此而惠民則治天下之大止如運轉於掌上之易也詩云刑于寡妻至于兄弟以御于家邦者是孟子引大雅思齊之詩文也言文王自正于寡妻以至正于兄弟自正于兄弟以至臨御于家邦言凡此是能舉此心而加諸彼耳故推恩足以保四海不推恩無以保妻子古之人所以大過人者無他焉善推其所為而已矣者孟子言為君者但能推其恩惠故足以安四海苟不推恩惠雖妻子亦不能安之古之人君所以大過强於人者無他事焉獨能推其所為恩惠耳蓋所謂老吾老以及人之老幼吾幼以及人之幼又如詩云文王刑于寡妻至于兄弟以御于家邦是其善推其所為之意㫖故也今恩足以及禽獸而功不至於百姓者獨何與者孟子復言非王不能但不為耳故復云然權然後知輕重度然後知長短物皆然心為甚王請度之者孟子又託物而諷王也言為之權與度然尚能知其輕重長短其權度之為物也然尚皆然而人心又甚於權度故請王自忖度之耳抑王興甲兵危士臣構怨於諸侯然後快於心與者抑辭也與語曰抑為之不厭之抑同孟子又以此數事而測王之意也言抑是王欲興甲兵以伐人危士臣以即戎不以為危事外結怨於諸侯如此且然後快樂其心與王曰否者宣王答之以為不如是也言我何肯快心於此數事我但將以求吾所大欲耳曰王之所大欲可得聞與者是孟子欲知王之所大欲故問之曰王大欲可得而聞之乎王笑而不言宣王知己之所欲甚大但笑而不言也曰為肥甘不足於口與輕暖不足於體與至不足使令於前與者是孟子又以此四事而測王所大欲也言王之所大欲是為其肥甘之味不足以供於口與抑是其聲音之樂不足供聽於王之耳與便嬖之幸不足使令於王之前與采色之飾不足供視於王之目與然此數事而為王之諸臣者皆足以供奉王矣而王豈用為此者與故繼之曰王之諸臣皆足以供之而王豈為是哉王曰否吾不為是者宣王答之曰我不為是四者之事也曰然則王之所大欲可知已者孟子言如是則王之大欲我今可得知已欲辟土地朝秦楚蒞中國而撫四夷也者孟子知王以此為所大欲也以若所為求若所欲猶緣木而求魚也者孟子言王如若以此欲開闢其土地而求其廣又欲朝秦楚之諸侯以臨蒞其中國而撫安四夷為所大欲是若緣喬木之上而求其魚也王曰若是其甚與者宣王亦謂己之大欲若此求魚之甚與曰殆有甚焉緣木求魚雖不得魚無後災以若所為求若所欲盡心力而為之後必有災者孟子言王如此大欲殆有甚於緣木求魚也緣喬木而求魚雖不得魚又且無後災難所及而王如若以所欲假使盡心力而為之後亦必有大災難所及也曰可得聞與者是宣王又問孟子欲求知其大災難也曰鄒人與楚人戰則王以為孰勝者孟子以此比喻而解王也言鄒之小國與楚之大國戰鬭則王以為誰國勝之曰楚人勝者宣王答孟子以為楚之大國人勝之也曰然則小固不可以敵大寡固不可以敵衆弱固不可以敵强者孟子言如是則小國固不可敵大國人之寡少固不可以敵人之衆多劣弱固不可以敵强悍也海內之地方千里者九齊集有其一以一服八何以異於鄒敵楚哉者孟子又言今海內之地方千里者有九而齊國但集而有一且以一而服八是何以異於鄒國之小而敵楚國之大哉言與此無異也王如欲服之蓋當反行王道之本耳故云蓋亦反其本矣今王發政施仁至孰能禦之者孟子於此教宣王王道之本也言今王發政而施仁使天下為之仕者皆欲立於王之朝廷耕者皆欲耕作於王之郊野商賈皆欲藏於王之市行旅皆欲出於王之道塗凡天下欲疾惡其君者又皆欲奔赴王而告訴之其如此天下皆歸之誰能止禦之也商賈漢書云通利鬻貨曰商白虎通云賣曰賈行旅者師旅也說文云軍五百人也王曰吾惛不能進於是矣願夫子輔吾志明以教我我雖不敏請嘗試之者宣王欲孟子明其王道而教之也故曰我之惛亂不能進於此仁政願夫子輔我志以明白教我也我雖不能敏疾而行之但請嘗試教之如何耳曰無恆産而有恆心者惟士為能若民則無恆産因無恆心苟無恆心放辟邪侈無不為已至未之有也者是孟子為宣王陳王道之本而教之者也言無常生之業而有常善之心者惟士人為能有之言士窮則獨善其身不求苟得故能有常心也若民則迫於窮困不能守其常善苟無常生之業遂因之而無常善之心苟無常善之心則放僻邪侈之事無有不為及其陷溺於罪然後又從而誅戮之是若張羅網而罔民也安有仁人之君在位而以罔民而可為之也故明哲之君制别民之生産必使其民仰而上之則足以奉事父母俯而下之則足以畜養妻子豐樂之嵗終身飽足凶荒之年又免其死亡然後驅率而從善教故其民從其善教亦輕易也自今之君制民之産仰則不足以奉養父母俯則不足以畜養妻子雖豐樂之嵗終身又且勞苦而凶荒之年又不得免其死亡如此則民惟獨於救死尚恐其不足何有閒暇而修治禮義哉言無及修其禮義也王欲行之則盍反其本矣者言王欲行之則何不反其王道之本五畝之宅至未之有也是又孟子為宣王陳王道之本其說已在前此更不解注宣諡也至齊也正義曰周顯王二十七年史記云齊威卒子辟疆立是為齊宣王在位十九年卒諡曰宣諡法云善問周逹曰宣云齊桓公小白者莊公八年左傳云齊僖公母弟曰夷仲年生公孫無知有寵於僖公弒君自立九年春殺無知莊公納子糾桓公小白自莒入於是立為桓公元年史記云桓公小白元年春齊殺無知五年與魯人㑹柯七年始霸㑹諸侯於鄄云晉文公重耳者史記云周襄三十六年晉文公重耳立是為元年又云晉獻公五年伐驪戎得二姬歸生奚齊其娣生卓子驪姬嬖欲立其子重耳者乃獻公娶於戎得二女犬戎狐姬之所生也十二年居重耳於蒲城二十六年獻公卒立奚齊里克殺之及卓子又立小戎所生夷吾者為晉惠公七年重耳聞管仲死自狄之齊十四年惠公夷吾卒遂立重耳為晉文公九年在位卒云孟子不得行道故仕於齊齊不用乃適梁者案史記列傳已說在梁王段注云宓羲至聞也正義曰宓羲古帝王氏也即伏犧氏也五霸者即齊桓晉文秦穆宋襄楚莊是也崔李云夏昆吾殷大彭豕韋周齊桓晉文是也謂之霸者把也把持諸侯之權也案國語亦然荀子云仲尼之門人五尺之豎子言羞稱乎五霸是仲尼之徒無道桓文之事者之證也注云觳觫牛當到死地處恐貌正義曰案廣雅有云觳觫死貌是也云周禮大祝墮釁逆牲逆尸令鐘鼓者鄭司農云墮釁謂薦血也凡血祭曰釁既墮釁後言逆牲容逆鼎是也蓋古者器成而釁以血所以厭變怪禦妖釁釁鐘之釁謂之釁亦治亂謂之亂之類也云天府云上春釁寶鎮及寶器者寶鎮寶器玉瑞玉器之美上春孟春也又言釁謂以殺牲以血血之也蓋釁之法其來有自矣周之所釁又非止此而已如大司馬於軍器小子於邦器龜人於龜器雞人於雞大祝逆牲小祝祈號皆在所釁也注愛嗇也正義曰釋文云嗇愛歰也字法從來㐭來夌也來者㐭而藏之故田夫謂之嗇夫㐭音廩書云嗇夫馳是也注百鈞三千斤也正義曰律歷志云銖兩斤鈞石本起於黃鍾之重一籥容千二百黍重十二銖二十四銖為兩十六兩為斤三十斤為鈞重一千五百二十銖四鈞為石重百二十斤以此推之則百鈞是三千斤也注太山北海近齊正義曰案地里志云齊地南有太山城陽北有千乘清河是也注權銓衡至度物也正義曰權重衡平衡所以任權而均物平輕重也釋文云銓平木器又曰銓衡也權稱錘也度者分寸尺丈引也所以度長短也本起於黃鍾之長以子穀巨黍中者子穀穀子在地即黑黍中者不大不小言黑黍穀子大小中者率為分寸一黍之廣度之九十分黃鍾之長為十分十分為寸十寸為尺十尺為丈十丈為引法用銅髙一寸廣二寸長一丈而分寸尺丈存焉注八口之家次上農夫正義曰王制制農田百畝百畝之分上農夫食九人其次食八人孟子云一夫百畝百畝之糞上農夫食九人上次食八人是也此云八口之家所以特指次上農夫者而已斯亦舉其次而見上下之意耳孟子注疏卷一下孟子注疏卷一下考證孟子見梁襄王章七八月之間旱節注周七八月夏之五六月也元儒吳澄曰周改月數而詩之小雅所稱四月維夏六月徂暑十月之交朔日辛卯雖周時之詩而用夏正之月蓋夏時得天時之正行于民間者久作詩者從舊俗稱之耳若書之所載六月庚午朏周禮所載正月正嵗春秋所書正月無氷十月隕霜殺草及孟子所稱七八月之間旱十一月徒杠成十二月輿梁成則皆用所改之月也齊桓晉文之事章臣固知王之不忍也日知録曰孟子為卿於齊其於梁則客也故見梁王不稱臣見齊王則稱臣刑于寡妻注文王正己適妻則八妾從以及兄弟臣宗楷按毛詩注云寡妻適妻也蓋雖貴為天子富有四海之內亦惟正后一人為妻妻惟一故以單寡稱孔穎逹正義云適妻惟一故言寡較勝于鄭箋寡有之妻朱注寡德之妻為長者折枝注案摩折手節解罷枝也疏案摩手節是恥見役使但不為非不能臣宗萬按四書辨疑云枝與肢通謂斂折肢體為長者作禮亦與徐行後長者意類蓋從奭疏惟陸善經云折草樹枝不兼言木正與罷枝意同亦于易為義醒孟子注疏卷一下考證
