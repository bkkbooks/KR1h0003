body:
  text: 欽定四庫全書孟子注疏卷九上漢趙氏注宋孫奭音義并疏萬章章句上注萬章者萬姓章名孟子弟子也萬章問舜孝猶論語顔淵問仁因以題其篇也疏正義曰前篇論離婁之明此篇論萬章問孝蓋以明者當明其行而行莫大於為孝今萬章問孝故以萬章為此篇之題以次於前篇矣此篇凡十八章趙氏分為上下卷據此上卷凡有九章而已一章言孝為百行之本無物以先之雖富有天下而不能取悅其父母也二章言仁聖所存者大舍小從大逹權之義不告而娶守正道也三章言仁人之心四章言孝莫大於嚴父行莫大於蒸蒸五章言德合於天則天爵歸之行歸於仁則天下與之六章言義於人則四海宅心守正不足則聖位莫保者也七章言賢達之理世務推政以濟時物守已直行不枉道以取容八章言君子大居正位以禮進退屈仲達節不違貞信九章言君子時行則行時舍則舍故能顯君明道不為苟合其餘九章分在下卷各有說焉注萬章至篇也正義曰萬章孟子弟子已說在敘段云論語顔淵問仁者蓋論語第十二篇首顔淵問為仁孔子曰克已復禮為仁因以顔淵目其篇蓋其文也孟子於此則而象之爾萬章問曰舜往于田號泣于旻天何為其號泣也注問舜往至于田何為號泣也謂耕于歷山之時然也孟子曰怨慕也注言舜自怨遭父母見惡之厄而思慕也萬章曰父母愛之喜而不忘父母惡之勞而不怨然則舜怨乎注言孝法當不怨如是舜何故怨曰長息問於公明髙曰舜往于田則吾既得聞命矣號泣于旻天于父母則吾不知也公明高曰是非爾所知也注長息公明髙弟子公明髙曾子弟子旻天秋天也幽隂氣也故訴于旻天髙非息之問不得其義故曰非爾所知也已夫公明髙以孝子之心為不若是恝注恝無愁之貌孟子以萬章之問難自距之故為言髙息之問對如此夫公明髙以為孝子不得意於父母自當怨悲豈可恝恝然無憂哉因以萬章具陳其意耳我竭力耕田共為子職而已矣父母之不我愛於我何哉注我共人子之事而父母不我愛於我之身獨有何罪哉自求責於已而悲感焉帝使其子九男二女百官牛羊倉廩備以事舜於畎畝之中注帝堯也堯使九子事舜以為師以二女妻舜百官致牛羊倉廩致粟米之餼備具饋禮以奉事舜於畎畝之中由是遂賜舜以倉廩牛羊使得自有之堯典曰釐降二女不見九男孟子時尚書凡百二十篇逸書有舜典之敘亡失其文孟子諸所言舜事皆堯典及逸書所載獨丹朱以𦙍嗣之子臣下以距堯求禪其餘八庶無事故不見於堯典猶晉獻公之子九人五人以事見於春秋其餘四子亦不復見於經天下之士多就之者帝將胥天下而遷之焉為不順於父母如窮人無所歸注天下之善士多就舜而悅之胥須也堯須天下悉治將遷位而禪之順愛也為不愛於父母其為憂愁若困窮之人無所歸往也天下之士悅之人之所欲也注欲貪也而不足以解憂好色人之所欲妻帝之二女而不足以解憂富人之所欲富有天下而不足以解憂貴人之所欲貴為天子而不足以解憂人悅之好色富貴無足以解憂者惟順於父母可以解憂注言為人所悅將見禪為天子皆不足以解憂獨見愛於父母為可以解己之憂人少則慕父母知好色則慕少艾有妻子則慕妻子仕則慕君不得於君則熱中注慕思慕也人少年少也艾美好也不得於君失意於君也熱中心熱恐懼也是乃人之情大孝終身慕父母五十而慕者豫於大舜見之矣注大孝之人終身慕父母若老萊子七十而慕衣五綵之衣為嬰兒匍匐於父母前也我於大舜見五十而尚慕父母書曰舜生三十徴庸五十在位在位時尚慕故言五十也音義惡烏路切下惡之惡已皆同恝張古黠切丁音界說文作􅢚忽也許介切為言之為于僞切下因為為不順為楚所為主當為皆同共音供禪音擅後皆放此不見之見音現此章及下見瞽皆同少詩妙切知好之好此章惟此字呼報切餘並如字衣於既切匍音蒲匐蒲北切疏正義曰此章言夫孝百行之本無物以先之雖富有天下而不能取悅於父母也萬章問曰舜往于田號泣于旻天何為其號泣也者萬章問孟子謂舜往耕于田乃號泣于旻天是何為其號泣於此也旻天秋天之號也以其情主乎憫也爾雅曰秋曰旻天是也孟子曰怨慕也孟子答之曰舜所以號泣于田者自怨遭父母之惡而思慕之也萬章曰父母愛之至怨乎萬章又曰父母以慈愛愛息其子子則當喜悅而不敢忘其父母之所愛父母惡之其子亦當勤勞奉事之而不可怨恨父母今舜若是則舜誠有怨恨父母乎曰長息問於公明高至是非爾所知也孟子難以自為言拒之乃託以長息問公明高之言而答也言長息常問公明高曰舜往于田則我既以得聞教命矣號泣于旻天則我不能知也故問之公明高乃答之曰此非爾我所能知者也以其所問不得其義故答之此也夫公明高以孝子之心為不若是恝至於我何哉者孟子又言夫公明髙以謂孝子之心有不得意於父母為不若此恝恝然而無憂也以其有不得父母意故有是怨也其舜必謂我竭盡其力而耕作田業以供為子之事以奉養父母而父母今反不我愛恤誠於我有何罪哉故自求責於已而號泣怨慕也帝使其子九男二女至豫於大舜見之矣孟子至此乃繼其言而答萬章言堯帝使其子九男與二女兼百官及牛羊倉廩皆備具以事舜於畎畝之中天下之善士多就歸舜而悅之者堯帝又將胥以天下而遷位讓之其舜尚以有不得愛於父母其亦憂愁若窮困苦極之人無所歸告者矣且天下之善士悅而就之是人之所皆欲也而尚不足以解舜之憂好色之女是人之所皆欲者也妻以堯帝之二女而尚亦不足以解舜之憂富是人之所皆欲者也而堯以百官牛羊倉廪備以事之而尚亦不足以解舜之憂貴是人之所皆欲者也而堯將以天下遷而讓之而為天子尚亦不足以解其憂凡以人悅之好色富貴此數者皆無足以解舜之憂惟得於父母然後可以解其憂夫人少小之時則知思慕父母及長知好其女色則思慕其少艾有妻子則思慕其妻子至於為仕則思慕其君如不得遇於君則熱中心而恐懼之也是則人之常情如此如為大孝者則終身思慕父母而不忘也然則孟子言至於五十之歲者而思慕父母而不敢忘者我於大舜見之矣故歷以此答其萬章之問注耕于歷山正義曰上卷首章已說詳矣注堯典至見於經正義曰云堯典曰釐降二女不見九男惟丹朱𦙍嗣之子臣下以距堯求禪其餘八庶無事故不見二女即娥皇女英是也案尚書堯典放齊曰𦙍子朱啓明帝曰吁嚚訟可乎孔安國云𦙍國名子爵朱𦙍子之名也益稷云無若丹朱傲孔注云丹朱堯之子是堯九子但見丹朱一人矣其餘八子亦未詳以其經傳無見焉云如晉獻公九人五人以事見於春秋餘四子亦無所見者按魯莊公二十八年左傳云晉獻公娶於賈無子蒸於齊姜生秦穆夫人及大子申生又娶二女於戎大戎生重耳小戎子生夷吾晉伐驪戎驪戎男女以驪姬歸生奚齊其娣生卓子凡此九人但見其五即此五人是也云獻公有九人按史記世家云獻公有子九人而大子申生重耳夷吾皆有賢行以此則知獻公有子九人而已其餘四者亦以經傳無見焉注慕思慕至人之情正義曰云少年少也艾美好也者蓋世之傳孟子者以少女為少艾也按說文云艾老也長也又按禮記云五十曰艾是則艾誠老長之稱也謂之少艾安可乎是則云艾美好也者又不知何據為之誤也殆亦未可知注老萊子七十而慕至書曰舜生三十徴庸五十在位正義曰云老萊子者按高士傳云老萊子楚人少以孝行養親極甘脆年七十父母猶存萊子服荆蘭之衣為嬰兒戲親前言不稱老為親取食上堂足跌而偃因為嬰兒啼誠至發中楚室方亂乃隱耕於蒙山之陽著書號萊子莫知所終又云老萊著五綵五色斑斕之衣出列女傳文今不載音義百行下孟切下行莫之行皆同萬章問曰詩云娶妻如之何必告父母信斯言也宜莫如舜舜之不告而娶何也注詩齊風南山之篇言娶妻之禮必告父母舜合信此詩之言何為違禮不告而娶也孟子曰告則不得娶男女居室人之大倫也如告則廢人之大倫以懟父母是以不告也注舜父頑母嚚常欲害舜告則不聽其娶是廢人之大倫以怨懟於父母也萬章曰舜之不告而娶則吾既得聞命矣帝之妻舜而不告何也注禮娶須五禮父母先答以辭是相告也帝謂堯何不告舜父母曰帝亦知告焉則不得妻也注帝堯知舜大孝父母止之舜不敢違則不得妻之故亦不告也萬章曰父母使舜完廩捐階瞽瞍焚廩使浚井出從而掩之注完治廪倉階梯也使舜登廪屋而捐去其階焚燒其廪也一說捐階舜即旋從階下瞽瞍不知其已下故焚廩也使舜浚井舜入而即出瞽瞍不知其已出從而蓋掩其井以為舜死矣象曰謨蓋都君咸我績注象舜異母弟也謨謀蓋覆也都於也君舜也舜有牛羊倉廩之奉故謂之君咸皆績功也象曰謀覆於君而殺之者皆我之功欲與父母分舜之有取其善者故引為已之功也牛羊父母倉廩父母注欲以牛羊倉廩與其父母干戈朕琴朕弤朕二嫂使治朕棲注干楯戈㦸也琴舜所彈五絃琴也弤雕弓也天子曰雕弓堯禪舜天下故賜之雕弓也棲牀也二嫂娥皇女英使治牀欲以為妻也象往入舜宫舜在牀琴象曰鬱陶思君爾忸怩注象見舜生在牀鼓琴愕然反辭曰我鬱陶思君故來爾辭也忸怩而慙是其情也舜曰惟兹臣庶汝其于豫治注兹此也象素憎舜不至其宫也故舜見來而喜曰惟念此臣衆汝故助我治事不識舜不知象之將殺已與注萬章言我不知舜不知象之將殺己與何為好言順辭以答象也曰奚而不知也象憂亦憂象喜亦喜注奚何也孟子曰舜何為不知象惡已也仁人愛其弟憂喜隨之象方言思君故以順辭答之曰然則舜僞喜者與注僞詐也萬章言如是則為舜行至誠而詐喜以悅人矣曰否昔者有饋生魚於鄭子産子産使校人畜之池校人烹之反命曰始舍之圉圉焉少則洋洋焉攸然而逝子産曰得其所哉得其所哉注孟子言否云舜不詐喜也因為說子産以喻之子産鄭子國之子公孫僑大賢人也校人主池沼小吏也圉圉魚在水羸劣之貌洋洋舒緩搖尾之貌攸然迅走趣水深處也故曰得其所哉重言之者嘉得魚之志也校人出曰孰謂子産智豫既烹而食之曰得其所哉得其所哉故君子可欺以其方難罔以非其道彼以愛兄之道來故誠信而喜之奚僞焉注方類也君子可以事類欺故子産不知校人之食其魚象以其愛兄之道來問舜是亦其類也故誠信之而喜何為僞喜也音義懟直類切妻七漈切下妻也妻之同捐音緣又音旋浚音峻掩張云與掩同弤都禮切丁音雕云義與弴同雕弓如字或作彤誤忸女六切怩音尼愕五各切與音餘注及下者與皆同校張音校丁音教畜許六切僑音喬重直用切疏正義曰此章言仁聖所存者大舍小從大達權之義不告而娶守正道也萬章問曰至何也者萬章問孟子言齊風南山之詩有云娶妻如之何必告父母如信此詩之言宜莫如舜信之今舜乃不告父母而娶是如之何也孟子曰至是以不告也孟子答之曰舜如告父母則不得娶之也男女居室是人之大倫也如告之則舜必不得娶也不得娶是廢人之大倫以致怨懟於父母也是以舜為此所以不告父母而娶也萬章曰至何也者萬章又問孟子言舜之不告而娶則我既已得聞教命矣然堯帝而以二女妻於舜而不告舜父母是如之何也故以此問之妻者以女嫁人謂之妻也曰帝亦知告焉則不得妻也孟子又答之曰帝堯亦知告舜父母則舜父母止之則不得以妻之也萬章曰至不知象之將殺己與萬章又問孟子言舜之父母使舜完治倉廩舜既登倉廩即捐梯而下瞽瞍不知已下乃焚廩欲因此以燒殺其舜又使舜深浚其井舜既浚井即旁出之瞽瞍不知已出又欲從而掩之以溺殺其舜其舜有弟名象乃曰謀掩蓋而殺都君者皆我之功也都君即象稱舜也然謂之都君者蓋以舜在側微之中漁雷澤一年所居成聚二年成邑三年成都故以此遂因之為都君矣注曰都於也其說亦通又曰牛羊與父母倉廩與父母干戈留我琴亦留我弤亦留我二嫂使治我之牀以為我妻欲與父母分此故先設言為謨蓋都君者咸我績耳於是象遂往入舜之宫遇舜又在牀而鼓五絃之琴愕然反其辭曰我氣閉積思憶君故來此遂忸怩其顔而乃慙恥形於面容也以其恐舜知已謀其二嫂故也舜曰惟兹民庶汝其于豫治是舜見象素不來至其宫遂見至宫乃曰念此臣之衆汝其來助我治耳如此故萬章乃問孟子言舜帝不知其弟象之將欲殺其已與故以此好言而答其象也曰奚而不知也象憂亦憂象喜亦喜孟子又言舜何為而不知象謀殺己也以其仁人愛其弟故象憂亦憂象喜亦喜故以好言答之也曰然則舜僞為喜以悅人者與曰否至奚僞焉孟子又答之曰舜非僞喜以悅人者矣又引以子産有饋生魚事而證之言往者有人饋賜生魚於鄭之子産子産受之乃使主池沼之吏曰校人者畜養於池校人烹煮而食之遂反歸命告於子産曰我始初放之於池則魚尚羸乏圉圉然於水而未遊少頃則洋洋然舒緩搖尾而走趣於深處子産信之以為然乃曰此魚是得其所養哉故重言之乃歎魚之得志於水甚快然也其校人乃出而與人曰誰謂子産為智者有知於人豫既烹煮而食其魚子産乃曰得其所哉得其所哉如此孟子故於此言故君子者可欺僞以其方類難誣罔全以非其道也彼象謂以鬱陶思君是以愛兄之道來至於宫是以但欺以其方類也故舜遂必以誠深信之而喜其來故以好辭答之矣何為以舜為僞喜者焉言舜不僞也亦若校人欺子産之謂故子産亦必曰得其所哉得其所哉耳所謂方類者以其在疑似之間故也注完治至為死矣正義曰云捐去其階焚舜之說不若旋階之說通也按史記云瞽瞍欲殺舜使舜上塗廪瞽瞍從下縱火焚廩舜乃以兩笠自扞而下去得不死後瞽瞍又使舜穿井為匿空旁出舜既入深瞽瞍與象共下土實井舜從匿空旁出去瞽瞍與象喜以為舜死矣象曰本謀者象之謀也象於是與父母分於是曰舜妻堯二女與琴象取之牛羊倉廩事父母象乃止舜宫居鼓其琴舜往見之象愕不懌曰我思舜正鬱陶舜曰然爾其庶矣舜復事瞽瞍愛弟彌謹凡此亦其事也以史記觀之則捐梯之說是此之文也大抵學者不可執此以為深然也當以意喻默然有自判之論可矣注干楯戈㦸也至妻也正義曰云干楯也者按孔安國云干楯也周禮掌五兵五楯鄭云五楯干櫓之屬云戈㦸也者禮圖云戈今之勾㦸或謂之雞鳴或謂之擁頸內謂胡以內接祕者也長四寸胡六寸疏云胡子橫插微邪向上不勾不勾似磬之折殺也又云㦸今之三鋒㦸也內長四寸半胡長六寸以其與戈相類故云戈㦸也論其制則别矣云雕弓天子之弓者雕弓漆赤弓也尚書云彤弓一彤矢百孔安國云諸侯有大功賜弓矢然後專征伐彤弓所以講德習射藏示子孫周禮司弓云天子之弓合九而成規諸侯之弓合七而成規大夫合五而成規士合三而成規是其等也云五絃琴者史記云舜彈五絃之琴是也云棲牀者蓋取類於禽棲故也以其牀則主木而言棲則主取而言二女即娥皇女英是也注鄭子國之子公孫僑者正義曰按左傳云子産穆公之孫公子發之子名僑公子之子曰公孫襄三十年執鄭國之政為鄭大夫公子發字子國公孫之子以王父字為氏據後而言故稱為國僑音義舍小之舍音捨萬章問曰象日以殺舜為事立為天子則放之何也注怪舜放之何故孟子曰封之也或曰放焉注舜封象於有庳或有人以為放之萬章曰舜流共工于幽州放歡兜于崇山殺三苗于三危殛鯀于羽山四罪而天下咸服誅不仁也象至不仁封之有庳有庳之人奚罪焉仁人固如是乎在他人則誅之在弟則封之注舜誅四佞以其惡也象惡亦甚而封之仁人用心當如是乎罪在他人當誅之在弟則封之曰仁人之於弟也不藏怒焉不宿怨焉親愛之而已矣親之欲其貴也愛之欲其富也封之有庳富貴之也身為天子弟為匹夫可謂親愛之乎注孟子言仁人於弟不問善惡親愛之而已封者欲使富貴耳身既已為天子弟雖不仁豈可為匹夫敢問或曰放者何謂也注萬章問放之意曰象不得有為於其國天子使吏治其國而納其貢稅焉故謂之放豈得暴彼民哉注象不得施教於其國天子使吏代其治而納貢賦與之比諸見放也有庳雖不得賢君象亦不侵其民也雖然欲常常而見之故源源而來不及貢以政接于有庳注雖不使象得豫政事舜以兄弟之恩欲常常見之無已故源源而來如流水之與源通不及貢者不待朝貢諸侯常禮乃來也其間歲歲自至京師謂若天子以政事接見有庳之君者實親親之恩也此之謂也注自常常以下皆尚書逸篇之辭孟子以告萬章言此乃象之謂也音義庳音鼻史記作鼻歡音歡疏正義曰此章言仁人之心如是也萬章問曰象日以殺舜為事立為天子則放之何也者萬章問孟子以謂象日日以謀殺舜為事然舜既立為天子則放象而不誅如之何孟子曰封之也或曰放焉孟子答之曰是封象也或人言放焉萬章曰至在弟則封之萬章又問舜流共工於幽州放歡兜於崇山殺三苗於三危殛鯀於羽山誅罪此四者而天下於是咸服此乃是誅戮其不仁者也然象傲極不仁乃反封之於有庳之國則有庳之國中人何罪也仁人固肯如此乎在他人之惡則誅戮焉在弟則封之於國故曰仁人固如是乎萬章之意以謂仁人必不肯如此也孔安國注尚書云共工象恭滔天足以惑世故流放之幽州北裔水中可居者曰洲歡兜黨於共工罪惡同崇山南裔也三苗國名縉雲氏之後為諸侯號叨餮三危西裔鯀方命圯族績用不成羽山東裔在海中按史記云共工少皥氏不才子天下謂之窮奇者也歡兜帝鴻氏不才子天下謂之渾敦者也鯀顓頊氏不才子天下謂之檮杌者也曰仁人之於弟也至可謂親愛之乎孟子又答之曰仁者之人於其弟也不藏怒心不隔宿怨但親愛之而已所以親之者以欲其貴也愛之者以欲其富也今舜封象於有庳者是所以富貴之也如舜身自為天子而使弟只為之匹夫可謂為親愛其弟者乎有庳國之名號也敢問或曰放者何謂也萬章又問孟子或人言放之者是何所謂也曰象不得有為於其國至此之謂也孟子又答之曰象之於庳不得施政教於其國中天子使吏代之以治其國而納天子之貢賦焉故謂之為放也象豈得暴彼有庳之國民哉以其使吏代之故也雖然不使象得施政教而舜以兄弟親親之恩欲常常見之故源源如水之流與源而通不以朝貢之諸侯常禮乃來也其自至而見天子如天子以政事接見於有庳之君也故孟子云是此之謂也注云自常常已下皆尚書逸篇之辭正義曰按隋經籍志尚書逸篇出於齊梁之間考其篇目似孔氏壁中書之殘缺者故附尚書之末唐有三卷徐邈為之注焉蓋其文也咸丘蒙問曰語云盛德之士君不得而臣父不得而子舜南面而立堯帥諸侯北面而朝之瞽瞍亦北面而朝之舜見瞽瞍其容有蹙孔子曰於斯時也天下殆哉岌岌乎不識此語試然乎哉注咸丘蒙孟子弟子語者諺語也言盛德之士君不敢臣父不敢子堯與瞽瞍皆臣事舜其容有蹙踖不自安也孔子以為君父為臣岌岌乎不安貌也故曰殆哉不知此語實然乎孟子曰否注言不然也此非君子之言齊東野人之語也注東野東鄙田野之人所言耳咸丘蒙齊人也故聞齊野人之言書曰平秩東作謂治農事也堯老而舜攝也堯典曰二十有八載放勛乃徂落百姓如喪考妣三年四海遏密八音注孟子言舜攝行事時未為天子也放勛堯名徂落死也如喪考妣思之如父母也遏止也密無聲也八音不作哀思甚也孔子曰天無二日民無二王舜既為天子矣又帥天下諸侯以為堯三年喪是二天子矣注日一王一言不得並也咸丘蒙曰舜之不臣堯則吾既得聞命矣注不以堯為臣也詩云普天之下莫非王圡率土之濱莫非王臣而舜既為天子矣敢問瞽瞍之非臣如何注詩小雅北山之篇普遍率循也遍天下循土之濱無有非王者之臣而曰瞽瞍非臣如何也曰是詩也非是之謂也勞於王事而不得養父母也曰此莫非王事我獨賢勞也注孟子言此詩非舜臣父之謂也詩言皆王臣也何為獨使我以賢才而勞苦不得養父母乎是以怨也故說詩者不以文害辭不以辭害志以意逆志是為得之如以辭而已矣雲漢之詩曰周餘黎民靡有孑遺信斯言也是周無遺民也注文詩之文章所引以興事也辭詩人所歌詠之辭志詩人志所欲之事意學者之心意也孟子言說詩者當本之志不可以文害其辭文不顯乃反顯也不可以辭害其志辭曰周餘黎民靡有孑遺志在憂旱災民無孑然遺脫不遭旱災者非無民也人情不逺以已之意逆詩人之志是為得其實矣王者有所不臣不可謂皆為王臣謂舜臣其父也孝子之至莫大乎尊親尊親之至莫大乎以天下養為天子父尊之至也以天下養養之至也注尊之至瞽瞍為天子之父養之至舜以天下之富奉養其親至極也詩曰永言孝思孝思維則此之謂也注詩大雅下武之篇周武王所以長言孝道欲以為天下法則此舜之謂也書曰袛載見瞽瞍蘷夔齊栗瞽瞍亦允若是為父不得而子也注書尚書逸篇祗敬載事也夔夔齊栗敬慎戰懼也舜既為天子敬事嚴父戰栗以見瞽瞍瞍亦信知舜之大孝若是為父不得而子也以此解咸丘蒙之疑音義帥音率下同蹙子六切岌魚及切踖子亦切勛音勳養餘亮切下皆同興去聲疏正義曰此章言孝莫大於嚴父而尊之矣行莫過於蒸蒸而執子之政者也咸丘蒙問曰至誠然乎哉者咸丘蒙問孟子曰諺語有云盛德之士君不得而臣之父不得而子之今舜嚮南面而立為天子堯帝乃率天下諸侯北面而朝之而舜見瞽瞍其容蹙踖然而不敢自安孔子亦云於此時也而天下危殆岌岌乎如也岌岌不安之貌也然未知此諺語實如是乎孟子曰否此非君子之言齊東野人之語也者孟子答以否不然也此語非君子之言也即齊東作田野人之語也堯老而舜攝之至是二天子矣孟子又言堯帝既老而舜於是攝權堯行事耳未為天子也堯典之篇有云言舜攝堯行事至二十有八年放勛乃徂落而死放勛堯之號也魂氣往為殂體魄殞為落大抵則死也堯既死天下百姓如喪其父母三年四海之內絶盡八音以其哀思之甚也禮記曰生曰父曰母死曰考曰妣鄭注云考成也言其德行之成也妣之言嫓也嫓於考故也八音金石絲竹匏土革木是也孔子云天無兩日民無兩王如舜既為天子矣又率諸侯以為堯三年之喪是則為二天子矣言日與王不可得而並也以其舜方攝堯行事未為天子故也咸丘蒙曰至非臣如何者咸丘蒙又言舜之不得臣堯則我既得聞教命矣然而詩小雅北山之篇有云遍天之下莫非為王之土地循土之濱莫非為王之臣而舜既為天子則是舜既得為天子矣敢問舜父瞽瞍之非臣是如之何曰是詩也非是之謂也至是周無遺民也者孟子又答之曰此北山之詩云非是舜臣父之謂也其詩蓋言勤勞於王事而不得奉養其父母者也故云普天之下莫非王土率土之濱莫非王臣言皆是王臣也以其無非為王事者也何為獨使我以賢才而勞苦不得奉養其父母也故以是而怨之也故說詩者不以文而害逆其辭又不可以其辭而害逆其詩人之志以己之心意而逆求知詩人之志是為得詩人之辭㫖人如說詩者但以歌詠之辭為然而不以己之意而求詩人志之所在而為得詩人之㫖而已矣則雲漢之篇有云周餘黎民靡有孑遺信此言也是周無遺民矣殊不知此雲漢之詩其詩人之志蓋在憂旱災以其多有死亡者矣今其餘民無有單孑得遺脫不遭旱災者非謂無民也孑單也孟子引此所以證此北山之詩云普天之下莫非王土率土之濱莫非王臣赤非謂舜臣父之意也孝子之至莫大乎尊親至是為父不得而子也者孟子又言孝子之至不可以有加者莫大乎尊親為之至也尊親之至莫大乎以天下奉養其親是為尊親之至也今瞽瞍為天子之父是舜尊親之至者也舜以天下奉養之是養之至者也詩大雅下武之篇云武王長言孝心之所思所思者維則法太王王季文王三后之所行耳此亦舜之謂也書於大禹謨篇亦云舜敬以事見於父夔夔然悚懼齊莊戰栗瞽瞍亦信順之見舜以瞍為父而不得臣之也孔安國注云祇敬載事也允信若順也注咸丘蒙正義曰云為孟子弟子齊人也者他經傳未詳今案春秋桓公七年有焚咸丘杜預云咸丘魯地以此推之所謂咸丘蒙者豈咸丘之人有以蒙為名者邪是未可知也注乃云齊人也者蓋魯國孟子時為齊之所侵故咸丘之地乃為齊之地故也有所問於孟子即為弟子矣注書平秩東作正義曰孔安國傳云平均次序東作之事以務農也注詩小雅北山之篇正義曰此篇蓋刺幽王役使不均已勞於從事而不得養其父母也注大雅下武之篇正義曰此詩蓋詠武王有聖德復受天命能昭先人之功也注逸篇正義曰據今大禹謨有云此非特止於逸篇文也已矣孟子注疏卷九上孟子注疏卷九上考證萬章章句上疏七章言賢達之理世賢監本訛聖今改正舜往於田章注不見於堯典疏如晉獻公九人此句下監本脫五人二字今從閣本增入又疏大戎生重耳左傳云大戎狐姬生重耳疑脫狐姬二字娶妻如之何章校人出節注象以其愛兄之道來問舜問一本作向咸丘蒙章疏是為得詩人之辭㫖人如說詩者人字疑衍文又疏但以歌詠之辭為然詠監本訛脉今改正孟子注疏卷九上考證欽定四庫全書孟子注疏卷九下漢趙氏注宋孫奭音義并疏萬章章句上萬章曰堯以天下與舜有諸注欲知堯實以天下與舜否孟子曰否注堯不與之天子不能以天下與人注當與天意合之非天命者天子不能違天命也堯曰咨爾舜天之厯數在爾躬是也然則舜有天下也孰與之注萬章言誰與之也曰天與之注孟子言天與之天與之者諄諄然命之乎注萬章言天有聲音命與之乎曰否天不言以行與事示之而已矣注孟子曰天不言語但以其人之所行善惡又以其事從而示天下也曰以行與事示之者如之何注萬章欲知示之之意曰天子能薦人於天不能使天與之天下諸侯能薦人於天子不能使天子與之諸侯大夫能薦人於諸侯不能使諸侯與之大夫昔者堯薦舜於天而天受之暴之於民而民受之故曰天不言以行與事示之而巳矣注孟子言下能薦人於上不能令上必用之舜天人所受故得天下也曰敢問薦之於天而天受之暴之於民而民受之如何注萬章言天人受之其事云何曰使之主祭而百神享之是天受之使之主事而事治百姓安之是民受之也天與之人與之故曰天子不能以天下與人注百神享之祭祀得福也百姓安之民皆謳歌其德也舜相堯二十有八載非人之所能為也天也注二十八年之久非人為也天與之也堯崩三年之喪畢舜避堯之子於南河之南天下諸侯朝覲者不之堯之子而之舜訟獄者不之堯之子而之舜謳歌者不謳歌堯之子而謳歌舜故曰天也夫然後之中國踐天子位焉而居堯之宫逼堯之子是篡也非天與也注南河之南逺地南夷也故言然後之中國堯子𦙍子丹朱訟獄獄不決其罪故訟之謳歌謳歌舜德也泰誓曰天視自我民視天聽自我民聽此之謂也注泰誓尚書篇名自從也言天之視聽從人所欲也音義諄之純切以行張去聲下行歸惡行皆同此以行亦如字暴步卜切露也篡楚患切疏正義曰此章言德合於天則天爵歸之行歸於仁則天下與之也萬章曰堯以天下與舜有諸萬章問孟子堯帝以天下與舜有之乎孟子曰否孟子答之堯不與之也天子不能以天下與人孟子言天子不能以天下與其人也然則舜有天下也孰與之萬章又問孟子言如此則舜有天下也誰與之曰天與之孟子答以為天與之也天與之者諄諄然命之乎萬章又問天與之舜者天有聲音諄諄然命與之乎曰天不言以行與事示之而已矣孟子又答之言天不以言語諄諄然命之也但以人之所行善惡與其事從而示之而止矣曰以行與事示之者如之何萬章又問以行與事示之者是如之何也曰天子能薦人至示之而已矣孟子答之言天子者雖能舉薦人於上天也又不能使上天以與之天下也諸侯者能舉薦人於天子而不能使天子必與為之諸侯大夫者能薦人於諸侯而不能使諸侯必與為之大夫往者堯舉薦舜於上天而天受之暴之於民而民受之我故曰天不言以行與事示之矣曰敢問薦之於天而天受之暴之於民而民受之如何萬章又問薦之於天而天受之與暴之於民而民受之是如之何也曰使之主祭而百神享之是天受之也使之主事而事治百姓安之是民受之也天與之人與之故曰天子不能以天下與人也書云納于大麓是堯薦舜於天也烈風雷雨弗迷是天受之也所謂百神享之亦可知也慎徽五典納於百揆是暴之於民也五典克從百揆時敘是民受之也所謂百姓安之亦可知也曰黎民於變時雍是也然於天則云薦於民則云暴者蓋天逺而在上是為尊者也聖人於天舉其所知而取舍不在我故云薦之也民近而在下是為卑者也聖人之於民顯其功業而使之自附故云暴之也所謂受之者即是與之也舜相堯至此之謂也孟子又言舜攝行堯事輔相之得二十八年之久非人所能為之也乃天與之也堯帝既崩死舜率天下諸侯為堯三年喪三年喪既畢舜乃逃避堯之子丹朱而隱於南河之南天下諸侯朝覲而來者不往朝覲於堯之子丹朱而往朝覲於舜訟獄有朱決斷者不往求治於堯之子丹朱而往求治於舜謳歌吟詠者不吟詠堯之子丹朱而吟詠舜故曰天與之也如此然後往歸中國履天子之位焉如使舜不避堯之子是則為篡奪者也非謂為天與之也泰誓篇亦云天之所視從我民之所視天之所聽亦從我民之所聽是此天與之人與之之謂也注咨爾舜天之厯數在爾躬正義曰案論語堯曰篇有此文書亦有此何晏曰厯數列次孔安國云厯數天道謂天厯運之數帝王易姓而興故言厯數謂天道注河南南夷也正義曰案裴駰云劉熙曰南河之南九河之最南者是也是知為南夷也所謂中國劉熙云帝王所都為中故曰中國注泰誓尚書篇正義曰孔安國傳云泰誓者大會以誓衆也又云天因民以視聽民所惡者天誅之而已萬章問曰人有言至於禹而德衰不傳於賢而傳於子有諸注問禹之德衰不傳於賢而自傳於子有之否乎孟子曰否不然也注否不也不如人所言天與賢則與賢天與子則與子注言隨天也昔者舜薦禹於天十有七年舜崩三年之喪畢禹避舜之子於陽城天下之民從之若堯崩之後不從堯之子而從舜也禹薦益於天七年禹崩三年之喪畢益避禹之子於箕山之隂朝覲訟獄者不之益而之啓曰吾君之子也謳歌者不謳歌益而謳歌啓曰吾君之子也丹朱之不肖舜之子亦不肖舜之相堯禹之相舜也歷年多施澤於民久啓賢能敬承繼禹之道益之相禹也歷年少施澤於民未久注舜薦禹禹薦益同也以啓之賢故天下歸之益又未久故也陽城箕山之隂皆嵩山下深谷之中以藏處也舜禹益相去久逺其子之賢不肖皆天也非人之所能為也莫之為而為者天也莫之致而至者命也注莫無也人無所欲為而橫為之者天使為也人無欲致此事而此事自至者是其命而已矣故曰命也匹夫而有天下者德必若舜禹而又有天子薦之者故仲尼不有天下繼世以有天下注仲尼無天子之薦故不能以有天下繼世之君雖無仲尼之德襲父之位非匹夫故得有天下也天之所廢必若桀紂者也故益伊尹周公不有天下注益值啓之賢伊尹值太甲能改過周公值成王有德不遭桀紂故以匹夫而不有天下伊尹相湯以王於天下湯崩太丁未立外丙二年仲壬四年太甲顛覆湯之典刑伊尹放之於桐三年太甲悔過自怨自艾於桐處仁遷義三年以聽伊尹之訓己也復歸于亳注太丁湯之太子未立而薨外丙立二年仲壬立四年皆太丁之弟也太甲太丁子也伊尹以其顛覆典刑放之於桐邑處居也遷徙也居仁徙義自怨其惡行艾治也治而改過以聽伊尹之教訓已故復得歸之於亳反天子位也周公之不有天下猶益之於夏伊尹之於殷也孔子曰唐虞禪夏后殷周繼其義一也注周公與益伊尹雖有聖賢之德不遭者時然孔子言禪繼其義一也音義施澤所豉切橫胡孟切艾音刈治也疏正義曰此章言義於人則四海宅心守正不足則賢位莫繼者也萬章問孟子曰世人有言至於禹之代而德衰微不傳於賢而傳於子有諸此乎否孟子答之曰否不然也天與之賢者則與賢者天與之子則與子以其隨天如何耳往者舜薦禹於天及得十有七年舜於是崩死禹以三年服喪畢遂避舜之子商均隱於陽城天下之民從禹若堯之死後民之舜而不之丹朱也禹其後又薦益於天及得七年禹即崩死益以三年服喪畢遂避禹之子啓隱於箕山之隂朝覲訟獄謳歌者皆不歸益而歸禹之子啓咸曰我君之子也無他以其堯子丹朱不肖舜子商均亦不肖而舜之輔相堯禹之輔相舜而歷年多矣施恩澤於民已久天下之民所以歸舜與禹不歸丹朱商均也啓以賢能敬承續禹之治而益又輔相禹但七年其歷年尚少不如舜相堯二十有八年禹相舜十有七年之多而施恩澤於民亦未至久所以天下之民不歸益而歸啓也又况啓有賢德與丹朱商均之不同邪舜禹益相去年代已久逺其子之或賢或不肖天使然也非人所能為之也人莫之為然而為然者故曰天使然也人莫能致之此事而其事自至者是其命有是也言天與命者究其義則一也以其無為而無不為故曰天也天之使我有是之謂命故曰命也天下善否天實使之然也祿位器服乃其所命故也今丹朱商均與啓三者之或賢或否是其天也天下之民或歸之或不歸之是其命也與書所謂天難諶命靡常孔子曰死生有命富貴在天凡此亦天與命之意也匹夫之賤而有天下者其義必如舜禹而又得天子薦之者故得有天下也故孔子不有天下雖言有德然而無天子以薦之者是不有天下也繼世之君雖無仲尼之德然而襲父之位又非匹夫故得有天下也夫天之所以廢滅者必若桀與紂之暴虐然後乃廢滅之矣故益伊尹周公三者不有天下以其時值啓太甲成王三君皆賢天不廢此三君故益伊尹周公所以不有天下也伊尹相湯王天下也及湯崩死太子太丁未立而喪於是太丁弟外丙立外丙即位二年崩外丙弟仲壬立仲壬即位四年崩太丁子太甲立太甲即位遂顛覆湯之典刑伊尹乃放之於桐宫及三年太甲乃自悔過而怨其已惡遂治身於桐宫於是居仁徙義以聽伊尹之教訓復歸於亳都反天子之位焉周公之不有天下若益之於夏禹伊尹之於殷湯故也孔子曰唐虞二帝禪讓其位夏禹殷湯周武繼父之位其義則一更無二也謂其義則一而無二者蓋唐與賢夏后殷周與子天與賢則與賢天與子則與子其為順天則一而已故曰其義則一也云禪者蓋唐虞禪祭而告傳位故曰禪也注陽城箕山之隂皆嵩山下深谷中正義曰案史記裴駰注云劉熙曰陽城是今之穎川也箕山嵩高之北是也注太丁湯之子至位也正義曰案史記文已具在公孫丑篇內此更不録然史記乃云外丙即位三年今孟子云外丙二年蓋史記不稽孟子之過也注丹朱商均正義曰堯舜之子皇甫謐云娥皇無子商均女英生也萬章問曰人有言伊尹以割烹要湯有諸注人言伊尹負鼎俎而干湯有之否孟子曰否不然注否不是也伊尹耕於有莘之野而樂堯舜之道焉非其義也非其道也祿之以天下弗顧也繫馬千駟弗視也非其義也非其道也一介不以與人一介不以取諸人注有莘國名伊尹初隱之時耕於有莘之國樂仁義之道非仁義之道者雖以天下之祿加之不一顧而覦也千駟四千匹也雖多不一眄視也一介草不以與人亦不以取於人也湯使人以幣聘之囂囂然曰我何以湯之聘幣為哉我豈若處畎畝之中由是以樂堯舜之道哉注湯聞其賢以𤣥纁之幣帛往聘之囂囂然自得之志無欲之貌也曰豈若居畎畝之中而無憂哉樂我堯舜仁義之道湯三使往聘之既而幡然改曰與我處畎畝之中由是以樂堯舜之道吾豈若使是君為堯舜之君哉吾豈若使是民為堯舜之民哉吾豈若於吾身親見之哉注幡反也三聘既至而後幡然改本之計欲就湯聘以行其道使君為堯舜之君使民為堯舜之民天之生此民也使先知覺後知使先覺覺後覺也豫天民之先覺者也豫將以斯道覺斯民也非豫覺之而誰也注覺悟也天欲使先知之人悟後知之人我先悟覺者也我欲以此仁義之道悟此未知之民非我悟之將誰教乎思天下之民匹夫匹婦有不被堯舜之澤者若已推而內之溝中其自任以天下之重如此故就湯而說之以伐夏救民注伊尹思念不以仁義之道化民者如已推排內之溝壑中也自任之重如此故就湯說之伐夏桀救民之命也吾未聞枉己而正人者也况辱己以正天下者乎注枉己者尚不能以正人况於辱己之身而有正天下者也聖人之行不同也或逺或近或去或不去歸潔其身而已矣注不同謂所由不同大要當同歸但殊塗耳或逺者處身逺也或近者仕者近君也或去者不屑就也或不去者爾焉能凂我也歸潔其身不汚己而已吾聞其以堯舜之道要湯未聞以割烹也注我聞伊尹以仁義干湯致湯為王不聞以割烹牛羊為道伊訓曰天誅造攻自牧宫朕載自亳注伊訓尚書逸篇名牧宫桀宫朕我也謂湯也載始也亳殷都也言意欲誅伐桀造作可攻討之罪者從牧宫桀起自取之也湯曰我始與伊尹謀之於亳遂順天而誅之也音義要音邀下要以要皆同莘所巾切樂音洛下同覦音俞眄莫甸切囂五高切又許驕切幡張云與翻同推丁土回切亦如字下卷同內張音納下卷同說如字亦音稅浼音每伊訓曰天誅造攻自牧宫朕載自亳丁注云伊訓尚書逸篇不是古文耳今文尚書伊訓曰造攻自鳴條朕哉自亳與此文小異疏正義曰此章言賢逹之理世務推政以濟時不枉道以取容期於益治而已者也萬章問曰至有諸者萬章問孟子謂世人有言伊尹以負鼎俎割烹之事而干湯有之否乎孟子曰否至朕載自亳孟子答之曰否不是也伊尹耕於有莘之國野而樂行堯舜二帝之道如非其義與非其道也雖祿賜之以天下之大且不顧而若無也繫馬雖千駟之多亦且不眄視也非其義也非其道也雖一草介亦不取諸人也以其伊尹所操守如是也湯聞如此之賢乃使人以幣帛之物往聘之伊尹且囂囂然自得而曰我何為以湯之幣聘是為出哉我豈如居處有莘之畎畝之中緣此以樂堯舜之道哉湯至三次使人往以幣帛聘之既至而後反然改本之計曰與我居處有莘之畎畝之中由是以樂堯舜之道我豈如使此君成湯為堯舜之君哉吾豈若使湯之民為堯舜之民哉我豈若吾身今得親見致君為堯舜之君致民為堯舜之民哉於是又曰上天之生此人民也是使為先知以覺悟後知者也是使為先覺悟以覺悟其後覺者也我今亦天民之先覺者也我將亦以伊尹樂堯舜仁義之道以覺悟今之民如非我覺悟之而誰能也孟子於此又言伊尹思念天下之民雖一匹之夫婦有不被堯舜之恩澤者如已推而內之於溝壑中也其伊尹自任以天下之重如此然後故就湯而說之以伐夏桀而救人民之厄也我未聞有枉其己身而能正人者也而况伊尹肯辱己負鼎俎割烹之事以為正天下者乎且聖人所行之迹不同也或逺處其身而不仕或近而仕君或去而不屑就或不去以為爾焉能浼我哉但歸潔其身而不汚己而已矣如是則我所以但聞伊尹以堯舜之道干說其湯未聞以鼎爼割烹之事而要湯也故尚書伊訓之篇有云天行誅伐始攻之罪者自桀宫起也湯言我始與伊尹謀之自亳地也以此詳之則知伊尹非事割烹之汚而要湯伐桀者也伊尹或逺而不仕謂在有莘之野是也或近而仕謂湯三聘而往見之是也去亳適夏所謂或去是也既醜有夏復歸于亳所謂或不去是也注伊尹負鼎俎而干湯正義曰案史記殷本紀云伊尹名阿衡欲干湯而無由乃為有莘氏媵臣負鼎俎以滋味說湯致於王道或曰伊尹處士湯使人聘迎之五反然後肯往從湯言素王及九主事湯舉任以國政伊尹去湯適夏既醜有夏復歸于亳裴駰云列女傳曰湯妃有莘氏之女劉向别録曰九主者有去君專君授君勞君寄君等君破君國君二嵗社君凡九品圖畫其形是也注有莘國名至人也正義曰案左傳莊公三十二年秋七月有神降于莘杜預曰莘虢地又云虢國今滎陽縣是也云千駟四千匹案論語孔子云齊景公有馬千駟孔安國注云千駟四千匹注伊訓至牧宫正義曰云伊訓逸篇之名蓋今之尚書亦有伊訓之篇乃其文則曰造攻自鳴條朕哉自亳孔安國傳云造哉皆始也鳴條地在安邑之西又云湯始居亳孔安國云帝嚳都亳湯自商丘遷焉是則亳帝嚳之都也今云殷都即因湯居而言爾萬章問曰或謂孔子於衛主癰疽於齊主侍人瘠環有諸乎注有人以孔子主於癰疽癰疽之醫者也瘠姓環名侍人也衛君齊君之所近狎人也孟子曰否不然也好事者為之也注否不也不如是也但好事毁人德行者為之辭耳於衛主顔讎由彌子之妻與子路之妻兄弟也彌子謂子路曰孔子主我衛卿可得也子路以告孔子曰有命孔子進以禮退以義得之不得曰有命而主癰疽與侍人瘠環是無義無命也注顔讎由衛賢大夫孔子以為主彌子彌子瑕也因子路欲為孔子主孔子知彌子幸於靈公不以正道故不納之而歸於命也孔子進以禮退以義必曰有天命也若主此二人是為無義無命者也孔子不悅於魯衛遭宋桓司馬將要而殺之微服而過宋是時孔子當厄主司城貞子為陳侯周臣注孔子以道不合不見悅魯衛之君而去適諸侯遭宋桓魋之故乃變更微服而過宋司城貞子宋卿也雖非大賢亦無諂惡之罪故諡為貞子陳侯周陳懷公子也為楚所滅故無諡但曰陳侯周是時孔子遭厄難不暇擇大賢臣而主貞子為陳侯周臣也於衛齊無厄難何為主癰疽瘠環者也吾聞觀近臣以其所為主觀逺臣以其所主若孔子主癰疽與侍人瘠環何以為孔子注近臣當為逺方來賢者為主逺臣自逺而至當主於在朝之臣賢者若孔子主於卑幸之臣是為凡人耳何謂孔子得見稱為聖人音義癰於容切疽七余切好呼報切下及卷末自好好名皆同讎張音醜之平聲亦如字厄音厄魋社回切難乃旦切疏正義曰此章言君子大居正以禮進退屈伸達節不違貞信故孟子辨之正其大義者也萬章問曰至有諸乎萬章問孟子曰或有人謂孔子於衛國主癰疽之醫者於齊國主侍人姓瘠名環者誠有諸此乎否孟子曰否至何以為孔子孟子答之曰否言不如是也但好事毁人德行者為此言也夫孔子於衛主顔讎由讎由賢大夫也彌子瑕之妻與子路之妻是兄弟也彌子瑕乃謂子路曰孔子如主於我則衛之卿孔子可得也子路以此言告孔子孔子遂曰我有命也以其得與不得皆命也孟子於此言夫孔子進以禮而有辭遜之心退以義而有羞惡之心其得用與不得用則曰有命如為主於癰疽與侍人瘠環者是無義無命者也是孔子所不為也然則孔子於衛主顔讎由者以其義也於衛不主彌子以其有命也以義則得其宜也以命則得與不得無所憂也然而孔子又嘗不悅於魯衛二國遂之宋國是時宋國司馬桓魋將要求孔子而殺之孔子乃變更微服而過宋當此時也孔子是遭其厄不得已遂至陳主司城貞子家為陳侯周之臣孟子於此又曰我聞觀逺方之來臣者但觀其所為主者如何則知其賢否也今孔子如主癰疽與侍人瘠環二人但卑佞之臣耳為凡人也何得為之孔子今以司城貞子之行不可得而詳由其諡而推之則司城貞子亦為守正之臣者也非癰疽瘠環之比也然則孔子當厄不得已而主之者尚且如是况癰疽瘠環者孰謂孔子肻主之乎蓋司城者今以宋六卿考之則司城在司冦之上右師左師司馬司徒之下其位則六卿之中也古有司空之官無司城之名特宋有之者按左傳魯桓公六年宋以武公廢司空杜預曰武公名司空遂廢為司城也注癰疽之醫瘠姓環名侍人也正義曰未詳其人但以經文推之亦誠然也注顔讎由至靈公正義曰案孔子世家史記云孔子自魯適衛主於子路妻兄顔濁鄒家是則顔讎由即濁鄒也為衛大夫又案魯哀公二十五年左傳云彌子飲衛侯酒杜預云彌子彌子瑕也是其有幸於衛靈公者也注遭宋桓魋之故至陳侯周正義曰案史記孔子自衛過曹及去曹適宋與弟子習禮大樹下宋司馬桓魋欲殺孔子拔其樹遂適鄭與弟子相失遂至陳主於司城貞子家歲餘吳王夫差伐陳取三邑而去由是推之則司城貞子為陳國之卿非宋卿也亦恐史家謬誤云陳侯周懷公子也今案史記世家陳懷公之子名越者乃為湣公又案湣公年表六年孔子來是則陳侯周即湣公是為懷公之子湣公即位二十四年楚惠王復國以兵北伐殺湣公遂滅陳而有之是歲孔子卒於魯案孔子世家云孔子在陳三歲晉楚爭強更伐陳及吳侵陳孔子遂曰歸與歸與然則孔子湣公六年來至居三歲遂復適衛而歸魯是湣公八年去陳也由此推之則孔子主於司城是為湣公之臣矣今孟子乃云為陳侯周臣是陳侯周即湣也萬章問曰或曰百里奚自鬻於秦養牲者五羊之皮食牛以要秦繆公信乎注人言百里奚自賣五羖羊皮為人養牛以是而要秦繆之相實然否孟子曰否不然好事者為之也注好事毁敗人之德行者為設此言也百里奚虞人也晉人以垂棘之璧與屈産之乘假道於虞以伐虢宫之竒諫注垂棘美玉所出地名屈産地良馬所生乘四馬也皆晉國之所寶宫之竒虞之賢臣諫之不欲令虞公受璧馬而假晉道百里奚不諌知虞公之不可諫而去之秦年已七十矣曾不知以食牛干秦繆公之為汙也可謂智乎不可諫而不諫可謂不智乎知虞公之將亡而先去之不可謂不智也時舉於秦知繆公之可與有行也而相之可謂不智乎相秦而顯其君於天下可傳於後世不賢而能之乎注百里奚知虞公之不可諫而去之秦年七十而不知食牛干人君之為汙是為不智也欲言其不智下有三智知食牛干秦為不然也卒相秦顯其君不賢之人豈能如是言其實賢也自鬻以成其君鄉黨自好者不為而謂賢者為之乎注人自鬻於汙辱而以輔相成立其君鄉黨邑里自喜好名者尚不肻為也况賢人肻辱身而為之乎音義鬻音育食音嗣繆音穆羖音古屈産九勿切乘音剩舍音捨疏正義曰此章言君子時行則行時舍則舍故能顯君明道不為苟合而為正者也萬章問曰至信乎者萬章問孟子謂或有人曰百里奚自賣五羖羊之皮於秦為人養牛以此而干秦繆公為之相今信乃為實然乎否乎孟子曰否至而謂賢者為之乎孟子答之以為否不信然也百里奚虞國之大夫也晉獻公以垂棘之璧與屈産之乘借道於虞以伐虢國虞之大夫宫之奇諫之令虞公無受璧與馬以借與道也百里奚不諫之以其知虞公之不可諫而去之遂往秦時百里奚年已七十歲矣豈不知食養牛干秦繆公之為有汙辱也苟如是不知以食牛為汙辱可謂為智者言不可謂之智者矣知虞公為君不可得而諫故不諫可謂為不智乎言如此可謂為智者也又知虞公將亡其國而乃先去之而之秦不可謂之不智也時得舉用於秦國百里奚知秦繆公可與有行其道也遂輔相之可謂不智乎言可謂之智者矣及輔相秦繆公而顯其君名揚於天下又可傳於後世不為賢者而能如是乎言百里奚真賢者乃能如是顯其君於天下可傳於後世如自賣而汙辱其身乃為成立其君雖鄉黨邑里自喜好名者尚亦不肯為自鬻以汙身今乃謂百里奚為真賢者而肻為乎言百里奚不肻為是也蓋宫之奇者按杜預春秋傳云虞之忠臣也注五羖羊皮正義曰說文云羖夏羊牡曰羖羊也注垂棘至晉道正義曰左傳魯僖公二年云晉荀息請以屈産之乘與垂棘之璧假道於虞以伐虢杜預曰荀息荀叔也屈産生良馬垂棘出美玉故以為名四馬曰乘史記云百里奚者晉獻公既虜百里奚以為秦繆公媵於秦百里奚亡秦走宛楚鄙人執之繆公聞百里奚賢欲重贖之恐楚人不與乃使人請以五羖羊之皮贖之楚人許之繆公乃釋其囚授之以國政號曰五羖大夫是其事矣又僖公五年云晉侯復假道於虞以伐虢宫之竒諫曰虢虞之表也虢亡虞必從之晉不可啓冦不可玩一之謂甚其可再乎謂二年假晉道滅夏陽是也諺所謂輔車相依脣亡齒寒其虞虢之謂也宫之奇以其族行曰虞不臘矣在此行也冬十二月晉滅虢虢公醜奔京師師還館於虞遂襲虞滅之執虞公及其大夫井伯以媵秦穆姬而修虞祀且歸其職貢於王故書曰晉人執虞公罪虞且言易也此孟子所以據而云焉孟子注疏卷九下孟子注疏卷九下考證或謂孔子於衛主癰疽章注癰疽之醫者也劉向說苑癰疽作雍睢衛之名醫也於衛主顔讎由節注顔讎由衛賢大夫臣浩按朱子集注云顔讎由史記作顔濁鄒今考孔子世家云孔子適衛主子路妻兄顔濁鄒家又云如顔濁鄒之徒願受業者甚衆然則顔讎由蓋嘗學於孔子者疏注俱未引及主司城貞子為陳侯周臣疏主司城貞子家為陳侯周之臣正義云孔子主於司城是為湣公之臣矣臣宗楷按臣字似竟屬孔子但蒙上過宋為文臣字端主貞子然以宋卿而越國為大夫其義不知何據也百里奚自鬻於秦章疏知虞公之不可諫而去之遂往秦臣宗楷按之本訓往古義通用也則當以知虞公之不可諫而去為一句之秦為一句略一小頓遞下七十句更有神味辨義云考史記所載乃是晉虜百里奚以為媵於秦非百里奚自之秦且無去虞即往秦之理孫疏遂往之遂字亦非注垂棘美玉所出地名疏荀息荀叔也叔監本訛淑今改正孟子注疏卷九下考證
