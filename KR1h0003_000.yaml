body:
  text: 御製讀孟子滕文公章句下陳代欲甹小節以見諸侯而舉枉尺直尋之喻孟子闢之是也然所稱王良之事余不能無温公之疑焉獵與戰其不可以車行余既於詠御之詩論之矣北人言舟南人言馬必不能得其欵要章章甚明馳射之事自應屬北方射生手今即使北方射生善手操弓挾矢立之車中將見顛簸支屈不能命中吾恐其皆為嬖奚之終日而不獲一禽而謂南方之人能之乎且馳之者在御而射之者在人御者即範其馳驅而射者不中御者亦無如之何也御者範馳驅而射者即屢中無是理也且羿與由基世所謂善射者也使王良範馳驅以御皆一朝而獲十焉亦得謂之君子乎或曰古者禽獸多而疆界平故可以車獵何言之甚哉且恨御之道不傳而世無王良也若然今之南苑即所謂禽獸多而疆界平吾將試之其不可行立見矣嗚呼是果無王良乎是果無王良其事乎欽定四庫全書經部八孟子注疏四書類目錄孟子音義序孟子題辭解孟子注疏原目卷一上梁惠王章句上卷一下梁惠王章句上卷二上梁惠王章句下卷二下梁惠王章句下卷三上公孫丑章句上卷三下公孫丑章句上卷四上公孫丑章句下卷四下公孫丑章句下卷五上滕文公章句上卷五下滕文公章句上卷六上滕文公章句下卷六下滕文公章句下卷七上離婁章句上卷七下離婁章句上卷八上離婁章句下卷八下離婁章句下卷九上萬章章句上卷九下萬章章句上卷十上萬章章句下卷十下萬章章句下卷十一上告子章句上卷十一下告子章句上卷十二上告子章句下卷十二下告子章句下卷十三上盡心章句上卷十三下盡心章句上卷十四上盡心章句下卷十四下盡心章句下臣等謹案孟子正義十四卷漢趙岐注舊本題宋孫奭撰䟽岐字邠卿京兆長陵人初名嘉字臺卿永興二年辟司空掾遷皮氏長延熹元年中常侍唐衡兄玹為京兆尹與岐夙隙岐避禍逃避四方乃自改名字後遇赦得出拜并州刺史又遭黨錮十餘嵗中平元年徴拜儀郎舉燉煌太守後遷太僕終太常事迹具後漢書本傳奭字宗古博平人太宗端拱中九經及第仁宗時官至兵部侍郎龍圖閣學士事迹具宋史本傳是註即岐避難北海時在孫賔家夾柱中所作漢儒註經多明訓詁名物惟此註箋釋文句乃似後世之口義與古學稍殊然孔安國馬融鄭元之註論語今載於何晏集解者體亦如是葢易書文皆最古非通其訓詁則不明詩禮語皆徴實非明其名物亦不解論語孟子詞㫖顯明惟闡其義理而止所謂言各有當也其中如謂宰予子貢有若縁孔子聖徳髙美而盛稱之孟子知其太過故貶謂之汚下之類紕繆殊甚以屈原憔悴為徴於色以寗戚扣角為發於聲之類亦比擬不倫然朱子作孟子集註或問於岐説不甚掊擊至於書中人名惟盆成括告子不従其學於孟子之説季孫子叔不従其二弟子之説餘皆従之書中字義惟折枝訓按摩之類不取其説餘亦多取之葢其説雖不及後末之精密而開闢荒蕪俾後來得循途而深造其功要不可冺也胡爌拾遺録據李善文選註引孟子曰墨子兼愛摩頂致於踵趙岐曰致至也知今本經文及注均與唐本不同今證以孫奭音義所音岐注亦多不相應語詳孟子音義條下葢已非舊本至於盡心下篇夫子之設科也註稱孟子曰夫我設教授之科云云則顯為予字今本乃作夫子又萬子曰句註稱萬子萬章也則顯為子字今本乃作為章是又註文未改而經文誤刋者矣其疏雖亦稱奭作而朱子語録則謂邵武士人假託蔡季通識其人今考宋史邢昺傳稱昺於咸平二年受詔與杜鎬舒雅孫奭李慕清崔偓佺等校定周禮儀禮公羊榖梁春秋傳孝經論語爾雅義疏不云有孟子正義涑水紀聞載奭所定著有論語孝經爾雅正義亦不云有孟子正義其不出奭手確然可信其疏皆敷衍語氣如鄉塾講章故朱子語録謂其全不似疏體不曽解出名物制度只繞纒趙岐之説至岐註好用古事為比疏多不得其根據如註謂非禮之禮若趙質取妻而長拜之非義之義若藉交報讐此誠不得其出典案藉交報讐似謂藉交游之力以報讐如朱亥郭解非有人姓藉名交也疑不能明謹附識於此至於單豹養其内而虎食其外事出荘子亦不能舉則弇陋太甚朱彝尊經義考摘其欲見西施者人輸金錢一文事詭稱史記今考註以尾生為不虞之譽以陳不瞻為求全之毁疏亦並稱史記尾生事實見荘子陳不瞻事實見説苑案説苑作陳不占蓋古字同音假借皆史記所無如斯之類益影撰無稽矣以久列學官姑仍舊本録之爾乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書孟子音義序字位過密無法显示臣孫奭撰夫總羣聖之道者莫大乎六經紹六經之教者莫尚乎孟子自昔仲尼既沒戰國初興至化陵遲異端並作儀衍肆其詭辯楊墨飾其淫辭遂至王公納其謀以紛亂於上學者循其踵以蔽惑於下猶洚水懐山時盡昏墊繁蕪塞路孰可芟夷惟孟子挺名世之才秉先覺之志㧞邪樹正髙行厲辭導王化之源以救時弊開聖人之道以斷羣疑其言精而贍其㫖淵而通致仲尼之教獨尊於千古非聖賢之倫安能至於此乎其書由炎漢之後盛傳於世為之注者則有趙岐陸善經為之音者則有張鎰丁公著自陸善經已降其所訓說雖小有異同而共宗趙氏今既奉勅校定仍據趙注為本惟是音釋宜在討論臣今詳二家撰録俱未精當張氏則徒分章句漏落頗多丁氏則稍識指歸偽謬時有若非刋正詎可通行謹與尚書虞部貟外郎同判國子監臣王旭諸王府侍講太常博士國子監直講臣馬龜符鎮寧軍節度推官國子監說書臣吳易直前江隂軍江隂縣尉國子學說書臣馮元等推究本文參考舊注采諸儒之善削異說之煩證以字書質諸經訓疏其疑滯備其闕遺集成音義二卷雖仰測至言莫窮於奥妙而廣傳博識更俟於發揮謹上孟子音義序孟子音義序考證雖小有異同而共宗趙氏此句下監本脫今既奉勅校定仍據趙注為本共十二字今補入若非刋正詎可通行此句下監本脫謹與尚書至集成音義二卷共一百零八字今補入孟子音義序考證孟子題辭解孟子題辭趙氏音義案本傳初名嘉生於御史臺因字臺卿後改名岐少眀經有才藝公府屢辟為京兆尹延篤功曹先是岐常貶議中常侍唐珩兄玹為京兆尹岐遂避難四方及諸唐滅乃出仕歴并州刺史議郎就拜太常九十餘建安六年卒疏正義曰案史記云孟軻受業子思門人道既通所干者不合退與萬章之徒序詩書述仲尼之意作孟子七篇至嬴秦焚書坑儒孟子之徒黨自是盡矣其七篇書號為諸子故篇籍得不泯絶漢興髙皇未遑庠序之事孝恵雖除挾書之律然而公卿皆武力功臣亦莫以為意及孝文皇帝廣遊學之路天下衆書往往稍出由是論語孟子孝經爾雅皆置博士當時乃有劉歆九種孟子凡十一篇炎漢之後盛傳於世為之注者西京趙岐出焉至于李唐又有陸善經出焉自陸善經已降其所訓說雖小有異同而咸歸宗於趙氏隋志云趙岐注孟子十四卷又有鄭亢注孟子七卷在梁時又有綦母邃孟子九卷唐書藝文志又云孟子注凡四家有三十五卷至于皇朝崇文總目孟子獨存趙岐注十四卷唐陸善經注孟子七卷凡二家二十一卷今校定仍據趙注為本今以為主題辭者趙岐謂此書孟子之所作所以題號孟子之書其題辭為孟子而作故曰孟子題辭孟子題辭者所以題號孟子之書本末指義文辭之表也疏正義曰此敘孟子題辭為孟子書之序也張鎰釋云孟子題辭即序也趙註尚異故不謂之序而謂之題辭孟姓也疏正義曰此敘孟氏之所自也案魯史桓公之後桓公適子荘公為君庶子公子慶父公子叔牙公子季友仲孫是慶父之後叔孫是叔牙之後季孫是季友之後其後子孫皆以仲叔季為氏至仲孫氏後世改仲曰孟又云孟庶長之稱也言已是庶不敢與荘公為伯仲叔季之次故取庶長為始也又定公六年有仲孫何忌如晉左傳即曰孟懿子往是孟氏為仲孫氏之後改孟也子者男子之通稱也音義稱丁云稱去聲下有此字以意讀之疏正義曰此敘凡稱子之例也案經傳凡敵者相謂皆言吾子或直言子稱師亦曰子是子者男子有徳之通稱也公羊傳云子沈子曰何休云沈子稱子冠氏上者著其為師也不但言子曰者辟孔子也然則後人稱先師則以子冠氏上所以眀其為師也如子公羊子子沈子之類是也凡書傳直言子曰者皆指孔子以其師範来世人盡知之故不必言氏也孟軻有徳亦足以師範来世宜其以氏冠子使後人知之非獨云有孔子又有孟子稱為子焉此書孟子之所作也故總謂之孟子疏正義曰此敘孟子所作此書故總名號為孟子也唐林慎思續孟子書二卷以謂孟子七篇非軻自著乃弟子共記其言韓愈亦云孟軻之書非軻自著軻既沒其徒萬章公孫丑相與記軻所言焉今趙氏為孟子之所作故總謂之孟子者盖亦有由爾其篇目則各自有名疏正義曰此敘孟子七篇各有名目也故梁恵王公孫丑滕文公離婁萬章告子盡心是也孟子鄒人也名軻字則未聞也鄒本春秋邾子之國至孟子時改曰鄒矣國近魯後為魯所并又言邾為楚所并非魯也今鄒縣是也音義邾陟輸切并必正切下同疏正義曰此敘孟子姓字及所居之國也案史記列傳云孟軻鄒人也不紀其字故趙氏云字則未聞焉後世或云字子輿云鄒本春秋邾子之國至是也者案春秋隠公元年書公及邾儀父盟于蔑杜注云邾今魯國鄒縣是也儀父事齊桓以奨王室王命以為邾子說文云鄒孔子鄉也一云鄒魯附庸之國云國近魯者案左傳哀公七年公伐邾及范門猶聞鐘聲又曰魯擊柝聞於邾杜注云范門邾郭門也是為魯所并云為楚所并者案史記云魯頃公二十四年楚考烈王伐滅魯是又為楚所并或曰孟子魯公族孟孫之後故孟子仕於齊䘮母而歸葬於魯也三桓子孫既以衰微分適他國疏正義曰此敘孟子為魯公族孟孫之後也其說在孟姓之段云仕於齊葬於魯者公孫丑篇之文也春秋定公六年季孫斯仲孫何忌如晉十年叔孫仇如齊哀公二十七年公患三桓之後欲以諸侯去之杜預云欲求諸侯以逐三桓後至魯頃公時魯遂絶祀由是三桓子孫衰微孟子生有淑質夙䘮其父幼被慈母三遷之教長師孔子之孫子思治儒術之道通五經尤長於詩書音義長師之長張丈切疏正義曰此敘孟子自幼至長之事也案史列女傳云孟軻母其舎近墓孟子少嬉遊為墓間之事孟母曰此非吾所以處子也乃去舎市傍其嬉戲乃賈人衒賣之事又曰此非吾所以處子也復徙舎學宫之傍其嬉戲乃設俎豆揖遜進退孟母曰此真可以居吾子矣遂居焉及孟子既學而歸孟母問學所至孟子自若也孟母以刀斷機曰子廢學若吾斷機孟子懼旦夕勤學不息師子思遂成名儒又案史記云孟軻受業於子思之門人道既通所如不合退與萬章之徒序詩書故趙氏云尤長於詩書周衰之末戰國縱横用兵爭强以相侵奪當世取士務先權謀以為上賢先王大道陵遲隳廢異端並起若楊朱墨翟放蕩之言以干時惑衆者非一孟子閔悼堯舜湯文周孔之業将遂湮微正塗壅底仁義荒怠佞偽馳騁紅紫亂朱音義縱音蹤隳許規切翟音狄後墨翟皆放此底張云音邸言否塞不通也疏正義曰此敘周衰戰國縱横之時大道陵遲也案太史公曰秦紀至犬戎敗幽王周東遷洛邑秦襄公始封為諸侯作西畤用事上帝於是僣端見矣自後陪臣執政大夫世禄六卿分晉及田常弑簡公而相齊國諸侯晏然不討海内爭於戰攻於是六國盛焉其務在强兵并敵謀詐用而縱横長短之說起故秦用商君富國强兵楚魏用呉起戰勝弱敵齊威宣王用孫子田忌之徒而諸侯東面朝齊天下於是方務於合縱連横以攻伐為賢而楊朱墨翟以兼愛自為以害仁義孟軻乃述唐虞三代之徳退序詩書述孔子之意當此之時念非孟子有哀憫之心則堯舜湯文周孔之業将遂沉小而正道鬰塞仁義荒怠佞偽並行紅紫亂朱矣揚雄云古者楊墨塞路孟子辭而闢之云湮微者湮沉也微小也云壅底者言正道鬰塞而不明也云仁義荒蕪者釋名曰仁忍也好生惡殺善惡含忍也義宜也裁制事物使合宜也荘子云愛人利物之謂仁揚子云事得其宜謂之義尚書云無怠無荒孔注云迷亂曰荒怠懈怠也云佞偽馳騁者論語云仁而不佞孔云佞口辭㨗給為人所憎惡者說文云偽詐也馳騁奔走云紅紫亂朱者論語云惡紫之奪朱也孔注云朱正色紫間色案皇氏云青赤黄白黒五方正色也不正謂五方間色綠紅碧紫黄是也青是東方正綠是東方間東為木木色青木尅土土色黄並以所尅為間故綠色青黄也朱是南方正紅是南方間南為火火色赤火尅金金色白故紅色赤白也白是西方正碧是西方間西為金金色白金尅木故碧色青白也黒是北方正紫是北方間北方水水色黒水尅火火色赤故紫色赤黒也黄是中央正黄是中央間中央土土色黄土尅水水色黒故黄色黄黒也是正間然於是則慕仲尼周流憂世遂以儒道遊於諸侯思濟斯民然由不肯枉尺直尋時君咸謂之迂闊於事終莫能聽納其說音義迂音紆又音于疏正義曰此敘孟子周流聘世時君不聽納其說也言孟子心慕孔子徧憂其世遂以儒家仁義之道厯遊諸侯之國思欲救濟天下之民然而諸侯不能尊敬之者孟子亦且不見也雖召之而不往以其不肯枉尺以直尋十寸曰尺八尺曰尋史記云孟子道既通遊事齊齊宣王不能用適梁梁恵王不果所言是皆以為迂逺而闊於事情而莫有能聼納其說者孟子亦自知遭蒼姬之訖録值炎劉之未奮進不得佐興唐虞雍熙之和退不能信三代之餘風恥沒世而無聞焉是故垂憲言以詒後人仲尼有云我欲託之空言不如載之行事之深切著眀也音義值丁作直音值信音伸詒丁云音義與貽同疏正義曰此敘孟子自知道不行於世恥沒世無名聞故慕仲尼託之空言而載之行事也言孟子生於六國之時當衰周末又遇漢之未興上不得輔起唐虞二世之治下不能伸夏商周三代之風化自愧沒一世而無名聞所以垂法言以貺後人故托慕仲尼周流憂世既不遇乃退而與萬章之徒敘詩書而作此七篇也趙氏意其然乃引孔子之言而明孟子載七篇之意也云蒼姫者周以木德王故號為蒼姬姬周姓也云炎劉者漢以火徳王故號為炎劉劉髙祖之姓氏也於是退而論集所與髙第弟子公孫丑萬章之徒難疑荅問又自撰其法度之言著書七篇二百六十一章三萬四千六百八十五字包羅天地揆敘萬類仁義道徳性命禍福粲然靡所不載音義難乃旦切疏正義曰此敘孟子退而著述篇章之數也史記云孟子所干者不合退而與萬章之徒序詩書述仲尼之意作孟子七篇云二百六十一章者合七篇之章數言也據趙氏分章則梁恵王篇凡二十有三章公孫丑篇凡二十有三章滕文公篇凡十有五章離婁篇凡六十一章萬章篇凡十有八章告子篇凡三十有六章盡心篇凡八十有五章總而計之是二百六十一章也云三萬四千六百八十五字者合七篇而言也今計梁恵王篇凡五千三百三十三字公孫丑篇凡五千一百二十字滕文公篇凡四千五百三十三字離婁篇凡四千二百八十五字萬章篇凡五千一百二十字告子篇凡五千五百三十五字盡心篇凡四千一百五十九字總而計之是三萬四千六百八十五字也云包羅天地至靡所不載者言此七篇之書大而至於天地微而至於昆蟲草木又次而至於性命禍福無有不載者也然而篇所以七者盖天以七紀璇璣運度七政分離聖以布曜故法之也章所以二百六十一者三時之日數也不敢比易當期之數故取於三時三時者成嵗之要時故法之也三萬四千六百八十五字者可以行五常之道施七政之紀故法五七之數而不敢盈也已帝王公侯遵之則可以致隆平頌清廟卿大夫士蹈之則可以尊君父立忠信守志厲操者儀之則可以崇髙節抗浮雲疏正義曰此敘孟子七篇之書為要者也言上而帝王遵循之則可以興升平之治次而公侯遵循之則可以頌清廟云頌清廟者言公侯可以此助祭于天子之廟也詩有清廟之篇以祀文王注云天徳清明文王象焉故祭而歌此詩也箋云諸侯有光明著見之徳者来助祭也卿大夫士蹈之則可以尊欽君父主其忠信守志厲操者儀而法之則可以此崇其髙節而抗富貴如浮雲云帝王公侯卿大夫士者盖帝以徳言王以業言卿有諸侯之卿有大夫之卿士有中士有下士公侯是周之爵所謂公侯伯子男凡有五等是也自帝王以下言之則有公侯自公侯以下則有卿自卿以下則有大夫自大夫以下則止於有士也有風人之託物二雅之正言可謂直而不倨曲而不屈命世亞聖之大才者也疏正義曰此叙孟子七篇有風人二雅之言為亞聖者也如對恵王欲以與民同樂故以文王靈臺靈沼為言對宣王欲以好貨色與百姓同之故以太王厥妃爲言論仁則託以穀為喻論性則託以牛山之木為喻是皆有風人之託物言也云二雅之正言者如引他人有心予忖度之乃積乃倉古公亶父来朝走馬不失其馳舎矢如破凡此之類是皆有二雅之正言也故可謂直其辭而且不失之倨傲曲其辭而且不失之屈枉而孟子誠為間世亞聖之大才者也言孟子之才比於上聖人之才但相亞次而已故謂亞聖大才孔子自衛反魯然後樂正雅頌各得其所乃刪詩定書繫周易作春秋音義繫本亦作系同胡計切疏正義曰此叙引孔子退而著述之意也案定公十四年孔子去魯應聘諸國哀公十一年自衛反魯是時道衰樂廢孔子来還乃正之又哀公十一年左傳云冬衛孔文子将攻太叔訪於仲尼仲尼曰胡簋之事則嘗學之甲兵之事未之聞也退命駕而行曰鳥則擇木木豈能擇鳥文子遽止之曰圉豈敢度其私訪衛國之難也将止魯人以幣召之乃歸杜預曰於是自衛反魯然後樂正雅頌各得其所是也云乃刪詩定書繫周易作春秋者案世家云魯定公五年季氏僣公室陪臣執國命是以魯大夫以下皆潜離於正道故孔子不仕退而修詩書禮樂弟子彌衆至自逺方莫不受業焉至哀十一年自衞反魯乃上采契后稷中述商周之盛至幽厲之缺凡三百五篇孔子皆弦歌之以求合韶武雅頌之音禮樂自此可得而述以備王道成六藝孔子晚喜易序彖繫象說卦孔子以詩書禮樂教弟子盖三千焉哀十四年春狩大野仲尼視之曰麟也取之曰吾道窮矣乃因史記作春秋上至隠公下訖哀十四年十二公據魯親周故殷運之三代約其文辭而指博故曰後世知丘者其惟春秋罪丘者亦惟春秋孟子退自齊梁述堯舜之道而著作焉此大賢擬聖而作者也疏正義曰此敘孟子退而擬孔子之聖而著述焉案馬遷作列傳云孟子遊仕齊宣王宣王不能用適梁梁恵王不果所言是以退而序詩書述仲尼之意而作孟子七篇也七十子之疇㑹集夫子所言以為論語論語者五經之錧鎋六藝之喉衿也音義錧鎋丁云上音管方言作輨車釭也下音黠車轄也矜音今疏正義曰此敘引孔子弟子記諸善言而為論語也案漢書藝文志云論語者孔子應答弟子時人及弟子相與言而接聞於夫子之語也當時弟子各有所記夫子既卒門人相與集而論纂故謂之論語鄭注云仲弓子游子夏等撰述論者綸也以此書可以經綸世務故曰論也語者鄭注周禮云答述曰語此書所載皆仲尼答弟子及時人之辭故曰語而在論字下錧鎋者車軸頭鐵也說文云車鍵也喉衿者說文云喉咽也衿衣領也言論語為五經六藝之要如此錧鎋與夫唯衿也孟子之書則而象之疏正義曰此敘孟子作此七篇之書而儀象論語之書是亦錧鎋喉衿衞靈公問陳於孔子孔子答以俎豆梁恵王問利國孟子對以仁義宋桓魋欲害孔子孔子稱天生徳於予魯臧倉毁鬲孟子孟子曰臧氏之子焉能使予不遇哉旨意合同若此者衆音義陳直刃切鬲丁云音隔蓋譛毁之使情隔耳又音歴焉於䖍切疏正義曰此敘孟子作七篇則象論語之㫖意也衞靈公問陳於孔子孔子對曰俎豆之事此論語之文也案左傳哀公十一年云云在孔子自衞反魯段云俎豆者案眀堂位云俎有虞氏以梡夏后氏以嶡商以椇周以房俎鄭注云梡斷木為四足而已嶡之言蹷也謂中足為横距之象周禮謂之距椇之言枳椇也謂曲橈之也謂足下跗也上下兩間有似於堂房魯頌曰籩豆大房又曰夏氏以楬豆商玉豆周獻豆鄭注云楬無異物之飾也獻疏刻之齊人謂無髮為秃楬其委曲制度備在禮圗梁恵王問利國孟子對以仁義說在梁恵王篇宋桓魋欲害孔子孔子稱天生徳於予是亦論語之文也案世家孔子適宋與弟子習禮大樹下宋司馬桓魋欲殺孔子拔其樹孔子去弟子曰可速矣故孔子發此語言天生徳於予者言孔子謂天授我以徳性徳合天地吉無不利桓魋必不能害我故曰其如予何云魯臧倉毁鬲孟子孟子曰臧氏之子焉能使予不遇哉者說在恵王下篇凡此者是皆㫖意合若此類者甚衆故不特止此而已又有外書四篇性善辯文說孝經為正其文不能𢎞深不與内篇相似似非孟子本真後世依放而託之者也音義放方往切疏正義曰凡此外書四篇趙岐不尚以故非之漢中劉歆九種孟子有十一卷時合此四篇孟子既沒之後大道遂絀逮至亡秦焚滅經術坑戮儒生孟子徒黨盡矣其書號為諸子故篇籍得不泯絶音義絀音黜疏正義曰此敘孟子之書得其傳也蓋孟子生於六國之時憫道之不行遂著述作七篇之書既沒之後先王之大道遂絀而不眀于世至嬴秦并六國號為秦始皇帝因李斯之言遂焚書坑儒自是孟子徒黨盡矣秦紀云秦皇三十四年丞相李斯曰五帝不相復三代不相襲今陛下創大業建萬世之功固非愚儒所知且越言三代之事臣請史官非秦紀皆燒之非博士官所職天下敢有藏詩書百家語者悉詣守尉雜燒之所不去者惟有醫卜種藝之書故孟子之書號為諸子以故篇籍不亡而得傳於世漢興除秦虐禁開延道徳孝文皇帝欲廣遊學之路論語孝經孟子爾雅皆置博士後罷傳記博士獨立五經而已訖今諸經通義得引孟子以明事謂之博文音義傳直戀切下經傳同疏正義曰此敘孟子之書自漢而行也案漢書云髙皇帝誅項羽引兵圍魯魯中諸儒尚講習禮弦歌之音不絶豈非聖人遺化好學之國哉於是喟然興於學然尚有干戈平定四海亦未遑庠序之事至孝恵乃除挾書之律然公卿皆武力功臣莫以為意至孝文始使掌故晁錯從伏生受尚書尚書出于屋壁詩始萌芽天下衆書往往頗出猶廣立於學官為置博士由是論語孟子孝經爾雅皆置博士及後罷傳記博士以至于後漢惟有五經博士博士秦官掌通古今秩比六百石員多至數十人漢武建元五年初置五經博士宣帝黄龍九年増員二十人自是之後五經獨有博士訖于西京趙岐之際凡諸經通義皆得引孟子以明事故謂之博文也孟子長於譬喻辭不廹切而意以獨至其言曰說詩者不以文害辭不以辭害志以意逆志為得之矣斯言殆欲使後人深求其意以解其文不但施於說詩也今諸解者往往摭取而說之其說又多乖異不同疏正義曰此敘孟子作七篇之書長於譬喻其文辭不至廹切而趙岐遂引孟子說詩之㫖亦欲使後人知之但深求其意義其㫖不特止於說詩也然今之解者摭取而說之其說又多乖異而不同矣孟子以来五百餘載傳之者亦已衆多疏正義曰此言孟子七篇之書自孟子既沒之後至西京趙岐已五百有餘年傳七篇之書解者亦甚衆多也余生西京世尋丕祚有自来矣少蒙義方訓涉典文知命之際嬰戚于天遘屯離蹇詭姓遁身經營八紘之内十有餘年心勦形瘵何勤如焉嘗息肩弛擔於濟岱之間或有温故知新雅徳君子矜我劬瘁睠我皓首訪論稽古慰以大道余困吝之中精神遐漂靡所濟集聊欲係志於翰墨得以亂思遺老也惟六籍之學先覺之士釋而辯之者既已詳矣儒家惟有孟子閎逺微妙緼奥難見宜在條理之科於是乃述已所聞證以經傳為之章句具載本文章别其㫖分為上下凡十四卷究而言之不敢以當逹者施於新學可以寤疑辯惑愚亦未能審於是非後之明者見其違闕儻改而正諸不亦宜乎音義𠞰子小切絶也瘵側界切病也弛音豕擔都濫切睠音眷漂撫昭切亂思張云亂治也思去聲緼於粉切淵奥也别後列切疏正義曰此是趙岐自敘己意而為孟子解也言我生自西漢之京若以世代根尋其祚其先與秦共祖皆顓帝之裔孫也其後子孫造父為穆王攻徐偃王大破之以功封趙城後因氏焉故其来端有自矣在幼少蒙義方教訓之以先王典籍及五十之嵗間乃零丁嬰戚于天是其時遇迍邅之險難遂詭詐其姓氏逃遁其身經營治身於八紘之内至十餘年心神形色莫不焦瘁疲瘵謂何勤如此之甚曽因息肩弛負擔於濟岱之地或有温故君子有雅徳者憐我勤苦焦瘁見我頭白遂訪我談論以稽考古人仍慰我以大道然於困吝之中其精神亦且遐漂未有歸定聊欲係志於筆墨以亂思遺我老也思其六經皆得先覺之賢士釋而辯論之亦已甚詳於儒家獨有孟子七篇之書其理藴奥深妙難造宜在於聖智條理之科於是乃申述己之聞見驗以六經之傳斷為章句具載本文章章别為意㫖分七篇作上下篇為十四卷究極而言雖不敢當於達士然於初學者資之亦可以曉悟其疑惑其有是非得失愚亦未敢審實後之有明哲者如見其違理疑闕者改而正之是其宜也云為之章句分為上下凡十四卷者各於卷下有說此更不言丁公著案漢書趙岐本傳云趙岐字邠卿京兆長陵人也嘗遇疾甚誡其子曰吾死之後置一圎石安墓前刻曰漢有逸人姓趙名岐有志無時後疾瘳仕至太僕卿嘗仕州郡以廉直疾惡見憚焉孟子題辭解孟子題辭解考證此書孟子之所作也臣宗楷按疏引唐林慎思韓愈兩說俱證孟子之書非孟子所作然考史記孟子列傳孟軻述唐虞三代之徳退而與萬章之徒序詩書述仲尼之意作孟子七篇據此自以趙氏之言為正長師孔子之孫子思臣浩按疏引列女傳云孟子師子思又引史記云受業于子思之門人今朱子序說獨取史記而附趙氏及索隠等說於注尋其意義蓋子思子親受曽氏之傳述中庸以明道統非僅七十子之徒可比孟子若果師之則七篇中所稱引者當必有尊異之辭如記魯論之於曽子有子以見師承之義不應苐云予私淑諸人而已以是知史記所云受業於子思之門人者其說近是而索隠以人字為衍文恐未足深據也通五經臣人龍按漢時始標五經六經之名此云孟子通五經者先攙入耳孟子亦自知遭蒼姬之訖録疏云蒼姬者周以木徳王故號為蒼姬臣宗楷按史記謂周以火徳王五行相勝鄒衍說也此云周以木徳王乃本劉向五行相生說又有外書四篇臣邦綏按揚子法言修身篇引孟子曰夫有意而不至者有矣未有無意而至者也周禮大行人注引孟子曰諸侯有王宋鮑照河清頌引孟子曰千載一聖猶旦暮也顔氏家訓引孟子曰圖影失形梁書處士傳序引孟子曰今人之於爵禄得之若其生廣韻圭字下注曰孟子六十四黍為一圭十圭為一合以及集注中程子所引荀子孟子三見齊王而不言事門人疑之孟子曰我先攻其邪心今孟子書皆無其文豈趙氏所謂外篇者耶孟子既沒之後節疏先王之道遂絀而不明於世絀監本訛紬今改正又疏今陛下創大業建萬世之功建監本訛是今改正孟子題辭解考證欽定四庫全書孟子注疏原目卷一梁恵王章句上凡七章卷二梁恵王章句下凡十六章卷三公孫丑章句上凡九章卷四公孫丑章句下凡十四章卷五滕文公章句上凡五章卷六滕文公章句下凡十章卷七離婁章句上凡二十八章卷八離婁章句下凡三十二章卷九萬章章句上凡九章卷十萬章章句下凡九章卷十一告子章句上凡二十章卷十二告子章句下凡十六章卷十三盡心章句上凡四十七章卷十四盡心章句下凡三十八章孟子注疏原目
