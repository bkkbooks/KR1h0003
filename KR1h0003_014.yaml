body:
  text: 欽定四庫全書孟子注疏卷十四上漢趙氏注宋孫奭音義并疏盡心章句下疏正義曰此卷即趙注分上卷為之者也此卷凡三十八章一章言發政施仁一國被恩好戰輕民災及所親二章言春秋撥亂時多戰爭三章言文之過實聖人不改録其意也四章言民思明君若旱望雨以仁伐暴誰不欣喜五章言規矩之法喻若典禮六章言厄窮不憫貴而思降七章言恕以行仁遠禍之端暴以殘民招咎之患八章言修理關梁譏而不征九章言率人之道躬行為首十章言務利蹈姦務德蹈仁十一章言廉貪相殊名亦卓異十二章言親賢正禮明其五教十三章言王者當天然後處之十四章言得民為君得君為臣重民敬祀治之所先十五章言伯夷栁下惠變貪厲薄十六章言仁恩須人人能𢎞道十七章言孔子周流不遇則去十八章言君子固窮窮不變道上下無交無賢援也十九章言正已信心不患衆口二十章言以明照暗暗者以開以暗責明暗者愈迷二十一章言聖人之道學而時習仁義在身當常被服舍而不修猶茅是塞二十二章言前聖後聖所尚者同三王一體何得相踰二十三章言可為則從不可則正非時逆指猶若馮婦暴虎無己必有害也二十四章言尊德樂道治性勤禮二十五章言神聖以下優劣異差樂正好善猶下二科二十六章言驅邪反正正斯可矣來者不追追其前罪君子甚之以為過二十七章言養民輕斂君子道也二十八章言寶此三者以為國珍二十九章言小知自私藏怨之府大雅先人福之所聚三十章言教誨之道受之如海百川移流不得有拒三十一章言善恕行義充大其美無受爾汝何施不可三十二章言道之善以心為原三十三章言君子之行動合中禮湯武之隆不是過三十四章言富貴而驕自遺咎也茅茨采椽聖堯表也以賤説貴懼有蕩心三十五章言清淨寡欲行之髙者畜聚積實穢行之下廉者招福濁者速禍三十六章言曾參至孝思親異心羊棗之感終身不嘗三十七章言士行有科人有等級中道為上狂狷不合似是而非色厲而內荏鄉原之惡聖人所甚戒三十八章言三皇以來人倫攸敘聖人不出名世承間雖有斯限蓋有遇不遇焉是以仲尼止於獲麟孟子終於無有乎爾凡此三十八章合前四十七章是盡心篇有八十五章矣孟子曰不仁哉梁惠王也仁者以其所愛及其所不愛不仁者以其所不愛及其所愛注梁魏都也以用也仁者用恩於所愛之臣民王政不偏普施德教所不親愛者并蒙其恩澤也用不仁之政加於所不親愛則有災傷所親愛之臣民亦并被其害惠王好戰殺人故孟子曰不仁哉公孫丑問曰何謂也注丑問及所愛之狀何謂也梁惠王以土地之故糜爛其民而戰之大敗將復之恐不能勝故驅其所愛子弟以殉之是之謂以其所不愛及其所愛也注孟子言惠王貪利鄰國之土地而戰其民死亡於野骨肉糜爛而不收兵大敗而欲復戰恐士卒少不能用勝故復驅其所愛近臣及子弟而以殉之殉從也所愛從其所不愛而往趍死亡故曰及其所愛也東敗於齊長子死焉音義王好之好呼報切下好戰好仁好生好名之好好禮好善皆同卒子忽切後章注卒以同長張丈切疏正義曰此章言發政施仁一國被恩好戰輕民災及所親著此魏王以戒人君者也孟子曰不仁哉梁惠王也至及其所愛也孟子言世稱不仁之人是梁惠王也仁者之君以其用恩於所愛親幸者以加及於所不親幸者是自近及逺之謂也不仁之君以其用不仁之政加於所不親愛幸者則有災傷及其所親愛幸者也公孫丑問曰何謂也公孫丑未曉其旨乃問孟子曰及所愛之狀是何所謂也梁惠王以土地之故至及其所愛也孟子解其旨以曉公孫丑之問也言梁惠王貪利鄰國之土地而戰鬬其民戰死於野糜爛其骨肉及兵大敗將欲復戰之恐懼其不能戰勝以其士卒之少故驅率其所愛幸之親臣及親愛之子弟以從之而往趍於戰死是謂以其所不愛及其所愛者也此所以見梁惠王不仁之甚也左傳云未陳而薄之曰敗某師大崩曰敗績今梁王之敗獨謂之大敗者以其敗某師與敗績不足言故稱為大敗抑又言梁王不以義戰以見梁王不仁之甚也注梁魏都及東敗於齊長子死焉正義曰此蓋首篇説矣孟子曰春秋無義戰彼善於此則有之矣征者上伐下也敵國不相征也注春秋所載戰伐之事無應王義者也彼此相覺有善惡耳孔子舉毫毛之善貶纎芥之惡故皆録之於春秋也上伐下謂之征諸侯敵國不相征五霸之世諸侯相征於三王之法皆不得其正者也音義覺音教義與校同疏正義曰此章言春秋撥亂時多爭戰事實違禮以之反正誅討征伐故不自王命曰無義戰者也孟子曰至敵國不相征也孟子言春秋之世凡兵之所起皆小役大弱役強或因怒興師或棄禮貪利未嘗有禁暴救亂之義也是以春秋無義戰然而春秋雖謂無義戰其彼國之戰有善於此國未嘗無也是以彼善於此則有之矣夫征者以上伐下無有敵於我師所以正彼之罪也如抗敵之國則相為強弱以結禍亂非上之所以伐下罔有敵於我師者也其勢皆足以相抗皆出於交惡者也故曰敵國不相征也注孔子舉毫毛至春秋也正義曰此蓋言春秋無義戰之謂也如有之則孔子必書故有是之言也孟子曰盡信書則不如無書吾於武成取二三策而已矣仁人無敵於天下以至仁伐至不仁而何其血之流杵也注書尚書經有所美言事或過若康誥曰冒聞于上帝甫刑曰皇帝清問下民梓材曰欲至于萬年又曰子子孫孫永保民人不能聞天天不能問於民萬年永保皆不可得為書豈可案文而皆信之哉武成逸書之篇名言武王誅紂戰鬭殺人血流舂杵孟子言武王以至仁伐至不仁殷人簞食壺漿而迎其王師何乃至於血流漂杵乎故吾取武成兩三簡䇿可用者耳其過辭則不取之也疏正義曰此章言文之過實聖人不改録其意也是故取於武成二三䇿而已孟子言尚書之文不可盡信之也如盡信其書之文則不若無書而已以其辭之有過適所以疑惑於人也故孟子言我於書之武成篇特取二三䇿而為不盡信之而已蓋尚書之過辭多矣所以不暇具言之故於武成但取二三䇿而言耳曰仁人用兵故前徒倒戈無有敵於我師也是以至仁之人而誅伐其至不仁之人而何其武王誅紂戰鬬殺人乃至於血流舂杵也此孟子於武成所以執此而言書之不可盡信矣注書尚書至不取之也正義曰康誥曰冒聞于上帝者蓋成王伐管叔蔡叔以殷餘民封康叔作此康誥也云我西土惟時怙冒聞于上帝帝休孔安國云我西土岐周惟是怙恃文王之道故其政教冒被四表上聞于天也云甫刑曰皇帝清問於下民者蓋呂侯見命為天子司寇後為甫侯故或稱甫刑此篇蓋以穆王命作夏禹贖刑之法以布告天下也皇帝清問下民者孔安國云堯帝詳問民患也云梓材曰欲至于萬年又曰子子孫孫永保民者蓋康叔為政之道亦如梓人治材故曰梓材言欲至于萬年惟王子子孫孫永保民孔注云我周家惟欲使至於萬年承奉王室又欲使子孫纍世長居國以安民也餘見前説孟子曰有人曰我善為陳我善為戰大罪也國君好仁天下無敵焉南面而征北狄怨東面而征西夷怨曰奚為後我注此人欲勸諸侯以攻戰也故謂之有罪好仁無敵四夷怨望遲願見征何謂而後我已説於上篇矣武王之伐殷也革車三百兩虎賁三千人王曰無畏寧爾也非敵百姓也若崩厥角稽首征之為言正也各欲正己也焉用戰注革車兵車也虎賁武士為小臣者也書云虎賁贅衣趣馬小尹三百兩三百乘也武王令殷人曰無驚畏我來安止爾也百姓歸周若崩厥角額角屖厥地稽首拜命亦以首至地也欲令武王來征己之國安用善戰陳者音義陳音陳兩丁音亮賁丁音奔先儒言如猛虎之奔焉於虔切贅丁之稅切趣千走切額丁云額即額字屖音西義與棲遲冏息也久也字從尸下辛或作犀牛字誤也疏正義曰此章言民思明君若旱望雨以仁伐暴誰不欣喜是以殷民厥角周師歌舞焉用善戰者也孟子曰有人曰我善為陳我善為戰至焉用戰者孟子言有人謂我善為行陳我善為戰鬬以其是欲勸諸侯以攻戰者也是為大罪之人也且國君好行仁政以及民人凡有所征天下無敢有敵者也故南面而征則北狄怨東面而征則西夷怨曰奚為後我説已在上篇矣武王之誅伐商紂有兵車三百乘虎賁之勇士有三千人武王令告於商之人曰無驚畏我來安止爾也故不敢抗敵之百姓皆崩摧其角若無所容頭乃稽首拜命故征之所以言正彼之罪也百姓各欲武王來征己之國焉用為善戰者乎此孟子所以有是而戒時君好仁以為無敵之道而已是又戒時之臣無以戰事言於時君耳注革車至戰陳者正義曰革車者以皮為飾者也牧誓言武王戎車三百兩虎賁三千人孔安國云兵車百夫長所載車稱兩一車步卒七十二人凡二萬一千人舉全數虎賁勇士稱也若虎賁獸言其猛也皆百夫長也又案太誓篇云百姓凛凛若崩厥角孔安國言民畏紂之虐危懼不啻若崩厥角無所容頭者也孟子曰梓匠輪輿能與人規矩不能使人巧注梓匠輪輿之工能以規矩與人人之巧在心拙者雖得規矩之法亦不能成器也蓋喻人不志仁雖誦典憲不能以善疏正義曰此章言規矩之法喻若典禮人不志仁雖誦憲籍不能以善者也孟子言梓匠輪輿之工能與人規矩法度而不能使人之巧以其人之巧在心如心拙雖得規矩法度亦不能成美器也喻當時之君如心不在仁雖誦憲籍亦不能成美政也梓匠輪輿已説於上篇矣孟子曰舜之飯糗茹草也若將終身焉及其為天子也被袗衣鼓琴二女果若固有之注糗飯乾糒也袗畫也果侍也舜耕陶之時飯糗茹草若將終身如是及為天子被畫衣黼黻絺繡也鼓琴以協音律也以堯二女自侍亦不佚豫如固自當有之也音義糗去久切茹音汝袗之忍切陸云袗衣之美者被音備丁音敗畫胡卦切下同疏正義曰此章言厄窮不憫貴而思降凡人所難舜隆聖德所以殊者也孟子言舜初於耕歷山陶河濵之時以糗而飯以草而茹若終身如是焉及堯禪位為之天子所被以畫衣黼黻絺繡鼓五絃之琴以堯帝二女事之實若固自當有之也注糗乾糒也至黼黻絺繡也正義曰云糗糒也按釋名云糗乾飯屑也云袗畫也説文云袗玄衣也孔傳云黼若斧形黻為兩己相背葛之精曰絺五色備曰繡云果侍也按許慎謂女侍曰倮今釋果為侍謂二女之侍舜是以有惑於許慎之説而遂誤歟蓋木實曰果云果者取其實而言也孟子曰吾今而後知殺人親之重也殺人之父人亦殺其父殺人之兄人亦殺其兄然則非自殺之也一間耳注父仇不同天兄仇不同國以惡加人人必加之知其重也一間者我往彼來間一人耳與自殺其親何異哉音義間張音澗亦如字疏正義曰此章言恕以行仁逺禍之端暴以殘民招咎之患是以君子好生惡殺反諸身者也孟子言我於今然後知殺人之親之為最重者也殺彼人之父彼人亦殺己父而報之殺彼人之兄彼人亦殺己兄而報之如是則非己之殺但一間耳以其與自殺之無異也注父仇不同天兄仇不同國正義曰案禮云父之讐弗與共戴天交遊之讐不同國兄弟之讐不反兵蓋所以避之也周官云父之讐避諸四海之外所謂不與共其國蓋非周禮歟又周官謂人凡殺人而義者勿令讐讐則殺之而不義在邦法不可殺者必避之而已音義逺于願切惡烏路切下惡似惡莠惡佞惡利惡鄭惡紫惡鄉所惡皆同孟子曰古之為關也將以禦暴今之為關也將以為暴注古之為關將以禦暴亂譏閉非常也今之為關反以征稅出入之人將以為暴虐之道也疏正義曰此章言修理關梁譏而不征如以稅斂非其程式懼將為暴故譏之也孟子言古之為關譏而不稅將以禦暴亂非常之人而已今之為關乃征稅而不譏將以為暴亂之道也按周禮司關云凡四方之賔客叩關則為之告有內外之送則以節傳出納之是以為關將以禦暴也孟子之時司關征取其稅適所以為暴此孟子所以有是言歟孟子曰身不行道不行於妻子使人不以道不能行於妻子注身不自履行道德而欲使人行道德雖妻子不肯行之言無所則效使人不順其道理不能使妻子順之而况他人乎疏正義曰此章言率人之道躬行為首者也孟子言人身自不履行其道德雖妻子之間且有所不行以其無所效法者也使人如不以道理雖妻子且有不順况能行於民乎荀况云有分義則合天下而治無分義則一妻一妾而亂亦與同意論語曰其身正不令而行其身不正雖令不從亦其意也孟子曰周于利者凶年不能殺周于德者邪世不能亂注周逹于利營苟得之利而趨生雖凶年不能殺之周逹於德身欲行之雖遭邪世不能亂其志也疏正義曰此章言務利蹈姦務德蹈仁舍生取義其道不均者也孟子言人積備其利物以為周于利者則所養常厚故凶荒之年且不能殺死喻人之能盡其性以為周于德者則所守彌篤故姦邪之世不能亂其志蓋以戰國之時無富而教之之術此孟子所以救之以此音義舍音捨下舍而舍其舍身皆同孟子曰好名之人能讓千乘之國苟非其人簞食豆羮見於色注好不朽之名者輕讓千乘伯夷季札之類是也誠非好名者爭簞食豆羮變色訟之致禍鄭公子染指魭羮之類是也音義見音現下注見上同魭丁音元左傳作黿疏正義曰此章言廉貪相殊名亦卓異者也孟子言好不朽之名者則重名輕利故云能讓千乘之國而且不受苟非好名之人則重利而輕名而簞食豆羮之小節且見爭奪而變見於顔色注伯夷季札與鄭公子之類正義曰案史記列傳云伯夷叔齊孤竹君之二子父欲立叔齊及父卒叔齊讓伯夷伯夷曰父命也遂逃去叔齊亦不肯立而逃之案春秋少陽篇伯夷姓墨名允字公信伯長也夷諡也叔齊名智字公逹伯夷之弟齊亦諡也世家云王餘昧卒欲授弟季札季札讓逃去於是吳人曰先王有命兄卒弟代立必致季子今逃位則王餘昧後立今卒其子當代乃立王餘昧之子僚為王凡此是伯夷季札之讓千乘之國也云鄭公子染指魭羮者案魯宣公四年左傳云楚人獻黿於鄭靈公公子宋與子家將見子公之食指動以示子家曰他日我如此必嘗異味及入宰夫將解黿相視而笑公問之子家以告及食大夫黿召子公而弗與子公怒染指於鼎嘗之而出公怒欲殺子公子公與子家謀先子家曰畜老猶憚殺之而况君乎反諧子家子家懼而從之夏弒靈公故經書曰鄭公子弒其君夷是也孟子曰不信仁賢則國空虛無禮義則上下亂無政事則財用不足注不親信仁賢仁賢去之國無賢人則曰空虗也無禮義以正尊卑則上下之敘泯亂無善政以教人農時貢賦則不入故財用有所不足故也疏正義曰此章言親賢正禮明其五教為政之源聖人以三者為急也孟子言人君不親信仁賢則仁賢去之仁賢去則國無賢人是為空虛之國也無禮義以正尊卑則上下之序泯亂無政事以理財則財用乏而不足蓋禮義由賢者出政事由賢者出不信仁賢則禮義不興禮義不興則政事不行而國之財用於是乎不足此孟子言之亦其敘之然孟子曰不仁而得國者有之矣不仁而得天下未之有也注不仁得國者謂象封於有庳叔鮮叔度封於管蔡以親親之恩而得國也雖有誅亡其世有土丹朱商均天下元子以其不仁天下不與故不得有天下焉疏正義曰此章言王者當天然後處之桀紂幽厲雖得猶失不為得者也孟子曰不仁而得國有之矣不仁而得天下未之有也者孟子言世有不仁之人而得其國而為君者有之矣不仁之人而得天下而為王者未之有也是以桀紂幽厲雖得而終亦失之亦且不為者也注象封有庳叔鮮叔度封於管蔡與丹朱商均者正義曰云象封有庳孟子於萬章篇言之詳矣云叔鮮叔度者案世家史記云管叔鮮蔡叔度周文王子而武王之弟也武王克殷紂平天下封功臣昆弟於是封叔鮮於管封叔度於蔡杜預云管在滎陽京縣東北世本曰居上蔡丹朱商均者丹朱堯之子也商均舜之子也又言於上篇已詳矣音義庳音鼻孟子曰民為貴社稷次之君為輕是故得乎丘民而為天子注君輕於社稷社稷輕於民丘十六井也天下丘民皆樂其政則為天子殷湯周文是也得乎天子為諸侯注得天子之心封以為諸侯得乎諸侯為大夫注得諸侯之心諸侯能以為大夫諸侯危社稷則變置注諸侯為危社稷之行則變更立賢諸侯也犧牲既成粢盛既潔祭祀以時然而旱乾水溢則變置社稷注犧牲已成肥腯粱稻已成潔精祭祀社稷常以春秋之時然而其國有旱乾水溢之災則毁社稷而更置之音義樂音洛下樂其樂者樂道般樂皆同行下孟切下之行德行正行穢行人行行與其行汚行皆同更古衡切下同盛音成腯徒忽切疏正義曰此章言得民為君得君為臣論君民社稷之輕重也孟子曰至則變置社稷者孟子言民之為貴不可賤之者也社稷次之於民而君比於民猶以為輕者如此者也如此故得乎四邑之民以樂其政則為天子以有天下得乎天子之心則為諸侯以有其國得乎諸侯之心以為大夫有其家而諸侯不能保安其社稷而以危之則變更立置其賢君是社稷有重於君也犧牲既成以肥腯粢盛既成以精潔祭祀又及春秋祈報之時然而其國尚有旱乾水溢之災則社稷無功以及民亦在所更立有功於民者為之也是民又有貴於社稷也此孟子所以自解民為貴社稷次之君為輕之敘也云社稷者蓋先王立五土之神祀以為社立五穀之神祀以為稷以古推之自顓帝以來用句龍為社柱為稷及湯之旱以棄易柱是亦知社稷之變置又有見於湯之時然也注君輕於社稷至於殷湯周文也正義曰此云丘十六井也者案司馬法云六尺為步步百為畝畝百為夫夫三為屋屋三為井井十為通通十為成是一丘為十六井而一井為九夫之地也今云十六井蓋有一萬四千四百畝為一百四十四夫所受者也云殷湯周文者蓋引此二王皆自百里而起為天下王是得乎民心者也孟子曰聖人百世之師也伯夷栁下惠是也注伯夷之清栁下惠之和聖人之一槩也故聞伯夷之風者頑夫廉懦夫有立志聞栁下惠之風者薄夫敦鄙夫寬奮乎百世之上百世之下聞者莫不興起也非聖人而能若是乎而况於親炙之者乎注頑貪懦弱鄙狹也百世言其逺也興起志意興起也非聖人之行何能感人若是喻聞尚然况於親見而薰炙之者乎疏正義曰此章言伯夷栁下惠變貪厲薄千載聞之猶有感激謂之聖人美其德也孟子曰至而况於親炙之者乎者此言伯夷栁下惠之為聖人也言聖人之道無窮為百世之師法者也伯夷栁下惠二人是也故千載之下聞伯夷之清風者頑貪之夫化而為廉儉懦弱之夫化而有立毅之志聞栁下惠之和風者鄙薄之夫化而為敦厚寬大是則二人清和之風奮發乎百世之上而使百世之下聞其風者無有不感激而志意興起而化之也然而非聖人其能若是使百世之下莫不興起者也聞而化者尚如此况當時有親見熏炙之者乎注頑貪至美其德此蓋於上篇言之詳矣孟子曰仁也者人也合而言之道也注能行仁恩者人也人與仁合而言之可以謂之有道也疏正義曰此章言仁恩須人人能𢎞道也孟子言為仁者所以盡人道也此仁者所以為人也蓋人非仁不立仁非人不行合仁與人而言之則人道盡矣揚子云仁以人同孟子曰孔子之去魯曰遲遲吾行也去父母國之道也去齊接淅而行去他國之道也注遲遲接淅説已見上篇言矣此不復説焉音義淅先歷切解見萬章章句疏此章蓋言孔子周流不遇則去者也其説俱見上篇孟子曰君子之厄於陳蔡之間無上下之交也注君子孔子也論語曰君子道者三我無能焉孔子乃尚謙不敢當君子之道故可謂孔子為君子也孔子所以厄於陳蔡之間者其國君臣皆惡上下無所交接故厄也音義厄或作厄同疏正義曰此章言孔子見厄謂君子固窮窮不變道上下無交無賢援也孟子言孔子見厄於陳蔡二國之間幾不免死以無上下之交而已以其上無所事雖死不為諂下無所可與雖死不為瀆是為無交接也論語衛靈公之篇云孔子在陳絶糧從者病莫能興子路愠見曰君子亦有窮乎子曰君子固窮小人窮斯濫矣豈非窮不變道者能如是乎注君子道者三我無能焉所謂乎仁者不憂智者不惑勇者不懼是三者也貉稽曰稽大不理於口注貉姓稽名仕者也為衆口所訕理賴也謂孟子曰稽大不賴人之口如之何也孟子曰無傷也士憎兹多口注審已之德口無傷也離於凡人而仕者亦益多口詩云憂心悄悄慍于羣小孔子也肆不殄厥慍亦不隕厥問文王也注詩邶風柏舟之篇曰憂心悄悄憂在心也愠于羣小怨小人聚而非議賢者也孔子論此詩孔子亦有武叔之口故曰孔子之所苦也大雅綿之篇曰肆不殄厥慍殄絶慍怒也亦不隕厥問隕失也言文王不隕絶畎夷之愠怒亦不能隕失文王之善聲問也音義貉丁云貊鶴二音既是人姓當音鶴纂文曰俗人姓也張亡百切説文云北方人豸種也訕所諫切殄徒典切疏正義曰此章言正已信心不患衆口衆口謹譁大聖所有况於凡品之所能禦者也貉稽曰稽大不理於口貉姓稽名亦當世之士也貉稽自稱名問於孟子曰稽大不能治人之口使不訕其己者如之何孟子曰無傷也至文王也者孟子答之以為審己之德已修雖人之口訕亦不能傷害其己之德也以其為士者益此多口不能免人之訕也故邶風柏舟之詩有云憂心悄悄慍于羣小言憂悄悄常在心見怒于羣小衆小人也以其孔子刪此詩亦不能免武叔之毁故曰孔子尚如是憎多口也大雅綿之詩有云肆不殄厥慍亦不隕厥問言不能殄絶畎夷之愠怒然亦不能隕失文王之善聲故曰文王尚如此亦憎多口也此所以答貉稽大不理於口以為無傷也注邶風柏舟之篇至聲聞也正義曰此篇蓋言仁人不遇也注云愠怒也悄悄憂貌論語云叔孫武叔毁仲尼子貢曰仲尼不可毁也仲尼日月也人雖欲自絶其何傷於日月乎多見其不知量也云大雅綿之篇者蓋此篇言文王之興本由太王也注肆故今也愠恚隕墜也畎夷狄國也孟子曰賢者以其昭昭使人昭昭今以其昏昏使人昭昭注賢者治國法度昭明明於道德是躬行之道可也今之治國法度昏昏亂潰之政也身不能治而欲使人昭明不可得也疏正義曰此章言以明照暗暗者以開以暗責明暗者愈迷賢者可遵譏今之非也孟子曰至昭昭者孟子言有諸己然後求諸人之道也賢者之君治國以其昭昭明己之道德然後使人昭昭今之治國者乃以昏昏不能自明己之道德而欲使他人昭明故不可得也是亦所謂曲其表而求影之正濁其源而求流之清同其旨孟子謂高子曰山徑之蹊間介然用之而成路為間不用則茅塞之矣今茅塞子之心矣注高子齊人也嘗學於孟子鄉道而未明去而學於他術孟子謂之曰山徑山之嶺有微蹊介然人遂用之不止則蹊成為路為間有間也謂廢而不用則茅草生而塞之不復為路以喻高子學於仁義之道當遂行之而反中止正若山路故曰茅塞子之心也音義間張如字為間皆如字注同鄉音嚮疏正義曰此章言聖人之道學而時習舍而弗修猶茅是塞明為善之不可倦者也孟子謂於高子曰山嶺有微蹊其間之微小介然而已如用而行之則蹊成大路不用而行之茅草生塞之不能成其路也喻高子之為善止於中道而其心為利欲之所充塞亦若茅塞其路矣故曰今茅塞子之心矣蓋高子嘗於為詩而不通乎意是塞其心之一端也高子曰禹之聲尚文王之聲孟子曰何以言之注高子以為禹之尚聲樂過於文王孟子難之曰何以言之曰以追蠡注高子曰禹時鐘在者追蠡也追鐘鈕也鈕磨齧處深矣蠡欲絶之貌也文王之鐘不然以禹為尚樂也曰是奚足哉城門之軌兩馬之力與注孟子曰是何足以為禹尚樂乎先代之樂器後王皆用之禹在文王之前千有餘歲用鐘日久故追欲絶耳譬若城門之軌齧其限切深者用之多耳豈兩馬之力使之然乎兩馬者春秋外傳曰國馬足以行關公馬足以稱賦是兩馬也音義追音堆蠡音禮鈕音紐兩馬如字丁云古人駕車以兩馬軌謂限之轍迹也孟子意言城門限迹切深以日久逺為車所轢多故也豈是一時兩馬駕車而過之使然與音餘下來與同疏正義曰此章言前聖後聖所尚者同三王一體何得相踰欲以追蠡未逹一隅孟子言之將以啓其蒙者也高子曰禹之聲尚文王之聲者高子言於孟子曰禹王之尚聲樂過於文王之聲樂也孟子曰何以言之者孟子見髙子蔽惑故難之曰何以言禹之聲尚文王之聲也曰以追蠡髙子曰以其追蠡鐘鈕之鋭欲絶故云然也孟子曰是奚足哉城門之軌兩馬之力與孟子又以此解髙子之蔽也此言追蠡何足為禹之尚聲樂過於文王乎且譬之城門之軌齧其限之深處豈以兩馬之力能使之然亦以積漸之久故使然也非特兩馬之力即如是之深也言禹王至文王其鐘用之亦以日久故能磨鋭至於欲絶也此又見髙子之蔽不獨於詩也所謂太山之溜久而穿石單極之綆久而斷幹其來非一日也兩馬即如注所謂春秋外傳云國馬公馬是也齊飢陳臻曰國人皆以夫子將復為發棠殆不可復注棠齊邑也孟子嘗勸齊王發棠邑之倉以賑貧窮時人賴之今齊人復飢陳臻言一國之人皆以為夫子將復若發棠時勸王也殆不可復言之也孟子曰是為馮婦也晉人有馮婦者善搏虎卒為善士則之野有衆逐虎虎負隅莫之敢攖望見馮婦趨而迎之馮婦攘臂下車衆皆恱之其為士者笑之注馮姓婦名也勇而有力能搏虎卒後也善士者以善搏虎有勇名也故進以為士之於野外復見逐虎者攖迫也虎依陬而怒無敢迫近者也馮婦恥不如前見虎走而迎攘臂下車欲復搏之衆人悅其勇猛其士之黨笑其不知止也故孟子謂陳臻今欲復使我如發棠時言之於君是則我為馮婦也必為知者所笑也音義搏補各切嵎音愚攖丁於盈切從手埤蒼云攖捁也此注云迫也陬子于切又子侯切隅也疏正義曰此章言可為則從不可則止言善見用得其時也非時逆指猶若馮婦搏虎無己必有害也齊飢陳臻曰至殆不可復者蓋齊國之人時皆被飢孟子嘗勸齊王發粟以賑之今者復飢而孟子不復發棠邑之粟以賑陳臻為孟子之弟子乃問孟子言齊國之人皆以為夫子將復發棠邑之粟以賑救之今夫子不復發棠殆為齊王不可復勸是如之何故以此問孟子孟子曰至其為士者皆笑之者孟子乃以此馮婦之喻而比言於陳臻也言如將復發棠是為馮婦若也馮婦能暴虎也言晉國有馮婦之人善能搏虎後為之善士則之於野外見有衆人逐其虎虎倚山嵎而怒衆人皆莫敢攖而搏之者望見馮婦來乃皆趨進而迎之馮婦乃下車攘臂欲復搏之衆人皆悅其勇猛其為士之黨者知道則笑其不知止也言今齊王恃威虐以斂民亦若虎之負嵎以難合之説述於暴人之前又若迎而搏虎也是以孟子將復為發棠非不足以悅衆自君子觀之亦若為士者之笑馮婦也以其不知止矣注棠齊邑名正義曰案齊世家史記云棠公妻好裴駰云賈逵曰棠公齊邑大夫也是棠之為齊邑明矣孟子曰口之於味也目之於色也耳之於聲也鼻之於臭也四肢之於安佚也性也有命焉君子不謂性也注口之甘美味目之好美色耳之樂五音鼻之喜芬香臭香也易曰其臭如蘭四體謂之四肢四肢解倦則思安佚不勞若此皆人性之所欲也得居此樂者有命祿人不能皆如其願也凡人則觸情從欲而求可樂君子之道則以仁義為先禮節為制不以性欲而苟求之也故君子不謂性也仁之於父子也義之於君臣也禮之於賔主也知之於賢者也聖人之於天道也命也有性焉君子不謂命也注仁者得以恩愛施於父子義者得以義理施於君臣好禮者得以禮敬施於賔主智者得以明智知賢逹善聖人得以天道王於天下此皆命祿遭遇乃得居而行之不遇者不得施行然亦才性有之故可用也凡人則歸之命祿在天而已不復治性以君子之道則修仁行義修禮學智庶幾聖人亹亹不倦不但坐而聽命故曰君子不謂命也音義解音懈從音縱又如字知音智注明知學知小知皆同王於況切亹音尾疏正義曰此章言尊德樂道不追佚性治性勤禮不専委命君子所能小人所病究言其事以勸戒者也孟子曰至君子不謂性也者孟子言人口之於美味目之於好色耳之於五聲鼻之於芬芳四肢之於安佚無事以勞之凡此五者皆人性所欲也然而得居於此樂者以其有命存焉君子以為有命在所不求而不可以幸得也是所以不謂之性也仁之於父子也至君子不謂命也者孟子又言仁以恩愛施之於父子義以義理施之於君臣禮以禮敬施之於賔主智以明智施之於賢者而具四端聖人兼統四體而與於天道以王天下者也凡此五者皆歸之於命也然而有是五者皆稟乎天性也以其有性存焉君子以為有性在所可求而不可不勉也是所以不謂之命也孟子言之所以分别凡人君子以勸戒時人浩生不害問曰樂正子何人也注浩生姓不害名齊人也見孟子聞樂正子為政於魯而喜故問樂正子何等人也孟子曰善人也信人也注樂正子為人有善有信也何謂善何謂信注不害問善信之行謂何曰可欲之謂善有諸已之謂信充實之謂美充實而有光輝之謂大大而化之之謂聖聖而不可知之之謂神樂正子二之中四之下也注己之可欲乃使人欲之是為善人已所不欲勿施於人也有之於己乃謂人有之是為信人不意不信也充實善信使之不虛是為美人美德之人也充實善信而宣揚之使有光輝是為大人大行其道使天下化之是為聖人有聖智之明其道不可得知是為神人人有是六等樂正子能善能信在二者之中四者之下也音義意音億又如字疏正義曰此章言神聖以下優劣異差樂正好善應下二科是以孟子為之喜者也浩生不害問曰樂正子何人也者浩生不害問孟子曰樂正子何等人也以其見孟子聞樂正子為政於魯而喜故有此問之也孟子曰善人也信人也孟子答之以為樂正子是善人信人者也以其有善有信故也何謂善何謂信不害又問之曰何以謂之善何以謂之信也曰可欲之謂善有諸己之謂信至四之下也者孟子又答而詳為之解之曰己之可欲使人欲之是為善有是善於己謂人亦有之是謂之信所謂善即仁義禮智也是為可欲之善矣充賔其善使之不虛是為美人故謂之美充實其善而宣揚之使有光輝于外是為大人故謂之大人其此善不特充賔於己而推之以化人自近以及逺自內以及外是為聖人故謂之聖以此之善又至經緯萬方使人莫知其故是為神人故謂之神凡是六善而樂正子能善能信是在二之中而在美大聖神四者之下也但不能充實而至神也注孟子聞樂正子為政於魯正義曰此蓋經文説見上矣音義為之之為于偽切下為己是為本為非為皆同孟子注疏卷十四上孟子注疏卷十四上考證盡心章句下疏得民為君得君為臣監本脫得君二字今從閣本補入又疏十六章言仁恩須人須監本訛及今改正吾今而後知章注父仇不同天兄仇不同國疏兄弟之仇不反兵兄監本訛九今改正貉稽曰章稽大不理於口疏稽大不能治人之口使不訕其已者如之何臣宗楷按此則理者整理也辨義云蓋謂衆口紛亂之言不能整治此説為是不必從趙氏訓賴之義禹之聲章兩馬之力與臣宗楷按音義云古人駕車以兩馬蓋特言其力之少耳趙注引春秋外傳國馬足以行關公馬足以稱賦是為兩馬失之逺矣口之於味章注凡人則觸情從欲而求可樂觸監本訛有今改正又注故君子不謂性也監本謂字下衍之字今刪仁之於父子節注凡人則歸之命祿在天而已在監本誤任今改正孟子注疏卷十四上考證欽定四庫全書孟子注疏卷十四下漢趙氏注宋孫奭音義并疏盡心章句下孟子曰逃墨必歸於楊逃楊必歸於儒歸斯受之而已矣注墨翟之道兼愛無親疏之别最為違禮楊朱之道為己愛身雖違禮尚得不敢毁傷之義逃者去也去邪歸正故曰歸去墨歸楊去楊歸儒則當受而安之也今之與楊墨辨者如追放豚既入其苙又從而招之注苙蘭也招罥也今之與楊墨辨爭道者譬如追放逸之豕豚追而還之入欄則可又復從而罥之太甚以言去楊墨歸儒則可又復從而非之亦云太甚音義苙丁音立欄也圈也蘭與欄字同罥涓兖切謂羈其足也疏正義曰此章言驅邪反正斯可矣來者不拒追其前罪君子甚之以為過者也孟子曰逃墨必歸於楊至歸斯受之而已矣者墨翟無親疏之别楊朱尚得父母生身不敢毁傷之義儒者之道幼學所以為己壯而行之所以為人故能兼愛無親疏之道必歸於楊朱為己逃去楊朱為己之道必歸儒者之道也然而歸之儒道則當斯受而安之矣今之與楊墨至從而招之者孟子又言今之人有與楊墨辨爭其道者如追放逸之豕豚既還入其欄又從而罥之者也以其逃墨而歸儒則可受之而已而乃又從而罪之無以異於追放逸之豕豚既入其欄又從而罥之也以其為亦太甚矣此孟子所以比之孟子曰有布縷之征粟米之征力役之征注征賦也國有軍旅之事則橫興此三賦也布軍卒以為衣也縷紩鎧甲之縷也粟米軍糧也力役民負荷斯養之役也君子用其一緩其二用其二而民有殍用其三而父子離注君子為政雖遭軍旅量其民力不並此三役更發異時急一緩二民不苦之若並用二則路有餓殍若並用三則分崩不振父子離析忘禮義矣音義橫胡孟切下橫暴同紩音秩鎧苦愛切又苦亥切斯義同厮賤役也殍皮表切張音孚疏正義曰此章言原心量力政之善者繇役並興以致離殍養民輕斂君之道也孟子曰有布縷之征至用其三而父子離者此所以薄稅斂之言而有以救時之弊者矣孟子言有布縷之征有粟米之征有力役之征布所以為衣縷所以紩鎧甲粟米所以為糧力征所以荷負厮飬之役然而君子為政其於此三者之賦未嘗並行也用其一則緩其二今夫三者之賦皆取民之類也如用其二則有傷財而民至於餓死用其三則有害民而至於父子離散是豈君子之為政然歟蓋征之者義也緩之者仁也惟君子以仁是守以義是行然而充類之至而義之盡者君子所不為也此孟子不得不權時而救時之弊也孟子曰諸侯之寶三土地人民政事寶珠玉者殃必及身注諸侯正其封疆不侵鄰國鄰國不犯寶土地也使民以時居不離散寶人民也修其德教布其惠政寶政事也若寶珠玉求索和氏之璧隋侯之珠與強國爭之強國加害殃及身也疏正義曰此章言寶此三者以為國珍寶於爭玩以殃其身諸侯如兹永無患也孟子言諸侯之所寶者有三曰土地曰人民曰政事使鄰國無侵犯其封疆是寶其土地也撫恤鰥寡煢獨使民以時民不離散是寶人民也修德布惠是寶政事也若不以此三者為寶而寶珠玉者殃禍必及身矣此孟子見當時之君爭城殺人橫賦重斂不以土地人民政事為寶所以有是言而救之耳注和氏之璧隋氏之珠正義曰案韓詩云楚人和氏得玉璞於楚山中獻武王武王使人相之曰非也王怒刖其左足後成王即位和抱玉璞泣于楚山下成王使人琢之果得寶名曰和氏之璧又隋侯姓祝字元暢往齊國見一蛇在沙中頭上血出隋侯以杖挑于水中而去後回還到蛇處乃見此蛇銜珠來隋侯前隋侯意不懌是夜夢腳踏一蛇驚起乃得雙珠後人稱為隋侯珠矣盆成括仕於齊孟子曰死矣盆成括注盆成姓括名也嘗欲學于孟子問道未逹而去後仕于齊孟子聞而嗟嘆曰死矣盆成括知其必死盆成括見殺門人問曰夫子何以知其將見殺注門人問孟子何以知之也曰其為人也小有才未聞君子之大道也則足以殺其軀而已矣注孟子答門人言括之為人小有才慧而未知君子仁義謙順之道適足以害其身也疏正義曰此章言小智自私藏怨之府勞謙終吉者也盆成括仕于齊孟子曰死矣盆成括者盆成括嘗學於孟子未逹其道而去之後仕于齊國孟子聞之乃曰死矣盆成括以其盆成括之必見死也盆成括見殺門人問曰夫子何以知其將見殺者言盆成括果見殺死門人乃問孟子曰夫子何以知其盆成括將見殺死曰其為人也小有才未聞君子之大道也則足以殺其軀而已矣者孟子答之曰盆成括之為人小有才慧而未知聞君子仁義謙順之大道是則足以知其將見殺其身孟子之滕館於上宮注館舍也上宮樓也孟子舍止賔客所館之樓上也有業屨於牖上館人求之弗得或問之曰若是乎從者之廋也注屨屝屨也業織之有次業而未成也置之窗牖之上客到之後求之不得有來問孟子者曰是客從者之廋廋匿也孟子與門徒相隨從車數十故曰侍從者所竊匿也曰子以是為竊屨來與注孟子謂館人曰子以是衆人來隨事我本為欲竊屨故來邪曰殆非也注館人曰殆非為是來事夫子也自知問之過也夫子之設科也往者不追來者不拒苟以是心至斯受之而已矣注孟子曰夫我設教授之科教人以道德也其去者亦不追呼來者亦不拒逆誠以是學道之心來至我則斯受之亦不知其取之與否君子不保其異心也見館人殆非為是來亦云不能保知謙以益之而已音義從才用切下從車同廋或作廋同音搜屝符費切疏正義曰此章言教誨之道受之如海百川移流不得有拒雖獨竊屨非己所絶順答小人小人自咎者也孟子之滕館於上宮者孟子往至滕國乃舍止於賔客所館之樓上有業屨於牖上館人求之弗得或問之曰若是乎從者之廋也者言業織之有次業而未成之屨置之於窗牖之上自客到之後館主之人求之不得或問於孟子曰若此屨之不見為從者之廋匿也曰子以是為竊屨來與者孟子見館主乃問己以為從者之廋匿其屨乃謂之曰子以是從者來隨事我本為欲竊子之屨故來與曰殆非也館主自知責己問之過也乃曰殆非為是來事夫子也夫子之設科也至斯受之而已矣者孟子又曰夫我之設科以教人往去之者則不追呼而還來者則不拒逆誠以是學道之心來至我則斯容受之而教誨亦且不保其異心也然則不拒從者之匿屨亦何纍之有論語云不保其往有教無類其斯之謂與孟子曰人皆有所不忍達之於其所忍仁也注人皆有所愛不忍加惡推之以通於所不愛皆令被德此仁人也人皆有所不為達之於其所為義也注人皆有不喜為謂貧賤也通之于其所喜為謂富貴也抑情止欲使若所不喜為此者義人也人能充無欲害人之心而仁不可勝用也注人皆有不害人之心能充大之以為仁仁不可勝用也人能充無穿踰之心而義不可勝用也注穿墻踰屋姦利之心也人既無此心能充大之以為義義不可勝用也人能充無受爾汝之實無所往而不為義也注爾汝之實德行可輕賤人所爾汝者也既不見輕賤不為人所爾汝能充大而以自行所至皆可以為義也士未可以言而言是以言餂之也可以言而不言是以不言餂之也是皆穿踰之類也注餂取也人之為士者見尊貴者未可與言而強與之言欲以言取之也是失言也見可與言者而不與之言不知賢人可與之言而反欲以不言取之是失人也是皆趨利入邪無知之人故曰穿踰之類也音義餂丁曰注云餂取也今案字書及諸書並無此餂字郭璞方言注云音沗謂挑取物也其字從金今此字從食與方言不同蓋傳寫誤也學者宜詳本亦作䬯奴兼切疏正義曰此章言善恕行義充大其美無受爾汝何施不可取人不知失其臧否比之穿踰之類者也孟子曰人皆有所不忍至是皆穿踰之類也者孟子言人皆有所惻隱而不忍如能推之所不忍於其所忍者仁人也以其所愛及其所不愛仁之為道如是也人皆有所不喜為謂貧賤也如能推之所不喜為而逹之於所喜為謂富貴也是為有義之人也人能充大不欲害人之心而為仁則仁道於是乎備故不可勝用也人能充大其無穿踰姦利之心以為義則義於是乎盡故義不可勝用也人能充大其不受人爾汝之實是不為人所輕賤故無所行而不為義者也言所為皆可以為義矣蓋惻隱有不忍者仁之端也羞惡有不為者義也但能充而大之則為仁義矣人之為士於尊貴者未可與言而與之言是以言取之也是失言也以其失之諂也可以與之言而不與之言是以不言取之也是失人也以其失之敖也如此者是皆為穿墻踰屋趨姦利之類也音義否音鄙與音豫下與並同孟子曰言近而指遠者善言也守約而施博者善道也君子之言也不下帶而道存焉注言近指逺近言正心逺可以事天也守約施博約守仁義大可以施德于天下也二者可謂善言善道也正心守仁皆在胸臆吐口而言之四體不與焉故曰不下帶而道存焉君子之守修其身而天下平注身正物正天下平矣人病舍其田而藝人之田所求於人者重而所以自任者輕注藝治也田以喻身舍身不治而欲責人治是求人太重自任太輕也疏正義曰此章言道之善以心為原當求諸己而責於人君子尤之况以妄藝言失務者也孟子曰言近而指遠者至所以自任者輕孟子言辭之近而指意己逺者乃為善言也所守簡約而所施博大者乃為善道也君子之言也不下帶而道存焉是所謂言近而指逺也是孟子自解其旨也以君子于其言也皆在胸臆以其不逺於心而道存焉蓋帶者所以服之近於人身也故取而喻之曰不下帶而道存抑又見君子之言非特騰口説而已君子之守修其身而天下平是所謂守約而施博也是孟子又自解其旨也以其君子之所守特在修身而天下由是平矣是所謂正已而物正者也且人病在舍其已之田而耕耘化人之田也是所求于人者為重而所以自任其在已者太輕耳藝治也田所以喻人之身也言人病在舍其己身而治他人之身也故為是云孟子曰堯舜性者也湯武反之也注堯舜之體性自善者也殷湯周武反之于身身安乃以施人謂加善于民也動容周旋中禮者盛德之至也注人動作容儀周旋中禮者盛德之至哭死而哀非為生者也注死者有德哭者哀也經德不回非以干祿也言語必信非以正行也注經行也體德之人行其節操自不回邪非以求祿位也庸言必信非必欲以正行為名也性不忍欺人也君子行法以俟命而已矣注君子順性蹈德行其法度大夀在天行法以待之而已矣音義中張仲切或如字疏正義曰此章言君子之行動合禮中不惑禍福修身俟終堯舜之盛湯武之隆不是過也孟子曰至於君子行法以俟命而已矣者孟子言堯舜之體性自然善也湯王武王反之於身身安乃以施人謂加善於人而反之者也一則體性之自然一則反之于身身安乃以施人無非是禮也故動容周旋中禮者是為盛德之至也至者以其盛德至矣盡矣不可以有加矣蓋哭死而哀非為生者也是為動容中禮也是孟子自解之旨也言哭其死而哀之者非為其生者也以其動容中禮德性然也經德不回非以干祿也言語必信非以正行也是謂周旋中禮者也是孟子自解之旨也言行德不回邪非欲干求爵祿而然也以其周旋中禮德行然也言語必以正非欲以正行為名故然也亦以周旋中禮德言如是也君子者順性蹈德行其禮法修身以俟命而已然則堯舜禹湯為盛德之至亦不是過也孟子曰説大人則藐之勿視其魏魏然注大人謂當時之尊貴者也孟子言説大人之法心當有以輕藐之勿敢視之魏魏冨貴若此而不畏之則心舒意展言語得盡而已堂高數仭榱題數尺我得志弗為也注仞八尺也榱題屋霤也堂髙數仞榱題數尺奢汰之室使我得志不居此堂也大室無尺丈之限故言數仞也食前方丈侍妾數百人我得志弗為也注極五味之饌食列於前方一丈侍妾衆多至數百人也般樂飲酒驅騁田獵後車千乘我得志弗為也注般大也大作樂而飲酒驅騁田獵後車千乘般于遊田也在彼者皆我所不為也在我者皆古之制也吾何畏彼哉注在彼貴者驕佚之事我所恥為也在我所行皆古聖人所制之法謂恭儉也我心何為當畏彼人乎哉音義説音稅下注同藐丁音邈藐然輕易之貌又音眇魏音巍丁云當作巍榱丁楚危切爾雅曰桷謂之榱題也霤力救切汰音泰般音盤疏正義曰此章言富責而驕自遺咎也茅茨采椽聖堯表也以賤説貴懼有蕩心心謂彼陋以寧我神故以所不為為之寶玩者也孟子曰説大人則藐之至吾何畏彼哉者孟子言説當時之尊貴為之大人者當輕藐之勿視其魏魏然尊貴而畏之也以其如是則心意舒展得盡其言也又言堂髙數仭仞八尺也至霤髙數尺是為奢泰之室也如我之得志于行道不為此室也食之前有方丈之廣以極五味之饌而列之又有所侍之妾至數百人之衆如我得志于行道亦不為之也大作樂而飲酒驅騁田獵有後車千乘之多如我得志于行道亦不為之也以其在彼驕貴之事者皆于我所恥而不為之也在我所行之事又皆是古聖王之制度者也是皆恭儉而有禮也如是則于我何有畏于彼之富貴乎哉是以説大人則藐之而勿視其魏魏然也音義遺以醉切孟子曰養心莫善於寡欲其為人也寡欲雖有不存焉者寡矣注養治也寡少也欲利欲也雖有少欲而亡者謂遭橫暴若單豹卧深山而遇飢虎之類也然亦寡矣其為人也多欲雖有存焉者寡矣注謂貪而不亡蒙先人德業若晉國欒黶之類也然亦少矣不存者衆音義單音善黶乙斬切疏正義曰此章言清淨寡欲德之髙者畜聚積實穢行之下廉者招福濁者速禍雖有不然蓋非常道是以正路不可不由也孟子曰至雖有不存焉者寡矣者孟子言此以教時人養心之術也言人之治其心莫善於少欲也其為人也少欲則不為外物之汩喪雖有遭橫暴而亡者蓋亦百無二三也然而未必全無也以其少也是如單豹為人少欲獨隱處于深山而卧乃遭遇于飢虎而亡之是也其為人也多欲則常于外物之所汩喪雖間有不亡其德業於身者蓋亦百無二三也然而未必多有者焉以其亦少也是如欒黶為人多貪乃為卿于晉國者是也荀子云養心莫善于誠蓋亦與此孟子同其旨也曽晳嗜羊棗而曾子不忍食羊棗公孫丑問曰膾炙與羊棗孰美注羊棗棗名也曾子以父嗜羊棗父沒之後惟念其親不復食羊棗故身不忍食也公孫丑怪之故問羊棗與膾炙孰美也孟子曰膾炙哉注言膾炙固美也何比於羊棗公孫丑曰然則曾子何為食膾炙而不食羊棗曰膾炙所同也羊棗所獨也諱名不諱姓姓所同也名所獨也注孟子言膾炙雖美人所同嗜獨曾子父嗜羊棗耳故曽子不忍食也譬如諱君父之名不諱其姓姓與族同之名所獨也故諱音義晳音錫復扶又切炙之夜切疏正義曰此章言曽參至孝思親異心羊棗之感終身不嘗孟子嘉之曾晳嗜羊棗而曾子不忍食羊棗公孫丑問曰膾炙與羊棗孰美者曽晳曽子父也曽晳為人専好羊棗羊棗棗名也曽晳既沒而曽子常思念其親而不忍食羊棗公孫丑怪之乃問孟子以謂膾炙與羊棗此二味孰為美孟子曰膾炙哉言膾炙固美于羊棗也而羊棗何可比于膾炙哉公孫丑曰然則曽子何為食膾炙而不食羊棗公孫丑又問孟子曰如是則曽子何為獨食於膾炙而不忍食羊棗曰膾炙所同也羊棗所獨也諱名不諱姓姓所同也名所獨也孟子又答之曰膾炙雖美人所同好者也羊棗獨曽晳好之故曽子所以思念之而不忍食也譬如諱君父之名不諱其姓者以其姓為族之所同名為君父之所獨故諱之也注羊棗棗名也正義曰蓋樲與棗一物也然而有二名是樲小而棗大樲酸而棗甘耳云羊棗則羊棗之為大棗甘者矣其類則樲棗之屬也曽晳者曽子父也案史記弟子傳曰曽蒧音點字晳是也孔傳云曽參父名點注上章稱曰豈有非義而曽子言之者正義曰此謂公孫丑疑曽子為非義而乃不知膾炙所同羊棗之所獨而曽子之心言之是或一于孝道故云然也萬章問曰孔子在陳曰盍歸乎來吾黨之小子狂簡進取不忘其初孔子在陳何思魯之狂士注孔子在陳不遇賢人上下無所交蓋歎息思歸欲見其鄉黨之士也簡大也狂者進取大道而不得其正者也不忘其初孔子思故舊也周禮五黨為州五州為鄉故曰吾黨之士也萬章怪孔子何為思魯之狂士者也孟子曰孔子不得中道而與之必也狂狷乎狂者進取狷者有所不為也孔子豈不欲中道哉不可必得故思其次也注中道中正之大道也狂者能進取狷者能不為不善時無中道之人以狂狷次善者故思之也敢問何如斯可謂狂矣注萬章曰人行何如斯則可謂之狂也曰如琴張曽晳牧皮者孔子之所謂狂矣注孟子言人行如此三人者孔子謂之狂也琴張子張也子張之為人踸踔譎詭論語曰師也辟故不能純善而稱狂也又善鼓琴號曰琴張曽晳曽參父也牧皮行與二人同皆事孔子學者也何以謂之狂也注萬章問何以謂此人為狂曰其志嘐嘐然曰古之人古之人夷考其行而不掩焉者也注嘐嘐志大言大者也重言古之人欲慕之也夷平也考察其行不能掩覆其言是其狂也狂者又不可得欲得不屑不潔之士而與之是狷也是又其次也注屑潔也不潔汚穢也既不能得狂者欲得有介之人能恥賤汙行不潔者則可與言矣是狷又次于狂者也孔子曰過我門而不入我室我不憾焉者其惟鄉原乎鄉原德之賊也注憾恨也人過孔子之門不入則孔子恨之獨鄉原不入者無恨心耳以其鄉原賊德故也曰何如斯可謂之鄉原矣注萬章問鄉原之惡何如曰何以是嘐嘐也言不顧行行不顧言則曰古之人古之人行何為踽踽涼涼生斯世也為斯世也善斯可矣閹然媚於世也者是鄉原也注孟子言鄉原之人言何以嘐嘐若有大志也其言行不顧則亦稱曰古之人古之人行何為踽踽涼涼有威儀如無所施之貌也鄉原者外欲慕古之人而其心曰古之人何為空自踽踽涼涼而生于今之世無所用之乎以為生斯世但當取為人所善善人則可矣其實但為合衆之行媚愛也故閹然大見愛于世也若是者謂之鄉原也萬子曰一鄉皆稱原人焉無所往而不為原人孔子以為德之賊何哉注萬子即萬章也孟子録之以其不解于聖人之意故謂之萬子子男子之通稱也美之者欲以責之也萬子言人皆以為原善所至亦謂之善人若是孔子以為賊德何為也曰非之無舉也刺之無刺也同乎流俗合乎汙世居之似忠信行之似廉潔衆皆悅之自以為是而不可與入堯舜之道故曰德之賊也注孟子言鄉原之人能匿蔽其惡非之無可舉者刺之無可刺者志同于流俗之人行合于汚亂之世為人謀居其身若似忠信行其身若似廉潔為行矣衆皆悅美之其人自以所行為是而無仁義之實故不可與入堯舜之道也無德而人以為有德故曰德之賊也孔子曰惡似而非者惡莠恐其亂苖也惡佞恐其亂義也惡利口恐其亂信也惡鄭聲恐其亂樂也惡紫恐其亂朱也惡鄉原恐其亂德也注似真而非真者孔子之所惡也莠之莖葉似苗佞人詐飾似有義者利口辨辭似若有信鄭聲淫人之聽似若美樂紫色似朱朱赤也鄉原惑衆似有德者此六似者孔子之所惡也君子反經而已矣經正則庶民興庶民興斯無邪慝矣注經常也反歸也君子治國家歸於常經謂以仁義禮智道化之則衆民興起而家給人足矣倉廪實而知禮節安有為邪惡之行也音義狷丁音絹興狷同踸丁勑甚切踔勑效切又勑角切譎音決詭過委切嘐火包切重直用切下同言不顧行行不顧言古之人行張云三行並去聲注及下行合為行之行士行皆同何為踽踽張云為于偽切踽俱禹切為又如字閹音奄解音蟹汙音烏又烏故切莠音誘慝土得切疏正義曰此章言士行有科人有等級中道為上狂狷不合似是而非色厲內荏鄉原之惡聖人所甚反經身行民化于已子率以正孰敢不正之謂也萬章問曰孔子在陳至何思魯之狂士者萬章問曰孔子在陳國有厄不遇賢人上下無有交者乃歎曰盍歸乎來言我黨之為士進取于大道而不得其中道者也亦以不忘其初而思故舊也故問之孟子謂孔子在陳國何為而思魯國之狂士者也孟子曰孔子不得中道而與之至故思其次也孟子答之曰孔子不得中正之道者而取與之必也思其狂狷者乎狂者以其但進取于大道而不知退宿于中道狷者有所不敢為但守節無所為而應進退者也孔子豈不欲中道者而與之哉不可以必得中道之人故思念其次于中道者為狂狷者也敢問何如斯可謂狂矣萬章又問孟子曰人行當何如則斯可謂之狂矣曰琴張曽晳牧皮者孔子之所謂狂矣孟子又答之曰如琴張曽晳牧皮三人者孔子謂為狂者也蓋論語嘗謂古之狂也肆今之狂也蕩琴張曽晳牧皮三者皆學于孔子進取於道而躐等者也是謂古之狂者也琴張曰君子不為利疚我曽晳風乎舞雩詠而歸是皆有志於學亦志于仕以為進取者也牧皮經傳並無所見大抵皆學孔子而行有同於曽晳琴張二人耳此孟子所以皆謂之狂士何以謂之狂也萬章又問何以謂此三人為之狂士也曰其志嘐嘐然曰古之人古之人至鄉原德之賊也者孟子又答之曰其志嘐嘐然大言乃曰古之人古之人及考驗其所行之行而未始掩覆其言焉是言過于行為之狂者也孔子思與狂者又不可而必得之欲得有介之人能恥賤汚行不潔者而與之是為狷者也是又次于狂者也孔子有曰過我門而不入我室我不以恨之者其惟獨于鄉原之徒也鄉原者以其為賊害于德者也然則孔子如以自非鄉原而過其門而不入室者是則恨之矣此亦見孔子自非鄉原之徒者無不與之也所以思于中道而不可得則思其狂狷曰何如斯可謂之鄉原矣萬章又問何如則謂之鄉原者矣曰何以是嘐嘐也至是鄉原也孟子又答之曰鄉原之人其言何以是嘐嘐然若有大也以其言不顧於行行又不顧于言則亦稱之曰古之人古之人所行之行何為踽踽涼涼有威儀如無所施之貌也是言鄉原之人外欲慕古之人而其心乃曰古之人何為空自踽踽涼涼而生於今之世無所用之乎以為生斯世也但當取為人所善則可矣故閹然大見媚愛之于世也者是則謂之鄉原者矣萬章曰一鄉皆稱原人焉至何哉者萬章不解孟子之意故問之曰如一鄉皆稱為原善之人是無所往而不為善人矣孔子乃以為有賊害于德是為德之賊者何為者哉曰非之無舉也至斯無邪慝者孟子又答之曰言鄉原之人能掩蔽其惡使人欲非謗之則無可而非者使人欲譏刺之則無可為譏刺者其志則有同乎流俗之人所行又合於汚亂之世居其身則若有忠信而實非忠信也行其身若有廉潔而實非廉潔也衆人皆恱美之而自以為是而無其實故不與入堯舜之正道者也是無得而為有得故謂之為德之賊者也孔子有曰惡有似真而非真者惡莠之莖華秀茂者以其似苖恐有亂其苖種者也惡佞詐飾者以其似義恐有亂其義者也惡利口辨辭以其似信恐其有亂於信者也惡鄭聲之淫哇以其似美樂恐其有亂於雅樂也惡紫之間色以莫似朱恐其有亂於朱者也惡鄉原之惑衆以其似有德恐其有亂於德者也凡此六者孔子所以惡之以其似是而非者也君子者乃歸其常經而已矣云經者則義信德是也如佞利口鄉原者是不經也唯君子則反經而已矣君子去其不經以反復乎經則其經斯適於正而不他故義以立而不為佞亂信以立而不為利口亂德以立而不為鄉原亂此庶民所以興行又不為兩疑之惑矣庶民既以興行斯無邪慝之行也注周禮五黨為州五州為鄉故曰吾黨之士也正義曰案論語云子在陳曰歸與歸與吾黨之小子狂簡斐然成章不知所以裁之今云周禮五黨而解其文蓋亦不案此論語而有誤也誠如周禮五黨言之則論語何以云吾黨蓋不當引此為證所謂黨者蓋五百家為之黨是其旨也注孟子言至學者也正義曰子張之為人踸踔譎詐論語曰師也辟故不能純善者案家語有衛人琴牢字張則此與左傳所謂琴張者琴牢而已非所謂子張善鼓琴也趙注引為顓孫師亦未審何據而琴張曰師張曰曽晳曽參之父蓋言於前矣牧皮者未詳注似真而非至孔子所惡也正義曰案論語云惡紫之奪朱惡鄭聲之亂雅樂惡利口之覆邦家其序與此不同者蓋孟子以亂義不及亂信亂信不及亂德其所主三者而已苖莠朱紫聲樂所託以為喻者也是所以為異者也注色厲內荏至子帥以正孰敢不正者正義曰此蓋本論語之文而云音義率如字又所類切孟子曰由堯舜至於湯五百有餘歲若禹臯陶則見而知之若湯則聞而知之注言五百歲聖人一出天道之常也亦有遲速不能正五百歲故言有餘歲也見而知之謂輔佐也通於大賢次聖者亦得與在其間親見聖人之道而佐行之言易也聞而知之者聖人相去卓逺數百歲之間變故衆多踰聞前聖所行追而遵之以致其道言難也由湯至於文王五百有餘歲若伊尹萊朱則見而知之若文王則聞而知之注伊尹摰也萊朱亦湯賢臣也一曰仲虺是也春秋傳曰仲虺居薛為湯左相是則伊尹為右相故二人等德也由文王至於孔子五百有餘歲若太公望散宜生則見而知之若孔子則聞而知之注太公望吕尚也號曰師尚父散宜生文王四臣之一也吕尚有勇謀而為將散宜生有文德而為相故以相配而言之也由孔子而來至於今百有餘歲去聖人之世若此其未遠也近聖人之居若此其甚也然而無有乎爾則亦無有乎爾注至今者至今之世當孟子時也聖人之間必有大賢名世者百有餘年適可以出未為逺而無有也鄒魯相近傳曰魯擊柝聞于邾近之甚也言己足以識孔子之道能奉而行之既不遭值聖人若伊尹吕望之為輔佐猶可應備名世如傅説之中出於殷高宗也然而世謂之無有此乃天不欲使我行道也故重言之知天意之審也言則亦者非實無有也則亦當使為無有也乎爾者歎而不怨之辭也音義虺虛鬼切散素但切尚父如字將即亮切然而無有乎爾則亦無有乎爾陸本作然而無乎爾則亦有乎爾云孟子意自以當之鄒魯相鄰故曰近聖人之居無乎爾有乎爾疑之也此意以況絶筆于獲麟也柝音託疏正義曰此章言天地剖判開元更始三皇以來人倫攸敘𢎞析道德莫貴聖人聖人不出名世承間雖有斯限蓋有遇不遇焉是以仲尼至獲麟而止筆孟子亦有乎爾終於篇章者也孟子曰由堯舜至于湯至由湯至于文王又至由文王至于孔子又至由孔子而至于今止無有乎爾者此孟子欲歸道于已故歷言其世代也言自堯舜二帝至于商湯其年數有五百餘載矣如禹臯陶為堯舜之臣則親見而知堯舜聖人之大道而佐行之也如湯王之去堯舜之世則相去有數百歲之逺則但聞其二帝所行之道遵而行之者也又自商湯逮至文王周時又有五百餘歲如伊尹萊朱二者俱為湯之賢臣則親見而知湯所行之道而輔佐之者也如文王之去湯世則相去有數百歲之逺則但聞其湯所行之道而遵之者也以自文王之世至于孔子之時又有五百餘載如太公望散宜生二者為文王之臣則親見而知文王所行之道而輔佐之者也如孔子之去文王世則相去亦有數百歲之逺則但聞其文王之道而遵之者也故自孔子以來逮至于今但百有餘歲以其去孔子之世如此之未逺自鄒國至于魯國其地相去如此之甚近然而猶可應備名世如傅説之中出於高宗也然而世之以謂無有此名世而出於間者乃天不欲使我行道也故曰然而無有乎爾則亦無有乎爾矣此所以欲歸於己而歷舉世代而言之也注伊尹至于等德也正義曰史記云伊尹名摰號為阿衡也為湯之相萊朱亦湯賢臣一曰仲虺是也春秋傳曰仲虺居薛為湯左相者蓋魯定公元年左丘明之文也杜預云仲虺奚仲之後也注太公望散宜生正義曰太公望於前詳言之矣散宜生案論語云武王曰豫有亂臣十人馬融云十人而散宜生在焉散姓宜生名也注至今者至而無有也正義曰云魯擊柝聞於邾者案魯哀公七年公伐邾之文也亦於敘言之詳矣云傅説出殷高宗者亦言于前篇矣然而仲尼作春秋必至獲麟而止筆而孟子亦必止於無有乎爾而終其篇者蓋亦見孟子擬仲尼而作者也故哀公十四年春西狩獲麟杜氏云麟仁獸也聖王之嘉瑞時無明王出而遇獲仲尼傷周道不興感嘉瑞之無應故春秋修中興之教絶筆於獲麟之一句所感而作固所以為終也孟子之書終於是言者蓋亦憫聖道不明于世歷三皇以來推以世代雖有歲限然亦有遇不遇焉故述仲尼之意而作此七篇遂以無有乎爾終於篇章之末蓋亦深歎而不怨之云爾音義剖普后切孟子注疏卷十四下孟子注疏卷十四下考證逃墨必歸於楊章疏來者不拒拒監本訛追今改正曾晳嗜羊棗章注羊棗棗名也疏是樲小而棗大爾雅羊棗郭注云實小而圓紫黑色俗呼為羊矢棗即孟子之所言也據此則疏以羊棗為大棗者非孔子在陳章過我門而不入我室節注憾恨也憾監本訛賊今改正孟子注疏卷十四下考證司經局洗馬臣陸宗楷謹言臣按孟子一書導王化之原紹六經之奧自炎漢趙岐作孟子注綱舉目張井然有條後陸善經鄭亢綦毋邃諸家皆宗之子朱子集注採録正復不少宋孫奭作疏與趙氏注相發明援引經傳原委畢該其羽翼之功不下趙氏矣顧監本所刋注疏二十八卷目次多非當時之舊而字句脫訛較諸經尤甚臣等奉敕校刋究其異同辨其殘失訛者正之闕者補之惟是孫奭音義一卷有裨後學而各本與監本俱闕焉未載今按章逐節各以類從用資省覽至於注疏原文監本脫略者必旁搜各本確有可據始為增改若諸本從同雖心知其訛姑闕疑焉謹集成考證若干條附諸簡末臣謹識
